е (недеполяризующие) — тубокурарин (Tubocurarini chloridum), пипекуроний; конкурируют с ацетилхолином, экранируют мембрану синапса, препятствуя сокращению. Антидот — прозерин.\n\nПрименение в ветеринарии:\n• Обездвиживание животных, фиксация диких и крупных животных, миорелаксация при операциях и интубации (только при ИВЛ — расслабляют дыхательные мышцы)."}, {"num": "20.3", "category": "Билет 20", "q": "Выписать 0,5% раствор новокаина 200мл. для инфильтрационной анестезии корове.", "hint": "• 0,5% = 1 г новокаина на 200 мл.\n• Инфильтрационная анестезия (послойно).\n• Стерильно, вводят в ткани.\n• Стандарт инфильтрации — 0,25–0,5%.", "a": "Rp.: Solutionis Novocaini 0,5% - 200 ml\n      Sterilisetur!\n      D.S. Корове. Для инфильтрационной анестезии — послойно инфильтрировать ткани по линии разреза перед операцией.\n\nРазвёрнутая пропись:\nRp.: Novocaini 1,0\n      Aquae pro injectionibus ad 200 ml\n      M. Sterilisetur!\n      D.S. Корове. Для инфильтрационной анестезии.\n\nПояснение:\nДля 0,5% раствора на 200 мл берут 1 г новокаина (0,5 г на 100 мл). Для инфильтрационной анестезии применяют 0,25–0,5% растворы, вводят в ткани в количестве от 30 до 300 мл и более в зависимости от объёма операции. Для удлинения действия можно добавить 0,1% раствор адреналина (1 капля на 5–10 мл). Раствор обязательно стерилизуют."}, {"num": "21.1", "category": "Билет 21", "q": "Пути введения лекарственных веществ в организм животного. Их влияние на качество продукции.", "hint": "• Две группы: энтеральные и парентеральные\n• Энтерально — через ЖКТ (рот, рубец, прямая кишка)\n• Парентерально — мимо ЖКТ (п/к, в/м, в/в)\n• Путь решает скорость, силу, побочные эффекты\n• Антибиотики в мясе/молоке — срок ожидания (каренции)", "a": "Определение:\n• Путь введения определяет скорость наступления, силу и длительность действия, спектр побочных эффектов.\n\nЭнтеральные пути (через ЖКТ):\n• Через рот (per os, орально) — порошки, болюсы, растворы; всасывание медленнее, часть разрушается в ЖКТ.\n• Внутрирубцово (у жвачных) — через зонд или прокол.\n• Через прямую кишку (ректально) — клизмы, свечи; минует печень частично.\n\nПарентеральные пути (минуя ЖКТ):\n• Подкожно (s/c) — медленное равномерное всасывание.\n• Внутримышечно (i/m) — быстрее подкожного.\n• Внутривенно (i/v) — действие сразу, точная доза; нельзя масла и взвеси.\n• Внутрикожно, внутрибрюшинно, ингаляционно, наружно (на кожу, слизистые), интрацистернально (в вымя).\n\nВлияние на качество продукции:\n• Лекарства (особенно антибиотики, гормоны, антигельминтики) выделяются с молоком, накапливаются в мясе, яйцах.\n• Устанавливают срок ожидания (каренции) — период, в течение которого продукцию (молоко, мясо, яйца) нельзя использовать в пищу.\n• Несоблюдение сроков → остаточные количества препаратов в продукции, опасность для человека, аллергии, устойчивость микробов.\n• Внутрицистернальное введение в вымя → особенно строгий контроль молока.\n• Вывод: выбор пути и соблюдение сроков ожидания обеспечивают безопасность продукции."}, {"num": "21.2", "category": "Билет 21", "q": "Изменения, вызываемые лекарственными веществами.", "hint": "• Главные виды действия: местное и резорбтивное\n• Прямое и рефлекторное; главное и побочное\n• Возбуждение или угнетение функции\n• Стимуляция, тонизация, угнетение, паралич", "a": "Определение:\n• Лекарственное вещество вызывает в организме изменения (эффекты) — усиление или ослабление функций органов.\n\nВиды действия по локализации:\n• Местное — на месте приложения (до всасывания): вяжущее, обволакивающее, прижигающее, раздражающее.\n• Резорбтивное (общее) — после всасывания в кровь, действие на органы и системы.\n\nПо механизму:\n• Прямое — непосредственно на орган (сердце, мышцу).\n• Рефлекторное — через рефлекс с рецепторов (напр. раздражение слизистой → откашливание).\n\nПо значимости:\n• Главное (основное) — ради которого назначают препарат.\n• Побочное — нежелательное сопутствующее.\n• Избирательное (элективное) — преимущественно на один орган/систему.\n\nПо направленности изменения функции:\n• Возбуждающее (стимулирующее) действие:\n  – Тонизирующее — до нормы при сниженной функции.\n  – Возбуждающее — выше нормы.\n• Угнетающее действие:\n  – Успокаивающее (седативное), угнетение, паралич (полное прекращение функции).\n\nДругие виды:\n• Этиотропное (на причину болезни), патогенетическое, симптоматическое.\n• Обратимое и необратимое; токсическое действие (передозировка)."}, {"num": "21.3", "category": "Билет 21", "q": "Выписать и приготовить крахмальную слизь корове для уменьшения раздражающего действия лекарственных веществ.", "hint": "• Mucilago Amyli — крахмальная слизь\n• Обволакивающее, защищает слизистую\n• Крахмал ~2% (4,0 на 200 мл)\n• Готовят перед употреблением (ex tempore)", "a": "Rp.: Amyli tritici 4,0\n     Aquae destillatae 200 ml\n     M.f. mucilago\n     D.S. Внутреннее. Корове. На один приём; давать внутрь для уменьшения раздражающего действия лекарственных веществ на слизистую оболочку ЖКТ.\n\nПояснение:\n• Крахмальную слизь (Mucilago Amyli) готовят ex tempore: крахмал растирают с холодной водой, затем при помешивании вливают в кипящую воду и кипятят ~5 мин.\n• Концентрация крахмала около 2% (4,0 на 200 мл — типичная учебная пропись на один приём).\n• Действие обволакивающее: слизь покрывает слизистую тонкой плёнкой, защищает её, замедляет всасывание и снижает раздражение от резко действующих или горьких веществ.\n• Для крупного животного дозу и объём увеличивают (крахмала до 20,0–50,0 на приём по показаниям) (уточнить по фармакопее)."}, {"num": "22.1", "category": "Билет 22", "q": "Рвотные и руминаторные средства. Слабительные средства.", "hint": "• Рвотные: центральные (апоморфин) и рефлекторные\n• У жвачных рвоты нет → руминаторные\n• Руминаторные: настойка чемерицы, карбохолин\n• Слабительные: солевые, масла, растительные, синтетические", "a": "РВОТНЫЕ СРЕДСТВА:\n• Вызывают рвоту, освобождают желудок (у собак, свиней; у жвачных и лошадей рвоты практически нет).\n• Центрального действия — на рвотный центр: апоморфина гидрохлорид (Apomorphini hydrochloridum) — п/к собакам.\n• Рефлекторного (периферического) действия — раздражение слизистой желудка: вератрин, корень ипекакуаны, меди сульфат, цинка сульфат.\n• Показания: отравления (вывести яд из желудка), переполнение желудка.\n• Противопоказания: отравление кислотами/щёлочами, беременность, кровотечения, угнетение ЦНС.\n\nРУМИНАТОРНЫЕ СРЕДСТВА:\n• Восстанавливают и усиливают жвачку и моторику преджелудков у жвачных (при атонии, гипотонии рубца).\n• Настойка чемерицы (Tinctura Veratri) — внутрь, рефлекторно усиливает сокращения рубца.\n• Карбохолин, прозерин (антихолинэстеразные) — усиливают моторику.\n• Также горечи, массаж рубца.\n\nСЛАБИТЕЛЬНЫЕ СРЕДСТВА:\n• Усиливают перистальтику и опорожнение кишечника (при запорах, для очистки, при отравлениях).\n• Солевые: натрия сульфат (глауберова соль, Natrii sulfas), магния сульфат (Magnesii sulfas) — удерживают воду в просвете кишки.\n• Масляные: масло касторовое (Oleum Ricini), вазелиновое, подсолнечное.\n• Растительные: лист сенны, корень ревеня, кора крушины (антрагликозиды).\n• Применение: при запорах, метеоризме, отравлениях для удаления токсинов."}, {"num": "22.2", "category": "Билет 22", "q": "Снотворные средства. Ненаркотические анальгетики и нестероидные противовоспалительные средства.", "hint": "• Снотворные: барбитураты + небарбитуровые\n• Угнетают ЦНС, вызывают сон\n• НПВС: 3 «А» — анальгезия, антипиретик, антифлогистик\n• Блок ЦОГ → снижение простагландинов\n• Анальгин, аспирин, бутадион", "a": "СНОТВОРНЫЕ СРЕДСТВА:\n• Угнетают ЦНС, вызывают сон, близкий к физиологическому; в малых дозах — седативный эффект.\n• Барбитураты: барбитал (Barbitalum), фенобарбитал (Phenobarbitalum), этаминал-натрий; в больших дозах — наркоз.\n• Небарбитуровые: бромиды (натрия бромид), хлоралгидрат (снотворное и наркотическое), производные бензодиазепина.\n• Применение: успокоение, судороги, бессонница, премедикация, борьба с возбуждением.\n• Особенности: при передозировке — угнетение дыхания; возможен некроз при подкожном введении барбитуратов.\n\nНЕНАРКОТИЧЕСКИЕ АНАЛЬГЕТИКИ И НПВС:\n• Три эффекта: обезболивающий (анальгезирующий), жаропонижающий (антипиретический), противовоспалительный.\n• В отличие от наркотических — не угнетают дыхание, не вызывают эйфорию и пристрастие.\n\nМеханизм:\n• Угнетают фермент циклооксигеназу (ЦОГ) → снижают синтез простагландинов → меньше боль, воспаление, лихорадка.\n\nКлассификация (по строению):\n• Производные салициловой кислоты: кислота ацетилсалициловая (аспирин, Acidum acetylsalicylicum), натрия салицилат.\n• Производные пиразолона: анальгин (Analginum, метамизол), бутадион (Butadionum), амидопирин.\n• Производные анилина: парацетамол.\n• Современные: ибупрофен, кетопрофен, флуниксин, мелоксикам.\n\nПрименение:\n• Лихорадка, боли (мышечные, суставные), воспаления, ревматические процессы, маститы.\nПобочные: раздражение слизистой ЖКТ (язвы), угнетение кроветворения (пиразолоны), нарушение функции почек."}, {"num": "22.3", "category": "Билет 22", "q": "Выписать и приготовить 0.1% раствор калия перманганата 450мл. для обработки раневой поверхности у поросенка.", "hint": "• Kalii permanganatis — калия перманганат\n• Антисептик-окислитель, выделяет атомарный кислород\n• 0,1% = 0,45 г на 450 мл\n• Готовить ex tempore, полностью растворять кристаллы", "a": "Rp.: Solutionis Kalii permanganatis 0,1% — 450 ml\n     D.S. Наружное. Поросёнку. Для промывания и обработки раневой поверхности.\n\nИли с навеской:\nRp.: Kalii permanganatis 0,45\n     Aquae destillatae 450 ml\n     M.D.S. Наружное. Поросёнку. Для обработки раны.\n\nПояснение:\n• Концентрация 0,1% соответствует навеске 0,45 г порошка на 450 мл воды (раствор слабо-розового цвета).\n• Калия перманганат — антисептик-окислитель: выделяет атомарный кислород, оказывает противомикробное, дезодорирующее и слабое вяжущее действие.\n• Для промывания ран применяют растворы 0,1–0,5%; готовят ex tempore (свежий), кристаллы растворяют полностью — нерастворённые крупинки вызывают химический ожог.\n• Обрабатывают раневую поверхность по мере необходимости до очищения раны."}], "mdk": [{"num": "1.1", "category": "Билет 1", "q": "Значение зоогигиены в технологии интенсивного животноводства, в профилактике заболевания животных в повышении их продуктивности.", "hint": "• Зоогигиена — наука об охране здоровья животных\n• Профилактика дешевле лечения: «болезнь легче предупредить»\n• Микроклимат + кормление + уход = продуктивность\n• На комплексах: высокая концентрация поголовья → строгие нормы", "a": "Определение:\n• Зоогигиена (гигиена животных) — наука об охране и укреплении здоровья животных рациональными приёмами содержания, кормления, ухода и использования.\n• Главный принцип — профилактика (предупреждение болезней дешевле и эффективнее лечения).\n\nЗначение при интенсивных технологиях:\n• Концентрация большого поголовья на комплексах и птицефабриках, безвыгульное содержание, гиподинамия → повышают требования к микроклимату и санитарии.\n• Нарушение зоогигиенических норм ведёт к стрессам, снижению резистентности, массовым заболеваниям.\n• Соблюдение норм (температура, влажность, газовый состав, освещение, плотность размещения) обеспечивает здоровье и высокую отдачу.\n\nПрофилактика заболеваний:\n• Создание оптимального микроклимата, полноценное кормление, чистая вода, правильный уход и моцион.\n• Дезинфекция, карантин, принцип «всё пусто — всё занято», ветеринарно-санитарные объекты.\n\nПовышение продуктивности (примеры значимости):\n• Оздоровление коров от фасциолёза повышает удой на 20–40 %.\n• Профилактика чесотки овец сохраняет настриг шерсти (потери при болезни до 50 %).\n• Оптимальный микроклимат повышает удои, привесы, яйценоскость, сохранность молодняка.\n\nВывод:\n• Зоогигиена — основа профилактической ветеринарии и рентабельности животноводства."}, {"num": "1.2", "category": "Билет 1", "q": "Состав и значение протеинов в кормлении животных; кормовые источники протеина. Полноценность белков; значение отдельных аминокислот.", "hint": "• Сырой протеин = белки + амиды (азот × 6,25)\n• Незаменимые: лизин, метионин, триптофан — «критические»\n• Полноценный белок = все незаменимые в нужном количестве\n• Источники: жмыхи, шроты, бобовые, корма животного происхождения", "a": "Состав протеина:\n• Сырой протеин = белки (истинные протеины) + амиды (небелковые азотистые вещества: свободные аминокислоты, амиды, нитраты).\n• Определяют по азоту: содержание N × 6,25 (белок содержит в среднем 16 % азота).\n• Белки состоят из аминокислот.\n\nЗначение протеина:\n• Строительный материал тела (мышцы, органы, кровь, ферменты, гормоны, антитела).\n• Незаменим — не может замещаться жирами и углеводами.\n• Необходим для роста, продуктивности (молоко, яйцо, шерсть), воспроизводства.\n\nАминокислоты:\n• Незаменимые (не синтезируются в организме): лизин, метионин, триптофан, валин, гистидин, фенилаланин, лейцин, изолейцин, треонин, аргинин.\n• Заменимые синтезируются в организме.\n• Критические (чаще в дефиците): лизин, метионин, триптофан.\n  - Лизин — рост, синтез тканевых белков, образование молока.\n  - Метионин — обмен серы, печень, образование шерсти, перьев.\n  - Триптофан — обновление белков плазмы, воспроизводство, рост.\n• Лимитирующие: для свиней — лизин; для птицы — метионин + цистин.\n\nПолноценность белка:\n• Полноценный белок содержит все незаменимые аминокислоты в нужном количестве и соотношении.\n• Корма животного происхождения — полноценны; растительные часто неполноценны (дефицит лизина, метионина).\n\nКормовые источники протеина:\n• Растительные: жмыхи и шроты (соевый, подсолнечный), зернобобовые (горох, соя, люпин, вика), бобовые травы (клевер, люцерна).\n• Животные: рыбная, мясокостная, кровяная мука, молоко, обрат.\n• Микробиальные: кормовые дрожжи.\n• Небелковые азотистые (для жвачных): карбамид (мочевина)."}, {"num": "1.3", "category": "Билет 1", "q": "Питательная ценность силосованного корма; технология приготовления силоса.", "hint": "• Силос = консервирование молочнокислым брожением, без воздуха\n• Сахарный минимум, pH 4,0–4,2, трамбовка + укрытие\n• Кукуруза, подсолнечник силосуются легко; бобовые — плохо\n• Сочный корм: витамины, минералы, ~0,15–0,2 к.ед.", "a": "Сущность силосования:\n• Силос — сочный корм, законсервированный путём молочнокислого брожения сахаров без доступа воздуха (анаэробно).\n• Молочнокислые бактерии сбраживают сахара → молочная кислота → подкисление до pH 4,0–4,2 → подавление гнилостных и маслянокислых бактерий.\n\nПитательная ценность:\n• Питательность ~0,15 к.ед./кг (разнотравный), ~0,20 к.ед./кг (кукурузный).\n• Влажность около 65–75 %.\n• Сырой протеин ~2,5–4 %, сырая клетчатка ~7 % (уточнить по учебнику).\n• Богат каротином, витаминами, минеральными веществами; молочной кислотой (>50 % всех кислот).\n• Диетический, сочный корм; улучшает аппетит и пищеварение, дешёвый.\n\nСилосуемость культур:\n• Хорошо силосуются (богаты сахаром): кукуруза, подсолнечник, сорго, злаковые травы, ботва.\n• Трудно силосуются: бобовые (клевер, люцерна) из-за низкого сахарного минимума — силосуют в смеси со злаками или с консервантами.\n\nТехнология приготовления:\n• Скашивание в оптимальную фазу (кукуруза — молочно-восковая спелость).\n• Измельчение массы (3–5 см при влажности 70 %, мельче при сухой).\n• Быстрая закладка в траншею (башню) — за 3–4 дня.\n• Тщательная трамбовка для удаления воздуха (анаэробиоз).\n• Герметичное укрытие плёнкой и слоем земли/груза.\n• Готовность через 1,5–2 месяца.\n\nКачество готового силоса:\n• Хороший — pH 4,0–4,2, зелёно-жёлтый цвет, запах квашеных овощей, преобладание молочной и уксусной кислот, отсутствие масляной."}, {"num": "2.1", "category": "Билет 2", "q": "Состав атмосферного воздуха и воздуха животноводческих помещений.", "hint": "• Атмосфера: азот 78 %, кислород 21 %, CO₂ 0,03–0,04 %\n• В помещении: меньше O₂, больше CO₂, влаги, пыли\n• Вредные газы: аммиак, сероводород, угарный газ\n• Норма CO₂ в коровнике ≤ 0,25 %", "a": "Состав атмосферного (наружного) воздуха:\n• Азот — 78,09 %.\n• Кислород — 20,95 % (≈21 %).\n• Углекислый газ (CO₂) — 0,03–0,04 %.\n• Инертные газы (аргон и др.) — ~0,93 %.\n• Плюс водяные пары и пыль (переменное количество).\n\nВоздух животноводческих помещений:\n• Отличается от атмосферного: меньше кислорода, больше углекислого газа, водяных паров (повышенная влажность), пыли и микроорганизмов.\n• Накапливаются вредные газы — продукты дыхания, разложения навоза и мочи.\n\nВредные газы и их допустимые нормы (ПДК):\n• Углекислый газ (CO₂): образуется при дыхании; норма для коровника не более 0,25 % (при плохой вентиляции достигает 0,6–1,0 %).\n• Аммиак (NH₃): из мочи и навоза; ПДК ~20 мг/м³ (0,02 мг/л); раздражает дыхательные пути.\n• Сероводород (H₂S): при гниении белка; ПДК ~10 мг/м³; очень ядовит.\n• Угарный газ (CO): от двигателей, неисправного отопления; ядовит. (конкретные нормы уточнить по учебнику для каждого вида животных)\n\nЗначение контроля состава воздуха:\n• Избыток вредных газов и влаги → снижение резистентности, болезни органов дыхания, падение продуктивности.\n• Поддерживается оптимальный газовый состав вентиляцией, своевременной уборкой навоза, нормальной плотностью размещения."}, {"num": "2.2", "category": "Билет 2", "q": "Факторы, влияющие на химический состав и питательность кормов (состав почв, климат, сорт и вид растений, фаза вегетации, способы заготовки и хранения, подготовка к скармливанию)", "hint": "• Почва и удобрения → минеральный состав растений\n• Климат: тепло, осадки, свет\n• Вид/сорт растения и фаза вегетации (моложе — питательнее)\n• Заготовка, хранение, подготовка — потери или сохранность", "a": "Общее:\n• Химический состав и питательность кормов непостоянны и зависят от ряда факторов.\n\n1. Состав почвы и удобрения:\n• Почва определяет минеральный состав растений.\n• Песчаные почвы бедны питательными веществами; часто дефицит фосфора, натрия, серы, меди, цинка, кобальта, йода.\n• Внесение удобрений повышает урожай и содержание протеина, минералов.\n\n2. Климат:\n• Сумма температур, количество осадков, длина вегетационного периода, освещённость (инсоляция) влияют на фотосинтез и накопление веществ.\n\n3. Вид и сорт растений:\n• Бобовые богаче протеином и кальцием, чем злаки.\n• Сорта различаются по содержанию белка, сахара, крахмала.\n\n4. Фаза вегетации (важнейший фактор):\n• Молодые растения богаче протеином, витаминами, беднее клетчаткой и легче перевариваются.\n• С возрастом (старением) растёт доля клетчатки, падает питательность и переваримость.\n\n5. Способы заготовки и хранения:\n• Нарушение технологии (запоздалая уборка, плохая сушка, неправильное хранение) ведёт к потерям протеина, каротина, сахаров (плесень, согревание, вымывание).\n• Правильная заготовка (быстрая сушка, силосование, сенаж) сохраняет питательность.\n\n6. Подготовка к скармливанию:\n• Измельчение, запаривание, дрожжевание, плющение, осолаживание повышают поедаемость и переваримость.\n\nВывод:\n• Знание этих факторов позволяет заготавливать корма высокого качества и точно нормировать кормление."}, {"num": "2.3", "category": "Билет 2", "q": "Способы заготовки сена. Факторы, влияющие на качество сена (ботан.состав, возраст трав, условия заготовки и хранения)", "hint": "• Сено — сушка трав до влажности 15–17 %\n• Способы: рассыпное, прессованное, активное вентилирование\n• Косить в фазу колошения/бутонизации (моложе — лучше)\n• Бобово-злаковый состав — самое ценное сено", "a": "Определение:\n• Сено — грубый корм, полученный высушиванием скошенной травы до влажности 15–17 % (оптимум 16–17 %).\n• Источник протеина, каротина, витамина D, минеральных веществ.\n\nСпособы заготовки сена:\n• Рассыпное (естественная полевая сушка): скашивание → провяливание → ворошение → сгребание в валки → копны → стога/скирды. Прост, но большие потери от погоды.\n• Прессованное: подсушенную траву (влажность до 20–22 %) прессуют в тюки/рулоны (плотность ~180–200 кг/м³). Снижает потери, удобно хранить и перевозить.\n• Метод активного вентилирования (досушивание): траву подвяливают в поле до 35–45 %, досушивают холодным или подогретым воздухом на установках. Прогрессивный способ — минимум потерь каротина и листьев.\n• Измельчённое и брикетированное сено.\n\nФакторы, влияющие на качество сена:\n1. Ботанический состав:\n• Лучшее сено — из бобовых и бобово-злаковых трав (клевер, люцерна, тимофеевка).\n• Наличие ядовитых и сорных растений снижает качество.\n2. Возраст (фаза вегетации) трав:\n• Косить в оптимальные сроки: злаки — фаза колошения, бобовые — бутонизация–начало цветения.\n• Молодые травы богаче протеином и каротином; перестой → много клетчатки, снижение питательности.\n3. Условия заготовки:\n• Погода, быстрота сушки: затягивание → потери каротина, осыпание листьев, плесень.\n• Пересушивание (влажность ниже 10 %) разрушает каротин и ведёт к потере листочков.\n4. Условия хранения:\n• Хранить под навесом/в сараях, защищать от дождя и сырости.\n• Повышенная влажность → самосогревание, плесень, гниение, потеря витаминов.\n\nОценка качества:\n• Зелёный цвет, приятный запах, облиственность, отсутствие плесени и пыли — признаки хорошего сена."}, {"num": "3.1", "category": "Билет 3", "q": "Пылевая и микробная загрязненность воздуха животноводческих помещений. Гигиеническое значение, методы определения.", "hint": "• Пыль: органическая + минеральная, мг/м³\n• Микробы: «на пыли как на транспорте»\n• Пыль — весовой и счётный метод\n• Микробы — Кох (седиментация) и прибор Кротова", "a": "Пыль в воздухе:\n• Аэрозоль из твёрдых частиц; по происхождению — органическая (частицы корма, подстилки, навоза, эпидермис, перхоть) и минеральная (почва, песок).\n• Норма содержания пыли в помещениях — 0,2–5,0 мг/м³ (для коровников, телятников фактически 1,7–4,4 мг/м³). Атмосферный воздух: чистый 0,05–0,2 мг/м³.\n\nГигиеническое значение пыли:\n• Раздражает слизистые дыхательных путей и глаз, кожу (дерматиты, зуд).\n• Снижает прозрачность воздуха и эффективность УФ-облучения, оседает на коже, нарушает теплоотдачу.\n• Вдыхание вызывает пневмокониозы (силикоз и др.), способствует бронхитам, пневмониям.\n• Пылинки — «носители» микробов (адсорбируют бактерии, споры грибов).\n\nМикробная загрязнённость:\n• Микроорганизмы находятся в воздухе на капельках влаги и пылинках.\n• Высокая обсеменённость способствует распространению аэрогенных инфекций (туберкулёз, пастереллёз, сальмонеллёз и др.).\n• ПДК общей микробной обсеменённости ориентировочно до 300 тыс. микр. тел/м³ (для коровников; для родильных, телятников нормы строже — уточнить по учебнику).\n• Определяют: общее микробное число, наличие санитарно-показательных микробов (БГКП, гемолитические и зеленящие стрептококки), плесневых и дрожжевых грибов.\n\nМетоды определения пыли:\n• Весовой (гравиметрический) — протягивание воздуха через фильтр и взвешивание пыли (мг/м³).\n• Счётный (кониметрический) — подсчёт числа пылинок в единице объёма.\n\nМетоды определения микробной обсеменённости:\n• Седиментационный (метод Коха) — открытые чашки Петри с МПА на 5–10 мин, посев оседающих микробов, затем подсчёт колоний.\n• Аспирационный — принудительный прибор Кротова (просасывание воздуха на питательную среду), даёт точное число микробов в 1 м³.\n\nСнижение загрязнённости:\n• Эффективная вентиляция, исправный микроклимат.\n• Своевременная уборка навоза, влажная уборка, дезинфекция.\n• Озеленение территории, увлажнение, правильная раздача кормов и подстилки."}, {"num": "3.2", "category": "Билет 3", "q": "Значение витаминов жирорастворимых А, Д, Е, К; признаки недостаточности; их кормовые источники.", "hint": "• «АДЕК» — жирорастворимые, копятся в печени\n• А — зрение/рост; Д — кости; Е — размножение; К — кровь\n• А→ куриная слепота; Д→ рахит; Е→ бесплодие; К→ кровоточивость\n• Источники: каротин (трава, морковь), рыбий жир, зелёные корма", "a": "Общее:\n• Жирорастворимые витамины А, Д, Е, К усваиваются с жирами, накапливаются в организме (главным образом в печени), поэтому не требуют ежедневного пополнения.\n\nВитамин А (ретинол):\n• Значение: рост молодняка, зрение, целостность эпителия, размножение, устойчивость к инфекциям, обмен веществ. В кормах в виде провитамина — каротина.\n• Недостаточность: «куриная слепота» (ослабление сумеречного зрения), ксерофтальмия (сухость роговицы), задержка роста, снижение продуктивности, бесплодие, аборты, рождение слабого приплода, частые инфекции.\n• Источники: каротин — зелёная трава, морковь (красная), клевер, люцерна, бобовое сено, травяная мука, силос; готовый витамин А — рыбий жир, молоко, желток яйца.\n\nВитамин Д (кальциферол):\n• Значение: регулирует фосфорно-кальциевый обмен, способствует всасыванию Са и Р из кишечника, минерализации костей.\n• Недостаточность: у молодняка — рахит, у взрослых — остеомаляция, остеопороз, тетания; искривление костей, хромота.\n• Источники: рыбий жир, сено солнечной (теневой) сушки, облучённые дрожжи; образуется в коже под действием УФ-лучей (солнца).\n\nВитамин Е (токоферол):\n• Значение: природный антиоксидант, нормальное размножение, функция мышц, связан с обменом селена.\n• Недостаточность: нарушение функции органов размножения (вплоть до бесплодия), беломышечная болезнь молодняка (дистрофия мышц), рассасывание плода.\n• Источники: зелёные корма, проросшее и зерновые корма, растительные масла, зародыши злаков, травяная мука.\n\nВитамин К (филлохинон):\n• Значение: участвует в свёртывании крови (синтез протромбина).\n• Недостаточность: понижение свёртываемости крови, кровоизлияния (подкожные, внутримышечные), анемия. Синтезируется микрофлорой ЖКТ, поэтому при нормальном кормлении дефицит редок.\n• Источники: зелёные корма, листья крапивы, люцерна, капуста, силос; синтез в кишечнике."}, {"num": "3.3", "category": "Билет 3", "q": "Подготовка зерна к скармливанию (измельчение, дрожжевание, осолаживание, плющение, поджаривание, экструзия, микронизация, электрогидротермический метод)", "hint": "• Цель: повысить поедаемость и усвоение\n• Механические: измельчение, плющение\n• Тепловые: поджаривание, экструзия, микронизация (ИК-лучи)\n• Биохимические: дрожжевание, осолаживание (крахмал→сахар)", "a": "Цель подготовки: повысить поедаемость, переваримость и усвоение питательных веществ, обезвредить (снизить микрофлору, антипитательные вещества).\n\nИзмельчение (дробление, размол):\n• Разрушают оболочки зерна, увеличивают доступность для пищеварительных соков.\n• Размер помола нормируют: для свиней мелкий, для КРС средний, для птицы крупка (слишком мелкий пылевидный нежелателен).\n\nПлющение:\n• Влаготепловая обработка с раздавливанием зерна в хлопья.\n• Улучшает вкус, повышает питательную ценность углеводного и протеинового комплексов.\n\nПоджаривание:\n• Зерно прогревают (часто для поросят-сосунов) — приучает к корму, делает его ароматным, часть крахмала переходит в декстрины; обеззараживает.\n\nОсолаживание:\n• Заливают измельчённое зерно горячей водой (55–60 °С) и выдерживают; часть крахмала переходит в сахар (за счёт ферментов).\n• Улучшает вкус, повышает сахаристость и поедаемость.\n\nДрожжевание:\n• Внесение дрожжей в зерновую массу; при их размножении небелковый азот используется для синтеза полноценного белка, корм обогащается белком и витаминами группы В.\n\nЭкструзия:\n• Обработка на экструдере под давлением и высокой температурой с резким сбросом давления («вспучивание»).\n• Количество сахара возрастает почти в 2 раза, декстринов — почти в 5 раз; повышается переваримость, обеззараживается.\n\nМикронизация:\n• Обработка зерна инфракрасными (ИК) лучами; молекулы крахмала «вспучиваются», крахмал переходит в декстрины, зерно становится мягким и легкоусвояемым.\n\nЭлектрогидротермический метод (ЭГТ):\n• Обработка зерна электрическим током (в среде воды/пара) — нагрев, набухание, частичное расщепление крахмала; повышается питательность и обеззараживание.\n\nИтог: механические способы (измельчение, плющение) повышают доступность, тепловые (поджаривание, экструзия, микронизация, ЭГТ) переводят крахмал в сахара/декстрины и обеззараживают, биохимические (дрожжевание, осолаживание) обогащают белком и сахаром."}, {"num": "4.1", "category": "Билет 4", "q": "Биологическое свойство почв. Самоочищение почвы. Охрана почвы от загрязнения и оздоровление ее.", "hint": "• Почва — живая среда: микробы, яйца гельминтов, споры\n• Самоочищение: минерализация + нитрификация\n• Аммонификация → нитрификация (нужен О₂, тепло, влага)\n• Охрана: правильное хранение навоза, ассенизация, обеззараживание", "a": "Биологические свойства почвы:\n• Почва — среда обитания микроорганизмов, грибов, простейших, личинок и яиц гельминтов, насекомых.\n• В почве длительно сохраняются возбудители (особенно спорообразующие: сибирская язва, столбняк, эмкар, ботулизм) и яйца гельминтов — почва может быть фактором передачи инфекций и инвазий.\n• От биологической активности почвы зависят разложение органики и санитарное состояние.\n\nСамоочищение почвы:\n• Это совокупность биохимических процессов превращения органических загрязнений (навоз, трупы, отбросы) в безвредные минеральные вещества.\n• Минерализация органики:\n  – Аммонификация (гниение) — гидролитическое расщепление белков до аминокислот, затем до аммиака, сероводорода, индола, скатола (в анаэробных и аэробных условиях).\n  – Нитрификация — окисление аммиака до нитритов и нитратов нитрифицирующими бактериями; требует хорошей аэрации, температуры ~25–37 °С, влажности не ниже 25–30 %.\n• Параллельно идёт распад безазотистых веществ (углеводов, жиров) до СО₂ и воды.\n• Результат — обезвреживание почвы, гибель патогенной микрофлоры.\n\nОхрана почвы от загрязнения и оздоровление:\n• Правильная организация сбора, хранения и обезвреживания навоза (навозохранилища, биотермическое обеззараживание — саморазогрев до 60–70 °С).\n• Правильное устройство и эксплуатация полей ассенизации и орошения, очистных сооружений.\n• Утилизация трупов и боенских отходов (биотермические ямы, утильзаводы, сжигание), запрет скотомогильников в неположенных местах.\n• Своевременная уборка территории ферм, дезинфекция, осушение заболоченных участков.\n• Контроль за внесением навоза, стоков, недопущение перегрузки почвы органикой выше способности к самоочищению.\n• Озеленение, агротехнические мероприятия, защита от эрозии."}, {"num": "4.2", "category": "Билет 4", "q": "Виды комбикормов (полнорационные, комбикорма-концентраты, балансирующие кормовые добавки-премиксы)", "hint": "• Комбикорм — смесь по научному рецепту\n• ПК — полнорационный (всё в одном)\n• К (КК) — концентрат, в добавку к грубым/сочным\n• БВД/БВМД и премиксы (П) — обогащают, «витаминно-минеральный концентрат»", "a": "Комбикорм — однородная смесь измельчённых кормовых средств, составленная по научно обоснованному рецепту для определённого вида, возраста и продуктивности животных.\n\nПолнорационные комбикорма (ПК):\n• Содержат все необходимые питательные, минеральные и биологически активные вещества.\n• Полностью обеспечивают физиологическую потребность животного при высокой продуктивности; скармливаются как единственный корм (чаще для свиней и птицы).\n\nКомбикорма-концентраты (К, КК):\n• Дополняют основной рацион из грубых, сочных и зелёных кормов (главным образом для КРС, овец, лошадей).\n• Восполняют недостаток энергии, протеина, минеральных веществ и витаминов в основном рационе.\n\nБалансирующие кормовые добавки:\n• БВД, БВМД, БМВД, МД — однородные смеси высокобелковых, минеральных и биологически активных веществ.\n• Вводятся в зерновую смесь хозяйства в небольшом количестве для балансирования рационов по протеину, минералам, витаминам.\n\nПремиксы (П):\n• Однородная смесь микродобавок (витаминов, микроэлементов, аминокислот, ферментов, антиоксидантов, лечебно-профилактических средств) с наполнителем (отруби, шрот).\n• Вводят в комбикорма и добавки в количестве ~1 % для обогащения биологически активными веществами; самостоятельно не скармливают.\n\nОбозначения: ПК — полнорационный комбикорм, К — комбикорм-концентрат, БВД (БВМД) — белково-витаминные (минеральные) добавки, П — премикс, ЗЦМ — заменитель цельного молока."}, {"num": "4.3", "category": "Билет 4", "q": "Особенности кормление коров в период раздоя.", "hint": "• Раздой — первые ~100 дней лактации\n• Авансированное кормление: «корм наперёд»\n• Аванс на удой +4–6 кг молока (≈ +2–3 ЭКЕ)\n• Начинают через 12–15 дней после отёла; следить за ацидозом", "a": "Раздой — период интенсивного нарастания удоя в первые 2–4 месяца (примерно до 100 дней) лактации; цель — максимально раскрыть молочную продуктивность.\n\nАвансированное кормление:\n• Сущность — корове дают кормов больше, чем требуется на фактический удой, чтобы стимулировать дальнейший рост молочности.\n• Авансируют рацион с расчётом на прибавку удоя 4–6 кг молока в сутки (к норме добавляют примерно 2–3 ЭКЕ/корм. ед.).\n• Начинают авансированное кормление через 12–15 дней после отёла, когда нормализуется состояние вымени.\n• Если корова отвечает прибавкой удоя — авансирование продолжают; если нет — рацион доводят до фактической потребности.\n\nОсобенности рациона:\n• Высокий уровень полноценного протеина, энергии, минеральных веществ (Са, Р) и витаминов.\n• Концентратов дают на 3–4 кг больше фактической потребности, но их доля не должна превышать 50–55 % по питательности рациона.\n• Корма должны быть высокого качества, разнообразные, хорошо поедаемые (сено, силос, сенаж, корнеплоды, концентраты).\n• Обязательны лёгкоусвояемые углеводы и сахаро-протеиновое соотношение в норме (около 0,8–1,2).\n\nОрганизация и контроль:\n• Кратность кормления и доения повышенная; постепенный ввод концентратов.\n• Контроль за упитанностью, состоянием вымени и обмена веществ.\n• Чрезмерные концентраты опасны — могут вызвать ацидоз, кетоз, ламинит (воспаление копыт).\n\nЗначение: правильный раздой повышает удой за всю лактацию, формирует молочную продуктивность коровы."}, {"num": "5.1", "category": "Билет 5", "q": "Гигиенические требования при ручном и машинном доении коров. Гигиена ухода за выменем коров.", "hint": "• Чистота: руки, посуда, помещение, полотенце\n• Подмывание вымени 40-45°C + насухо\n• Массаж, сдаивание первых струек\n• Машинное: вакуум, не передаивать, антисептик сосков", "a": "Цель: получить чистое доброкачественное молоко и сохранить здоровое вымя (профилактика мастита).\n\nОбщие требования:\n• Доярки/операторы — здоровы, в чистой спецодежде, руки моют с мылом, ногти коротко острижены.\n• Доильное помещение и аппаратура чистые; молочная посуда вымыта и продезинфицирована.\n• Строгое соблюдение распорядка и кратности доения (обычно 2-3 раза в сутки).\n\nГигиена ухода за выменем (подготовка к доению):\n• Осмотр и обмывание вымени тёплой водой 40-45°C (не выше), затем вытирание насухо чистым (лучше одноразовым) полотенцем.\n• Массаж вымени — усиливает молокоотдачу (рефлекс окситоцина).\n• Сдаивание первых 2-3 струек в отдельную кружку с тёмным дном (диагностика мастита, удаление загрязнённого молока).\n• Доение начинать через 40-60 сек после подготовки (на пике молокоотдачи).\n\nРучное доение:\n• Доят кулаком (не щипком, чтобы не травмировать соски), полностью выдаивают вымя.\n• По окончании — заключительный массаж, додаивание.\n\nМашинное доение:\n• К аппарату допускают коров со здоровым, пригодным по форме (чашеобразное, округлое) выменем.\n• Контроль режима: вакуум ~48-50 кПа, частота пульсаций ~60 в минуту (уточнить по марке аппарата).\n• Доильные стаканы надевают сразу после подготовки; нельзя передаивать (сухое доение травмирует соски, ведёт к маститу).\n• Своевременное снятие аппарата при прекращении молокоотдачи (машинное додаивание).\n\nЗаключительная обработка вымени:\n• После доения соски обрабатывают (погружение на 2-3 сек в антисептик) для профилактики мастита.\n• Между дойками — содержание в чистоте, регулярный осмотр и пальпация долей вымени.\n\nЗначение: соблюдение гигиены повышает санитарное качество молока, удои и сохраняет здоровье вымени."}, {"num": "5.2", "category": "Билет 5", "q": "Классификация жиров, их значение в организме и кормлении животных; кормовые источники.Питательная ценность кормов животного происхождения (молоко, обрат, сыворотка, рыбная, мясная, мясо-костная мука и т.п.); нормы скармливания животным.", "hint": "• Липиды: простые (жиры) и сложные (фосфо-, гликолипиды)\n• Жир — самый калорийный, 2,25× энергии углеводов\n• Источники жира: семена, жмыхи, рыбий жир\n• Корма животные — полноценный белок: рыбная/мясо-костная мука, обрат", "a": "КЛАССИФИКАЦИЯ ЖИРОВ (липидов):\n• Простые липиды — собственно жиры (триглицериды) и воски.\n• Сложные липиды (липоиды) — содержат, кроме С, Н, О, ещё азот и фосфор: фосфолипиды (лецитин), гликолипиды, стерины.\n• По жирным кислотам: насыщенные и ненасыщенные (в т.ч. незаменимые — линолевая, линоленовая, арахидоновая).\n\nЗначение жиров:\n• Главный концентрированный источник энергии: 1 г жира даёт ~9,3 ккал, ~ в 2,25 раза больше углеводов.\n• Источник незаменимых жирных кислот и носитель жирорастворимых витаминов (A, D, E, K).\n• Структурный материал клеточных мембран, защита и теплоизоляция, резерв энергии.\n• Жировыми добавками обеспечивают до 10-15% энергии рациона.\n\nКормовые источники жира:\n• Семена и зёрна — соя, рапс, лён, кукуруза, овёс.\n• Жмыхи и шроты, кормовой жир, рыбий жир.\n• Примечание: жвачным избыток ненасыщенных жиров вреден (угнетает рубцовое пищеварение).\n\nКОРМА ЖИВОТНОГО ПРОИСХОЖДЕНИЯ — высокая биологическая ценность белка (полный набор незаменимых аминокислот), богаты Ca, P, витаминами группы B и B12.\n\n• Цельное молоко — основной корм для молодняка; полноценный белок, жир, лактоза, Ca.\n• Обрат (обезжиренное молоко): ~9% СВ, ~3,4% протеина, жира ~0,1%; ~0,13 к.ед. и ~35 г перевар. протеина в 1 кг. Дают телятам и поросятам.\n• Молочная сыворотка: ~6% СВ, белка ~1%; низкокалорийна, используют для свиней.\n• Рыбная мука: до 50-60% протеина, 5-10% жира, богата Ca, P, B12. Норма: птице 3-7% рациона, свиньям до 5-10% (уточнить по учебнику); исключают за 10-15 дней до убоя (привкус).\n• Мясная и мясо-костная мука: протеина 30-50%, мясо-костная богата минералами (Ca ~140 г/кг, P ~70 г/кг). Норма свиньям и птице — до 5-7% рациона (уточнить).\n• Кровяная мука: до 80% протеина, бедна минералами; дают до 3-5%.\n\nНормы скармливания (ориентир): корма животного происхождения вводят как белковые добавки в небольших количествах (несколько процентов рациона) для балансирования по протеину и аминокислотам, особенно свиньям и птице. Конкретные нормы — по справочным таблицам (уточнить по учебнику)."}, {"num": "5.3", "category": "Билет 5", "q": "Кормление телят в молочный период.", "hint": "• Молозиво в 1-й час, ~4 л (10% массы)\n• Молочный период ~2-3 мес\n• Цельное молоко → обрат/ЗЦМ\n• С 7-10 дня сено, концентраты, вода; температура 37-39°C", "a": "Молочный период — от рождения до ~2-3 месяцев, когда основу рациона составляют молочные корма.\n\nМолозивный период (первые дни):\n• Первую выпойку молозива — в течение 0,5-1 часа после рождения (формирование иммунитета за счёт иммуноглобулинов).\n• Объём первой выпойки ~1,5-2 л, за сутки ~ до 10% массы тела (около 4-6 л).\n• Поить тёплым (37-39°C), чистым, из сосковой поилки (медленно), 3-4 раза в сутки.\n\nМолочный период:\n• Со 2-3 дня — цельное молоко матери, дневная норма ~5-6 л (схема: 3 раза по 2 л или 2 раза по 3 л).\n• Постепенный переход на обрат или ЗЦМ (заменитель цельного молока) — с 3-4 недели, заменяя часть цельного молока.\n• Температура выпойки 37-39°C; молоко свежее, от здоровых коров.\n\nПриучение к другим кормам:\n• Сено хорошего качества — с 7-10 дня (развитие рубца, профилактика лизухи).\n• Концентраты (стартер/престартер, овсянка) — с конца 1-й недели, малыми порциями.\n• Сочные корма (морковь, силос) — с конца 1-го месяца.\n• Чистая тёплая вода (+15…20°C) — постоянно с первых дней.\n• Минеральная подкормка (мел, соль, костная мука).\n\nГигиена: индивидуальные клетки/домики, чистая посуда, моцион, выпойка по распорядку. Это предупреждает диспепсию и обеспечивает нормальный рост (среднесуточный прирост ~600-800 г — уточнить по нормам)."}, {"num": "6.1", "category": "Билет 6", "q": "Ветеринарные объекты и гигиенические требования к ним. Утилизация трупов животных.", "hint": "• Ветобъекты: изолятор, карантин, ветпункт, убойно-санитарный\n• Размещают по ветеринарному разрыву, изолированно\n• Утилизация: завод, биотермическая яма, сжигание, захоронение\n• Скотомогильник: 0,5 км от села, забор 2 м, грунтовые воды 2,5 м", "a": "ВЕТЕРИНАРНЫЕ ОБЪЕКТЫ на ферме:\n• Ветеринарный пункт (амбулатория) — лечебно-профилактическая работа.\n• Изолятор — для больных заразными болезнями животных.\n• Карантинное помещение — для вновь поступающих животных (карантин ~30 дней).\n• Убойно-санитарный пункт.\n• Дезинфекционный блок, ветсанпропускник на въезде.\n• Объекты для уничтожения трупов (биотермическая яма/печь).\n\nГигиенические требования к ветобъектам:\n• Изолированное размещение с подветренной стороны, ниже по рельефу относительно других построек.\n• Соблюдение ветеринарных (зооветеринарных) разрывов между объектами и фермой.\n• Огораживание, отдельный въезд, дезбарьеры; непроницаемые полы, удобные для дезинфекции.\n• Изолятор и карантин — обособлены, со своим обслуживанием и инвентарём.\n\nУТИЛИЗАЦИЯ (уничтожение) ТРУПОВ ЖИВОТНЫХ — биологических отходов. Способы:\n• Переработка на ветеринарно-санитарных утилизационных заводах (цехах) — лучший способ (получают мясо-костную муку).\n• Обеззараживание в биотермических ямах (ямы Беккари).\n• Сжигание (трупосжигательные печи) — при особо опасных инфекциях.\n• Захоронение в скотомогильниках — только в исключительных случаях.\n• ЗАПРЕЩЕНО: выбрасывать, закапывать в землю без обеззараживания, сбрасывать в водоёмы.\n\nТребования к скотомогильнику / биотермической яме:\n• Размещение: не ближе 0,5 км от населённого пункта, вдали от пастбищ, водоёмов, колодцев, дорог и скотопрогонов.\n• Уровень грунтовых вод — не менее 2,5 м от поверхности.\n• Территория огорожена глухим забором высотой не менее 2 м с воротами, имеется ров.\n• Над ямой — навес, рядом помещение для вскрытия, дезсредств и инвентаря.\n• В биотермической яме за счёт развития термофильных микробов температура поднимается до 65-70°C, обеззараживание происходит за несколько суток (около 20-40 дней до полного разложения — уточнить по правилам)."}, {"num": "6.2", "category": "Билет 6", "q": "Значение витаминов В1, В2, В3,В4,В5,В6,В12 в кормлении животных и птицы; признаки недостаточности; кормовые источники.", "hint": "• Группа В — водорастворимые, синтезируются в рубце жвачных\n• В1 — полиневрит; В2 — курчавость пальцев у цыплят\n• В12 — анемия (только в кормах животных)\n• Источники: дрожжи, отруби, зелень, корма животные", "a": "Общее: витамины группы В — водорастворимые, входят в состав ферментов, регулируют обмен веществ. У взрослых жвачных синтезируются микрофлорой рубца, поэтому особенно важны для молодняка, свиней и птицы (моногастричных).\n\nВ1 (тиамин):\n• Значение: углеводный обмен, работа нервной системы.\n• Недостаток: полиневрит у птицы (запрокидывание головы, судороги), потеря аппетита, слабость, нарушение координации.\n• Источники: пшеничные отруби, дрожжи, проросшее зерно, зелень, травяная мука.\n\nВ2 (рибофлавин):\n• Значение: тканевое дыхание, рост, воспроизводство.\n• Недостаток: у цыплят «курчавость пальцев» (скрючивание), параличи, замедление роста, снижение выводимости яиц, дерматиты.\n• Источники: дрожжи, молоко и обрат, травяная мука, зелень.\n\nВ3 (пантотеновая кислота):\n• Значение: обмен жиров и белков, состояние кожи.\n• Недостаток: дерматиты, поражение кожи и слизистых, замедление роста, у птицы — «очковый» дерматит вокруг глаз и клюва.\n• Источники: дрожжи, отруби, зелёные корма, корма животного происхождения.\n\nВ4 (холин):\n• Значение: участвует в жировом обмене, предупреждает жировое перерождение печени.\n• Недостаток: ожирение печени, перозис (слётанность суставов) у птицы, снижение прироста.\n• Источники: зелёные корма, жмыхи, рыбная мука, дрожжи.\n\nВ5 / РР (никотиновая кислота, ниацин):\n• Значение: тканевое дыхание, обмен веществ, состояние ЖКТ и кожи.\n• Недостаток: пеллагра — дерматит, поражение ЖКТ (поносы), у птицы воспаление ротовой полости, замедление роста.\n• Источники: дрожжи, отруби, жмыхи, корма животного происхождения.\n(Примечание: в разных классификациях В3 и В5 обозначают пантотеновую и никотиновую кислоты — уточнить по учебнику.)\n\nВ6 (пиридоксин):\n• Значение: белковый (аминокислотный) обмен, кроветворение, нервная система.\n• Недостаток: дерматиты, анемия, повышенная возбудимость, судороги, замедление роста.\n• Источники: дрожжи, зерно, отруби, зелень.\n\nВ12 (цианокобаламин):\n• Значение: кроветворение, белковый обмен, рост; содержит кобальт.\n• Недостаток: злокачественная (B12-) анемия, истощение, снижение продуктивности и выводимости яиц.\n• Особенность: содержится практически только в кормах животного происхождения (рыбная, мясо-костная мука, обрат) и продуктах микробного синтеза; в растительных кормах его нет.\n\nЗначение в кормлении: дефицит витаминов В (В-гиповитаминозы) чаще у молодняка; профилактика — скармливание дрожжей, отрубей, зелени, травяной муки, кормов животного происхождения, премиксов."}, {"num": "6.3", "category": "Билет 6", "q": "Понятие о рационе и его структуре.", "hint": "• Рацион — набор кормов на сутки по нормам\n• Структура — % групп кормов по питательности\n• Грубые, сочные, концентрированные, животные\n• Структура определяет тип кормления", "a": "Рацион — набор и количество кормов, потребляемых животным за определённый период (сутки), составленный в соответствии с нормами кормления для данного вида, возраста, массы, физиологического состояния и продуктивности.\n\nТребования к рациону (полноценность):\n• Соответствие нормам по энергии (кормовым единицам/ОЭ) и переваримому протеину.\n• Сбалансированность по аминокислотам, минеральным веществам (Ca, P, соль), витаминам.\n• Достаточный объём и хорошие вкусовые качества (поедаемость), разнообразие кормов.\n• Доброкачественность и экономическая целесообразность (из местных кормов).\n\nСтруктура рациона — процентное соотношение отдельных видов или групп кормов по их питательности (в % от общей питательности, к.ед./ОЭ).\n\nГруппы кормов:\n• Грубые (сено, солома, сенаж).\n• Сочные (силос, корнеплоды, зелёные корма).\n• Концентрированные (зерно, комбикорм, жмыхи, шроты).\n• Корма животного происхождения и добавки (минеральные, витаминные).\n\nПример структуры рациона дойной коровы (зима):\n• Грубые — ~30-40%;\n• Сочные — ~25-30%;\n• Концентрированные — ~20-30% (уточнить по нормам).\n\nЗначение: структура рациона определяет тип кормления (например, концентратный, силосно-сенной, объёмистый). Она зависит от вида, продуктивности животных и наличия кормов в хозяйстве и влияет на здоровье, продуктивность и себестоимость продукции."}, {"num": "7.1", "category": "Билет 7", "q": "Гигиенические требования содержания телят молозивного периода в секционном (боксовом) профилактории. Гигиенические требования к содержанию и кормлению новорожденных телят (молозивного периода).", "hint": "• Секции по 15-20 клеток, принцип «всё пусто – всё занято»\n• Первое молозиво в первые 0,5-1 ч, t 36-38 °C\n• Индивидуальная клетка, t воздуха 16-18 °C, обсушка телёнка\n• Дезинфекция секции 3-5 дней между группами", "a": "Назначение профилактория:\n• Изолированное содержание новорождённых телят в молозивный период (первые ~15-20 дней) для защиты от инфекций и формирования колострального (пассивного) иммунитета.\n\nСекционный (боксовый) профилакторий:\n• Состоит из 2-4 и более изолированных секций со сплошными перегородками и автономным микроклиматом.\n• В секции не более 15-20 (до 30) индивидуальных клеток-боксов.\n• Работа по принципу «всё свободно – всё занято»: секцию заполняют за 2-4 дня, телята стоят 16-20 дней, затем 3-5 дней на очистку, мойку и дезинфекцию.\n• Индивидуальная клетка-полубокс ~120х100 см (h передней стенки ~100-120 см), исключает контакт между телятами.\n\nМикроклимат:\n• Температура воздуха 16-18 °C, относительная влажность 70%.\n• Хорошая вентиляция без сквозняков, освещённость, сухая чистая подстилка.\n• Содержание вредных газов: аммиак до 10 мг/м³, CO2 до 0,15%.\n\nСодержание и уход:\n• Принять телёнка на чистую подстилку, обтереть слизь, обсушить, обработать пуповину настойкой йода.\n• Первые сутки телёнок в индивидуальной клетке, поение из сосковых поилок.\n\nКормление молозивом:\n• Первое молозиво выпаивают в первые 0,5-1 ч после рождения (не позже 1,5-2 ч) — антитела всасываются только в первые часы.\n• Температура молозива 36-38 °C, из сосковой поилки (медленное поступление, лучше переваривание).\n• Кратность 3-4 раза в сутки; разовая дача ~1-1,5 л, суточно 5-7 л (1/5-1/6 живой массы).\n• Молозиво даётся от матери; нельзя выпаивать остывшее, грязное или из вёдер большими глотками.\n• С 4-5-го дня приучают к воде (кипячёной, t ~25 °C).\n\nЗначение: правильная выпойка молозива и чистый микроклимат предупреждают диспепсию и обеспечивают сохранность молодняка."}, {"num": "7.2", "category": "Билет 7", "q": "Отходы технических производств, используемые в кормлении животных (жмыхи, шроты, отруби, жом, барда и т.п.), их питательность.", "hint": "• Жмых/шрот – масличный, протеин 30-40%, 1,0-1,3 к.ед.\n• Отруби – мукомольные, протеин 15%, фосфор, 0,7 к.ед.\n• Жом, барда – свеклосахар/спирт, водянистые, мало к.ед.\n• Контроль плесени, госсипола (хлопковый), ограничение норм", "a": "Определение:\n• Отходы технических производств — побочные продукты переработки растительного сырья, ценные концентрированные и сочные корма.\n\nГруппы по производству:\n• Мукомольное — отруби, мучная пыль, лузга.\n• Маслоэкстракционное — жмыхи (прессование) и шроты (экстракция).\n• Крахмало-паточное — мезга, кормовая патока (меласса).\n• Бродильное (спиртовое, пивоваренное) — барда, пивная дробина, солодовые ростки.\n• Свеклосахарное — жом, патока.\n\nЖмыхи и шроты (белковые концентраты):\n• Богаты протеином: соевые до 40-45%, подсолнечные 30-40%; жмых жирнее (5-10% жира), шрот — 1-3%.\n• Питательность 1,0-1,3 к.ед. в 1 кг.\n• Ограничения: хлопковый — госсипол (телятам осторожно), льняной при намокании выделяет синильную кислоту, рапсовый — глюкозиды.\n\nОтруби (пшеничные, ржаные):\n• Протеин 15-18%, клетчатка 8,5-12%, богаты фосфором, витаминами группы B.\n• Питательность ~0,7-0,75 к.ед. в 1 кг; послабляющее действие.\n\nЖом свекловичный:\n• Свежий — до 90% воды, ~0,08-0,1 к.ед./кг; кислый (силосованный) и сухой (до 0,8-0,85 к.ед./кг, близок к концентратам), беден протеином и фосфором.\n\nБарда:\n• 92-95% воды, в 1 кг хлебной ~0,08 к.ед., картофельной ~0,04 к.ед.; сухое вещество богато протеином.\n• Скармливают свежей, в ограниченных нормах (избыток — «бардяной мокрец», расстройства).\n\nПивная дробина и солодовые ростки:\n• Дробина — ~75% воды, протеин до 25-28% в СВ; норма КРС до 20-25 кг/сут.\n• Солодовые ростки — горьковатые, скармливают размоченными в небольших количествах.\n\nГигиена скармливания:\n• Корма с плесенью, затхлым запахом, горьким вкусом — непригодны.\n• Водянистые отходы быстро портятся — давать свежими; соблюдать нормы для каждого вида животных."}, {"num": "7.3", "category": "Билет 7", "q": "Особенности кормление коров в период стабилизации лактации.", "hint": "• Середина лактации, ~3,5-7 мес после отёла\n• Удой стабилизируется, спад 3-4% в месяц при норме\n• Снижают концентраты до ~28% (с 40% в раздой)\n• Объёмистый тип, восстановление упитанности без ожирения", "a": "Место в лактационном цикле:\n• Период стабилизации (середина лактации) — примерно с 3,5 до 7-8-го месяца после отёла, после фазы раздоя.\n• Суточные удои достигают максимума к 30-45 дню, затем постепенно снижаются.\n\nЗадачи кормления:\n• Удержать удой на стабильном уровне (естественный спад 8-10% в месяц, при сбалансированном кормлении до 3-4%).\n• Восстановить упитанность (резервы, потраченные в раздое) без ожирения.\n• Полное и равномерное кормление по фактическому удою.\n\nОсобенности рациона:\n• Переход на объёмистый и малоконцентратный тип кормления.\n• Доля концентратов снижается до ~25-28% питательности рациона (против ~40% в раздое).\n• Максимально используют качественные грубые и сочные корма (сено, силос, сенаж, корнеплоды, зелёная масса).\n\nНормирование и контроль:\n• Рацион корректируют по результатам контрольных доек.\n• Сахаро-протеиновое отношение ~0,8-1,2:1 (оптимум 1:1); крахмал к сахару ~1,5:1.\n• Обеспечивают потребность в минеральных веществах (Ca, P) и каротине.\n\nРежим:\n• Нельзя допускать перебоев и резкой смены кормов — даже разовый сбой снижает удой на 1-1,5 кг/сут, восстановление до 2 недель.\n\nЗначение: правильное кормление в этот период удлиняет лактацию, сохраняет высокую продуктивность и подготавливает корову к запуску."}, {"num": "8.1", "category": "Билет 8", "q": "Гигиена выращивания и эксплуатации быков- производителей.", "hint": "• Индивидуальные стойла/боксы, привязь, моцион 3-4 км\n• Средняя упитанность, кормление 2-4 раза, белковые корма\n• Чистка кожи, копыт, препуция и мошонки ежедневно\n• Молодой бык: 50-70 садок/год; режим использования", "a": "Значение:\n• Бык даёт качественную сперму, от его здоровья зависит воспроизводство стада; держат на племпредприятиях, станциях искусственного осеменения.\n\nРазмещение и содержание:\n• Помещение просторное, светлое, сухое, с длинными индивидуальными стойлами (длина 2,5-3,0 м) или в боксах, на привязи с цепью.\n• Площадь логова на быка ~6-9 м²; полы с уклоном, тёплое сухое ложе.\n• Микроклимат: температура 8-12 °C, относительная влажность ~70%, освещённость хорошая, без сквозняков.\n• Летом — перевод в летние лагеря, на лёгкие постройки (повышает резистентность).\n\nМоцион:\n• Обязателен ежедневный активный (принудительный) моцион 3-4 км — на механической водилке или прогоном; укрепляет конечности, сердце, повышает качество спермы и продлевает использование.\n• С раннего возраста приучают к моциону и спокойному обращению.\n\nКормление:\n• Полноценное, но не обильное — поддержание средней (заводской) упитанности, не допускать ожирения и истощения.\n• Кратность 2-3 раза зимой, 3-4 раза летом; индивидуальные рационы.\n• Корма доброкачественные: хорошее сено, концентраты, корнеплоды, корма животного происхождения (в случной период усиленное белковое питание, повышают переваримый протеин, витамины A, E, минеральные вещества).\n\nУход:\n• Ежедневная чистка кожи, регулярный уход и обрезка копыт, уход за препуцием и мошонкой.\n• Летом систематическое купание (душевые установки на выгулах).\n\nРежим использования:\n• Молодого быка приучают постепенно: ~2 садки в сутки, отдельными днями 3-4; за год молодой бык даёт 50-70 садок.\n• За взрослым закрепляют 200 и более коров; не допускать перегрузки и переутомления.\n\nЗначение: правильная гигиена удлиняет срок племенного использования, сохраняет высокую половую активность и качество спермы."}, {"num": "8.2", "category": "Билет 8", "q": "Сточные воды животноводческих предприятий, способы очистки и обеззараживания.", "hint": "• Этапы: механическая → биологическая → обеззараживание\n• Решётки, отстойники, песколовки – механическая\n• Поля фильтрации, биофильтры, аэротенки – биологическая\n• Карантин навозных стоков 6 сут, хлорирование/УФ", "a": "Состав сточных вод:\n• Образуются при поении, уборке, мойке: навозная жижа, остатки кормов, шерсть, моющие и дезсредства; богаты органикой, азотом, патогенной микрофлорой, яйцами гельминтов.\n• Опасны как источник загрязнения почвы, водоёмов и распространения инфекций — очистка обязательна перед сбросом или использованием.\n\nЭтапы очистки:\n1) Механическая очистка (удаление взвесей):\n• Решётки и сита — задержка крупных примесей.\n• Песколовки — оседание песка и тяжёлых частиц.\n• Отстойники (горизонтальные, вертикальные), жироловки — осаждение взвешенных веществ.\n2) Биологическая очистка (разложение органики микроорганизмами):\n• Естественная — поля фильтрации, поля орошения, биологические пруды.\n• Искусственная — биофильтры, аэротенки (аэрация с активным илом), процессы нитрификации и денитрификации.\n3) Физико-химическая/химическая очистка:\n• Коагуляция, отстаивание, нейтрализация (по необходимости).\n4) Обеззараживание:\n• Хлорирование (хлорная известь, жидкий хлор), озонирование, ультрафиолетовое облучение для уничтожения патогенных микроорганизмов.\n\nОбработка навозных стоков:\n• Разделение на твёрдую и жидкую фракции, карантинирование жидкого навоза не менее 6 суток (для выявления инфекций).\n• Биотермическое обеззараживание твёрдой фракции (саморазогрев до 60-70 °C).\n• При инфекциях — дезинфекция стоков химическими средствами перед использованием.\n\nИспользование:\n• Очищенные и обеззараженные стоки применяют для орошения и удобрения полей (по агрономическим и ветсанитарным нормам).\n\nЗначение: очистка предотвращает загрязнение окружающей среды и распространение заразных болезней."}, {"num": "8.3", "category": "Билет 8", "q": "Понятие о проекте, его видах и составных частях. Нормативные документы. Права и обязанности ветеринарного врача при проектировании, строительстве и эксплуатации животноводческих объектов.", "hint": "• Проект = комплект документации для строительства\n• Виды: типовой, индивидуальный, экспериментальный\n• Части: технологическая, строительная, сметная, генплан, записка\n• Ветврач: задание, экспертиза, контроль, приёмка объекта", "a": "Понятие о проекте:\n• Проект — комплект технической документации (чертежи, расчёты, сметы, пояснения), на основе которой ведётся строительство или реконструкция животноводческой фермы (комплекса).\n\nСтадии проектирования:\n• Одностадийное — рабочий проект (для типовых, несложных объектов).\n• Двухстадийное — проект (проектное задание) + рабочая документация (для крупных, сложных объектов).\n\nВиды проектов:\n• Типовой — стандартное многократно применяемое решение.\n• Индивидуальный — разработан под конкретные местные условия.\n• Экспериментальный — новое решение на основе научных разработок, для проверки.\n• Привязка типового проекта к конкретной площадке.\n\nСоставные части проекта:\n• Пояснительная записка — обоснование решений.\n• Генеральный план — размещение зданий на территории, зонирование, благоустройство.\n• Технологическая часть — процессы содержания, кормления, поения, навозоудаления, микроклимат, ветзащита.\n• Строительная (архитектурно-строительная) часть — конструктивные решения.\n• Санитарно-техническая часть — водоснабжение, канализация, отопление, вентиляция.\n• Сметная часть — расчёт стоимости.\n\nНормативные документы:\n• СНиП — строительные нормы и правила.\n• НТП/ОНТП (РД-АПК) — нормы технологического проектирования животноводческих и ветеринарных объектов.\n• ГОСТ, ветеринарно-санитарные и санитарные правила (СанПиН), нормы пожарной безопасности.\n\nПрава и обязанности ветеринарного врача:\n• Участвует в разработке задания на проектирование (ветеринарно-санитарные требования).\n• Проводит ветеринарную экспертизу (согласование) проектов на соответствие нормам.\n• Контролирует ход строительства и соблюдение проектных решений.\n• Участвует в приёмке объекта в эксплуатацию.\n• Контролирует ветеринарно-санитарное состояние при эксплуатации (микроклимат, размещение ветобъектов, навозоудаление, зооветеринарные разрывы).\n• Имеет право не допускать к вводу объекты с нарушениями ветсанитарных норм.\n\nЗначение: грамотное проектирование обеспечивает здоровье животных, продуктивность, охрану труда и окружающей среды."}, {"num": "9.1", "category": "Билет 9", "q": "Зоогигиенический контроль при заготовке, хранении, транспортировке и подготовке кормов к вскармливанию. Основные методы, особенности контроля за качеством кормов в крупных животноводческих предприятиях", "hint": "• 3 этапа: заготовка → хранение → перед скармливанием\n• Оценка: цвет, запах, влажность, примеси, плесень\n• Методы: органолептика, лаборатория, ветсанэкспертиза\n• На комплексах — постоянный контроль, корм из кормушек", "a": "Цель контроля: не допустить скармливания недоброкачественных, токсичных, обсемененных кормов — профилактика отравлений, инфекций, инвазий, снижения продуктивности.\n\nЭтапы контроля:\n• 1-й — при заготовке (на месте уборки/закладки): однородность, структура, влажность, цвет, запах, примеси, признаки порчи.\n• 2-й — при хранении: контроль за самосогреванием, плесенью, гниением, поражением вредителями, грызунами.\n• 3-й — перед скармливанием, после длительного хранения; по результатам корректируют рацион.\n\nОсновные методы оценки:\n• Органолептические — цвет, запах, вкус, структура, наличие плесени, гнили, примесей.\n• Лабораторные — определение влажности, кислотности, содержания питательных веществ, токсичности, бактериальной и грибковой обсемененности (микотоксины).\n• Ветеринарно-санитарная экспертиза — на ядовитые растения, пестициды, соли тяжелых металлов, яйца гельминтов.\n\nГигиенические требования:\n• Корма заготавливают в оптимальные сроки и фазы вегетации.\n• Хранилища сухие, чистые, защищенные от осадков, грызунов, птиц.\n• Зерно: влажность не выше 14–15 %, допускается 1–2 % сорной примеси (в т.ч. 0,3 % минеральной, 0,2 % вредной).\n• Транспортировка — чистым транспортом, без загрязнения ГСМ, ядохимикатами.\n• Подготовка к скармливанию: измельчение, запаривание, дрожжевание, проращивание — повышают поедаемость и обеззараживают.\n\nОсобенности на крупных предприятиях (комплексах):\n• Большие объемы однотипных кормов — ошибка качества затрагивает все поголовье.\n• Нужен постоянный (поточный) лабораторный контроль, контроль кормоцехов и кормосмесей.\n• Кормление только из кормушек — профилактика заражения гельминтами.\n• Создание производственных лабораторий, периодический отбор средних проб."}, {"num": "9.2", "category": "Билет 9", "q": "Злаковые зерновые; их питательность (ячмень, кукуруза, овес, пшеница, рожь)", "hint": "• Злаки = энергия: крахмал, мало протеина (~8–12 %)\n• Кукуруза — самая энергоемкая, мало клетчатки\n• Овес — много клетчатки (пленки), диетичен для лошадей\n• Рожь — осторожно, не беременным; ячмень — свиньям", "a": "Общая характеристика: зерно злаков — основной концентрированный (углеводистый) корм. Высокая энергия за счет крахмала (320–560 г/кг); протеина мало (около 8–12 %, неполноценный, дефицит лизина); жира немного; минеральных веществ мало (мало Ca, много P), беден каротином (кроме желтой кукурузы).\nПитательность: 0,95–1,36 корм. ед. в 1 кг; переваримого протеина около 70–90 г/кг.\n\nПо культурам (ориентировочно, на 1 кг):\n• Ячмень — ~1,15 корм. ед., переваримого протеина ~85 г; пленчатый, клетчатки 5–6 %; лучший корм для свиней (улучшает качество сала), КРС, птицы.\n• Кукуруза — ~1,33–1,34 корм. ед., переваримого протеина ~73 г; самая энергоемкая, клетчатки мало (<3 %), много жира и каротина (желтая); бедна белком и Ca; для откорма, птицы.\n• Овес — ~1,0 корм. ед., переваримого протеина ~79 г; пленчатый, клетчатки 10–12 %; диетический, незаменим для лошадей, племенных животных, молодняка.\n• Пшеница (фуражная) — ~1,28 корм. ед., переваримого протеина ~106 г (самый ценный белок, клейковина); скармливают дробленой, избыток у КРС вызывает закисление рубца.\n• Рожь — ~1,15 корм. ед., переваримого протеина ~91 г; вводят ограниченно (до 5–10 % рациона), не беременным; набухает в ЖКТ, риск поражения спорыньей/головней.\n\n(Точные значения уточнить по справочнику Калашникова/Менькина.)\n\nПодготовка: дробление, плющение, дрожжевание — повышают переваримость и поедаемость."}, {"num": "9.3", "category": "Билет 9", "q": "Понятие о нормах кормления.", "hint": "• Норма = энергия + питательные вещества в сутки\n• На поддержание жизни + на продукцию\n• Зависит от вида, массы, возраста, продуктивности\n• Современные нормы — до 24–40 показателей", "a": "Норма кормления — это количество энергии, питательных и биологически активных веществ, необходимое животному в сутки для поддержания жизни, здоровья, нормального воспроизводства и получения запланированной продукции при экономном расходе кормов.\n\nОснова нормирования:\n• Зависит от вида, возраста, живой массы, физиологического состояния, уровня и направления продуктивности.\n• Норма = поддерживающая часть (на жизнедеятельность) + продуктивная часть (на молоко, прирост, шерсть, яйца, плод).\n\nИсторическое развитие:\n• Старые нормы (по М.Ф. Томмэ) — по 6 показателям: корм. ед., переваримый протеин, поваренная соль, кальций, фосфор, каротин.\n• Современные (детализированные) нормы — до 24–40 показателей: энергия (корм. ед., обменная энергия), сухое вещество, протеин, аминокислоты (лизин, метионин), клетчатка, сахара, крахмал, жир, макро- и микроэлементы, витамины.\n\nЗначение: научно обоснованное нормированное кормление обеспечивает высокую продуктивность, здоровье, воспроизводство и экономию кормов; на основе норм составляют рационы.\n\n(Число показателей детализированных норм уточнить по учебнику Менькина.)"}, {"num": "10.1", "category": "Билет 10", "q": "Особенности кормления телят в молозивный период.", "hint": "• Молозиво = антитела (иммунитет), теленок родится без них\n• Первая выпойка — в первый час, 1–2 л\n• За сутки 6–8 л, температура 37–39 °С\n• Из сосковой поилки, чистота, 4 раза в сутки", "a": "Молозивный период — первые 5–7 дней жизни теленка, когда он питается молозивом.\n\nЗначение молозива:\n• Содержит иммуноглобулины (антитела) — формируют колостральный (пассивный) иммунитет; теленок рождается без собственных антител (плацента коровы их не пропускает).\n• Богато белком, жиром, витаминами (A, D), минеральными веществами; имеет высокую кислотность — губит гнилостную микрофлору.\n• Действует послабляюще — очищает кишечник от первородного кала (мекония).\n\nПравила выпойки:\n• Первая выпойка — как можно раньше, в первые 0,5–1,5 ч после рождения (всасывание иммуноглобулинов с каждым часом снижается, прекращается к 24–36 ч).\n• Первая порция — 1–2 л; за первые сутки теленок должен получить около 6–8 л (не менее 10 % живой массы).\n• Температура молозива — 37–39 °С (температура тела).\n• Кратность: в первые сутки не менее 4 раз, затем 3 раза в сутки.\n• Поят из сосковой поилки (медленное поступление, обильное слюноотделение) — профилактика расстройств пищеварения; нельзя поить из ведра большими глотками.\n\nГигиена: чистая посуда; место для теленка чистое, сухое, светлое, без сквозняков, температура не ниже 15 °С. С 7–10 дня приучают к воде, сену, концентратам."}, {"num": "10.2", "category": "Билет 10", "q": "Сено; питательность и нормы скармливания.", "hint": "• Сено — основной грубый корм зимой, источник каротина\n• Лучшее — бобовое/злаково-бобовое, ранней уборки\n• Луговое ~0,45 к.ед., 48 г ПП; клеверное ~0,5, 81 г\n• Норма коровам 1,5–2 кг на 100 кг массы", "a": "Сено — грубый корм, получаемый высушиванием трав до влажности 14–17 %; основной источник клетчатки, протеина, каротина и витамина D в зимний период.\n\nВиды по составу: бобовое (клевер, люцерна — самое питательное), злаковое (тимофеевка, овсяница), злаково-бобовое, луговое (естественных сенокосов).\n\nПитательность (в 1 кг, ориентировочно):\n• Луговое сено — 0,45 корм. ед., 48 г переваримого протеина, 6,4 г Ca, 1,8 г P, ~11 мг каротина.\n• Клеверное (бобовое) — 0,50 корм. ед., 81 г переваримого протеина, ~13 г Ca, ~25 мг каротина.\n• В среднем хорошее сено — 0,5–0,7 ЭКЕ; злаковое — 40–50 г ПП, бобовое — 60–80 г ПП в 1 кг.\n\nФакторы качества: ботанический состав, фаза уборки (лучшее — начало цветения злаков/бутонизация бобовых), технология сушки, цвет (зеленый), запах (ароматный), отсутствие пыли, плесени, ядовитых трав.\n\nНормы скармливания:\n• Дойным коровам — 1,5–2 кг на 100 кг живой массы (т.е. взрослой корове ~8–12 кг в сутки).\n• Молодняк КРС — 1–3 кг; лошади — 1,5–3 кг на 100 кг массы; овцы — 1,5–2,5 кг на голову.\n\nЗначение: нормализует пищеварение жвачных, поддерживает работу рубца; хорошим сеном можно покрыть значительную часть потребности. (Точные нормы уточнить по справочнику Калашникова.)"}, {"num": "10.3", "category": "Билет 10", "q": "Системы навозоудаления и их гигиеническая оценка. Биотермическое обеззараживание навоза.", "hint": "• 2 системы: механическая и гидравлическая (самотечная)\n• Механика: скребки, штанги, бульдозер; гидро — смыв водой\n• Хранят в навозохранилищах, не вносить свежий навоз\n• Биотермия: штабель, термофилы дают 60–70 °С, губят микробов", "a": "Значение: своевременное удаление навоза снижает влажность, загазованность (аммиак, сероводород), микробную обсемененность, предупреждает распространение болезней.\n\nСистемы навозоудаления:\n• Механические — транспортеры (скребковые ТСН), штанговые установки, бульдозеры, скреперы. Оценка: надежны, недороги, но требуют подстилки, ручного труда, выходит из строя зимой.\n• Гидравлические (самотечные, смывные, рециркуляционные) — навоз удаляется по каналам водой/самотеком. Оценка: меньше ручного труда, но большой расход воды, образуются жидкие стоки большого объема, сложнее обеззараживание и хранение.\n• Самосплавная (самотечно-непрерывного действия) — без воды, за счет текучести жидкого навоза по каналам.\n\nХранение: навоз вывозят в навозохранилища (открытые/закрытые); жидкий — в емкости/лагуны. Свежий навоз на поля вносить нельзя — содержит патогенные бактерии, яйца гельминтов, семена сорняков.\n\nСпособы обеззараживания: биотермический, биологический, химический, термический.\n\nБиотермическое обеззараживание (основной для подстилочного навоза):\n• Навоз укладывают рыхло в штабель (бурт) шириной 2–2,5 м, высотой 1,5–2 м, на площадке с твердым покрытием.\n• Влажность ~60–70 %, доступ воздуха — развиваются термофильные микроорганизмы.\n• Температура внутри штабеля поднимается до 60–70 °С — гибнут возбудители инфекций, яйца и личинки гельминтов, семена сорняков.\n• Выдержка: летом — около 1 месяца, зимой — 2–3 месяца (при подозрении на инфекцию — дольше).\n\n(Точные размеры штабеля и сроки выдержки уточнить по учебнику Аликаева «Зоогигиена».)"}, {"num": "11.1", "category": "Билет 11", "q": "Подстилочные материалы, их свойства, гигиеническая оценка и значение. Гигиенические требования к полам при бесподстилочном содержании животных.", "hint": "• Свойства: влагоемкость, гигроскопичность, теплоемкость, газопоглощение\n• Виды: солома, торф, опилки, стружка\n• Торф — чемпион по влагоемкости (~1000%)\n• Бесподстилочно: пол теплый, нескользкий, водонепроницаемый", "a": "Определение:\n• Подстилка — материал, настилаемый на пол для создания сухого, теплого, мягкого и чистого ложа; входит в состав навоза.\n\nГигиенические требования к подстилке:\n• высокая влагоемкость и гигроскопичность (впитывание влаги и газов);\n• малая теплопроводность, большая теплоемкость (теплое ложе);\n• газопоглотительная способность (поглощает аммиак, сероводород);\n• безвредность: без патогенных микробов, плесени, ядовитых растений, не пылит, не липнет к шерсти;\n• хорошие удобрительные качества навоза.\n\nКлассификация (основные материалы) и оценка:\n• Солома (озимых злаков) — лучший материал: теплое, сухое ложе, влагоемкость 370–450%, ценное удобрение; минус — слабые бактерицидные свойства; используют в резке 8–15 см.\n• Сфагновый (моховой) торф — самая высокая влагоемкость (~1000%), высокая газопоглотительная и бактерицидная (кислая среда) способность, отличное удобрение; минус — пылит, сушит кожу/копыта, темный цвет.\n• Опилки (только сухие) — влагоемкость 370–520%, мягкое чистое ложе; минусы: пылят, низкая удобрительная ценность, могут травмировать вымя.\n• Стружка древесная — влагоемкость ~280%, теплое сухое ложе, удобрительная ценность низкая.\n• Реже: листва, хвоя, осока, песок, торфокрошка.\n\nПримерные нормы расхода (на голову в сутки):\n• корова — соломы 2,5–3 кг, торфа 2–3 кг, опилок 3–6 кг;\n• молодняк КРС до года — примерно вдвое меньше;\n• при глубокой несменяемой подстилке нормы увеличивают в ~2 раза (конкретные нормы для лошадей, свиней, овец уточнить по учебнику Аликаева).\n\nЗначение подстилки:\n• сохраняет тепло, снижает теплопотери и заболеваемость (простуды, маститы);\n• поддерживает чистоту кожи и сухость воздуха;\n• улучшает количество и качество навоза как удобрения.\n\nТребования к полам при бесподстилочном содержании:\n• малая теплопроводность (теплый пол) — применяют керамзитобетон, кордорезинобитум, дерево, резиновые маты;\n• нескользкая, ровная, но не гладкая поверхность (профилактика травм и падений);\n• водонепроницаемость и стойкость к дезсредствам и моче;\n• достаточный уклон для стока (около 1–1,5%, уточнить по учебнику);\n• прочность, долговечность, легкость очистки и дезинфекции;\n• сухость поверхности — для отвода жижи."}, {"num": "11.2", "category": "Билет 11", "q": "Значение серы, железа, меди, кобальта, цинка, йода в питании животных; кормовые источники.", "hint": "• Кроветворение — Fe, Cu, Co (анемия)\n• Co → витамин B12 в рубце; I → тироксин, зоб\n• Zn → паракератоз кожи; S → шерсть и аминокислоты\n• Источники микроэлементов: дрожжи, отруби, жмыхи, рыбная/костная мука", "a": "Микроэлементы регулируют обмен веществ, входят в ферменты, гормоны, участвуют в кроветворении (Fe, Cu, Co) и работе желёз внутренней секреции (I, Zn).\n\nСера (S):\n• Роль: входит в серосодержащие аминокислоты (метионин, цистин, цистеин), в состав шерсти, рогов, копыт, инсулина, витаминов B1 и биотина; нужна микрофлоре рубца для синтеза белка (особенно при кормлении мочевиной).\n• Недостаток: ухудшение роста шерсти, выпадение, снижение прироста и продуктивности, плохое использование азота небелковых добавок.\n• Источники: бобовые травы, жмыхи, шроты, зерно бобовых, корма животного происхождения; добавки — сульфат натрия (глауберова соль), элементарная сера.\n\nЖелезо (Fe):\n• Роль: входит в гемоглобин крови и миоглобин мышц, в ферменты дыхания; обеспечивает перенос кислорода и клеточное дыхание.\n• Недостаток: алиментарная (железодефицитная) анемия, особенно у поросят-сосунов; бледность, слабость, отставание в росте.\n• Источники: зелёные растения, бобовые, отруби, жмыхи, корма животного происхождения; добавки — сульфат железа.\n\nМедь (Cu):\n• Роль: участвует в образовании гемоглобина (способствует усвоению железа), входит в ферменты и пигменты волоса и пера; влияет на рост, пигментацию, воспроизводство.\n• Недостаток: анемия, задержка роста, обесцвечивание (депигментация) волоса и шерсти, бесплодие, у овец — нарушение шерсти и расстройства движений у ягнят.\n• Источники: зерно, семена, жмыхи и шроты; мало в траве и соломе. Добавка — сульфат меди (медный купорос).\n\nКобальт (Co):\n• Роль: входит в состав витамина B12 (цианокобаламина); необходим микрофлоре рубца для синтеза B12, стимулирует кроветворение, рост, улучшает использование протеина.\n• Недостаток: эндемическая болезнь — «сухотка» (акобальтоз): слабость, анемия, истощение, потеря аппетита, снижение продуктивности и нарушение воспроизводства.\n• Источники: бобовые травы; корма с торфянисто-болотных почв беднее; добавка — хлорид и сульфат кобальта.\n\nЦинк (Zn):\n• Роль: входит в фермент карбоангидразу и гормон инсулин, в состав кожи и шёрстного покрова; нужен для роста, воспроизводства и обмена углеводов.\n• Недостаток: паракератоз (огрубение, утолщение и поражение кожи) у свиней, замедление роста, плохая оплата корма, нарушение волосяного покрова.\n• Источники: дрожжи, отруби, зародыши зерна; молозиво богаче молока. Добавки — сульфат и окись цинка.\n\nЙод (I):\n• Роль: входит в гормон щитовидной железы — тироксин; регулирует обмен веществ, рост и развитие.\n• Недостаток: нарушение функции щитовидной железы, эндемический зоб (увеличение железы), рождение слабого, безволосого или мёртвого приплода, снижение продуктивности.\n• Источники: морские водоросли, рыбная мука; добавка — йодистый (йодид) калий, йодированная соль."}, {"num": "11.3", "category": "Билет 11", "q": "Потребность лактирующих коров в основных питательных в-вах (в сухом веществе, энергии, протеине, сахаре и крахмале).", "hint": "• Сухого вещества 3-4 кг на 100 кг массы\n• 95-105 г перевар. протеина на 1 корм.ед.\n• Сахаро-протеиновое отношение 0,8-1,2\n• Корова 500 кг, удой 16 кг ≈ 12-13 корм.ед.", "a": "Потребность лактирующих коров в питательных веществах нормируют по детализированным нормам (более 20 показателей); главные — сухое вещество, энергия, протеин, сахар, крахмал.\n\nСухое вещество:\n• Нормируют на 100 кг живой массы: при среднем удое 2,8-3,2 кг СВ, у высокопродуктивных коров до 3,5-4 (иногда 4,7) кг на 100 кг массы.\n• Чем выше удой, тем выше концентрация энергии в 1 кг СВ (до 10-11,4 МДж ОЭ).\n\nЭнергия:\n• Измеряют в кормовых единицах (корм.ед.) или ЭКЕ (1 ЭКЕ = 10 МДж обменной энергии).\n• Потребность складывается из затрат на поддержание жизни (≈1 корм.ед. на 100 кг массы) плюс на образование молока (≈0,5 корм.ед. на 1 кг молока).\n\nПереваримый протеин:\n• На 1 корм.ед. — 95-105 г.\n• Зависит от удоя: низкопродуктивным 90-95 г, среднепродуктивным ≈100 г, высокопродуктивным (удой 20 кг и более) 105-110 (до 112) г на 1 корм.ед.\n\nСахар и крахмал:\n• Сахара 75-105 г на 1 корм.ед.\n• Сахаро-протеиновое отношение (сахар : перевар. протеин) = 0,8-1,2 (оптимум ≈1,0).\n• Крахмала 110-160 г на 1 корм.ед.; крахмало-сахарное отношение ≈1,5:1.\n\nВлияние удоя и живой массы:\n• С ростом удоя и массы растёт общая потребность, а также концентрация энергии и протеина в СВ.\n\nПример (корова 500 кг, удой 16 кг молока, стойловый период):\n• Около 12-13 корм.ед. в сутки, ≈14-15 кг сухого вещества.\n• Переваримого протеина ≈1300-1400 г (≈100-105 г на корм.ед.).\n• Сахара ≈1200-1300 г, крахмала ≈1700-1900 г.\n• Кальций ≈7 г, фосфор ≈5 г на корм.ед., соль 65 г.\n(конкретные цифры рациона уточнить по таблицам Калашникова/учебнику Менькина).\n\nРекомендации: рацион должен быть сбалансирован по всем показателям; недостаток сахара снижает использование протеина и ведёт к кетозу; избыток концентратов нарушает рубцовое пищеварение."}, {"num": "12.1", "category": "Билет 12", "q": "Зерно бобовых; их питательность.", "hint": "• Горох, соя, бобы, люпин, вика, чечевица, нут\n• Протеина 20-35%, богаты лизином\n• Питательность 1,1-1,3 корм.ед. в 1 кг\n• Антипитательные: ингибитор трипсина, алкалоиды — нужна термообработка", "a": "Зерно бобовых — высокобелковые концентрированные корма, главный растительный источник протеина в рационах.\n\nКультуры:\n• Горох, соя, кормовые бобы, люпин, вика, чечевица, нут, чина.\n\nПитательность и состав:\n• Содержание сырого протеина 20-35%: горох ≈20-22%, кормовые бобы ≈25-26%, люпин ≈30-35%, соя ≈32-35% (лидер по протеину и жиру).\n• Белок богат незаменимыми аминокислотами, особенно лизином.\n• Питательность 1 кг: горох ≈1,17-1,18 корм.ед. (≈11,8 МДж ОЭ, ≈124 г перевар. протеина), соя ≈1,3-1,45 корм.ед. (≈15 МДж ОЭ, жир 14-15%), люпин ≈1,1-1,2 корм.ед.\n• Бедны крахмалом по сравнению со злаками, но богаче белком.\n\nАнтипитательные вещества:\n• Соя — ингибитор трипсина, уреаза, гемагглютинины (угнетают пищеварение).\n• Люпин — алкалоиды (горькие сорта); сладкие сорта содержат 0,008-0,12% алкалоидов и почти безопасны.\n• Бобы и горох — также содержат ингибиторы протеаз.\n• Поэтому многие бобовые (особенно соя) требуют термообработки — пропаривание, варка, экструдирование, поджаривание; это разрушает ингибиторы и повышает переваримость протеина.\n\nНормы скармливания:\n• Горох КРС (дойные): 1,5-4,5 кг на голову в сутки; молодняку на откорме 1-3 кг.\n• Овцам 0,35-0,55 кг; до 15-20% массы рациона.\n• Свиньям взрослым до 20% рациона, поросятам с 5-10%.\n• Зерно обязательно измельчают (размол, плющение).\n\nРекомендации: бобовые вводят в рацион постепенно; для свиней и птицы сою скармливать только после термообработки; горький люпин использовать только после вымачивания/обезгоречивания, лучше — сладкие сорта."}, {"num": "12.2", "category": "Билет 12", "q": "Особенности биологии и гигиены овец. Системы содержания.", "hint": "• Боятся сырости, не холода; стадность, шерсть греет\n• Овчарня (кошара), баз для выгула, тепляк +12-16°C\n• Системы: стойлово-пастбищная, пастбищная, отгонная\n• Сухость, подстилка, t овцематкам +4-6°C, влажн. до 75-85%", "a": "Биологические особенности овец:\n• Стадные животные — содержат и пасут группами (отарами), плохо переносят одиночество.\n• Шерстный покров (руно) хорошо защищает от холода и зноя — овцы устойчивы к низким температурам, могут зимовать на пастбищах (тебеневка — добывание корма из-под снега).\n• Главный враг — сырость и сквозняки: влажность портит шерсть, вызывает простуды, копытную гниль, мокрец. Сухой холод переносят легко, сырость и духоту — плохо.\n• Подвижны, неприхотливы к кормам, хорошо используют пастбища, в т.ч. горные и полупустынные.\n\nГигиена содержания и микроклимат овчарн
