<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Анатомия и физиология животных — карточки</title>
<style>
  :root{
    --bg:#f4f1ea; --panel:#ffffff; --ink:#2c2a26; --muted:#8a8377;
    --accent:#7c9473; --accent2:#c97b5a; --line:#e6e0d4;
    --know:#7c9473; --learn:#c97b5a; --shadow:0 10px 30px rgba(60,50,30,.12);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
  header{padding:22px 18px 10px;text-align:center}
  h1{margin:0 0 4px;font-size:22px;font-weight:700;letter-spacing:-.2px}
  .sub{color:var(--muted);font-size:13px;margin:0}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 80px}
  .bar{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin:14px 0 6px}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),#9fb38f);transition:width .3s}
  .stats{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:14px}
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .controls input,.controls select{flex:1;min-width:130px;padding:10px 12px;border:1px solid var(--line);
    border-radius:12px;background:var(--panel);font-size:14px;color:var(--ink);outline:none}
  .controls input:focus,.controls select:focus{border-color:var(--accent)}
  .toggle{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:0 12px;cursor:pointer;user-select:none}
  .toggle input{accent-color:var(--accent);width:16px;height:16px}
  .card{background:var(--panel);border-radius:20px;box-shadow:var(--shadow);border:1px solid var(--line);
    min-height:360px;padding:26px 24px;cursor:pointer;position:relative;display:flex;flex-direction:column;
    transition:transform .12s}
  .card:active{transform:scale(.995)}
  .badge{display:inline-block;align-self:flex-start;font-size:11px;font-weight:600;letter-spacing:.3px;
    text-transform:uppercase;color:var(--accent);background:rgba(124,148,115,.12);
    padding:4px 10px;border-radius:99px;margin-bottom:14px}
  .badge.b-learn{color:var(--learn);background:rgba(201,123,90,.12)}
  .qnum{position:absolute;top:22px;right:22px;font-size:12px;color:var(--muted);font-weight:600}
  .side-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
  .qtext{font-size:20px;font-weight:650;margin:0}
  .atext{font-size:15.5px;white-space:pre-wrap;margin:0}
  .hint{margin-top:auto;padding-top:18px;font-size:12px;color:var(--muted);text-align:center}
  .mark{position:absolute;top:18px;left:18px;font-size:18px}
  .nav{display:flex;align-items:center;gap:10px;margin-top:16px}
  .nav button{flex:1;padding:13px;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;
    background:var(--panel);border:1px solid var(--line);color:var(--ink);transition:.12s}
  .nav button:hover{border-color:var(--accent)}
  .nav .counter{flex:0 0 auto;font-size:13px;color:var(--muted);min-width:64px;text-align:center}
  .judge{display:flex;gap:10px;margin-top:10px}
  .judge button{flex:1;padding:13px;border:none;border-radius:14px;font-size:15px;font-weight:650;cursor:pointer;color:#fff}
  .judge .know{background:var(--know)}
  .judge .learn{background:var(--learn)}
  .judge button:active{transform:translateY(1px)}
  .empty{text-align:center;color:var(--muted);padding:60px 0}
  footer{text-align:center;font-size:12px;color:var(--muted);padding:10px 0 30px}
  .reset{background:none;border:none;color:var(--accent2);font-size:12px;cursor:pointer;text-decoration:underline}
  @media(max-width:520px){.qtext{font-size:18px}.atext{font-size:14.5px}.card{padding:22px 18px;min-height:340px}}
</style>
</head>
<body>
<header>
  <h1>Анатомия и физиология животных</h1>
  <p class="sub">96 экзаменационных вопросов · карточки для подготовки</p>
</header>
<div class="wrap">
  <div class="bar"><i id="prog"></i></div>
  <div class="stats">
    <span><span id="known">0</span> выучено · <span id="left">96</span> осталось</span>
    <button class="reset" id="reset">сбросить прогресс</button>
  </div>

  <div class="controls">
    <input id="search" type="search" placeholder="Поиск по вопросам…" autocomplete="off">
    <select id="cat"></select>
    <label class="toggle"><input type="checkbox" id="onlyLeft"> только невыученные</label>
  </div>

  <div id="stage"></div>

  <div class="nav" id="navbox">
    <button id="prev">‹ Назад</button>
    <span class="counter" id="counter">1 / 96</span>
    <button id="next">Вперёд ›</button>
  </div>
  <div class="judge" id="judgebox">
    <button class="learn" id="bLearn">Учить ещё</button>
    <button class="know" id="bKnow">Знаю ✓</button>
  </div>
</div>
<footer>Пробел — перевернуть · ← → листать · собрано для подготовки к экзамену</footer>

<script>
const CARDS = [{"id": 1, "category": "Общие понятия", "q": "Значение и задачи изучения дисциплины «Анатомия и физиология животных»", "a": "Анатомия — наука, изучающая закономерности строения и развития органов, систем органов и организма в целом; основной её метод — рассечение (от греч. anatome — рассечение). Физиология — наука о жизнедеятельности (функциях) организмов, о механизмах работы органов, систем и целостного организма во взаимосвязи со средой. Морфология и физиология неразрывно связаны: всякая функция осуществляется на основе особо построенных клеток, органов и целостного организма; строение обусловлено функцией, а функция зависит от строения. Вместе они определяются наследственностью и условиями среды обитания.\n\nМорфология объединяет ряд наук: анатомию, гистологию, эмбриологию и цитологию. Различают нормальную и патологическую анатомию.\n\nЗначение дисциплины:\n- даёт теоретическую основу для специальных дисциплин — зоогигиены, кормления, разведения, ветеринарии, акушерства, хирургии;\n- позволяет понять процессы пищеварения, дыхания, размножения, обмена веществ, что важно для рационального кормления и содержания.\n\nЗадачи изучения:\n- знать строение тела здорового животного и расположение (топографию) органов;\n- понимать физиологические процессы и их нервную и гуморальную регуляцию;\n- знать видовые и возрастные особенности строения у КРС, лошади, свиньи, овцы, птицы;\n- уметь применять знания для оценки состояния животного и повышения продуктивности.\n\nИнтенсивное развитие животноводства невозможно без специалистов, владеющих знаниями анатомии и физиологии: они позволяют грамотно вести животноводство, профилактику болезней, замечать отклонения от нормы и получать качественную продукцию — молоко, мясо, яйца."}, {"id": 2, "category": "Цитология и гистология", "q": "Строение животной клетки", "a": "Клетка — целостная живая система, элементарная структурная и функциональная единица всех животных и растений, состоящая из цитоплазмы и ядра. Форма клеток разнообразна (шарики, кубики, пирамиды, звёздочки), размер — от 0,5 до 150 мкм. Соседние клетки соединяются межклеточными контактами: щелевыми, плотными и десмосомами.\n\nК цитоплазме относят оболочку клетки — плазмалемму, постоянные структуры — органоиды (органеллы), непостоянные — включения, и гиалоплазму (жидкую среду).\n\nПлазмалемма (цитоплазматическая мембрана) построена из двух слоёв молекул фосфолипидов и молекул белков; избирательно регулирует проникновение веществ; твёрдые частицы захватываются фагоцитозом.\n\nОрганеллы общего значения:\n- цитоплазматическая (эндоплазматическая) сеть — шероховатая (с рибосомами, синтез белка) и гладкая (образование жиров и углеводов);\n- рибосомы — синтез белка;\n- митохондрии — на их кристах идут процессы дыхания и образуется АТФ;\n- пластинчатый комплекс (комплекс Гольджи) — синтез углеводов, накопление жиров и белков, образование секрета;\n- клеточный центр (две центриоли) — участвует в делении;\n- лизосомы — пузырьки с переваривающими ферментами.\n\nБывают и специальные органоиды (миофибриллы, реснички). Включения — запасы или продукты жизнедеятельности.\n\nЯдро — аппарат наследственности и регуляции роста и деления; в неделящейся клетке различают оболочку (с порами), хроматин (ДНК с белком-гистоном), ядрышки (синтез РНК, образование рибосом) и кариоплазму (ядерный сок). Из хроматина в делящихся клетках формируются хромосомы."}, {"id": 3, "category": "Цитология и гистология", "q": "Эпителиальная ткань, морфологические и функциональные особенности", "a": "Эпителиальные ткани (эпителий) развиваются из всех трёх зародышевых листков. Эпителий располагается всюду на границе организма и среды, образует пласт клеток; клетки обязательно прикрепляются к мембране, через неё — к питающей соединительной ткани (сосудов эпителий не содержит). Клетки имеют апикальный (свободный) и базальный концы (полярность), обладают высокой способностью к восстановлению.\n\nПо числу слоёв эпителий делится на однослойный и многослойный.\nОднослойный — на однорядный (ядра на одном уровне) и многорядный. По форме клеток:\n- однослойный плоский серозных оболочек (плевры, брюшины) — мезотелий; во внутренней стенке сосудов — эндотелий;\n- кубический (протоки желёз, канальцы почек);\n- призматический (цилиндрический) каемчатый со щёточной каёмкой из микроворсинок (слизистая кишечника);\n- многорядный мерцательный с ресничками (верхние дыхательные пути).\n\nМногослойный эпителий:\n- плоский ороговевающий — эпидермис кожи, слизистая ротовой полости, глотки, пищевода, преджелудков жвачных;\n- плоский неороговевающий — роговица глаза, пищевод, влагалище;\n- переходный — слизистые мочевыводящих путей.\n\nФункции эпителия: покровная (защитная), секреторная, выделительная, всасывающая, газообмен. Секреторный (железистый) эпителий образует основную часть желёз; железы с протоками выделяют секреты, лишённые протоков — инкреты прямо в кровь. По строению железы бывают трубчатые, альвеолярные и трубчато-альвеолярные."}, {"id": 4, "category": "Цитология и гистология", "q": "Соединительная ткань, морфологические и функциональные особенности", "a": "Соединительные (опорно-трофические) ткани формируют остов органов и всего тела, выполняют трофическую и защитную функции; развиваются из мезенхимы (производной мезодермы). Главный признак — наличие межклеточного вещества, образованного клетками; полярности они не имеют.\n\nВиды по учебнику:\n- мезенхима — только у зародыша, из неё развиваются остальные опорно-трофические ткани;\n- ретикулярная (сетчатая) — основа красного костного мозга, селезёнки, лимфоузлов (кроветворение);\n- кровь и лимфа — жидкие соединительные ткани (кровь составляет 7-8% массы тела);\n- рыхлая соединительная — опора и трофика, образует остов органов; клетки: фибробласты, гистиоциты (блуждающие, защита), плазматические (гамма-глобулин), тучные (гепарин), жировые, пигментные;\n- жировая — комплекс жировых клеток (у свиней — шпик);\n- плотная оформленная — сухожилия, связки (параллельные пучки коллагеновых волокон);\n- плотная неоформленная — капсулы, сетчатый слой дермы;\n- хрящевая (гиалиновый, эластический, волокнистый хрящ) — опорная функция;\n- костная — образует скелет.\n\nМежклеточное вещество состоит из коллагеновых и эластических волокон, аморфного вещества и тканевого сока.\n\nФункции: опорная (кость, хрящ, связки), трофическая (питание тканей), защитная (фагоцитоз, антитела), запасающая (жировая ткань). Соединительная ткань объединяет, поддерживает и питает органы, обеспечивает постоянство внутренней среды."}, {"id": 5, "category": "Опорно-двигательный аппарат", "q": "Скелет туловища, деление его на отделы (укажи число позвонков по отделам у КРС, лошади, свиньи)", "a": "Скелет туловища состоит из позвоночного столба, рёбер и грудины, которые вместе с грудными позвонками образуют грудную клетку.\n\nПозвоночный столб делится на пять отделов: шейный, грудной, поясничный, крестцовый и хвостовой. Шейный отдел у всех сельскохозяйственных животных — 7 позвонков (1-й — атлант, 2-й — осевой/аксис с зубом). Число позвонков по видам (по учебнику):\n- КРС: шейных 7, грудных 13, поясничных 6, крестцовых 5, хвостовых 18-20;\n- свинья: шейных 7, грудных 14-15, поясничных 7, крестцовых 4, хвостовых 20-23;\n- лошадь: шейных 7, грудных 18, поясничных 6, крестцовых 5, хвостовых 17-19.\n\nЧисло пар рёбер равно числу грудных позвонков (КРС 13, свинья 14-15, лошадь 18). Различают рёбра стернальные (истинные) — их рёберные хрящи соединяются с грудиной, и астернальные (ложные) — их хрящи последовательно прикрепляются к хрящам предыдущих рёбер, образуя рёберную дугу; последние рёбра лежат свободно. У КРС из 13 пар рёбер 8 стернальных; у свиньи первые 7 пар стернальные.\n\nГрудина — непарная кость; в ней различают рукоятку, тело и мечевидный отросток, оканчивающийся мечевидным хрящом. Грудную клетку образуют грудные позвонки (дорсально), рёбра (с боков) и грудина с хрящами стернальных рёбер (снизу); она защищает сердце и лёгкие."}, {"id": 6, "category": "Опорно-двигательный аппарат", "q": "Строение и развитие кости как органа", "a": "Кость — орган опорно-двигательного аппарата. Скелет служит остовом тела, системой рычагов для мышц, депо минеральных солей и красного костного мозга (кроветворение). В скелете КРС 207-209 костей, лошади 207-214, свиньи 281-288.\n\nВ каждой кости различают: надкостницу, костное вещество, кровеносные сосуды и нервы. На суставных поверхностях надкостницы нет — они покрыты суставным (гиалиновым) хрящом.\n\nНадкостница (периост) — двуслойная оболочка: наружный слой грубоволокнистый с сосудами, питающими кость; внутренний содержит остеобласты, образующие кость (за их счёт идёт сращение при переломах и рост в толщину).\n\nКостное вещество бывает компактное (наружный слой) и губчатое (внутри; его ячейки заполнены мозгом). В трубчатых костях внутри полость. Костный мозг: красный (ретикулярная ткань, орган кроветворения) и жёлтый (жировая ткань, без кроветворной функции).\n\nПрочность кости обусловлена соединением органического вещества — оссеина (30-33% массы) и неорганических минеральных солей (67-70%). У молодых животных органики больше (кости эластичны), с возрастом солей больше (хрупкость).\n\nРазвитие (остеогенез) проходит три стадии: соединительнотканную, хрящевую и костную (через очаги окостенения: остеобласты строят, остеокласты разрушают). Рост в длину — за счёт эпифизарного хряща между эпифизом и диафизом, в толщину — за счёт надкостницы. У КРС рост костей в длину заканчивается к 4, у лошади — к 5 годам."}, {"id": 7, "category": "Опорно-двигательный аппарат", "q": "Характеристика скелета свободных грудных конечностей", "a": "Скелет грудной (передней) конечности соединяется с туловищем поясом (лопаткой) и состоит из плеча, предплечья, запястья, пясти и пальцев.\n\nПлечо — плечевая кость (трубчатая, рычаг движения): вверху головка с буграми (малый медиальный, большой латеральный), внизу блок с мыщелками для сочленения с предплечьем.\n\nПредплечье — лучевая и локтевая кости с двумя межкостными пространствами. Лучевая кость основная (несёт нагрузку). У КРС локтевая кость хорошо развита и срастается с лучевой; у лошади локтевая сохраняется лишь в проксимальной части предплечья; у свиньи лучевая и локтевая короткие, прочно соединены хрящом.\n\nЗапястье — короткие кости в два ряда (у КРС в проксимальном ряду четыре, в дистальном две; у лошади семь костей — 4 и 3; у свиньи восемь — по четыре).\n\nПясть: у КРС III и IV пястные кости срастаются в одну (есть рудиментарная 5-я); у лошади полностью развита только III пястная, II и IV слабо развиты (грифельные); у свиньи 4 пястные кости (III и IV опорные).\n\nПальцы: палец состоит из путовой, венечной и копытцевой (у лошади — копытной) костей; за путовым суставом лежат две сезамовидные кости, у копытцевой — сезамовидная кость третьей фаланги. У КРС 2 основных пальца (III и IV) и 2 недоразвитых; у лошади один палец (III); у свиньи четыре (III и IV опорные)."}, {"id": 8, "category": "Опорно-двигательный аппарат", "q": "Характеристика скелета свободных тазовых конечностей", "a": "Скелет тазовой (задней) конечности соединяется с туловищем тазовым поясом и состоит из бедра, голени, заплюсны, плюсны и пальцев.\n\nБедро — бедренная кость (длинная трубчатая): на проксимальном конце головка (входит в суставную впадину таза), шейка, большой и малый вертелы, а у КРС ещё третий вертел; на дистальном конце мыщелки и блок для коленной чашки. Коленная чашка — короткая сезамовидная кость, сочленяется с блоком бедренной кости.\n\nГолень — большеберцовая и малоберцовая кости. Большеберцовая основная, несёт нагрузку, с гребнем. Малоберцовая у КРС сильно редуцирована, её дистальный конец превращается в лодыжковую кость (только у жвачных); у лошади развита слабо; у свиньи развита хорошо, лежит параллельно большеберцовой.\n\nЗаплюсна — короткие кости, у КРС их пять, в три ряда: верхний ряд — таранная и пяточная (с пяточным бугром), средний — центральная, нижний — две кости. Это скакательный (заплюсневый) сустав. У свиньи 7 костей заплюсны, у лошади тоже обособлена хорошо развитая третья заплюсневая.\n\nПлюсна соответствует пясти, но кости несколько длиннее (у лошади одна развитая, у КРС две сросшиеся).\n\nПальцы построены так же, как на грудной конечности (путовая, венечная, копытцевая кости), но фаланги длиннее и тоньше. Число пальцев соответствует виду: лошадь — один, КРС и свинья — парнокопытные."}, {"id": 9, "category": "Опорно-двигательный аппарат", "q": "Строение и расположение спинного мозга и его оболочек", "a": "Спинной мозг (medulla spinalis) — отдел центральной нервной системы в виде белой толстостенной трубки, лежащей внутри всего позвоночного канала. Он начинается от продолговатого мозга на уровне краниального края первого шейного позвонка и заканчивается в крестцовом канале мозговым конусом; последний вместе с пучками нервных волокон и концевой нитью формирует конский хвост. Спинной мозг подразделяется на отделы, соответствующие отделам позвоночного столба; имеет шейное и пояснично-крестцовое утолщения.\n\nНа поперечном разрезе в центре — серое вещество в форме летящей бабочки, окружающее центральный канал со спинномозговой жидкостью. Серое вещество образует рога (столбы): дорсальные (чувствительные нейроны), вентральные (двигательные) и боковые (двигательные и сосудистые); есть и вставочные нейроны. Белое вещество расположено по периферии, образовано отростками нейронов и формирует канатики — дорсальные, вентральные и боковые (проводящие пути).\n\nКорешки: дорсальный (чувствительный, имеет спинномозговой ганглий) и вентральный (двигательный); сливаясь, они образуют смешанный спинномозговой нерв.\n\nОболочки спинного мозга (три): твёрдая (наружная, неплотно прилегает к стенке канала; между ними эпидуральное пространство), паутинная (отделена субдуральным пространством, в котором спинномозговая жидкость) и мягкая (непосредственно покрывает мозг). Функции спинного мозга — рефлекторная и проводниковая."}, {"id": 10, "category": "Опорно-двигательный аппарат", "q": "Строение тазового пояса", "a": "Тазовый пояс образует костную основу тазовой полости. Таз состоит из двух симметричных безымянных (тазовых) костей, которые вместе с крестцовой костью и первыми хвостовыми позвонками образуют тазовую полость.\n\nКаждая тазовая кость состоит из трёх костей, срастающихся между собой в суставной впадине:\n- подвздошная кость — впереди от впадины; у неё различают крыло (с наружной ягодичной и внутренней тазовой поверхностями) и тело; на крыле — крестцовый бугор, латеральный бугор (маклок) и подвздошный гребень; соединяется с крестцом;\n- седалищная кость — каудальная часть, имеет тело и две ветви (шовную и впадинную), которые ограничивают запертое отверстие; каудально — седалищный бугор; между буграми седалищная дуга;\n- лонная кость — краниомедиальное положение, две ветви (шовная и впадинная).\n\nВ месте сращения трёх костей находится суставная (вертлужная) впадина, в которую входит головка бедренной кости (тазобедренный сустав). Шовные ветви лонных костей правой и левой сторон срастаются, образуя тазовое сращение (шов).\n\nЧерез тазовую полость проходят прямая кишка, мочеполовые органы, у самок — родовые пути. Таз самок большего объёма со сглаженными буграми, что способствует выходу плода при рождении (акушерское значение). Тазовый пояс выполняет опорную функцию, передаёт усилие задних конечностей на туловище и защищает тазовые органы."}, {"id": 11, "category": "Опорно-двигательный аппарат", "q": "Соединения костей скелета. Сустав: определение, строение. Суставы, их виды по строению и движению", "a": "Различают два типа соединения костей: сращение (синартроз) и суставы (диартроз).\n\nСращения характеризуются промежуточной тканью между костями: соединение соединительной тканью — синдесмоз (швы черепа — зубчатые, чешуйчатые, плоские; связки), хрящом — синхондроз (межпозвоночные диски, рёберные хрящи), костной тканью — синостоз (сросшиеся кости таза, крестца).\n\nСустав — подвижное соединение (сочленение). В каждом суставе обязательно есть три элемента: 1) капсула сустава (видоизменённая надкостница; в ней наружный фиброзный и внутренний синовиальный слои, последний выделяет синовию); 2) синовия — жидкость, заполняющая суставную полость и устраняющая трение; 3) суставные хрящи (гиалиновые, без надхрящницы). Вспомогательные элементы — связки, диски и мениски.\n\nПо характеру движения суставы бывают:\n- одноосные — движение вокруг одной оси (сгибание-разгибание): локтевой, путовый;\n- двухосные — две оси (сгибание-разгибание и отведение-приведение);\n- многоосные — разнообразные движения, суставные поверхности в виде головки и ямки (тазобедренный, плечевой);\n- плоские — малоподвижные (крестцово-подвздошный, запястно-пястный, заплюсно-плюсневый).\n\nПо строению суставы делят на простые (соединяются только две кости) и сложные (между двумя основными костями лежат хрящевые мениски — височно-нижнечелюстной, коленный — или несколько рядов коротких костей — запястно-пястный, заплюсно-плюсневый). Суставы обеспечивают подвижность скелета."}, {"id": 12, "category": "Опорно-двигательный аппарат", "q": "Строение мышцы как органа. Вспомогательные органы мышц. Классификация мышц по форме и действию", "a": "Скелетная (поперечнополосатая) мышца — орган активного движения. Её структурная единица — мышечное волокно (с оболочкой-сарколеммой, саркоплазмой и миофибриллами). Волокна объединяются в пучки соединительнотканными прослойками.\n\nСтроение мышцы как органа:\n- активная часть — мышечное брюшко (тело) из мышечных волокон; различают начало (головку) и конец (хвост);\n- пассивная часть — сухожилие из плотной соединительной ткани, которым мышца крепится к кости;\n- мышца снабжена кровеносными сосудами и нервами.\n\nВспомогательные органы мышц (облегчают и направляют работу): фасции — одевают мышцы и группы мышц; синовиальные сумки (бурсы) — мешочки с синовиальной жидкостью у выступов костей, уменьшают трение; синовиальные влагалища сухожилий — облегчают скольжение сухожилий; сесамовидные кости и блоки — изменяют направление тяги.\n\nКлассификация по форме: длинные (на конечностях), широкие (плоские, на туловище), короткие, кольцевые (сфинктеры вокруг отверстий). По внутреннему строению: одно-, дву-, многоперистые, веретенообразные.\n\nПо действию (функции): сгибатели (флексоры) и разгибатели (экстензоры); приводящие (аддукторы) и отводящие (абдукторы); вращатели (супинаторы и пронаторы); сжиматели (сфинктеры) и расширители; подниматели и опускатели; напрягатели. Мышцы-синергисты действуют в одном направлении, антагонисты — в противоположных. Свойства мышечной ткани: возбудимость, сократимость, проводимость, эластичность."}, {"id": 13, "category": "Дыхание", "q": "Физиология дыхания: акт вдоха и выдоха. Жизненная ёмкость лёгких", "a": "Дыхание обеспечивает потребление кислорода и выделение углекислого газа. Различают внешнее дыхание (вентиляция лёгких), транспорт газов кровью и клеточное (тканевое) дыхание. У млекопитающих внешнее дыхание в основном лёгочное (через кожу и пищеварительный тракт — около 1-2%, у лошади при быстром аллюре до 8-10%).\n\nАкт вдоха: сокращаются наружные межрёберные (вдыхательные) мышцы — рёбра приподнимаются и смещаются вперёд; сокращается диафрагма, оттесняя органы брюшной полости назад (брюшная стенка выпячивается). Объём грудной клетки увеличивается, лёгкие следуют за ней и растягиваются, давление в них становится ниже атмосферного, и воздух входит в лёгкие.\n\nАкт выдоха (обычно пассивный): расслабляются вдыхательные мышцы, частично сокращаются внутренние межрёберные; грудная клетка за счёт тяжести и эластичности возвращается, диафрагма становится выпуклой, объём уменьшается, воздух выжимается. При усиленном выдохе активно сокращаются внутренние межрёберные, вспомогательные дыхательные мышцы и мышцы брюшной стенки. В плевральной полости давление всегда отрицательное.\n\nРегуляция — дыхательным центром продолговатого мозга (центры вдоха и выдоха); его автоматизм связан с накоплением углекислоты.\n\nЖизненная ёмкость лёгких — сумма дыхательного, дополнительного и резервного воздуха. Дыхательный воздух у овец и крупных собак 0,3-0,5 л, у лошади 5-6 л. ЖЕЛ у собак 1,5-3 л, у лошади 26-30, у КРС 30-35 л. После максимального выдоха остаётся остаточный воздух (у лошади около 12 л); ЖЕЛ и остаточный воздух составляют общую ёмкость. ЖЕЛ непостоянна — зависит от пола, возраста, породы, тренировки."}, {"id": 14, "category": "Опорно-двигательный аппарат", "q": "Мышцы головы", "a": "Мышцы головы делят на лицевые (мимические) и жевательные.\n\nЛицевые (мимические) мышцы развиваются из кожной мускулатуры, располагаются вокруг естественных отверстий (рта, носа, глаз, ушей), действуют как сжиматели или расширители. К основным относятся: круговая мышца рта (сфинктер губ); носо-губной подниматель; скуловая мышца; опускатель нижней губы; подкожная мышца губ и клыковая мышца (образуют общий пласт с поднимателем и опускателем верхней губы); щёчная мышца (образует боковую стенку рта, при жевании перемещает пищевой ком); круговая мышца глаза; мышцы ушной раковины. Они обеспечивают захват корма, сосание, движение губ и ушей.\n\nЖевательные мышцы — четыре пары, действуют на височно-нижнечелюстной сустав:\n- большая жевательная (m. masseter) — на латеральной поверхности нижней челюсти, поднимает (смыкает) челюсть;\n- медиальная крыловидная — на медиальной поверхности ветви нижней челюсти, смыкает челюсть;\n- височная — из височной ямки к мышечному отростку нижней челюсти, смыкает челюсть;\n- двубрюшная — опускает нижнюю челюсть (у лошади есть ещё яремно-челюстная, тоже опускает челюсть).\n\nСмещение нижней челюсти в сторону происходит при сокращении большой жевательной мышцы одной стороны и крыловидной — противоположной (боковое растирающее движение, важное для жвачных). У травоядных жевательные мышцы развиты сильнее из-за длительного пережёвывания грубого корма."}, {"id": 15, "category": "Опорно-двигательный аппарат", "q": "Мышцы, соединяющие плечевой пояс с туловищем", "a": "У домашних животных грудная конечность соединяется с туловищем не суставом, а мышцами (лопатка не имеет прямого костного сочленения с осевым скелетом). Эти мышцы соединяют плечевой пояс с головой, шеей и туловищем:\n\n- трапециевидная мышца — самая поверхностная в области холки; крепится к канатику выйной связки и надостистой связке, заканчивается на ости лопатки и акромионе; поднимает и закрепляет лопатку;\n- ромбовидная мышца — лежит под трапециевидной, крепится к канатику выйной связки и медиальной поверхности лопаточного хряща; притягивает лопатку к туловищу;\n- зубчатая вентральная мышца — крепится к медиальной поверхности лопатки и, расходясь веером, прочно соединяется с шейными позвонками и грудной клеткой (каудальный зубец достигает 9-го ребра); на этой мышце как бы подвешено туловище между конечностями (главная опора и амортизация);\n- плечеголовная мышца — идёт от затылочной и височной костей до латерального бугра плечевой кости, выносит конечность вперёд, опускает голову и шею (между ней и грудино-головной мышцей лежит яремный жёлоб с яремной веной);\n- широчайшая мышца спины — от пояснично-спинной фасции к плечевой кости, тянет конечность назад, сгибает плечевой сустав;\n- грудные мышцы (поверхностная и глубокая) — начинаются от грудной кости, прижимают и приводят конечность.\n\nТаким образом, туловище упруго подвешено между передними конечностями главным образом на зубчатой вентральной мышце, что обеспечивает амортизацию при движении."}, {"id": 16, "category": "Общие понятия", "q": "Понятие об органах, системы органов", "a": "Орган — часть тела определённой формы, строения, расположения, выполняющая специфическую функцию. По строению различают два типа органов: трубчатые и паренхиматозные. Трубчатые органы состоят из трёх оболочек — слизистой, мышечной и серозной (в полостях; вне полостей покрыты адвентицией). В паренхиматозных (компактных) органах различают соединительнотканный остов — строму и паренхиму — ткань, выполняющую основную функцию органа (в железах — секреторный эпителий, в мышцах — поперечнополосатая ткань). Любой орган имеет артерии, вены, лимфатические сосуды и нервы (сосудисто-нервный пучок).\n\nОрганы, участвующие в общей сложной функции и сходного строения, составляют систему органов, а различного строения — аппарат.\n\nПо учебнику различают следующие системы и аппараты органов:\n1) аппарат движения (кости и мышцы);\n2) система органов пищеварения;\n3) система органов дыхания;\n4) мочеполовой аппарат;\n5) система органов крово- и лимфообращения;\n6) железы внутренней секреции (эндокринная);\n7) система органов кожного покрова;\n8) нервная система и органы чувств.\n\nВсе системы и аппараты взаимосвязаны и работают согласованно под контролем нервной и эндокринной регуляции, образуя единый целостный организм, связанный со средой обитания."}, {"id": 17, "category": "Опорно-двигательный аппарат", "q": "Мышцы тазобедренного сустава", "a": "Тазобедренный сустав — многоосный, окружён мощными мышцами. По учебнику выделяют две основные группы, действующие на сустав: ягодичную и заднебедренную.\n\nЯгодичная группа (три мышцы): поверхностная ягодичная (у КРС срастается с напрягателем широкой фасции бедра и двуглавой мышцей, образуя ягодично-двуглавую мышцу), средняя ягодичная (наиболее развита, оканчивается на большом вертеле) и глубокая ягодичная (отводит конечность в сторону). Они разгибают и отводят бедро.\n\nЗаднебедренная группа (четыре мышцы): двуглавая мышца бедра (у КРС — ягодично-двуглавая), полусухожильная, полуперепончатая и квадратная мышца бедра. Это главные разгибатели тазобедренного сустава, обеспечивающие отталкивание (толчок) при движении.\n\nСгибатели (выносят конечность вперёд): подвздошно-поясничная мышца (состоит из большой поясничной и подвздошной), портняжная и гребешковая мышцы.\n\nПриводящие (на медиальной поверхности): стройная (тонкая), приводящая и гребешковая мышцы — приближают конечность к средней линии.\n\nМежду стройной, гребешковой и портняжной мышцами образуется треугольное пространство (бедренный треугольник).\n\nУ продуктивных животных (КРС, свинья) заднебедренная группа образует наиболее ценные в мясном отношении части туши (окорок); у лошади сильное развитие этих мышц обеспечивает мощный бег."}, {"id": 18, "category": "Общие понятия", "q": "Строение копыта, мякишей", "a": "Копыто — твёрдый кожный наконечник третьего пальца у однокопытных (лошадь, осёл). У КРС и свиньи аналогичные образования называются копытцами (по два на конечности). В копыте лошади различают две основные части: роговую капсулу (соответствует эпидермису) и основу кожи копыта (дерму); подкожная основа есть только в области каймы и венчика. Кости пальца в состав копыта не входят, но тесно связаны с его тканями.\n\nОснова кожи и роговая капсула делятся на части:\n- кайма — узкая полоска кожи без волос на границе с волосистой кожей;\n- венчик — широкий валик; от его росткового слоя растут эпидермальные трубочки, образующие основной слой роговой стенки;\n- стенка — боковая твёрдая часть из трёх слоёв (наружного, среднего, внутреннего); растёт со скоростью около 8 мм в месяц; имеет листочковый слой; место соединения с подошвой видно как белая зона (линия);\n- подошва — вогнутая роговая пластинка с телом и ножками;\n- роговая стрелка (пальцевый мякиш) — эластичный клин между ножками подошвы, при опоре расширяет заднюю часть копыта, улучшая кровообращение.\n\nКопытца жвачных и свиньи похожи на половину копыта лошади; стрелки в них нет.\n\nМякиши — плотные утолщения кожи на пальмарной поверхности кисти и плантарной поверхности стопы; состоят из эпидермиса, основы кожи и подкожного слоя, амортизируют толчки. Различают запястные и заплюсневые (у лошади — каштаны), пястные и плюсневые (у лошади — шпоры) и пальцевые мякиши (у лошади образуют основу стрелки)."}, {"id": 19, "category": "Общие понятия", "q": "Строение, значение и развитие кожного покрова", "a": "Кожа покрывает всё тело, защищает от вредных влияний среды; через здоровую кожу не проникают микробы. К системе кожного покрова, кроме кожи, относятся её производные: волосы, потовые, сальные и молочные железы, копыта и копытца, когти, мякиши, рога.\n\nКожа состоит из трёх пластов:\n- эпидермис — наружный пласт многослойного плоского эпителия, развивается из эктодермы; на безволосых участках имеет базальный, шиповатый, зернистый, блестящий и роговой слои; сосудов не содержит;\n- дерма (основа кожи) — производная мезенхимы, состоит из сосочкового слоя (на границе с эпидермисом, с сосудами, нервами, рецепторами) и сетчатого слоя (плотная неоформленная ткань); это самый прочный слой (кожевенное сырьё);\n- подкожная основа — рыхлая соединительная и жировая ткань; связывает кожу с телом, накапливает жир (у КРС кожа составляет 6-7% массы тела).\n\nФункции кожи: защитная; терморегуляция (потоотделение, теплоотдача, шерсть как теплоизоляция); выделительная (вода, соли, мочевина с потом); рецепторная (орган осязания — тактильная, температурная, болевая чувствительность); частично дыхательная; синтез витамина D; кожа служит депо крови, воды и солей.\n\nКожа имеет большое хозяйственное значение: даёт шерсть, кожевенное и меховое сырьё, а через молочную железу — молоко. Состояние кожи и шерсти отражает здоровье и условия содержания животного."}, {"id": 20, "category": "Дыхание", "q": "Строение лёгких и грудной полости", "a": "Лёгкие — парные паренхиматозные органы розового цвета, конусовидной формы, в грудной полости. Различают три поверхности: рёберную, диафрагмальную и средостенную; дорсальный край тупой, вентральный острый, рассечён вырезками на доли. У КРС в левом лёгком различают краниальную, среднюю (сердечную) и каудальную доли; правое лёгкое примерно в 1,5 раза больше и имеет добавочную долю (у КРС к правому лёгкому идёт особый трахейный/эпартериальный бронх). У лошади сердечная и диафрагмальная доли не разделяются.\n\nПаренхима состоит из бронхиального (альвеолярного) дерева: главные бронхи → бронхи 1-го, 2-го и т.д. порядка → бронхиолы (без хрящевого остова) → альвеолярные ходы → альвеолярные мешочки → лёгочные альвеолы. Стенка альвеол образована одним слоем плоского респираторного эпителия, снаружи оплетена капиллярами (эндотелий); газообмен идёт через два слоя клеток. Особые клетки образуют сурфактант, придающий упругость альвеолам.\n\nГрудная полость ограничена грудными позвонками, рёбрами и грудиной, сзади — диафрагмой. Лёгкое снаружи покрыто лёгочной плеврой, переходящей на грудную стенку как рёберная плевра; от позвоночника плевра опускается двумя пластинками — средостенной плеврой. Пространство между её листками — средостение, где лежат сердце, пищевод, трахея, сосуды и нервы. Между лёгочной и рёберной плеврой остаётся плевральная полость с небольшим количеством серозной жидкости; давление в ней отрицательное."}, {"id": 21, "category": "Дыхание", "q": "Строение гортани и трахеи", "a": "Гортань и трахея относятся к воздухопроводящим путям, выстланным мерцательным эпителием.\n\nГортань находится между глоткой и трахеей вблизи углов нижней челюсти; проводит воздух, образует звук и предохраняет дыхательные пути от попадания корма при глотании. Её основу составляют пять хрящей: щитовидный (самый массивный, образует вентральную и боковые стенки), кольцевидный (каудальная часть), два черпаловидных (парные, к ним крепятся голосовые связки) и надгортанник (из эластического хряща, закрывает вход в гортань при глотании); остальные хрящи гиалиновые. Хрящи соединены связками и мышцами. Между щитовидным и черпаловидными хрящами натянуты голосовые связки; слизистая образует голосовые губы, делящие гортань на преддверие, голосовую щель и дыхательную часть. Колебание голосовых губ при прохождении воздуха образует голос.\n\nТрахея (дыхательное горло) — трубка, сжатая с боков; её основу составляют незамкнутые хрящевые кольца. Поперечная мышца трахеи сближает концы колец (это облегчает прохождение корма по пищеводу). У КРС 46-50 колец, у лошади 48-60, у свиньи 32-36. Трахея идёт по нижней части шеи, входит в грудную полость и у 5-го ребра заканчивается бифуркацией — делением на два главных бронха. Слизистая трахеи и бронхов выстлана многорядным призматическим мерцательным эпителием с бокаловидными железами, выделяющими слизь, реснички которой выводят пыль наружу."}, {"id": 22, "category": "Пищеварение", "q": "Слюнные железы, их строение", "a": "Слюнные железы — железы внешней секреции, выделяющие слюну в ротовую полость; различают мелкие (пристенные) в толще слизистой губ, щёк, языка, нёба и крупные (застенные) парные.\n\nКрупных застенных желёз три пары (по учебнику):\n- околоушная слюнная железа — красно-бурого цвета, у основания ушной раковины; выделяет серозный (белковый) секрет; её проток выводит слюну в преддверие рта на уровне 3-4-го верхнего коренного зуба;\n- нижнечелюстная слюнная железа — с медиальной стороны нижней челюсти до 1-го шейного позвонка, жёлтого цвета; выделяет смешанную слюну; её проток открывается в подъязычной бородавке впереди уздечки языка;\n- подъязычная слюнная железа — на дне ротовой полости сбоку тела языка; передняя часть однопротоковая, задняя короткопротоковая (более 30 протоков); выделяет преимущественно слизистую (муцин) смешанную слюну.\n\nПо строению крупные слюнные железы состоят из секреторных отделов (альвеол и трубок с серозными и слизистыми клетками) и системы выводных протоков (вставочные, исчерченные, междольковые); снаружи одеты капсулой, разделены на дольки.\n\nСлюна содержит воду, слизь (муцин), минеральные соли и ферменты. У свиньи слюна содержит фермент, расщепляющий крахмал. У КРС слюны выделяется очень много, она богата щелочами и поддерживает щелочную среду в рубце для микрофлоры. Выделение слюны регулируется рефлекторно."}, {"id": 23, "category": "Кровь и кровообращение", "q": "Круги кровообращения: большой и малый", "a": "Кровообращение замкнутое, осуществляется по большому и малому кругам, образующим единую систему сосудов; сердце четырёхкамерное (два предсердия и два желудочка). Кроме того, от большого круга отходит вставочный (воротный) круг с воротной веной и печёночными капиллярами.\n\nБольшой круг кровообращения состоит из аорты (берёт начало в левом желудочке), артерий и капиллярных сосудов, питающих ткани всех органов, и краниальной и каудальной полых вен, несущих кровь в правое предсердие. В капиллярах кровь отдаёт тканям кислород и питательные вещества, забирает углекислый газ и продукты обмена, превращаясь из артериальной в венозную.\n\nМалый (лёгочный) круг служит для газообмена в лёгких: начинается лёгочным стволом из правого желудочка, который делится на правую и левую лёгочные артерии; в капиллярах альвеол кровь отдаёт углекислый газ и насыщается кислородом; по лёгочным венам артериальная кровь возвращается в левое предсердие, где малый круг заканчивается.\n\nТаким образом, путь крови: левый желудочек → большой круг → правое предсердие → правый желудочек → малый круг → левое предсердие → левый желудочек. Особенность: в лёгочной артерии течёт венозная кровь, а в лёгочных венах — артериальная. Движение крови обеспечивает работа сердца как насоса (при сокращении проталкивает кровь в аорту, при расслаблении присасывает из полых вен)."}, {"id": 24, "category": "Кровь и кровообращение", "q": "Строение и топография сердца у разных видов животных", "a": "Сердце — полый мышечный конусовидный орган, разделённый на четыре камеры (два предсердия и два желудочка), работающий как насос: при сокращении проталкивает кровь в аорту, при расслаблении присасывает её из полых вен. Расположено в средостении, больше в левой половине грудной клетки; передняя граница — 3-е ребро, задняя — рёберный хрящ 5-го ребра; широкое основание на уровне плечевого сустава, заострённая верхушка направлена вниз, назад и влево. У КРС сердце прослушивается в 3-4-м межреберье. Масса сердца относительно тела у быка около 0,42%, у коровы 0,50%.\n\nСтенка сердца из трёх оболочек: наружная серозная — эпикард, средняя мышечная — миокард (сердечная мышечная ткань; миокард левого желудочка значительно толще правого), внутренняя — эндокард с эндотелием. Соединительнотканный остов образован четырьмя фиброзными кольцами. Клапанов четыре: правый атриовентрикулярный (трёхстворчатый), левый атриовентрикулярный (двустворчатый) со створками, удерживаемыми сухожильными струнами, клапан лёгочного ствола и клапан аорты (по три полулунные створки) — они обеспечивают ток крови в одном направлении. Снаружи сердце заключено в перикард (сердечную сумку) с полостью.\n\nВидовые особенности: у КРС в фиброзном кольце аорты заложены правая и левая кости сердца (3-6 см). У свиньи сердце небольшое с округлой верхушкой (заканчивается у 7-го ребра). У лошади сердце большое, с расширенным основанием, масса достигает 5,75 кг."}, {"id": 25, "category": "Кровь и кровообращение", "q": "Группа крови, резус-фактор", "a": "Группа крови определяется наличием на эритроцитах белков-антигенов (агглютиногенов) и в плазме антител (агглютининов). При встрече одноимённых агглютиногена и агглютинина наступает агглютинация (склеивание) эритроцитов и их разрушение — гемолиз, что опасно при переливании.\n\nУ человека (система, открытая Ландштейнером и Янским) агглютиногены обозначают А и В, агглютинины — α и β. Агглютинин α склеивает эритроциты с агглютиногеном А, β — с В. Различают четыре группы: I — агглютиногенов нет, есть α и β (кровь можно переливать всем); II — А и β; III — В и α; IV — А и В, агглютининов нет (нельзя переливать другим группам). Донор отдаёт кровь, реципиент получает.\n\nРезус-фактор — ещё один агглютиноген, обнаруженный у 85% людей; впервые найден у обезьян Macacus rhesus. При переливании резус-положительной крови резус-отрицательному реципиенту у него образуются антитела, и повторное переливание вызывает агглютинацию и осложнения. У сельскохозяйственных животных резус-фактор обнаружен только в крови лошадей.\n\nГруппы крови у сельскохозяйственных животных гораздо сложнее: в эритроцитах много антигенных факторов. У КРС их более 80, объединены в 12 систем; у свиней 14 систем, у овец 7, у кур 14; у лошадей открыто 10 агглютиногенов. Агглютиногены и резус-фактор образуются в эмбриональный период, поэтому группа не меняется всю жизнь. Группы крови используют в селекции (уточнение происхождения) и при переливании."}, {"id": 26, "category": "Общие понятия", "q": "Деление брюшной полости на области", "a": "Брюшная полость расположена между диафрагмой (спереди) и входом в таз (сзади); изнутри выстлана брюшиной. Для определения топографии органов её условно делят на 10 областей.\n\nДвумя сегментальными плоскостями брюшную полость делят на три отдела: первую плоскость проводят через каудальный край последней пары рёбер, вторую — через краниальный край маклоков. Так выделяются передний отдел (между диафрагмой и первой плоскостью), средний (между плоскостями) и задний (каудальнее второй плоскости).\n\nПередний отдел делят на три области: левое подреберье, правое подреберье (между диафрагмой и рёберной дугой) и область мечевидного хряща (между рёберной дугой и вентральным краем брюшной стенки).\n\nСредний отдел делят на четыре области: левую и правую подвздошные (по концам поперечно-рёберных отростков проводят сагиттальные плоскости), а оставшийся участок фронтальной плоскостью на уровне плечевого сустава делят на дорсальную — поясничную область и вентральную — пупочную область.\n\nЗадний отдел делят на три области: правую и левую паховые (продолжение подвздошных) и непарную лонную область.\n\nТакое деление имеет практическое значение: зная, в какой области лежит орган (например, у КРС рубец занимает всю левую половину брюшной полости), специалист точно определяет локализацию при исследовании, прослушивании, проколе и операциях."}, {"id": 27, "category": "Опорно-двигательный аппарат", "q": "Строение плечевого пояса грудной конечности", "a": "Плечевой пояс служит для соединения свободной грудной конечности с туловищем. У предков млекопитающих он состоял из трёх костей — лопатки, ключицы и коракоида. У домашних копытных (КРС, лошадь, свинья) в связи с приспособлением к быстрому движению по твёрдому грунту ключица и коракоид редуцировались (коракоид сохранился как небольшой коракоидный отросток на лопатке), и пояс представлен только лопаткой.\n\nЛопатка — плоская парная кость треугольной формы, лежащая косо на боковой поверхности грудной клетки; присоединяется к ней мышцами. На лопатке различают три края и три угла. Позвоночный край (основание) соединён с лопаточным хрящом, увеличивающим площадь прикрепления мышц. Латеральная поверхность разделена остью лопатки на предостную и более широкую заостную ямки (к ним крепятся одноимённые мышцы). Ость заканчивается отростком — акромионом (у лошади выражен слабо). На медиальной поверхности — подлопаточная ямка. Нижний (суставной) угол несёт суставную впадину для сочленения с головкой плечевой кости (плечевой сустав); рядом — бугор лопатки и коракоидный отросток (рудимент коракоидной кости).\n\nОсобенность: лопатка не имеет прямого костного соединения с осевым скелетом — конечность подвешена к туловищу только мышцами, что даёт большую свободу движения вперёд-назад и амортизацию толчков. Лопатка — место прикрепления многих мышц плечевого пояса и плеча."}, {"id": 28, "category": "Цитология и гистология", "q": "Костная ткань, морфология и функциональные особенности", "a": "Костная ткань — разновидность соединительной (опорно-трофической) ткани, развивается из мезенхимы; отличается твёрдостью благодаря обызвествлённому межклеточному веществу. Из неё построен скелет.\n\nКлетки (три вида): остеобласты — молодые костные клетки, строящие костное вещество и превращающиеся в остеоциты; остеоциты — зрелые клетки; остеокласты — крупные подвижные клетки, разрушающие кость при её перестройке.\n\nМежклеточное вещество состоит из органической части — оссеиновых волокон, склеенных оссеомукоидом (придают упругость), и неорганической — минеральных солей (главным образом фосфорнокислый и углекислый кальций; придают твёрдость). На скелет приходится 97% всего кальция организма. У молодых животных органики больше (кости эластичны), с возрастом солей больше (хрупкость).\n\nСтруктурный элемент костной ткани — остеон: в центре гаверсов канал, окружённый костными пластинками в виде трубочек, чередующихся с остеоцитами. Между остеонами лежат вставочные костные пластинки, а на поверхности кости — наружные и внутренние общие пластинки. Из остеонов построено компактное вещество кости; из тонких переплетающихся пластинок — губчатое.\n\nФункции костной ткани:\n- опорная и защитная (скелет — опора тела, защита мозга, сердца, лёгких);\n- кроветворная (в красном костном мозге губчатого вещества образуются клетки крови);\n- участие в минеральном обмене (депо кальция и фосфора).\nКостная ткань хорошо снабжается кровью и способна к регенерации."}, {"id": 29, "category": "Кровь и кровообращение", "q": "Кровь: функции, состав. Свойства крови", "a": "Кровь — жидкая соединительная (опорно-трофическая) ткань; вместе с лимфой и тканевой жидкостью образует внутреннюю среду организма. Кровь составляет 7-8% массы тела. Постоянство состава и физико-химических свойств внутренней среды называют гомеостазом; кровь обеспечивает постоянство тканевой жидкости (истинной среды клеток).\n\nСостав. Кровь состоит из плазмы (жидкой части, объём которой несколько больше) и форменных элементов:\n- эритроциты — у большинства млекопитающих безъядерные двояковогнутые клетки, образуются в красном костном мозге, живут 100-120 дней; содержат гемоглобин, переносящий кислород (оксигемоглобин);\n- лейкоциты — ядерные клетки, защитная функция (фагоцитоз, антитела); делятся на зернистые (гранулоциты: эозинофилы, базофилы, нейтрофилы) и незернистые (агранулоциты: лимфоциты, моноциты);\n- кровяные пластинки (тромбоциты) — участвуют в свёртывании крови.\nПлазма — соломенного цвета, содержит белки, жиры, углеводы и другие вещества.\n\nФункции крови: питательная (перенос питательных веществ к клеткам), выделительная (унос продуктов обмена к почкам и коже), дыхательная (перенос O2 и CO2), регуляторная (гуморальная связь — перенос гормонов), защитная (фагоцитоз, антитела). Кровь вместе с органами образования и разрушения кровяных клеток (костный мозг, селезёнка, печень, лимфоузлы) объединяют в единую систему.\n\nСвойства: красный непрозрачный цвет (от гемоглобина); вязкость; слабощелочная реакция; осмотическое давление и реакция поддерживаются на постоянном уровне; способность к свёртыванию."}, {"id": 30, "category": "Кровь и кровообращение", "q": "Кровеносные сосуды. Строение, деление", "a": "Кровеносные сосуды образуют замкнутую систему; различают артерии, вены и капилляры.\n\nСтенки артерий и вен состоят из трёх оболочек: внутренней (tunica intima) — выстлана плоскими клетками эндотелия; средней (tunica media) — соединительная ткань с гладкими мышечными волокнами; наружной (tunica externa) — рыхлая соединительная ткань, соединяющая сосуд с органами.\n\nАртерии несут кровь от сердца. По содержанию гладких мышечных волокон артерии делят на три типа: эластический (аорта и её крупные ветви), смешанный и мышечный (артерии в органах). Аорта начинается в левом желудочке, идёт к 6-му грудному позвонку и тянется до 5-6-го поясничных позвонков. По мере удаления от сердца артерии ветвятся (тип деления магистральный, дихотомический или рассыпной; есть коллатеральные сосуды и анастомозы).\n\nКапилляры — мельчайшие сосуды; их стенка состоит лишь из одного слоя эндотелиальных клеток. Через неё происходит обмен веществ между кровью и тканями (газообмен, питание).\n\nВены несут кровь к сердцу. По строению сходны с артериями, но их внутренняя оболочка образует клапаны (пропускают кровь только к сердцу), а средняя оболочка тоньше, поэтому просвет вен на разрезе овальный. По венам большого круга течёт венозная кровь, малого — артериальная.\n\nСхема движения: сердце → артерии → капилляры → вены → сердце. Имеется прямая связь между диаметром сосуда и напряжённостью работы питаемого им органа."}, {"id": 31, "category": "Пищеварение", "q": "Строение многокамерного желудка", "a": "Многокамерный желудок характерен для жвачных (КРС, овца, коза); он смешанного, пищеводно-кишечного типа и состоит из четырёх камер: рубца, сетки, книжки и сычуга. Первые три камеры — преджелудки — выстланы плоским многослойным эпителием и не содержат пищеварительных желёз; четвёртая, сычуг, имеет слизистую кишечного типа с железами. Желудок крупных жвачных вмещает более 100 л.\n\nРубец — большой мешок, занимает всю левую половину брюшной полости (заходит и в правую); разделён на дорсальный и вентральный мешки. В его преддверие впадает пищевод, переходящий в желоб сетки; жидкая пища по желобу проходит в книжку, а грубый корм попадает в рубец. Слизистая густо усеяна ороговевшими сосочками, через сосуды которых всасываются вещества; в рубце микроорганизмы (бактерии, инфузории) расщепляют клетчатку; корм отрыгивается для повторного пережёвывания (жвачка).\n\nСетка (вмещает 4-8 л) — слизистая образует складки, напоминающие ячеи сети; сортирует корм.\n\nКнижка (7-10 л) — слизистая собрана в листочки с ороговевшими сосочками; перетирает и отжимает пищевую массу.\n\nСычуг (8-10 л) — истинный железистый желудок грушевидной формы; слизистая делится на кардиальную, фундальную (дно) и пилорическую зоны; железы выделяют желудочный сок (пепсин, соляную кислоту обкладочными клетками фундальной зоны). Пилорическое отверстие со сфинктером пропускает массы в двенадцатиперстную кишку.\n\nУ новорождённых телят молоко по желобу сетки попадает прямо в книжку и сычуг, минуя рубец."}, {"id": 32, "category": "Пищеварение", "q": "Строение однокамерного желудка свиньи, лошади, собаки", "a": "Однокамерный желудок имеют свинья, лошадь и собака. Это расширенный мешковидный отдел между пищеводом и кишечником; имеет вход — кардиальное отверстие, выход — пилорическое, большую и малую кривизну, дно. Стенка из слизистой, подслизистой, мышечной и серозной оболочек.\n\nПо характеру слизистой различают желудки:\n- кишечного типа — вся слизистая выстлана железистым эпителием; такой желудок у собаки (хищник), относится к простым однокамерным желудкам кишечного типа;\n- пищеводно-кишечного типа — начало желудка выстлано многослойным плоским (безжелезистым) эпителием, как пищевод, остальная часть — призматическим железистым; такой желудок у свиньи и лошади.\n\nУ свиньи желудок однокамерный, пищеводно-кишечного типа, с дивертикулом желудка у входа; в области кардия слизистая безжелезистая (молочного цвета), остальная железистая (кардиальная, фундальная, пилорическая зоны); мышечная оболочка из продольного, кольцевого и косого слоёв; лежит поперёк брюшной полости в левом подреберье.\n\nУ лошади желудок однокамерный, в виде удлинённого изогнутого мешка, пищеводно-кишечного типа, вмещает 6-15 л; имеет слепой мешок с безжелезистой слизистой (без желёз) и железистую часть (железы кардия, собственные и пилорические). Внутренние пучки косого слоя образуют мощный кардиальный сфинктер, препятствующий рвоте. Почти весь желудок лежит в левом подреберье.\n\nЖелудок депонирует корм, механически и химически обрабатывает его (расщепление белков пепсином и соляной кислотой), всасывает воду."}, {"id": 33, "category": "Пищеварение", "q": "Строение и топография печени", "a": "Печень (hepar) — самая крупная застенная пищеварительная железа, буро-красного цвета. У крупного рогатого скота её масса 3-9 кг, у свиньи до 2,5 кг, у лошади 1,5-3,5 кг. Кроме выработки жёлчи она выполняет барьерную (обезвреживающую) функцию, синтезирует гликоген и образует мочевину.\n\nНа печени различают диафрагмальную и висцеральную поверхности. На висцеральной — ворота печени, куда входят воротная вена (собирает кровь со всего кишечника), печёночная артерия (питает орган) и нервы, а выходит жёлчный проток. По дорсальному краю две вырезки — для пищевода и задней полой вены. Вентральный край вырезками разделён на доли: различают три основные доли — левую, среднюю и правую; средняя воротами делится на квадратную и хвостатую.\n\nПечень построена по типу паренхиматозного органа: остов из капсулы и междольковых прослоек и паренхима из печёночных долек в виде многогранных призм. Печёночные клетки расположены рядами (балками); одной поверхностью они соприкасаются с венозными капиллярами, другой образуют жёлчные капилляры. На стенках кровеносных капилляров есть звёздчатые (купферовы) клетки, выполняющие фагоцитарную функцию. Кровь воротной вены, протекая между клетками, собирается в центральную вену дольки; центральные вены, сливаясь, образуют печёночные вены, отводящие кровь в заднюю полую вену.\n\nУ крупного рогатого скота печёночный проток, соединяясь с пузырным, образует общий жёлчный проток, открывающийся во втором изгибе двенадцатиперстной кишки; жёлчный пузырь имеется. У лошади жёлчного пузыря нет — жёлчь поступает в кишку по печёночному протоку."}, {"id": 34, "category": "Пищеварение", "q": "Тонкий отдел кишечника. Строение", "a": "К тонкому отделу кишечника относят двенадцатиперстную (duodenum), тощую (jejunum) и подвздошную (ileum) кишки. Здесь происходит окончательное переваривание корма и всасывание питательных веществ.\n\nДвенадцатиперстная кишка — продолжение пилоруса; в неё открываются протоки печени и поджелудочной железы. Её слизистая отличается сильным развитием ворсинок и наличием трубчатых и сложнотрубчатых желёз (сложнотрубчатые есть только в двенадцатиперстной, трубчатые общекишечные — во всех кишках). Тощая кишка наиболее длинная (до 40 м у крупного рогатого скота), ворсинки её мельче. Подвздошная — самая короткая (у КРС не более 50 см), заканчивается отверстием при впадении в слепую кишку.\n\nСтенка построена по типу трубчатого органа. Слизистая собрана в складки, покрыта призматическим каёмчатым эпителием с одноклеточными бокаловидными железами; на 1 см2 двенадцатиперстной около 1500-2000 ворсинок. Каёмка эпителия состоит из микроворсинок, увеличивающих всасывающую поверхность клетки до 14 раз. В каждой ворсинке проходят кровеносные капилляры и центральный лимфатический сосуд, по которому отводится до 80% всосавшегося жира; в стенках ворсинок есть гладкие мышечные волокна. Мышечная оболочка состоит из продольного и циркулярного слоёв гладких мышц, обеспечивающих перистальтику. Снаружи кишка покрыта серозной оболочкой. Здесь действуют ферменты поджелудочного и кишечного соков, а жёлчь эмульгирует жиры."}, {"id": 35, "category": "Эндокринная система", "q": "Щитовидная железа и её значение. Развитие и топография", "a": "Щитовидная железа (glandula thyreoidea) — непарная железа внутренней секреции бранхиогенной группы, развивается из глотки и жаберных карманов зародыша. Состоит из двух долей и железистого перешейка (перешеек отсутствует у лошади, овцы и козы). Железа красно-коричневого цвета, находится на первых 1-2 кольцах трахеи.\n\nПаренхима состоит из железистых эпителиальных клеток — тиреоцитов, образующих стенки пузырьков-фолликулов. Полости фолликулов заполнены коллоидом, содержащим гормоны тироксин и трийодтиронин. Клетки межфолликулярных островков вырабатывают тиреокальцитонин.\n\nТироксин и трийодтиронин образуются из аминокислоты тирозина и йода. Они стимулируют поглощение клетками кислорода и выделение СО2, повышают основной обмен и образование тепла, усиливают расщепление белков, жиров и углеводов, влияют на рост и развитие животных, на кожу и её производные, повышают продукцию молока и его жирность. При удалении железы у молодняка задерживается рост и развитие, нарушается образование условных рефлексов.\n\nТиреокальцитонин сберегает в организме кальций: угнетает остеокласты и активирует остеобласты, кальций переходит в кость, его уровень в плазме понижается. В местностях, бедных йодом, нарушается образование тироксина, гипофиз выделяет больше тиротропина, и железа разрастается, образуя зоб. Деятельность железы регулируется центральной нервной системой и гипофизом (гормон тиротропин, выделение которого стимулирует тиролиберин гипоталамуса)."}, {"id": 36, "category": "Пищеварение", "q": "Толстый отдел кишечника. Строение", "a": "Толстый отдел кишечника называется так потому, что его просвет у большинства видов шире просвета тонкого (у крупного рогатого скота разница незначительная). Включает слепую, ободочную и прямую кишки. Здесь заканчивается всасывание питательных веществ, а в прямой кишке формируются каловые массы.\n\nВ слизистой оболочке толстого отдела нет ворсинок, есть только трубчатые общекишечные железы; оболочка выстлана однослойным призматическим эпителием, а конец прямой кишки — многослойным плоским. Много бокаловидных клеток, выделяющих слизь. Мышечная оболочка состоит из продольного и циркулярного слоёв. Собственных ферментов толстый кишечник почти не выделяет; переваривание здесь идёт за счёт ферментов, поступивших из тонкого отдела, и деятельности микрофлоры.\n\nВидовые особенности выражены. У крупного рогатого скота слепая кишка имеет длину около 70 см, ободочная (около 7 м) свёрнута спиральным лабиринтом (диском) на правой стенке рубца, прямая кишка короткая (около 40 см). У свиньи слепая кишка несёт три продольных мышечных тяжа (тении) и три ряда карманов, ободочная свёрнута конусом. У лошади толстый отдел огромен: сильно развиты слепая кишка и большая ободочная кишка (до 6,5 м) с четырьмя тениями и четырьмя рядами карманов — у непарнокопытных здесь идёт основное переваривание клетчатки. Прямая кишка заканчивается анусом."}, {"id": 37, "category": "Витамины и минералы", "q": "Общая характеристика витаминов", "a": "Витамины — особая группа органических веществ, содержащихся в кормах, но не относящихся к белкам, липидам и углеводам. Они нужны в очень малых количествах, их роль подобна ферментам и гормонам, многие входят в состав ферментов. Известно более 30 витаминов; открыл их Н. И. Лунин (1881), название предложил К. Функ (1912).\n\nЖизнь без витаминов невозможна, поэтому необходимо их постоянное поступление с кормом. Некоторые образуются из провитаминов (витамин А из каротина в тонком кишечнике; витамин D3 из эргостерина под действием ультрафиолета), другие синтезируются микроорганизмами желудочно-кишечного тракта (витамины группы В, витамин К — особенно у жвачных). Отсутствие витамина приводит к авитаминозу, недостаток — к гиповитаминозу.\n\nПо растворимости витамины делят на две группы. Жирорастворимые: А (ретинол) — состояние эпителия, зрение (образует родопсин); D (кальциферол) — обмен кальция и фосфора, профилактика рахита и остеомаляции; Е (токоферол) — размножение, развитие зародыша, усвоение витамина А; К (нафтохинон, фитохинол) — образование протромбина, свёртывание крови. Водорастворимые: большая группа витаминов В (В1 — тиамин, В2 — рибофлавин и др.), витамин С (аскорбиновая кислота) и витамин Р (цитрин). Потребность зависит от вида, возраста, продуктивности и физиологического состояния животного."}, {"id": 38, "category": "Нервная система и анализаторы", "q": "Физиология нервов", "a": "Нерв образован пучками нервных волокон — отростков нейронов, объединённых соединительнотканными оболочками. Различают миелиновые (мякотные) и безмиелиновые (безмякотные) волокна. Основная функция нерва — проведение возбуждения (нервного импульса).\n\nВ покое наружная поверхность мембраны волокна заряжена положительно, внутренняя — отрицательно (потенциал покоя). Он создаётся главным образом выходом ионов калия наружу, тогда как анионы остаются внутри клетки; разность концентраций натрия и калия поддерживается натрий-калиевым насосом, источник энергии для которого — АТФ. При раздражении проницаемость мембраны для натрия возрастает в сотни раз, натрий устремляется внутрь, происходит перезарядка мембраны — возникает потенциал действия (длительность 1-5 мс), который распространяется вдоль волокна с помощью круговых (локальных) токов.\n\nВозбуждение по нервному волокну проводится изолированно — не переходит на соседние волокна, и может распространяться в обе стороны от места раздражения. В безмиелиновых волокнах импульс идёт непрерывно и медленно (0,5-3 м/с), в миелиновых потенциал действия возникает только в перехватах Ранвье и распространяется скачкообразно от одного перехвата к другому, поэтому скорость достигает 120 м/с. Обмен веществ в нерве очень мал, поэтому он практически неутомляем; этому способствует и высокая лабильность (миелиновые волокна воспроизводят до 500 импульсов в секунду)."}, {"id": 39, "category": "Нервная система и анализаторы", "q": "Строение наружного, среднего и внутреннего уха", "a": "Орган слуха и равновесия (ухо) делят на три части: наружное, среднее и внутреннее.\n\nНаружное ухо состоит из ушной раковины, наружного слухового прохода и мышц, приводящих раковину в движение. Основу раковины составляет эластический хрящ, покрытый кожей; она улавливает и направляет звук. Наружный слуховой проход заканчивается барабанной перепонкой, отделяющей наружное ухо от среднего.\n\nСреднее ухо заключено в барабанной полости каменистой кости. В нём находятся четыре слуховые косточки, соединённые суставами: молоточек, наковальня, чечевицеобразная косточка и стремечко. Молоточек рукояткой соединяется с барабанной перепонкой, а стремечко — с перепонкой овального окошка, ведущего в преддверие. Барабанная полость через слуховую (евстахиеву) трубу сообщается с глоткой; у лошади эта труба образует воздухоносный мешок.\n\nВнутреннее ухо (лабиринт) состоит из преддверия, улитки и трёх полукружных каналов. Различают костный и перепончатый лабиринт; между ними находится перилимфа, а внутри перепончатого — эндолимфа. Улитка — спиральный канал, разделённый основной пластинкой; на ней лежит мембрана с кортиевым органом, слуховые волосковые клетки которого являются акустическим рецептором, передающим возбуждение к нейронам спирального ганглия и далее в кору мозга. Полукружные каналы заполнены эндолимфой и являются периферической частью органа равновесия: при изменении положения головы они раздражают вестибулярные рецепторы."}, {"id": 40, "category": "Пищеварение", "q": "Характерные особенности в строении органов домашней птицы", "a": "Организм домашней птицы имеет ряд особенностей.\n\nПищеварение: зубов, дёсен и губ нет — их заменяют роговые надклювье и подклювье; слюнные железы слабо развиты (слизистые). Пищевод длинный, при входе в грудную полость образует расширение — зоб (у гусей и уток развит слабо), где корм увлажняется слизью. Желудок двойной: железистый (выделяет желудочный сок) и мышечный (с толстой мышечной стенкой и плотной кутикулой, перетирает корм). Кишечник относительно короткий (у кур длиннее тела в 6 раз), толстый отдел представлен двумя слепыми кишками и прямой кишкой, открывающейся в клоаку; ободочной кишки нет. Печень большая, тёмно-коричневая, из двух долей, с жёлчным пузырём. В клоаку открываются конечный отдел кишечника, мочеточники и половые пути; у молодых птиц в её стенке есть фабрициева сумка (лимфоидный орган).\n\nДыхание: лёгкие малы, дополнены воздухоносными мешками, заходящими между органами и в кости; звук образуется в певчей гортани у бифуркации трахеи. Костяк лёгкий, многие кости пневматичны, грудная кость несёт киль. Почки крупные, мочевого пузыря нет, моча с большим количеством мочевой кислоты выводится в клоаку. У самок развит обычно левый яичник и левый яйцевод; яйцо формируется в яйцеводе. Эритроциты птиц овальные, содержат ядро; температура тела высокая, обмен интенсивный."}, {"id": 41, "category": "Обмен веществ", "q": "Обмен энергии", "a": "Обмен энергии — превращения энергии в организме. Потенциальная энергия питательных веществ при их окислении частично расходуется на процессы ассимиляции и механическую работу, а большей частью превращается в тепло; часть запасается в макроэргических соединениях (АТФ, креатинфосфат).\n\nКоличество выделяемой энергии определяют калориметрией. Прямая калориметрия проводится в калориметрической камере с теплонепроницаемыми стенками: тепло поглощается протекающей водой, по разнице её температур вычисляют выделенное тепло; метод точен, но сложен. Непрямая (косвенная) калориметрия — измерение энергии по газообмену: определяют объём потреблённого кислорода и выделенного углекислого газа и вычисляют дыхательный коэффициент (отношение выделенного CO2 к поглощённому O2). При окислении углеводов он равен 1,0, белков — 0,8, жиров — 0,7. При окислении 1 г жира освобождается 38,9 кДж (9,3 ккал), углеводов — 17,6 кДж (4,1 ккал), белков — 17,6 кДж (4,1 ккал).\n\nОсновной обмен — количество энергии при полном мышечном покое, натощак, при оптимальной для вида температуре среды. На него влияют возраст, пол, размеры, продуктивность, время суток и года; беременность и лактация его повышают. Энергию, используемую на образование продукции, называют продуктивным обменом; общая потребность складывается из основного и продуктивного обмена. Ведущая роль в регуляции принадлежит коре головного мозга и гипоталамусу; симпатическая система, тироксин, гормоны гипофиза и надпочечников усиливают обмен."}, {"id": 42, "category": "Витамины и минералы", "q": "Физиологическое значение микроэлементов", "a": "Минеральные вещества по содержанию в организме делят на макро- и микроэлементы. По учебнику к макроэлементам относят натрий, калий, хлор, кальций, фосфор, железо, магний и серу, а к микроэлементам (содержащимся в сотых и тысячных долях процента) — кобальт, йод, медь, марганец, цинк, фтор, бром, стронций и другие. Микроэлементы участвуют в росте и развитии, повышают устойчивость к болезням, плодовитость и продуктивность; входят в состав ферментов, гормонов, витаминов.\n\nКобальт откладывается главным образом в печени; необходим для образования эритроцитов и гемоглобина, требуется для синтеза витамина В12, в состав которого входит. При недостатке развивается анемия, болезни (лизуха), шерсть становится матовой и ломкой. Йод входит в состав гормона щитовидной железы — тироксина; при недостатке нарушается её функция, молодняк рождается слабым, снижается продуктивность. Медь содержится больше всего в печени, входит в состав ферментов, стимулирует тканевое дыхание, кроветворение и синтез гемоглобина; при недостатке — анемия, нарушение функций нервной и мышечной систем. Марганец входит в состав ферментов, участвует в окислительно-восстановительных процессах, росте и размножении; при недостатке нарушаются нервная система и равновесие. Цинк, фтор и другие также необходимы. Потребность зависит от вида, возраста, продуктивности и содержания элементов в кормах и почве."}, {"id": 43, "category": "Эндокринная система", "q": "Околощитовидная железа, её гормоны и действие", "a": "Околощитовидные (паращитовидные) железы — gll. paratyroideae — парные округлой или овальной формы органы желто-коричневого цвета; обычно бывают наружные и внутренние. У коровы наружные лежат краниальнее щитовидной железы вблизи общей сонной артерии, внутренние заключены в её паренхиме. Развиваются из глотки и жаберных карманов. Паренхима состоит из главных и оксифильных эпителиальных клеток — паратироцитов.\n\nОколощитовидные железы выделяют гормон белковой природы — паратгормон (паратирин). Он регулирует уровень кальция и фосфора в крови. Паратгормон стимулирует активность остеокластов — клеток, разрушающих кости; при этом ионы кальция освобождаются из костей и поступают в кровь, одновременно с кальцием выходит и фосфор. Однако под влиянием паратгормона усиливается выведение фосфатов с мочой, и концентрация фосфора в крови снижается. Паратгормон усиливает всасывание кальция из кишечника и в почечных канальцах.\n\nОбразование и выделение паратгормона происходит при снижении кальция в крови: клетки железы очень чувствительны к его концентрации (регуляция по принципу обратной связи). После удаления околощитовидных желёз (например, у собак) уровень кальция в крови падает, возникают судорожные припадки — тетания (вследствие возбуждения двигательных центров среднего и продолговатого мозга), и животные на 4-12-й день погибают. Жизнь можно сохранить введением паратгормона."}, {"id": 44, "category": "Нервная система и анализаторы", "q": "Строение и расположение ромбовидного мозга и его оболочки", "a": "Головной мозг условно делят на большой и ромбовидный. Ромбовидный мозг подразделяется на продолговатый и задний мозг.\n\nПродолговатый мозг (medulla oblongata) расположен дорсальнее тела затылочной кости и анатомически является продолжением спинного мозга. Его серое вещество образует ядра, часть которых сосредоточена на дне ромбовидной ямки в четвёртом мозговом желудочке. Здесь лежат жизненно важные центры — дыхательный, сердечно-сосудистый, центры глотания, слюноотделения и др.; через продолговатый мозг проходят проводящие пути.\n\nЗадний мозг (metencephalon) состоит из мозжечка и моста. Мозжечок (cerebellum) находится дорсальнее продолговатого мозга, состоит из двух полушарий, между которыми лежит червячок. Серое вещество расположено на поверхности и образует кору мозжечка с тремя слоями нейронов (молекулярный, ганглиозный, гранулярный). Мозжечок координирует движения, регулирует мышечный тонус, поддерживает равновесие и позу. Мост мозга — белая поперечная пластинка на вентральной поверхности продолговатого мозга, состоящая из отростков нейронов, связывающих части спинного мозга с головным.\n\nОболочки головного и спинного мозга три: твёрдая (наружная, прилегает к костям), паутинная (средняя, тонкая) и мягкая (сосудистая, прилегает к мозгу). Между паутинной и мягкой оболочками находится подпаутинное пространство со спинномозговой жидкостью."}, {"id": 45, "category": "Кровь и кровообращение", "q": "Лейкоциты, их строение и функции", "a": "Лейкоциты — белые кровяные клетки, имеющие ядра; размеры достигают около 20 мкм. В зависимости от способности окрашиваться, размеров и формы ядра их делят на зернистые — гранулоциты (нейтрофилы, эозинофилы, базофилы) и незернистые — агранулоциты (лимфоциты, моноциты). У крупного рогатого скота лейкоцитов 6-10·10^9 в 1 л крови. Увеличение их числа называют лейкоцитозом, уменьшение — лейкопенией.\n\nГлавная функция лейкоцитов — защита. Поглощение и переваривание лейкоцитами микробов и чужеродных веществ называют фагоцитозом (явление открыл И. И. Мечников). Нейтрофилы и эозинофилы способны к самостоятельному амёбовидному движению, проходят через стенки капилляров к месту скопления микробов. Базофилы почти лишены способности к фагоцитозу, синтезируют гепарин, препятствующий свёртыванию крови.\n\nЛимфоциты составляют 30-50% белых кровяных телец, живут долго и являются центральным звеном иммунной системы. Их делят на три группы: Т-лимфоциты (тимусзависимые) осуществляют клеточный иммунитет, разрушая чужеродные и изменённые клетки; В-лимфоциты (бурсазависимые) создают гуморальный иммунитет, вырабатывая антитела; нулевые лимфоциты способны превращаться в Т- или В-лимфоциты. Моноциты захватывают и переваривают микробы и обломки клеток; проникая к очагу воспаления, превращаются в макрофаги. Процентное соотношение видов лейкоцитов называют лейкоцитарной формулой (лейкограммой)."}, {"id": 46, "category": "Обмен веществ", "q": "Физиология мышц", "a": "Мышцы образованы мышечной тканью, обладающей возбудимостью, проводимостью и сократимостью. Различают поперечнополосатую скелетную (произвольную), гладкую (непроизвольную) и сердечную мышечную ткань. Структурная единица скелетной мышцы — мышечное волокно с миофибриллами из белков актина (тонкие нити) и миозина (толстые нити); их чередование даёт поперечную исчерченность.\n\nСвойства скелетных мышц: возбудимость (меньше, чем у нервов), изолированное проведение возбуждения (скорость 4-15 м/с), а также растяжимость, эластичность (возврат к исходной длине) и пластичность; в скелетных мышцах эластичность выражена лучше пластичности.\n\nПри одиночном раздражении мышца отвечает одиночным сокращением с тремя периодами: латентным, сокращения и расслабления (у млекопитающих 0,04-0,1 с). При частых импульсах возникает длительное тетаническое сокращение; различают зубчатый и гладкий тетанус. В естественных условиях мышцы сокращаются по типу гладкого тетануса.\n\nХимизм сокращения протекает в две фазы: анаэробную (распад АТФ на АДФ и фосфорную кислоту с освобождением энергии) и аэробную; восстановление АТФ идёт за счёт креатинфосфата, а образующаяся молочная кислота частично окисляется до CO2 и воды, частично снова превращается в гликоген. По теории скольжения при возбуждении ионы кальция связываются с тропонином, тропомиозин освобождает места прикрепления, головки поперечных мостиков миозина прикрепляются к актину и продвигают актиновые нити к середине саркомера — мышца укорачивается. Гладкие мышцы сокращаются медленно, длительно, мало утомляются и обладают тонусом."}, {"id": 47, "category": "Кровь и кровообращение", "q": "Состав плазмы крови", "a": "Кровь состоит из жидкой части — плазмы и взвешенных в ней форменных элементов (эритроцитов, лейкоцитов, тромбоцитов). При отстаивании или центрифугировании несвернувшейся крови плазма (объём её несколько больше, чем форменных элементов) остаётся сверху как почти прозрачная, слегка желтоватая жидкость.\n\nВ плазме крови содержится 90-92% воды и 8-10% сухих веществ. Основную часть сухого вещества (6-8%) составляют белки, представленные главным образом альбуминами и глобулинами; к глобулинам относят и фибриноген, участвующий в свёртывании крови. Белки создают онкотическое давление, поддерживают объём крови и количество воды в тканях; из гамма-глобулинов образуются антитела, создающие иммунитет. Плазма без фибриногена (после свёртывания) называется сывороткой.\n\nВ состав сухих веществ входят также глюкоза, липиды, молочная и пировиноградная кислоты, небелковые азотистые вещества (аминокислоты, мочевина, мочевая кислота, креатинин), минеральные соли, ферменты, гормоны, витамины; в плазме растворены кислород, углекислый газ и азот. Минеральные соли создают осмотическое давление.\n\nКровь имеет слабощелочную реакцию, pH 7,35-7,55; постоянство pH поддерживают буферные системы — карбонатная, фосфатная, гемоглобиновая (основная) и белков плазмы, а также деятельность выделительных органов. Бикарбонаты плазмы образуют щелочной резерв крови."}, {"id": 48, "category": "Выделительная система", "q": "Типы почек, их строение", "a": "Почки (renes) — парные паренхиматозные органы, образующие мочу; лежат забрюшинно под поясничными позвонками. По строению различают четыре типа почек: множественные, бороздчатые многососочковые, гладкие многососочковые и гладкие однососочковые.\n\nМножественные почки (у водных животных и белых медведей) состоят из множества маленьких почек, соединённых стебельками с общим мочеточником. Бороздчатая многососочковая почка крупного рогатого скота состоит из почечных долек, сливающихся средней частью, тогда как сосочки и наружные части долек остаются обособленными. Гладкая многососочковая почка свиньи: дольки слились наружными частями, обособлены лишь сосочки. У гладких однососочковых почек овцы, лошади и собаки все доли полностью слились, а их сосочки образуют один общий сосочек.\n\nНа разрезе различают кору почки (мочеотделительную зону, тёмно-красную) и мозговой слой (белого цвета). Снаружи почка покрыта фиброзной и жировой капсулами. Структурно-функциональная единица — нефрон; в каждой почке крупного рогатого скота около 8 млн нефронов. Нефрон состоит из капсулы клубочка с сосудистым клубочком (вместе — почечное тельце), где происходит фильтрация и образуется первичная моча, и системы канальцев (проксимальный отдел, петля нефрона, дистальный отдел), где идёт реабсорбция и образуется вторичная моча."}, {"id": 49, "category": "Кровь и кровообращение", "q": "Свойства сердечной мышцы. Сердечный цикл", "a": "Сердце — полый мышечный орган; его стенка состоит из эндокарда, миокарда и эпикарда. Сердечная мышца обладает свойствами автоматии, возбудимости, проводимости и сократимости.\n\nАвтоматия — способность сердца ритмически сокращаться без внешних раздражений, под влиянием импульсов, возникающих в нём самом. Её обеспечивает проводящая система: синоатриальный (синусно-предсердный) узел — водитель ритма (пейсмекер), атриовентрикулярный узел — центр автоматии второго порядка, пучок Гиса с двумя ножками и волокна Пуркине. На пороговое раздражение сердечная мышца отвечает максимальным сокращением; сила сокращения тем больше, чем сильнее растянуты волокна в диастолу («закон сердца»). Длительный период абсолютной рефрактерности не позволяет сердцу впадать в тетанус, обеспечивая ритмичную безотказную работу.\n\nСердечный цикл — смена систолы (сокращения) и диастолы (расслабления). При 60 сокращениях в мину
