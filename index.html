ту цикл длится 1 с: систола предсердий около 0,1 с, систола желудочков около 0,3 с, общая диастола около 0,6 с. Цикл начинается систолой предсердий — кровь переходит в желудочки; при систоле желудочков (фаза напряжения, затем изгнания) кровь нагнетается в аорту и лёгочную артерию, атриовентрикулярные клапаны закрыты, полулунные открыты; во время диастолы камеры заполняются кровью. Частота сокращений: у лошади 32-42, у крупного рогатого скота и свиньи 60-80, у собаки 70-80 в минуту."}, {"id": 50, "category": "Кровь и кровообращение", "q": "Регуляция работы сердца", "a": "Сердце функционирует автоматически, но его деятельность регулируется нервной и гуморальной системами в соответствии с потребностями организма.\n\nНервная (рефлекторная) регуляция осуществляется по блуждающим и симпатическим нервам. Центры блуждающих нервов лежат в продолговатом мозге, симпатических — в боковых рогах первых пяти грудных сегментов спинного мозга. Блуждающие нервы доходят до синоатриального и атриовентрикулярного узлов и тормозят сердечную деятельность: замедляют и ослабляют сокращения, понижают возбудимость и проводимость. Симпатические нервы действуют противоположно — учащают и усиливают сокращения, повышают возбудимость и проводимость. Рефлекторную регуляцию обеспечивают центры коры больших полушарий, гипоталамуса, продолговатого и спинного мозга.\n\nВажную роль играют рецепторы сосудистых рефлексогенных зон (дуга аорты, каротидный синус, устья полых вен). При повышении давления в дуге аорты и каротидном синусе рефлекторно ослабляются и урежаются сокращения; повышение давления в устье полых вен, наоборот, усиливает и учащает их. Хеморецепторы возбуждаются при увеличении CO2 и уменьшении O2.\n\nГуморальная регуляция: адреналин и норадреналин надпочечников, а также избыток тироксина учащают и усиливают сокращения. Электролиты влияют на автоматию и сократимость: при избытке ионов калия сердце сокращается реже и слабее и может остановиться в диастоле, а ионы кальция учащают и усиливают сокращения."}, {"id": 51, "category": "Размножение и лактация", "q": "Общая характеристика органов размножения самцов. Придаточные половые железы самца", "a": "Половые органы самца включают семенники, придатки семенников, спермиопроводы, мочеполовой канал, придаточные половые железы, половой член и семенниковый мешок (мошонку).\n\nСеменники (testis) — парные половые железы; их паренхима состоит из извитых семенных канальцев, где образуются и развиваются спермии (через стадии сперматогоний, сперматоцитов I и II порядка и сперматид). В соединительнотканной строме лежат интерстициальные клетки, продуцирующие мужской половой гормон тестостерон. Семенники до рождения опускаются из брюшной полости через паховый канал в мошонку. Из хвоста придатка отходит спермиовыносящий проток (спермиопровод), который через паховый канал в составе семенного канатика идёт в брюшную полость и, образуя ампулы, открывается в мочеиспускательный канал, формируя мочеполовой канал. Половой член служит для введения спермы и выведения мочи.\n\nПридаточные половые железы через протоки выделяют секрет в тазовую часть мочеполового канала. К ним относятся: пузырьковидные железы (семенные пузырьки) — парные, у быка большие, лежат по бокам шейки мочевого пузыря; предстательная железа (простата) — непарная, с телом на шейке мочевого пузыря и рассеянной частью в стенке мочеполового канала; бульбоуретральная (куперова) железа — парная, в конце тазовой части канала. Их секрет вместе со спермиями образует сперму."}, {"id": 52, "category": "Кровь и кровообращение", "q": "Лимфа и тканевая жидкость", "a": "Внутреннюю среду организма образуют кровь, тканевая жидкость и лимфа. Истинной средой для клеток служит тканевая жидкость; кровь обеспечивает постоянство её состава.\n\nТканевая (межклеточная) жидкость заполняет промежутки между клетками; состав её близок к плазме крови. Образуется при движении крови по капиллярам, когда через их стенки проникают составные части плазмы. Из этой жидкости клетки поглощают питательные вещества, гормоны, витамины, минеральные вещества, воду и кислород и выделяют в неё CO2 и продукты обмена. Тканевая жидкость постоянно пополняется за счёт веществ из крови и превращается в лимфу.\n\nЛимфа — жидкость, содержащаяся в лимфатических сосудах; она бесцветная, прозрачная, химический состав близок к плазме, но белка в ней меньше (наибольшее его содержание, в среднем 5,3%, в лимфе печени). Реакция лимфы щелочная; плотность и вязкость меньше, чем у плазмы. Эритроцитов в лимфе нет, тромбоцитов тоже, но она способна свёртываться, так как содержит фибриноген и факторы свёртывания. Главные форменные элементы — лимфоциты, число которых после прохождения лимфоузлов возрастает (в грудном протоке 5-20·10^9 в 1 л). Лимфа, оттекающая от кишечника после корма, богатого жиром, молочно-белого цвета. Лимфа течёт по капиллярам и сосудам, проходит лимфоузлы и через грудной проток вливается в кровь передней полой вены."}, {"id": 53, "category": "Кровь и кровообращение", "q": "Кроветворение", "a": "Кроветворение поддерживает постоянное количество форменных элементов крови за счёт их непрерывного образования взамен разрушающихся.\n\nГлавным органом кроветворения, в котором образуются эритроциты, тромбоциты и лейкоциты, является костный мозг. Лимфоциты формируются также в лимфоузлах и тимусе (вилочковой железе), моноциты, кроме костного мозга, — в соединительной ткани и лимфоузлах. У плода органами кроветворения служат костный мозг и печень.\n\nВсе форменные элементы крови образуются из гемоцитобластов — больших клеток, имеющих ядро. Разрушение эритроцитов и лейкоцитов происходит в печени и селезёнке. Образование эритроцитов называют эритропоэзом, тромбоцитов — тромбоцитопоэзом, лейкоцитов — лейкопоэзом.\n\nКроветворение связано с обменом веществ: эритроциты образуются при участии витамина В12 и фолиевой кислоты, а также микроэлементов — железа, кобальта, меди. Регулируется кроветворение нервной системой, железами внутренней секреции и гуморальными факторами; важную роль играют кора больших полушарий и гипоталамус. Образование эритроцитов усиливают мужские половые гормоны, гормоны коры надпочечников и щитовидной железы, а тормозят эстрогены. Среди гуморальных факторов большое значение имеют эритропоэтины, усиливающие образование эритроцитов; их предшественник эритрогенин образуется в почках и активируется при кислородном голодании. Образование тромбоцитов стимулируют тромбоцитопоэтины, лейкоцитов — лейкопоэтины."}, {"id": 54, "category": "Кровь и кровообращение", "q": "Свёртывание крови", "a": "Свёртывание крови — защитная реакция, препятствующая кровопотере: на месте повреждения сосуда образуется кровяной сгусток (тромб). В основе процесса лежит превращение растворённого в плазме белка фибриногена в нерастворимый фибрин, нити которого образуют густую сеть, задерживающую форменные элементы.\n\nВ свёртывании участвуют стенки сосудов, форменные элементы (особенно тромбоциты) и ферментная система плазмы — факторы свёртывания, содержащиеся в плазме, форменных элементах и тканях. Процесс проходит три фазы. Первая, самая сложная и продолжительная, — образование протромбиназы (тканевой и кровяной); толчком служит повреждение стенок сосудов, тромбоцитов и эритроцитов с выделением тромбопластина — фрагментов фосфолипидного слоя клеточных мембран; в этой фазе участвуют ионы кальция и факторы плазмы. Вторая фаза — образование тромбина: протромбиназа превращает протромбин в тромбин (при участии ионов кальция). Третья фаза — под влиянием тромбина, при участии кальция и фибринстабилизирующего фактора, фибриноген превращается в фибрин, образуется тромб.\n\nПосле образования сгустка происходит его уплотнение — ретракция. Затем начинается фибринолиз — расщепление фибрина протеолитическим ферментом плазмином (образуется из плазминогена под действием активаторов), восстанавливающий просвет сосуда. Для нормального свёртывания необходимы кальций и витамин К (нужен для синтеза протромбина в печени); препятствует свёртыванию гепарин."}, {"id": 55, "category": "Пищеварение", "q": "Пищеварение в полости рта", "a": "В ротовой полости корм захватывается, измельчается, смачивается слюной и оценивается органами вкуса. Захват корма у видов различен: крупный рогатый скот захватывает траву языком, лошадь — губами и резцами, свинья — рылом и губами, плотоядные — зубами; у жвачных корм заглатывается и затем отрыгивается для повторного пережёвывания (жвачка).\n\nСлюна — продукт трёх пар крупных слюнных желёз: околоушных (серозные, выделяют жидкую слюну), нижнечелюстных и подъязычных (смешанные, со слизью-муцином), а также мелких желёз. Слюна — вязкая жидкость слабощелочной реакции, содержит 99-99,4% воды и 0,6-1% сухих веществ; pH слюны жвачных 8,1-8,3, лошади и свиньи 7,2-7,5. Она смачивает корм, муцином склеивает пищевой ком, нейтрализует кислоты, обладает бактерицидным действием (лизоцим и ингибан). Ферменты — a-амилаза (птиалин) и мальтаза — имеются по учебнику только в слюне свиньи: амилаза расщепляет крахмал до декстринов и мальтозы, мальтаза превращает мальтозу в глюкозу; в слюне лошади, жвачных и плотоядных этих ферментов нет.\n\nЗа сутки выделяется слюны: у крупного рогатого скота 90-190 л, у овец 6-10 л, у лошади до 40 л, у свиньи до 15 л; у жвачных околоушные железы секретируют постоянно. Слюноотделение рефлекторно: центр в продолговатом мозге, под контролем гипоталамуса и коры. Сформированный пищевой ком языком проталкивается в глотку и перистальтикой пищевода поступает в желудок."}, {"id": 56, "category": "Размножение и лактация", "q": "Процесс молокообразования. Лактация", "a": "Лактация — процесс образования, накопления и выведения молока молочной железой. У коров лактация длится около 10 месяцев.\n\nМолоко образуется в эпителиальных секреторных клетках альвеол и протоков вымени из составных частей крови; для образования 1 л молока через вымя должно пройти около 500 л крови. Синтез белков молока (казеина) идёт из аминокислот и белков плазмы, молочный сахар лактоза синтезируется из глюкозы, молочный жир — из глицерина и жирных кислот, а также из уксусной кислоты, образующейся в рубце. Витамины и минеральные вещества переходят из крови в молоко без изменений. Из альвеол молоко поступает в молочные протоки, а затем в молочный синус (цистерну), где накапливается между доениями.\n\nРегуляцию молокообразования осуществляют нервная система и железы внутренней секреции при участии коры больших полушарий и гипоталамуса (лактационный центр). Гипоталамус выделяет нейросекреты, стимулирующие выделение гипофизом соматотропина и пролактина — гормонов, непосредственно участвующих в образовании молока; другие железы способствуют образованию предшественников молока.\n\nВ рефлексе молокоотдачи различают две фазы. Первая — нервная: при раздражении рецепторов соска импульсы идут в спинной мозг и к сфинктерам сосков, выделяется цистернальная порция молока. Вторая — нервно-гуморальная: импульсы поступают в гипоталамус, где образуется окситоцин; через заднюю долю гипофиза он выделяется в кровь и вызывает сокращение звёздчатых миоэпителиальных клеток альвеол, выводя альвеолярную порцию молока."}, {"id": 57, "category": "Эндокринная система", "q": "Общая характеристика желёз внутренней секреции", "a": "Железы внутренней секреции (эндокринные) не имеют выводных протоков; образуемые ими вещества — инкреты, содержащие гормоны, — поступают прямо в кровь и лимфу. Этим они отличаются от желёз внешней секреции, выделяющих секрет по протокам. Существуют железы смешанной секреции (поджелудочная, половые), имеющие и внешнюю, и внутреннюю секрецию. Все эндокринные железы — паренхиматозные органы с сильно развитой сетью капилляров.\n\nПо происхождению железы делят на группы: невральную (гипофиз и эпифиз развиваются из нейроглии головного мозга), бранхиогенную (щитовидная, околощитовидные железы и тимус — из глотки и жаберных карманов) и мезодермальную (половые железы и корковое вещество надпочечников).\n\nГормоны — биологически активные вещества, действующие в очень малых количествах. Они разносятся кровью, действуют на органы-мишени, регулируя обмен веществ, рост, развитие, размножение и приспособление организма к среде. Взаимодействие эндокринной системы с нервной обеспечивает единую нейрогормональную регуляцию. Ведущая роль принадлежит гипоталамусу и гипофизу, выделяющему тропные гормоны, управляющие другими железами.\n\nК железам внутренней секреции относят гипофиз, эпифиз (шишковидную железу), щитовидную, околощитовидные железы, надпочечники, вилочковую железу, а также островки поджелудочной железы (инсулин, глюкагон) и половые железы. Деятельность желёз регулируется по принципу обратной связи; нарушения проявляются гиперфункцией (избыток гормона) или гипофункцией (недостаток)."}, {"id": 58, "category": "Размножение и лактация", "q": "Строение вымени коровы", "a": "Вымя коровы — молочная железа, развившаяся из видоизменённых кожных желёз; расположена в паховой области. Покрыто тонкой эластической кожей с нежными волосами, сальными и потовыми железами (на сосках сальных и потовых желёз нет). Вымя имеет основание, прикреплённое к брюшной стенке, тело и соски.\n\nВымя удерживается подвешивающим аппаратом: подвешивающая связка из двух листков эластической ткани делит его на правую и левую половины. Каждая половина состоит из передней и задней долей — всего у коровы 4 доли, обычно с 4 сосками; передние доли менее развиты (их удой составляет 38-45% общего — индекс вымени). Молоко из одной доли в другую не переходит.\n\nВ вымени различают паренхиму, соединительнотканный остов (строму), сосуды и нервы. По строению железа альвеолярно-трубчатая. Молочные альвеолы — пузырьки, стенки которых состоят из железистых клеток, миоэпителия, мембраны и тонкого слоя соединительной ткани с сосудами; в железистых клетках из веществ крови синтезируются составные части молока. Группы альвеол объединяются в дольки. Из альвеол молоко вытесняется в молочные протоки, которые сливаются и впадают в обширную полость — молочный синус (цистерну), делящийся на железистый и сосковый отделы. Из соскового отдела молоко выделяется через единственный сосковый проток (длиной 5-14 мм), закрытый сфинктером соска. Для образования 1 кг молока через вымя проходит 450-500 л крови, поэтому кровоснабжение очень развито."}, {"id": 59, "category": "Выделительная система", "q": "Строение мочеточников и мочевого пузыря", "a": "Мочеточники и мочевой пузырь — мочевыводящие пути, по которым моча из почек выводится из организма.\n\nМочеточник (ureter) — парный трубчатый орган, проводящий мочу из почки в мочевой пузырь; в нём различают брюшную и тазовую части. От ворот почки он направляется каудально по дорсальной брюшной стенке. Слизистая выстлана многослойным переходным эпителием; стенка содержит также мышечную оболочку. Мочеточник косо пронизывает стенку мочевого пузыря и, пройдя некоторое расстояние между его мышечной и слизистой оболочками, открывается возле шейки; при наполнении пузыря его стенка сжимает конец мочеточника, что препятствует обратному току мочи.\n\nМочевой пузырь (vesica urinaria) — непарный грушевидной формы орган-резервуар; находится на дне тазовой полости, при наполнении свешивается в брюшную полость. В нём различают тело, верхушку и шейку, переходящую в мочеиспускательный канал (уретру). Слизистая выстлана многослойным переходным эпителием, способным сильно растягиваться. Мышечная оболочка толстая, состоит из циркулярного и двух продольных слоёв гладких мышц; циркулярный слой в области шейки образует сфинктер. Верхушка и тело покрыты серозной оболочкой, шейка — адвентицией.\n\nМочеиспускание рефлекторно: при наполнении пузыря раздражаются рецепторы стенки, сфинктер расслабляется, мышца пузыря сокращается, моча выводится. У птиц мочевого пузыря нет — моча выводится в клоаку."}, {"id": 60, "category": "Нервная система и анализаторы", "q": "Вегетативная нервная система", "a": "Автономная (вегетативная) нервная система регулирует функции внутренних органов, кровеносную и лимфатическую системы, кроветворные органы, обмен веществ. Она управляет процессами, не подчиняющимися воле животного; её центры контролируются корой головного мозга, поэтому полностью независимой она не является. В отличие от соматической системы, управляющей скелетными мышцами, вегетативная регулирует непроизвольные функции.\n\nОсобенность строения: путь от центра к рабочему органу состоит из двух нейронов и прерывается в вегетативном ганглии (узле). Вегетативная система делится на симпатический и парасимпатический отделы, оказывающие на органы, как правило, противоположное действие.\n\nСимпатический отдел: его центры лежат в грудном и поясничном отделах спинного мозга, узлы располагаются по бокам позвоночника, образуя симпатические стволы. Симпатическая система мобилизует силы организма: учащает и усиливает сердцебиение, повышает давление, расширяет зрачок и бронхи, тормозит работу пищеварительных органов, усиливает распад гликогена. Медиатор в окончаниях — норадреналин (адреналин).\n\nПарасимпатический отдел: его центры лежат в среднем и продолговатом мозге (отсюда идёт блуждающий нерв) и в крестцовом отделе спинного мозга; узлы лежат в стенках органов или рядом. Парасимпатическая система действует в покое: замедляет сердце, понижает давление, суживает зрачок, усиливает секрецию пищеварительных желёз и перистальтику. Медиатор — ацетилхолин. Высший центр регуляции — гипоталамус."}, {"id": 61, "category": "Пищеварение", "q": "Глотка, пищевод, строение и топография", "a": "Глотка и пищевод проводят корм из ротовой полости в желудок.\n\nГлотка (pharynx) — трубчатый орган воронкообразной формы, расположенный позади носовой и ротовой полостей, перед началом пищевода и гортани; это перекрёст дыхательного и пищеварительного путей. В глотке семь отверстий: непарный зев (на границе с ротовой полостью), парные хоаны (из носовой полости), отверстие гортани, пищеводное отверстие и два отверстия слуховых труб. Слизистая свода глотки выстлана мерцательным эпителием, боковые стенки и дно — многослойным плоским эпителием. Мышечная оболочка из поперечнополосатых мышц (сжиматели глотки — ростральный, средний и каудальный констрикторы) при глотании проталкивает пищевой ком в пищевод; при этом хоаны закрываются нёбной занавеской, а вход в гортань — надгортанником. У лошади слуховые трубы образуют воздухоносные мешки.\n\nПищевод (oesophagus) — типичный трубчатый орган, проводящий корм из глотки в желудок сокращениями мышечной оболочки. Подразделяется на шейную, грудную и брюшную части: начинается от задней стенки глотки, идёт по дорсальной поверхности гортани и трахеи, проходит через грудную полость, прободает диафрагму и в брюшной полости впадает в желудок (у жвачных — в преддверие рубца). Слизистая выстлана многослойным плоским эпителием, собрана в продольные складки. Корм продвигается перистальтикой; у жвачных по пищеводу корм движется в обе стороны (при отрыгивании жвачки)."}, {"id": 62, "category": "Нервная система и анализаторы", "q": "Черепно-мозговые нервы (перечисли все 12 пар)", "a": "Черепные (черепно-мозговые) нервы отходят от основания головного мозга; у млекопитающих их двенадцать пар. Они иннервируют (кроме X и XII пар) органы головы. По функции бывают чувствительные, двигательные и смешанные.\n\nI пара — обонятельный нерв (чувствительный; тела нейронов в обонятельном эпителии слизистой носа).\nII пара — зрительный нерв (чувствительный; тела нейронов в сетчатке, у основания мозга образует зрительный перекрест).\nIII пара — глазодвигательный нерв (двигательный; начинается в области ножек большого мозга, заканчивается в прямых и косых мышцах глаза).\nIV пара — блоковой нерв (двигательный; в мышце глаза).\nV пара — тройничный нерв (смешанный; делится на глазничный, верхнечелюстной и нижнечелюстной нервы).\nVI пара — отводящий нерв (двигательный; в мышце глаза).\nVII пара — лицевой нерв (заканчивается в лицевых мышцах и слюнных железах).\nVIII пара — слуховой (преддверно-улитковый) нерв (чувствительный; связан с органом слуха и равновесия, нейроны в спиральном узле улитки).\nIX пара — языкоглоточный нерв (заканчивается во вкусовых луковицах языка и в околоушной слюнной железе).\nX пара — блуждающий нерв (относится к парасимпатическим нервам, иннервирует органы шеи, грудной и брюшной полостей).\nXI пара — добавочный нерв (начинается от продолговатого и спинного мозга, заканчивается в мышцах шеи).\nXII пара — подъязычный нерв (вызывает сокращение языка)."}, {"id": 63, "category": "Размножение и лактация", "q": "Оболочки стенки матки коровы", "a": "Матка (uterus) коровы относится к типу двурогих: в ней различают тело, два рога и шейку. Рога изогнуты наподобие бараньих, на значительном протяжении идут параллельно, затем переходят в короткое тело матки (длина тела всего 2-6 см). К рогам подходят яйцеводы, через шейку (длиной 7-11 см) матка сообщается с влагалищем.\n\nВ стенке матки три оболочки: слизистая, мышечная и серозная.\n\nСлизистая оболочка (эндометрий) выстлана однослойным цилиндрическим эпителием с отдельными мерцательными клетками; его состояние меняется в течение полового цикла. На слизистой у коровы расположены 80-120 карункулов (маточных бугорков) в четыре ряда — они составляют материнскую часть плаценты (у жвачных плацента множественная, котиледонная).\n\nМышечная оболочка (миометрий) состоит из двух слоёв гладкой мышечной ткани с крупными мышечными клетками, между слоями находится сосудистый слой. Сокращение мышечной оболочки играет важную роль при изгнании плода во время отёла.\n\nСерозная оболочка (периметрий) переходит к позвоночному столбу в виде широких маточных связок, на которых подвешена матка; между рогами находится межроговая связка.\n\nТаким образом, стенка матки коровы: эндометрий (с карункулами), миометрий и периметрий. Кровь к матке поступает по трём парным маточным артериям, иннервация — тазовым нервом и ветвями подчревного сплетения."}, {"id": 64, "category": "Обмен веществ", "q": "Обмен углеводов в организме", "a": "Обмен углеводов — процессы поступления, превращения и использования углеводов. Углеводы — основной источник энергии: при окислении 1 г выделяется 17,6 кДж (4,1 ккал). Они поступают с растительным кормом (крахмал, сахара, клетчатка) и всасываются из кишечника главным образом в виде глюкозы.\n\nГлюкоза по воротной вене поступает в печень, где из неё образуется запасной гликоген; при недостатке глюкозы гликоген печени снова распадается до глюкозы. Содержание глюкозы в крови поддерживается на постоянном уровне: у жвачных 40-60 мг%, у животных с однокамерным желудком 80-100 мг%. Снижение ниже нормы называют гипогликемией, повышение — гипергликемией; избыток глюкозы выводится почками (глюкозурия).\n\nРасщепление углеводов с освобождением энергии идёт анаэробно (с образованием молочной кислоты, которая затем окисляется или вновь превращается в гликоген) и аэробно (до CO2 и воды); энергия накапливается в АТФ. У жвачных углеводы (клетчатка, крахмал) сбраживаются в рубце до летучих жирных кислот — уксусной, пропионовой, масляной; из пропионовой образуется глюкоза, а уксусная служит основным источником энергии.\n\nРегуляция осуществляется корой, гипоталамусом, вегетативной нервной системой и гормонами. Инсулин усиливает окисление глюкозы и синтез гликогена; глюкагон и адреналин вызывают распад гликогена до глюкозы; глюкокортикоиды образуют глюкозу из аминокислот и жирных кислот; соматотропин повышает уровень глюкозы, тироксин усиливает её окисление."}, {"id": 65, "category": "Обмен веществ", "q": "Обмен веществ, ассимиляция и диссимиляция", "a": "Обмен веществ (метаболизм) — это совокупность химических и физических процессов поступления, превращения и выведения веществ в организме, обеспечивающих его рост, развитие, движение, размножение и постоянное обновление структур. Это основное свойство живой материи, неразрывно связанное с обменом энергии. Обмен веществ складывается из двух противоположных, но взаимосвязанных процессов — ассимиляции и диссимиляции.\nАссимиляция (анаболизм, пластический обмен) — это усвоение организмом поступивших веществ, их превращение в собственные сложные соединения тела (белки, жиры, углеводы) и построение из них клеточных структур. Ассимиляция идёт с затратой энергии. У растущих, беременных и продуктивных животных процессы ассимиляции преобладают над диссимиляцией; так, у плода ассимиляция явно преобладает, что обеспечивает быстрый рост.\nДиссимиляция (катаболизм, энергетический обмен) — это распад сложных органических веществ на более простые, сопровождающийся освобождением энергии, которая накапливается в виде АТФ и используется для жизнедеятельности, а часть выделяется в виде тепла. Конечные продукты распада — углекислый газ, вода, аммиак, мочевина, мочевая кислота — удаляются из организма.\nЭти процессы протекают одновременно и согласованно. У молодого организма ассимиляция преобладает, обеспечивая рост; у взрослого здорового животного они уравновешены; при голодании, старении, болезнях преобладает диссимиляция, что ведёт к исхуданию. Различают обмен белков, жиров, углеводов, воды и минеральных веществ. Регуляция обмена осуществляется нервной системой и эндокринными железами; интенсивность обмена зависит от вида, возраста, продуктивности, кормления и условий содержания животного."}, {"id": 66, "category": "Обмен веществ", "q": "Обмен белков в организме", "a": "Белки — основной пластический материал организма, из них построены клетки, ферменты, гормоны, антитела, гемоглобин. Белки не могут синтезироваться из жиров и углеводов и должны постоянно поступать с кормом, поэтому обмен белков занимает центральное место в метаболизме.\n\nПоступившие с кормом белки в желудочно-кишечном тракте расщепляются ферментами (пепсином, трипсином, химотрипсином, пептидазами) до аминокислот, которые всасываются в кровь и доставляются в печень и ткани. Из аминокислот клетки синтезируют собственные специфические белки. Аминокислоты делятся на заменимые, которые могут синтезироваться в организме, и незаменимые (лизин, метионин, триптофан, валин и др.), которые должны поступать с кормом. Биологическая ценность белка определяется содержанием незаменимых аминокислот.\n\nУ жвачных белковый обмен имеет особенность: микрофлора рубца синтезирует полноценный микробный белок из небелкового азота (мочевины, аммонийных солей), который затем переваривается в сычуге и кишечнике.\n\nЧасть аминокислот подвергается распаду: путём дезаминирования отщепляется аминогруппа с образованием аммиака, а безазотистый остаток используется как источник энергии или превращается в жиры и углеводы. Токсичный аммиак в печени обезвреживается, превращаясь в мочевину, которая выводится почками. У птиц конечным продуктом является мочевая кислота.\n\nО состоянии белкового обмена судят по азотистому балансу — соотношению поступившего и выведенного азота. Положительный баланс характерен для роста, беременности, откорма; равновесие — для взрослых животных; отрицательный — при голодании и болезнях. Регулируют белковый обмен соматотропный гормон, тироксин, гормоны коры надпочечников и половые гормоны."}, {"id": 67, "category": "Дыхание", "q": "Строение носовой полости", "a": "Носовая полость — начальный отдел дыхательных путей, где воздух согревается, увлажняется, очищается от пыли и микробов, а также воспринимаются обонятельные раздражения. Она расположена в лицевом отделе черепа и спереди открывается ноздрями, а сзади сообщается через хоаны с глоткой.\n\nНосовая полость разделена носовой перегородкой, в основе которой лежит хрящ, на правую и левую половины. Костную основу образуют носовые, резцовые, верхнечелюстные, нёбные кости и решётчатая кость. Снизу полость отделена от ротовой твёрдым нёбом.\n\nВ каждой половине находятся носовые раковины — тонкие, свёрнутые костные пластинки: дорсальная (верхняя) и вентральная (нижняя). Раковины делят полость на носовые ходы: верхний (дорсальный) — обонятельный, ведёт к решётчатому лабиринту; средний — выводит в придаточные пазухи; нижний (вентральный) — дыхательный, ведёт к хоанам; и общий носовой ход. По нижнему ходу удобно вводить носопищеводный зонд.\n\nСлизистая оболочка дыхательной области покрыта мерцательным (реснитчатым) эпителием, богата кровеносными сосудами и слизистыми железами, что обеспечивает согревание и увлажнение воздуха. В дорсальной части находится обонятельная область, выстланная обонятельным эпителием с рецепторными клетками.\n\nС носовой полостью сообщаются придаточные (околоносовые) пазухи — верхнечелюстная, лобная и другие, которые облегчают череп и служат резонаторами. В переднем углу глаза открывается носослёзный канал, отводящий слёзу в носовую полость. У свиньи в области ноздрей имеется хоботная (хрящевая) пластинка — основа рыла. У птиц носовая полость относительно простая, развито обоняние слабо."}, {"id": 68, "category": "Пищеварение", "q": "Желудочный сок, его состав. Пищеварение в желудке", "a": "Желудочный сок вырабатывается железами слизистой оболочки желудка, которые состоят из главных, добавочных и обкладочных клеток: главные клетки образуют ферменты, добавочные — слизь, обкладочные — соляную кислоту. Это бесцветная прозрачная жидкость кислой реакции.\nСостав желудочного сока: вода, органические вещества (ферменты, аминокислоты), минеральные соли и соляная кислота. Ферменты: пепсин — главный фермент, выделяется в виде неактивного пепсиногена и активируется соляной кислотой, расщепляет белки до полипептидов; гастриксин расщепляет белки при слабокислой реакции сока; химозин (сычужный фермент, реннин) в слабокислой среде в присутствии ионов кальция превращает казеиноген молока в казеин (створаживание молока), особенно у молодняка в молочный период; липаза расщепляет жиры на глицерин и жирные кислоты, легче — эмульгированный жир молока.\nСоляная кислота создаёт кислую среду, активирует пепсиноген, вызывает набухание белков, обладает бактерицидным действием (в желудке погибают бактерии). Слизь предохраняет стенку желудка от самопереваривания.\nПищеварение в желудке: корм, пропитываясь желудочным соком, переваривается; белки расщепляются пепсином, частично перевариваются жиры. Перистальтика перемешивает содержимое и порциями переводит его в двенадцатиперстную кишку. Секреция желудочного сока идёт в две фазы — рефлекторную и гуморальную (нейрохимическую). Рефлекторная (сложнорефлекторная) фаза слагается из безусловных и условных рефлексов: корм раздражает рецепторы рта, возбуждение по блуждающему нерву идёт к железам желудка; И.П. Павлов назвал условнорефлекторный сок «запальным». Гуморальная фаза вызывается гормоном гастрином, образующимся в пилорической части под влиянием соляной кислоты и продуктов переваривания. У жвачных истинное желудочное пищеварение протекает в сычуге."}, {"id": 69, "category": "Обмен веществ", "q": "Обмен жиров в организме", "a": "Жиры (липиды) выполняют в организме энергетическую, пластическую, защитную и теплоизоляционную функции. При окислении 1 г жира выделяется около 9,3 ккал энергии — вдвое больше, чем при распаде углеводов или белков. Жиры входят в состав клеточных мембран, служат растворителем жирорастворимых витаминов А, D, E, K, откладываются в запас в подкожной клетчатке, сальнике, брыжейке.\n\nПоступающие с кормом жиры в тонком кишечнике под действием желчи эмульгируются, а затем расщепляются липазой поджелудочного и кишечного сока на глицерин и жирные кислоты. Глицерин и низкомолекулярные жирные кислоты всасываются непосредственно в кровь, а высокомолекулярные жирные кислоты соединяются с желчными кислотами и всасываются в лимфу. В стенке кишечника из продуктов расщепления синтезируется специфический для данного вида жир, который поступает в лимфу, затем в кровь и откладывается в жировых депо.\n\nВ организме жиры могут синтезироваться из углеводов и из белков, что используется при откорме животных. При недостатке углеводов жиры расходуются как источник энергии: они окисляются до углекислого газа и воды. При неполном окислении жиров (при сахарном диабете, кетозе у высокопродуктивных коров) образуются кетоновые тела — ацетон, ацетоуксусная и бета-оксимасляная кислоты, что ведёт к ацидозу.\n\nК липидам относятся также фосфатиды (лецитин) и стерины (холестерин), участвующие в построении мембран и образовании гормонов и желчных кислот. Регуляция жирового обмена осуществляется нервной системой, а также гормонами — адреналином, соматотропином, тироксином, инсулином и половыми гормонами. Видовой особенностью является различный состав и температура плавления жира у разных животных."}, {"id": 70, "category": "Витамины и минералы", "q": "Физиологическое значение макроэлементов", "a": "Макроэлементы — это минеральные вещества, содержащиеся в организме в относительно больших количествах (десятые доли процента и более). К ним относят кальций, фосфор, натрий, калий, хлор, магний, серу. Они выполняют пластическую функцию, поддерживают осмотическое давление, кислотно-щелочное равновесие, участвуют в возбуждении, мышечном сокращении и работе ферментов.\n\nКальций — основной строительный материал костной ткани и зубов (около 99 % находится в скелете), необходим для свёртывания крови, мышечного сокращения, передачи нервных импульсов, проницаемости мембран. Недостаток вызывает рахит у молодняка и остеомаляцию у взрослых, послеродовый парез у коров.\n\nФосфор входит в состав костей вместе с кальцием, а также в нуклеиновые кислоты, фосфолипиды, АТФ, ферменты. Он играет ключевую роль в энергетическом обмене. Важно соблюдать кальциево-фосфорное соотношение (около 1,5–2:1) и обеспеченность витамином D.\n\nНатрий и хлор поддерживают осмотическое давление крови и тканей, кислотно-щелочное равновесие; натрий участвует в возбуждении, хлор входит в состав соляной кислоты желудочного сока. Их вводят с поваренной солью.\n\nКалий — главный внутриклеточный катион, необходим для работы сердца, нервно-мышечной возбудимости, поддержания осмотического давления внутри клеток.\n\nМагний участвует в работе ферментов, в углеводном и фосфорном обмене, влияет на нервно-мышечную возбудимость; недостаток вызывает пастбищную тетанию.\n\nСера входит в состав серосодержащих аминокислот (метионин, цистин), витаминов, гормонов, шерсти, копытного рога. Особенно нужна жвачным для микробного синтеза белка в рубце. Недостаток или избыток макроэлементов нарушает обмен и снижает продуктивность."}, {"id": 71, "category": "Пищеварение", "q": "Пищеварение в тонком отделе кишечника", "a": "Тонкий отдел кишечника включает двенадцатиперстную, тощую и подвздошную кишки. Это главный участок пищеварения, где завершается расщепление питательных веществ до конечных продуктов и происходит их всасывание. В двенадцатиперстную кишку открываются протоки поджелудочной железы и желчного пузыря (печени).\n\nНа химус действуют три пищеварительных сока: поджелудочный, кишечный и желчь. Поджелудочный сок имеет щелочную реакцию и содержит ферменты на все виды питательных веществ: трипсин и химотрипсин (расщепляют белки до аминокислот, активируются энтерокиназой), амилазу и мальтазу (расщепляют углеводы до глюкозы), липазу (расщепляет жиры до глицерина и жирных кислот), нуклеазы.\n\nЖелчь, вырабатываемая печенью, не содержит ферментов, но эмульгирует жиры, активирует липазу, способствует всасыванию жирных кислот и жирорастворимых витаминов, усиливает перистальтику, обладает бактерицидным действием и нейтрализует кислый химус.\n\nКишечный сок содержит ферменты: пептидазы, мальтазу, лактазу, сахаразу, липазу, энтерокиназу. Различают полостное пищеварение (в просвете кишки) и пристеночное (мембранное) пищеварение на поверхности микроворсинок эпителия, где завершается расщепление и происходит всасывание.\n\nПродукты переваривания всасываются через слизистую оболочку, имеющую огромную поверхность благодаря складкам, ворсинкам и микроворсинкам. Аминокислоты и глюкоза всасываются в кровь, продукты расщепления жиров — преимущественно в лимфу.\n\nДвижения кишечника — перистальтические, маятникообразные и ритмическая сегментация — перемешивают химус и продвигают его дальше. Регуляция осуществляется нервной системой (блуждающий нерв) и гормонами (секретин, холецистокинин). У жвачных в тонком кишечнике переваривается микробный белок, поступивший из преджелудков."}, {"id": 72, "category": "Пищеварение", "q": "Строение ротовой полости", "a": "Ротовая полость — начальный отдел пищеварительного аппарата, где корм захватывается, измельчается, смачивается слюной и формируется в пищевой ком; здесь же воспринимаются вкусовые и осязательные раздражения. Её подразделяют на преддверие рта (пространство между губами, щеками и зубами) и собственно ротовую полость (от зубов до нёбной занавески).\nСлизистая оболочка образует дёсны, твёрдое и мягкое нёбо, покрывает язык, губы, щёки. Губы — кожно-мышечные складки с круговой мышцей; у крупного рогатого скота верхняя губа малоподвижна и имеет носогубное зеркало. Щёки образуют боковые стенки. На дёснах у жвачных на месте отсутствующих верхних резцов слизистая образует роговую зубную пластинку. Твёрдое нёбо несёт поперечные валики с роговыми сосочками, направленными к глотке, и переходит в мягкое нёбо (нёбную занавеску), отделяющее ротовую полость от глотки.\nЯзык — мышечный подвижный орган; им захватывается и перемещается корм, формируется ком; он является органом вкуса. На нём различают верхушку, тело и корень. Слизистая содержит нитевидные сосочки (механические) и вкусовые — грибовидные и валиковидные; у крупного рогатого скота листовидные сосочки отсутствуют, нитевидные ороговевшие, язык шероховатый, с подушкой языка.\nЗубы расположены в альвеолах челюстей; различают резцы, клыки и коренные (премоляры и моляры). В ротовую полость открываются протоки трёх пар слюнных желёз — околоушной, нижнечелюстной и подъязычной. Слизистая покрыта многослойным плоским эпителием."}, {"id": 73, "category": "Нервная система и анализаторы", "q": "Периферическая нервная система", "a": "Периферическая нервная система — это часть нервной системы, расположенная вне головного и спинного мозга. Она связывает центральную нервную систему со всеми органами и тканями, проводя нервные импульсы от рецепторов в центр (афферентные, чувствительные пути) и от центра к рабочим органам (эфферентные, двигательные пути). К периферической нервной системе относят нервы, нервные узлы (ганглии) и нервные окончания.\n\nНервы — это пучки нервных волокон, покрытые соединительнотканными оболочками. По функции различают чувствительные (афферентные), двигательные (эфферентные) и смешанные нервы. Большинство нервов смешанные.\n\nВыделяют черепно-мозговые (черепные) нервы — 12 пар, отходящих от головного мозга: обонятельный, зрительный, глазодвигательный, блоковый, тройничный, отводящий, лицевой, преддверно-улитковый (слуховой), языкоглоточный, блуждающий, добавочный, подъязычный. Они иннервируют органы головы, а блуждающий нерв — органы шеи, грудной и брюшной полостей.\n\nСпинномозговые нервы отходят от спинного мозга парами по числу сегментов (шейные, грудные, поясничные, крестцовые, хвостовые). Каждый нерв образуется слиянием переднего (двигательного) и заднего (чувствительного) корешков, поэтому является смешанным. Выйдя из позвоночного канала, нервы образуют сплетения — шейное, плечевое, поясничное, крестцовое, от которых отходят нервы к конечностям и туловищу.\n\nК периферической нервной системе относят и периферические отделы вегетативной (автономной) нервной системы — симпатические и парасимпатические ганглии и волокна, иннервирующие внутренние органы, сосуды и железы. Нервные окончания бывают чувствительными (рецепторы) и двигательными (эффекторы, например нервно-мышечные синапсы)."}, {"id": 74, "category": "Пищеварение", "q": "Пищеварение в толстом отделе кишечника", "a": "Толстый отдел кишечника включает слепую, ободочную и прямую кишки. В нём собственные пищеварительные железы не выделяют ферментов (вырабатывается лишь слизь), поэтому переваривание здесь происходит за счёт ферментов, поступивших из тонкого кишечника, и за счёт деятельности микрофлоры.\n\nГлавная роль толстого кишечника — микробное сбраживание клетчатки. Многочисленные бактерии расщепляют клетчатку (целлюлозу) до летучих жирных кислот (уксусной, пропионовой, масляной), которые всасываются и используются как источник энергии. Микрофлора также синтезирует витамины группы B и витамин K, частично сбраживает углеводы и подвергает белки гниению с образованием токсичных продуктов (индола, скатола, фенола, сероводорода), которые обезвреживаются в печени.\n\nВажнейшая функция толстого кишечника — всасывание воды и минеральных солей, благодаря чему происходит сгущение содержимого и формирование каловых масс. Здесь же всасываются продукты микробного брожения.\n\nЗначение толстого кишечника особенно велико у травоядных с однокамерным желудком — лошади и свиньи. У лошади сильно развиты слепая и большая ободочная кишки, которые выполняют роль «бродильного чана», подобно рубцу жвачных, обеспечивая переваривание большого количества клетчатки. У жвачных основное переваривание клетчатки идёт в рубце, поэтому роль толстого кишечника меньше.\n\nДвижения толстого кишечника — перистальтические и антиперистальтические — обеспечивают перемешивание содержимого, контакт с микрофлорой и продвижение к прямой кишке. Сформированный кал накапливается в прямой кишке и выводится через анус при акте дефекации, который осуществляется рефлекторно при участии центра дефекации в крестцовом отделе спинного мозга и регулируется корой больших полушарий."}, {"id": 75, "category": "Обмен веществ", "q": "Обмен воды в организме", "a": "Вода — важнейшая составная часть организма, в теле животного её содержится 60–70 %. Она является средой, в которой протекают все биохимические реакции, растворителем питательных веществ и продуктов обмена, участвует в транспорте веществ, в теплорегуляции, поддерживает форму клеток и осмотическое давление. Без воды животное погибает быстрее, чем без корма.\n\nРазличают воду внутриклеточную (около двух третей) и внеклеточную (плазма крови, лимфа, тканевая жидкость). Вода поступает в организм тремя путями: с питьём (основной источник), с кормом и образуется в самом организме при окислении питательных веществ (метаболическая, эндогенная вода — около 10 %). При окислении жиров образуется наибольшее количество эндогенной воды.\n\nВыводится вода из организма через почки с мочой (основной путь), через кожу с потом, через лёгкие с выдыхаемым воздухом и через кишечник с калом. У лактирующих животных значительная часть воды выделяется с молоком.\n\nВ нормальных условиях существует водный баланс — равенство поступившей и выделенной воды. Регуляция водного обмена тесно связана с обменом минеральных солей, особенно натрия и хлора, и осуществляется нервной системой и гормонами. Антидиуретический гормон (вазопрессин) задней доли гипофиза усиливает обратное всасывание воды в почках и уменьшает диурез; альдостерон коры надпочечников задерживает натрий и воду. Чувство жажды регулируется питьевым центром гипоталамуса.\n\nПотребность в воде зависит от вида, продуктивности, температуры среды, характера корма. Особенно много воды требуется лактирующим коровам. Обезвоживание (дегидратация) ведёт к сгущению крови, нарушению обмена и тяжёлым расстройствам."}, {"id": 76, "category": "Дыхание", "q": "Жизненная ёмкость лёгких", "a": "Жизненная ёмкость лёгких (ЖЕЛ) — это наибольшее количество воздуха, которое животное может выдохнуть после самого глубокого вдоха. Она характеризует функциональные возможности дыхательного аппарата и изменяется в зависимости от пола, возраста, породы, продуктивности и тренировки животного.\nЖизненная ёмкость лёгких складывается из трёх объёмов. Дыхательный воздух — объём, который животное вдыхает и выдыхает при спокойном дыхании (у овец и крупных собак в среднем 0,3-0,5 л, у лошадей 5-6 л). Дополнительный воздух — объём, который можно вдохнуть дополнительно после спокойного вдоха при максимальном усилии (у овец и собак 0,5-1 л, у лошади 10-12 л). Резервный воздух — объём, который можно выдохнуть дополнительно после спокойного выдоха; он приблизительно равен дополнительному.\nТаким образом, ЖЕЛ = дыхательный + дополнительный + резервный воздух. У собак она равна 1,5-3 л, у лошадей — 26-30 л, у крупного рогатого скота — 30-35 л.\nПосле максимального выдоха в лёгких остаётся остаточный воздух (у лошади около 12 л); он не входит в жизненную ёмкость, входит в лёгкие при первом вдохе новорождённого и не удаляется даже после смерти (кусочек лёгкого дышавшего животного плавает в воде). Жизненная ёмкость и остаточный воздух составляют общую ёмкость лёгких.\nЖизненная ёмкость больше у животных с интенсивным обменом и хорошей тренированностью (рабочие и спортивные лошади) и снижается при заболеваниях лёгких и сердца. Определение ЖЕЛ позволяет судить о состоянии дыхательной системы и работоспособности животного."}, {"id": 77, "category": "Нервная система и анализаторы", "q": "Строение большого мозга", "a": "Большой мозг (конечный мозг) — наиболее развитый отдел головного мозга, состоящий из двух полушарий — правого и левого, разделённых продольной щелью и соединённых внутри мозолистым телом (спайкой из нервных волокон). Большой мозг управляет всей высшей нервной деятельностью, является органом мышления, памяти, ощущений и произвольных движений.\n\nКаждое полушарие снаружи покрыто слоем серого вещества — корой больших полушарий (плащом), толщиной несколько миллиметров. Кора образует многочисленные складки — извилины, разделённые бороздами, что значительно увеличивает её поверхность. Чем более развит мозг, тем больше извилин. Под корой находится белое вещество, состоящее из нервных волокон (проводящих путей), связывающих различные участки мозга между собой и с нижележащими отделами.\n\nКора состоит из нервных клеток (нейронов), расположенных слоями (обычно шесть слоёв). В коре выделяют функциональные зоны (центры): двигательную, кожно-мышечной чувствительности, зрительную (в затылочной области), слуховую (в височной области), обонятельную, вкусовую. Эти зоны являются высшими отделами анализаторов.\n\nВнутри полушарий, в основании, находятся скопления серого вещества — подкорковые (базальные) ядра, участвующие в регуляции сложных двигательных актов и тонуса мышц. Внутри полушарий расположены полости — боковые желудочки, заполненные спинномозговой жидкостью.\n\nПолушария разделены на доли: лобную, теменную, височную и затылочную. К конечному мозгу относится также обонятельный мозг с обонятельными луковицами, расположенный на основании полушарий. У сельскохозяйственных животных кора развита хорошо, но в меньшей степени, чем у человека; наиболее развита у собаки."}, {"id": 78, "category": "Кровь и кровообращение", "q": "Движение крови по кровеносным сосудам", "a": "Кровь движется по замкнутой системе сосудов — артериям, капиллярам и венам — непрерывно благодаря работе сердца, которое создаёт разность давлений. Из левого желудочка кровь под высоким давлением выбрасывается в аорту, далее по артериям и капиллярам большого круга, затем по венам возвращается в правое предсердие. Это движение называется кровообращением.\n\nГлавной причиной движения крови является разность давления между началом артериальной системы (высокое давление) и концом венозной (низкое, близкое к нулю). Кровь течёт из области высокого давления в область низкого.\n\nКровяное давление наибольшее в аорте и крупных артериях, постепенно снижается в артериолах и капиллярах и наименьшее в венах. Различают максимальное (систолическое) давление — при сокращении желудочков, и минимальное (диастолическое) — при расслаблении. По мере удаления от сердца давление падает из-за трения крови о стенки сосудов.\n\nСкорость движения крови наибольшая в аорте, наименьшая в капиллярах (что важно для обмена веществ между кровью и тканями), и снова возрастает в венах. Это связано с площадью суммарного просвета сосудов: в капиллярах она наибольшая.\n\nПульс — это ритмичные колебания стенок артерий, вызванные выбросом крови сердцем; его прощупывают на доступных артериях (у лошади — на наружной челюстной артерии, у крупного рогатого скота — на хвостовой или лицевой артерии).\n\nДвижению крови по венам, где давление низкое, способствуют: сокращения скелетных мышц, клапаны вен, препятствующие обратному току, присасывающее действие грудной полости при вдохе и присасывающее действие сердца. Регуляция кровообращения осуществляется нервной системой (сосудодвигательным центром продолговатого мозга) и гуморально (адреналин, ацетилхолин)."}, {"id": 79, "category": "Кровь и кровообращение", "q": "Эритроциты, их строение, значение, функция", "a": "Эритроциты — красные кровяные клетки, наиболее многочисленные форменные элементы крови. У большинства млекопитающих это безъядерные клетки в форме двояковогнутого диска, что увеличивает их поверхность и облегчает диффузию кислорода (у верблюдов и лам эритроциты овальные). У птиц, рыб, амфибий и рептилий эритроциты овальные и содержат ядро.\nЭритроцит покрыт белково-липоидной оболочкой, внутри имеет сетчатое строение, ячейки которого заполнены гемоглобином, придающим клеткам и крови красный цвет. Гемоглобин богат железом; соединяясь с кислородом, он образует непрочное соединение — оксигемоглобин. Эритроциты эластичны, легко меняют форму и проходят по узким капиллярам.\nКоличество эритроцитов у животных разных видов неодинаково: у крупного рогатого скота около 5-7,5, у овец 7,5-12,5, у свиней 6-7,5 млн в 1 мм3 (по СИ — соответственно 5-7,5·10^12, 7,5-12,5·10^12, 6-7,5·10^12 в 1 л). У молодых, высокопродуктивных и тренированных животных эритроцитов больше.\nФункции эритроцитов: переносят кислород от лёгких к тканям, участвуют в транспорте углекислого газа от тканей к лёгким, на своей поверхности транспортируют аминокислоты, гормоны, витамины и продукты обмена, участвуют в поддержании кислотно-щелочного равновесия (гемоглобиновая буферная система). Образуются в красном костном мозге, живут 100-120 дней, затем разрушаются. Разрушение оболочки с выходом гемоглобина называется гемолизом. При недостатке эритроцитов или гемоглобина развивается анемия."}, {"id": 80, "category": "Нервная система и анализаторы", "q": "Нервные центры и их свойства", "a": "Нервный центр — это совокупность нервных клеток (нейронов), расположенных в определённом отделе центральной нервной системы и совместно регулирующих какую-либо функцию организма или осуществляющих определённый рефлекс. Например, дыхательный центр находится в продолговатом мозге, сосудодвигательный — там же, центры мочеиспускания и дефекации — в крестцовом отделе спинного мозга.\n\nНервные центры обладают рядом особых физиологических свойств, отличающих их от проведения возбуждения по нервному волокну.\n\nОдностороннее проведение возбуждения — в центрах через синапсы возбуждение проводится только в одном направлении: с чувствительного нейрона на двигательный.\n\nЗамедленное проведение (синаптическая задержка) — в центре возбуждение проходит медленнее из-за передачи через синапсы с участием медиатора.\n\nСуммация возбуждений — слабые подпороговые раздражения, поступающие одно за другим или одновременно, суммируются и вызывают ответную реакцию.\n\nТрансформация ритма — центр может изменять частоту поступающих импульсов.\n\nПоследействие — возбуждение в центре продолжается некоторое время после прекращения раздражения.\n\nУтомляемость — нервные центры утомляются быстрее, чем нервные волокна, главным образом из-за истощения медиатора в синапсах.\n\nВысокая чувствительность к недостатку кислорода, ядам и фармакологическим веществам.\n\nТонус — нервные центры постоянно находятся в состоянии некоторого возбуждения (тонуса), посылая импульсы к органам.\n\nПластичность — способность изменять и перестраивать свою деятельность.\n\nВажным свойством является способность к иррадиации (распространению) возбуждения и к торможению. Взаимодействие процессов возбуждения и торможения в нервных центрах обеспечивает согласованную, координированную деятельность всего организма."}, {"id": 81, "category": "Нервная система и анализаторы", "q": "Строение и функции зрительного анализатора", "a": "Зрительный анализатор обеспечивает восприятие света, формы, цвета, размеров и движения предметов, что помогает животному ориентироваться в окружающей среде. Как и всякий анализатор, он состоит из трёх частей: периферической (рецепторной) — глаза с сетчаткой, проводниковой — зрительного нерва и проводящих путей, центральной — зрительной зоны коры в затылочной доле больших полушарий.\n\nПериферическая часть — орган зрения, глаз, состоит из глазного яблока и вспомогательных органов (веки, слёзный аппарат, мышцы глаза). Глазное яблоко имеет три оболочки. Наружная — фиброзная: сзади непрозрачная белочная оболочка (склера), спереди прозрачная роговица. Средняя — сосудистая, богатая сосудами и пигментом; в передней части она образует радужную оболочку с отверстием — зрачком, регулирующим поступление света, и ресничное (цилиарное) тело, удерживающее хрусталик. Внутренняя оболочка — сетчатка, содержащая светочувствительные рецепторы: палочки (восприятие света, сумеречное зрение) и колбочки (цветное зрение, острота зрения).\n\nВнутри глаза находятся светопреломляющие среды: роговица, водянистая влага передней и задней камер, хрусталик (двояковыпуклая линза, способная менять кривизну — аккомодация) и стекловидное тело. Они преломляют лучи и фокусируют изображение на сетчатке.\n\nСвет, попадая на сетчатку, вызывает в палочках и колбочках фотохимические реакции (распад зрительного пигмента родопсина), возникает нервное возбуждение, которое по зрительному нерву передаётся в подкорковые центры и в зрительную зону коры, где формируется зрительный образ.\n\nУ разных видов есть особенности: у травоядных глаза расположены по бокам головы, обеспечивая широкое поле зрения; у хищников — больше прямо, что даёт объёмное зрение. У ночных животных много палочек, в сосудистой оболочке имеется отражательное зеркальце (тапетум)."}, {"id": 82, "category": "Выделительная система", "q": "Моча, её состав, образование мочи", "a": "Моча — конечный продукт деятельности почек, с которым из организма выводятся конечные продукты обмена (главным образом азотистого), избыток воды, солей и чужеродные вещества; образование мочи поддерживает постоянство внутренней среды.\nСостав мочи: на 93-95 % она состоит из воды, остальное — растворённые вещества. Составные части те же, что и в плазме крови, за исключением белков, жиров и глюкозы, которых в нормальной моче нет. Из органических веществ преобладает мочевина (главный продукт белкового обмена), а также мочевая кислота, креатинин; из минеральных — хлориды, сульфаты, фосфаты натрия, калия, кальция. Реакция мочи у травоядных щелочная, у плотоядных кислая, у свиней бывает и кислой; плотность 1,018-1,040. У лошади моча мутная из-за кристаллов углекислого кальция.\nОбразование мочи в нефронах происходит в две фазы. Первая — фильтрационная: в мальпигиевом клубочке под давлением крови (70-90 мм рт. ст.) из плазмы фильтруется первичная моча — плазма без белков; из каждых 10 л крови отфильтровывается около 1 л первичной мочи. Вторая — реабсорбционная (обратное всасывание): при прохождении первичной мочи по извитым канальцам в кровь всасываются вода, глюкоза, аминокислоты, многие соли, а мочевина, мочевая кислота, креатинин, сульфаты обратно не всасываются. В канальцах идут также секреция и синтез (например, гиппуровой кислоты у травоядных). Образуется концентрированная конечная моча.\nКонечная моча по собирательным трубкам поступает в почечные лоханки, по мочеточникам — в мочевой пузырь и выводится наружу. Регуляция осуществляется нервной системой и гормонами (антидиуретический гормон, альдостерон)."}, {"id": 83, "category": "Эндокринная система", "q": "Надпочечники, их строение и функция", "a": "Надпочечники — парные железы внутренней секреции, расположенные у переднего (краниального) конца каждой почки. Они состоят из двух различных по происхождению, строению и функции частей: наружного коркового вещества (коры) и внутреннего мозгового вещества. По сути это две разные железы, объединённые в одном органе.\n\nКорковое вещество вырабатывает группу гормонов — кортикостероидов, образующихся из холестерина. Различают три зоны коры. Клубочковая зона выделяет минералокортикоиды, главный из которых альдостерон; он регулирует минеральный обмен, задерживает в организме натрий и воду, выводит калий, поддерживает осмотическое давление и кровяное давление. Пучковая зона выделяет глюкокортикоиды (кортизол, кортикостерон); они регулируют углеводный, белковый и жировой обмен, способствуют образованию глюкозы из белков, обладают противовоспалительным и противоаллергическим действием, повышают устойчивость организма к стрессу. Сетчатая зона выделяет небольшое количество половых гормонов (андрогенов и эстрогенов).\n\nГормоны коры жизненно необходимы: при удалении или недостаточности коры надпочечников животное погибает. Деятельность коры регулируется адренокортикотропным гормоном (АКТГ) передней доли гипофиза.\n\nМозговое вещество вырабатывает гормоны адреналин и норадреналин (катехоламины). Адреналин усиливает и учащает работу сердца, суживает сосуды и повышает кровяное давление, расширяет зрачок и бронхи, тормозит работу пищеварительного тракта, повышает содержание сахара в крови за счёт распада гликогена. Эти гормоны мобилизуют силы организма при опасности, мышечной работе, страхе, боли (гормоны «тревоги»), действуют подобно симпатической нервной системе.\n\nТаким образом, надпочечники играют важнейшую роль в обмене веществ, приспособлении организма к неблагоприятным условиям и поддержании постоянства внутренней среды."}, {"id": 84, "category": "Эндокринная система", "q": "Гипофиз: топография, строение, функции, гормоны", "a": "Гипофиз (нижний мозговой придаток) — небольшая железа внутренней секреции у основания мозга, расположенная в турецком седле клиновидной кости; с помощью ножки он соединён с гипоталамусом, под контролем которого работает (нейросекреты гипоталамуса — либерины и статины — регулируют его деятельность). Гипофиз управляет работой других желёз.\nГипофиз делят на три доли: переднюю (аденогипофиз), среднюю и заднюю (нейрогипофиз).\nПередняя доля выделяет шесть гормонов. Соматотропин (СТГ, гормон роста) регулирует рост и развитие, усиливает синтез белка и деление клеток; его избыток у молодняка вызывает гигантизм, а у взрослых — акромегалию (неравномерное разрастание костей), недостаток — карликовость. Тиротропин (ТТГ) стимулирует щитовидную железу. Кортикотропин (АКТГ) вызывает рост коры надпочечников и стимулирует пучковую и сетчатую зоны. Фоллитропин (ФСГ) у самцов стимулирует сперматогенез, у самок — рост фолликулов. Лютропин (ЛГ) обеспечивает овуляцию, образование жёлтого тела, выработку половых гормонов. Пролактин (ЛТГ, лактотропный гормон) сохраняет жёлтое тело и стимулирует образование молока. Фоллитропин и лютропин называют гонадотропными гормонами.\nСредняя доля выделяет меланотропин, действующий на пигментные клетки кожи (у рыб, амфибий, рептилий); у млекопитающих его роль неясна.\nЗадняя доля (нейрогипофиз) гормонов не образует, а накапливает и выделяет окситоцин и вазопрессин, образующиеся в ядрах гипоталамуса. Окситоцин вызывает сокращение мышц матки и выведение молока. Вазопрессин (антидиуретический гормон) усиливает обратное всасывание воды в почках, уменьшает диурез и повышает кровяное давление."}, {"id": 85, "category": "Высшая нервная деятельность", "q": "Учение И.П. Павлова об условных и безусловных рефлексах", "a": "И.П. Павлов создал учение о высшей нервной деятельности, в основе которого лежит понятие рефлекса — ответной реакции организма на раздражение, осуществляемой при участии нервной системы. Он разделил все рефлексы на безусловные и условные.\n\nБезусловные рефлексы — это врождённые, постоянные, наследственно закреплённые реакции, одинаковые у всех животных данного вида. Они осуществляются через низшие отделы центральной нервной системы (спинной мозг, ствол мозга) и проявляются в ответ на определённый (адекватный) раздражитель. Примеры: пищевой, оборонительный, половой, ориентировочный рефлексы, сосательный рефлекс у новорождённых. Безусловные рефлексы обеспечивают приспособление к постоянным условиям среды. Сложные безусловные рефлексы называют инстинктами.\n\nУсловные рефлексы — это приобретённые в течение жизни, индивидуальные, непостоянные реакции, вырабатывающиеся на основе безусловных. Они осуществляются при обязательном участии коры больших полушарий и обеспечивают тонкое приспособление к меняющимся условиям среды.\n\nДля выработки условного рефлекса необходимы условия: совпадение во времени действия условного (безразличного) раздражителя с безусловным, причём условный сигнал должен предшествовать безусловному; неоднократное сочетание; нормальное деятельное состояние коры. При этом в коре образуется временная нервная связь между двумя центрами. Например, если зажигание лампочки многократно сочетать с кормлением, лампочка станет условным сигналом и сама начнёт вызывать слюноотделение.\n\nУсловные рефлексы могут угасать (тормозиться), если условный сигнал не подкреплять безусловным. Павлов выделил внешнее (безусловное) и внутреннее (условное) торможение. Учение об условных рефлексах позволило научно объяснить механизмы дрессировки, выработки навыков, формирования стереотипов поведения и широко применяется в животноводстве при выработке у животных полезных рефлексов на кормление, доение, распорядок дня."}, {"id": 86, "category": "Размножение и лактация", "q": "Беременность, её продолжительность у с/х животных разных видов. Роды", "a": "Беременность — состояние самки от оплодотворения яйцеклетки до рождения плода, в течение которого в матке развивается плод. С наступлением беременности прекращаются половые циклы, сохраняется жёлтое тело, вырабатывающее прогестерон, увеличивается матка, развивается молочная железа, повышается потребность в питательных веществах. Через плаценту плод получает питательные вещества и кислород и отдаёт продукты обмена.\nПродолжительность беременности у разных видов неодинакова (в среднем): у коров около 285 суток (колебания 240-310), у лошадей около 340 суток (307-412), у овец и коз около 150 суток (140-160), у свиней около 114 суток (110-140), у собак около 62 суток (59-65), у кроликов около 30 суток (28-33), у кошек около 58 суток. У ослов около 380, у верблюдов около 365 суток.\nРоды — прекращение беременности и рождение живого плода — сложный рефлекторный физиологический процесс, наступающий по окончании эмбрионального развития. Организм самки подготавливается постепенно: за 3-4 недели до родов у коров и кобыл отекает вымя, перед родами начинается секреция молозива; связочный аппарат родовых путей расслабляется под влиянием релаксина. К концу беременности снижается выделение прогестерона, понижающего возбудимость мышц матки, и возрастает поступление эстрогенов; повышается чувствительность матки к окситоцину и ацетилхолину. Под влиянием окситоцина и ацетилхолина и усиленных движений плода раздражаются интерорецепторы матки, её мышцы ритмически сокращаются — происходят роды. У кобыл и свиней роды быстрые (плацента легко отделяется), у жвачных более продолжительные. После родов из половых путей удаляются плодные оболочки — послед."}, {"id": 87, "category": "Размножение и лактация", "q": "Характеристика органов размножения самок", "a": "Органы размножения самок (половой аппарат) обеспечивают образование яйцеклеток, оплодотворение, развитие плода, роды и выкармливание потомства. Они подразделяются на половые железы (яичники), половые пути (яйцепроводы, матка, влагалище) и наружные половые органы (мочеполовое преддверие, половые губы, клитор).\n\nЯичники — парные половые железы, выполняющие двойную функцию. Во-первых, в них образуются и созревают женские половые клетки — яйцеклетки; созревание происходит в пузырьках — фолликулах, а выход яйцеклетки из лопнувшего фолликула называется овуляцией. Во-вторых, яичники являются железами внутренней секреции: фолликулы вырабатывают эстрогены (половые гормоны, вызывающие течку и половое возбуждение), а на месте лопнувшего фолликула образуется жёлтое тело, выделяющее прогестерон (гормон, сохраняющий беременность).\n\nЯйцепроводы (маточные трубы, яйцеводы) — тонкие извитые трубки, по которым яйцеклетка движется от яичника к матке. В яйцепроводе обычно происходит оплодотворение. Расширенная воронкообразная часть (бахромка) захватывает вышедшую яйцеклетку.\n\nМатка — мышечный полый орган, в котором развивается плод. У сельскохозяйственных животных матка двурогая, состоит из двух рогов, тела и шейки. Рога матки наиболее развиты, в них располагается плод (у многоплодных животных — несколько плодов). Шейка матки имеет толстые стенки и узкий канал, который закрывается во время беременности. Стенка матки состоит из слизистой (эндометрия), мышечной (миометрия) и серозной оболочек.\n\nВлагалище — мышечно-эластичный орган, служащий для совокупления и как часть родовых путей. Преддверие влагалища является общим для половых и мочевых путей. Наружные половые органы — половые губы и клитор. У свиньи и крольчихи рога матки длинные (многоплодие), у коровы и кобылы выражены карункулы или особенности слизистой."}, {"id": 88, "category": "Дыхание", "q": "Регуляция дыхания", "a": "Дыхание регулируется так, чтобы обеспечивать организм кислородом и удалять углекислый газ соответственно меняющимся потребностям. Регуляция осуществляется рефлекторным (нервным) и гуморальным путями.\nГлавную роль играет дыхательный центр, расположенный в продолговатом мозге; он двусторонний и состоит из центра вдоха и центра выдоха. В верхней части варолиева моста имеется центр пневмотаксиса, контролирующий дыхательный центр; в регуляции участвует и кора больших полушарий. Дыхательный центр обладает автоматизмом — в нём автоматически возникают ритмические импульсы возбуждения, что связывают с накоплением углекислоты.\nРефлекторная регуляция: при вдохе лёгкие растягиваются, раздражаются их рецепторы, импульсы по блуждающему нерву поступают в дыхательный центр, тормозят центр вдоха и возбуждают центр выдоха — наступает выдох; когда лёгкие спадаются, рецепторы перестают возбуждаться, и центр вдоха вновь возбуждается. Так вдох рефлекторно вызывает выдох, а выдох — вдох. В регуляции участвуют также рецепторы межрёберных мышц и диафрагмы.\nГуморальная регуляция — важнейший фактор. Специфическим возбудителем дыхательного центра является углекислота (угольная кислота) крови: при накоплении CO2, уменьшении кислорода и повышении молочной кислоты дыхание учащается и углубляется. Это доказано опытом с перекрёстным кровообращением. Хеморецепторы дуги аорты и каротидного синуса рефлекторно усиливают дыхание при таких сдвигах. Кора больших полушарий обеспечивает тончайшее приспособление дыхания (выработку условных дыхательных рефлексов). К защитным рефлексам относятся чиханье и кашель."}, {"id": 89, "category": "Высшая нервная деятельность", "q": "Учение И.П. Павлова о типах высшей нервной деятельности", "a": "И.П. Павлов установил, что животные различаются по особенностям высшей нервной деятельности, и создал учение о типах высшей нервной деятельности. В основу классификации он положил три основных свойства нервных процессов — возбуждения и торможения.\n\nПервое свойство — сила нервных процессов, то есть способность нервных клеток выдерживать сильные и длительные раздражения, не переходя в торможение. По силе различают сильные и слабые типы.\n\nВторое свойство — уравновешенность процессов возбуждения и торможения, то есть их соотношение по силе. Бывают уравновешенные (когда возбуждение и торможение равны) и неуравновешенные (когда возбуждение преобладает над торможением).\n\nТретье свойство — подвижность нервных процессов, то есть способность быстро сменять возбуждение торможением и наоборот. По подвижности различают подвижные и инертные типы.\n\nНа основании сочетания этих свойств Павлов выделил четыре основных типа высшей нервной деятельности, совпадающих с темпераментами, описанными ещё Гиппократом.\n\nСильный, уравновешенный, подвижный тип (сангвиник) — животные живые, подвижные, легко приспосабливаются, быстро вырабатывают и переделывают условные рефлексы.\n\nСильный, уравновешенный, инертный (спокойный) тип (флегматик) — животные спокойные, малоподвижные, условные рефлексы вырабатываются прочно, но медленно переделываются.\n\nСильный, неуравновешенный (безудержный) тип (холерик) — животные возбудимые, агрессивные, у них преобладает возбуждение, торможение развито слабо.\n\nСлабый тип (меланхолик) — животные трусливые, легко тормозимые, плохо переносят сильные раздражители, условные рефлексы вырабатываются с трудом.\n\nЗнание типов высшей нервной деятельности важно в животноводстве: оно помогает правильно подбирать животных для разных целей, учитывать их поведение при дрессировке, использовании и отборе на продуктивность."}, {"id": 90, "category": "Обмен веществ", "q": "Теплорегуляция", "a": "Теплорегуляция — совокупность физиологических процессов, обеспечивающих постоянство температуры тела у теплокровных (млекопитающих и птиц) независимо от температуры среды; у рыб, земноводных и пресмыкающихся (холоднокровных) температура меняется вместе со средой. Для каждого вида характерна определённая температура тела (в прямой кишке): у коровы 37,5-39,0 C, у лошади 37,5-38,5 C, у овцы и козы 38,5-40,0 C, у свиньи 38,0-40,0 C, у собаки 37,5-39,0 C, у курицы 40,5-42,0 C, у утки 41,0-43,0 C. Температура зависит от возраста, пола, времени суток: у молодых выше, у самцов выше, чем у самок, ночью ниже. Гибель наступает при снижении ниже 24 C и подъёме выше 44 C.\nТеплорегуляция складывается из теплообразования (химическая) и теплоотдачи (физическая). Химическая теплорегуляция — выработка тепла при окислении питательных веществ; около трёх четвертей тепла приходится на мышцы, много тепла даёт печень, пищеварительный тракт, пережёвывание жвачки. При охлаждении теплообразование усиливается.\nФизическая теплорегуляция — отдача тепла, в основном через поверхность тела: теплопроводностью, излучением инфракрасных лучей и испарением пота (у животных с развитыми потовыми железами — лошади, крупного рогатого скота, овцы). У собак потовые железы развиты слабо, теплоотдача идёт испарением слюны с поверхности языка и через дыхательные пути. При перегревании сосуды кожи расширяются, усиливаются потоотделение и дыхание; при охлаждении сосуды суживаются, волосы поднимаются.\nРегуляция осуществляется корой, центрами теплорегуляции гипоталамуса (теплообразования и теплоотдачи) и гормонами (тиротропин и тироксин, адреналин), усиливающими теплообразование."}, {"id": 91, "category": "Кожный покров", "q": "Волосяной покров, физиология линьки", "a": "Волосяной покров (шёрстный покров) — это совокупность волос, покрывающих кожу млекопитающих. Он защищает тело от механических повреждений, холода и перегревания, участвует в осязании и придаёт животному характерный вид. Волос — это нитевидное роговое производное эпидермиса кожи.\n\nВ волосе различают стержень, выступающий над кожей, и корень, лежащий в коже в волосяном мешке (фолликуле). Нижняя расширенная часть корня — волосяная луковица, в основании которой находится волосяной сосочек с кровеносными сосудами, питающими растущий волос. За счёт деления клеток луковицы волос растёт. В стержне волоса различают сердцевину, корковый слой и наружный чешуйчатый слой (кутикулу). Цвет волоса зависит от пигмента (меланина).\n\nК волосяному фолликулу прикрепляется мышца — подниматель волоса, при сокращении которой волос приподнимается. В волосяной мешок открываются протоки сальных желёз, секрет которых смазывает волос и кожу.\n\nРазличают волосы покровные (остевые), пуховые (подшёрсток), длинные (защитные — грива, хвост, щётки) и осязательные (синуозные, чувствительные — вибриссы на морде).\n\nЛинька — это периодическая смена волосяного покрова. Старые волосы выпадают и заменяются новыми. Различают сезонную линьку (весной и осенью), при которой меняется густота и характер шерсти в связи с подготовкой к лету или зиме, и постоянную (перманентную) линьку, идущую круглый год. У диких и многих сельскохозяйственных животных весной выпадает зимний густой подшёрсток, осенью отрастает более густая шерсть.\n\nФизиология линьки регулируется нервной системой и гормонами (щитовидной железы, половых желёз) и зависит от длины светового дня, температуры, кормления и состояния животного. У птиц аналогом является смена перьевого покрова."}, {"id": 92, "category": "Эндокринная система", "q": "Гормоны, их свойства и механизм действия", "a": "Гормоны — это биологически активные вещества, вырабатываемые железами внутренней секреции (эндокринными железами) и выделяемые непосредственно в кровь. Они осуществляют гуморальную регуляцию деятельности организма, влияя на обмен веществ, рост, развитие, размножение и согласованную работу органов.\n\nГормоны обладают рядом характерных свойств.\nВысокая биологическая активность — они действуют в очень малых количествах (ничтожных дозах).\nСпецифичность действия — каждый гормон влияет на определённые органы или процессы; орган, на который действует гормон, называют органом-мишенью.\nДистантность действия — гормоны действуют вдали от места своего образования, разносясь кровью по всему телу.\nОтносительная недолговечность — гормоны быстро разрушаются (главным образом в печени) и выводятся, поэтому для постоянного действия должны вырабатываться непрерывно.\nОтсутствие видовой специфичности у многих гормонов — гормон одного вида животных может действовать у другого вида, что используется в практике (введение гормональных препаратов).\n\nПо химической природе гормоны делятся на белковые и пептидные (инсулин, гормоны гипофиза), производные аминокислот (тироксин, адреналин) и стероидные (гормоны коры надпочечников и половых желёз).\n\nМеханизм действия гормонов различен. Белковые и пептидные гормоны, а также адреналин не проникают внутрь клетки, а связываются с рецепторами на поверхности клеточной мембраны и через посредника (циклический АМФ) активируют внутриклеточные ферменты. Стероидные гормоны и тироксин проникают внутрь клетки, действуют на генетический аппарат (ДНК) ядра и регулируют синтез белков-ферментов.\n\nДеятельность эндокринных желёз и выработка гормонов регулируются нервной системой и самим гипофизом по принципу обратной связи, что обеспечивает единство нервной и гуморальной регуляции организма."}, {"id": 93, "category": "Пищеварение", "q": "Слюна и слюноотделение", "a": "Слюна — пищеварительный сок, вырабатываемый слюнными железами. Имеются три пары крупных желёз: околоушные (серозные, дают прозрачную жидкую слюну), подъязычные и нижнечелюстные (смешанные, дают вязкую слюну с муцином), а также мелкие железы слизистой рта.\nВ состав слюны входят вода (99-99,4 %), органические вещества (белок муцин и др.) и неорганические (хлориды, сульфаты, карбонаты натрия, калия, кальция). Слюна — вязкая жидкость слабощелочной реакции; pH слюны жвачных 8,1-8,3, лошади и свиньи — 7,2-7,5.\nЗначение слюны: смачивает корм, облегчая жевание; муцином склеивает и обволакивает пищевой ком, облегчая проглатывание; своими щелочными основаниями нейтрализует кислоты желудка; обладает бактерицидным действием (содержит лизоцим и ингибан); растворяет вещества корма, что необходимо для восприятия вкуса.\nВ слюне свиньи имеются ферменты альфа-амилаза (птиалин), расщепляющая крахмал до декстринов и мальтозы, и мальтаза, превращающая мальтозу в глюкозу. В слюне лошади, жвачных и плотоядных этих ферментов нет. Особенно велика роль слюны у жвачных: за сутки у крупного рогатого скота выделяется 90-190 л, у овец 6-10 л; щелочная слюна поддерживает нужную среду в рубце и нейтрализует кислоты брожения. У свиньи за сутки выделяется до 15 л слюны, у собак слюна выделяется только при приёме корма.\nСлюноотделение регулируется центром в продолговатом мозге. Безусловное отделение возникает при попадании корма в рот, условное — при виде, запахе корма и сигналах, связанных с кормлением (классический пример условного рефлекса, изученного И.П. Павловым)."}, {"id": 94, "category": "Пищеварение", "q": "Пищеварение в рубце", "a": "Рубец — самый крупный отдел сложного многокамерного желудка жвачных (наряду с сеткой и книжкой он относится к преджелудкам, не имеющим собственных пищеварительных желёз). Несмотря на отсутствие желёз, в рубце происходит важнейший этап переваривания корма за счёт жизнедеятельности обильной микрофлоры и микрофауны.\n\nВ рубце обитают многочисленные микроорганизмы — бактерии, инфузории (простейшие) и грибки, которые находятся в симбиозе с организмом животного. Они выделяют ферменты, недостающие самому животному, прежде всего фермент целлюлазу.\n\nГлавный процесс в рубце — переваривание клетчатки (целлюлозы). Микрофлора расщепляет клетчатку до простых сахаров, которые сбраживаются с образованием летучих жирных кислот — уксусной, пропионовой и масляной. Эти кислоты всасываются через стенку рубца в кровь и служат главным источником энергии для жвачных, а также используются для синтеза молочного жира.\n\nВ рубце происходит и превращение белков: микробы расщепляют белки корма и одновременно синтезируют собственный полноценный микробный белок, в том числе из небелкового азота — мочевины и аммонийных солей (это позволяет подкармливать жвачных карбамидом). Микробный белок затем переваривается в сычуге и кишечнике. Кроме того, микрофлора синтезирует витамины группы B и витамин K.\n\nПри брожении образуются газы (углекислый газ, метан), которые удаляются при отрыжке; нарушение их удаления вызывает тимпанию (вздутие рубца).\n\nВажную роль играет жвачка (руминация): отрыгивание порций корма из рубца в ротовую полость, его дополнительное пережёвывание, смачивание щелочной слюной и повторное проглатывание. Это улучшает измельчение корма. Стенка преджелудков совершает ритмичные сокращения, перемешивающие содержимое. Благодаря рубцовому пищеварению жвачные хорошо используют грубые растительные корма."}, {"id": 95, "category": "Нервная система и анализаторы", "q": "Обонятельный анализатор", "a": "Обонятельный анализатор обеспечивает восприятие запахов — летучих пахучих веществ, находящихся в воздухе. Обоняние имеет огромное значение в жизни сельскохозяйственных животных: с его помощью они отыскивают и оценивают корм, распознают особей своего вида, определяют состояние половой охоты, узнают потомство (мать находит детёныша по запаху), ориентируются в среде и избегают опасности. У многих животных обоняние развито очень сильно, особенно у собаки, у которой оно является ведущим чувством.\n\nКак и всякий анализатор, обонятельный состоит из трёх частей: периферической (рецепторной), проводниковой и центральной.\n\nПериферическая часть представлена обонятельными рецепторами, расположенными в обонятельной области слизистой оболочки носовой полости — в её верхней (дорсальной) части, в области решётчатой кости. Здесь слизистая выстлана обонятельным эпителием, содержащим обонятельные (рецепторные) клетки. Эти клетки имеют чувствительные волоски (реснички), обращённые в полость носа; пахучие вещества, растворяясь в слизи, раздражают эти волоски, и возникает нервное возбуждение.\n\nПроводниковая часть — обонятельный нерв (первая пара черепно-мозговых нервов). От рецепторных клеток отходят нервные волокна, которые проходят через отверстия решётчатой пластинки и вступают в обонятельные луковицы, расположенные на основании мозга. Далее по обонятельным трактам возбуждение передаётся к подкорковым центрам.\n\nЦентральная часть — корковый центр обоняния, расположенный в обонятельном мозге, в области основания и медиальной части полушарий, где формируется ощущение запаха и его распознавание.\n\nЖивотные с сильно развитым обонянием называются макросматиками (собака, лошадь, крупный рогатый скот). У человека и птиц обоняние развито слабее. Обоняние тесно связано со вкусом в восприятии и выборе корма."}, {"id": 96, "category": "Опорно-двигательный аппарат", "q": "Скелет головы", "a": "Скелет головы (череп) — это сложный костный остов головы, служащий вместилищем и защитой для головного мозга и важнейших органов чувств (зрения, слуха, обоняния), а также для начальных отделов пищеварительной и дыхательной систем. Кости черепа в большинстве соединяются неподвижно — швами, и только нижняя челюсть и подъязычная кость подвижны.\n\nЧереп делят на два отдела: мозговой (черепной) и лицевой (висцеральный).\n\nМозговой отдел образует черепную полость, в которой помещается головной мозг. Он состоит из непарных и парных костей. К непарным относят
