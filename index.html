<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Экзамены — карточки для подготовки</title>
<style>
  :root{
    --panel:#ffffff; --ink:#2c2a26; --muted:#8a8377; --line:#e6e0d4;
    --hint:#c79a3a; --hint-bg:rgba(199,154,58,.12); --hint-ink:#6b5a2e;
    --ans:#7c9473; --ans-bg:rgba(124,148,115,.12);
    --shadow:0 8px 24px rgba(60,50,30,.10);
    --bg:#f4f1ea; --accent:#7c9473; --accent-soft:rgba(124,148,115,.12);
  }
  /* per-section theming: only background + accent + line tint change */
  body.sec-anatomy{ --bg:#f1f0e6; --accent:#7c9473; --accent-soft:rgba(124,148,115,.13); --line:#e3ddd0; }
  body.sec-pharma { --bg:#f8f1dd; --accent:#bf8f2b; --accent-soft:rgba(191,143,43,.15); --line:#ece2c8; }
  body.sec-mdk    { --bg:#e9eff6; --accent:#5c7fa6; --accent-soft:rgba(92,127,166,.15); --line:#d8e1ec; }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;transition:background .35s}
  header.top{padding:18px 18px 6px;text-align:center}
  h1{margin:0 0 4px;font-size:21px;font-weight:700;letter-spacing:-.2px}
  .sub{color:var(--muted);font-size:13px;margin:0}
  .wrap{max-width:780px;margin:0 auto;padding:0 16px 80px}
  /* section tabs */
  .tabs{display:flex;gap:8px;max-width:780px;margin:14px auto 0;padding:0 16px}
  .tabs button{flex:1;padding:11px 8px;border:1px solid var(--line);border-radius:13px 13px 0 0;
    background:var(--panel);color:var(--muted);font-size:14px;font-weight:650;cursor:pointer;
    border-bottom:none;transition:.15s;opacity:.7}
  .tabs button .n{display:block;font-size:11px;font-weight:500;opacity:.8;margin-top:2px}
  .tabs button.active{color:#fff;background:var(--accent);border-color:var(--accent);opacity:1;
    box-shadow:var(--shadow)}
  .tabs button:not(.active):hover{opacity:1;border-color:var(--accent)}
  .bar{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin:14px 0 6px}
  .bar > i{display:block;height:100%;width:0;background:var(--accent);transition:width .3s}
  .stats{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:14px}
  .reset{background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;text-decoration:underline}
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;position:sticky;top:0;z-index:5;
    background:var(--bg);padding:10px 0;border-bottom:1px solid var(--line);transition:background .35s}
  .controls input,.controls select{flex:1;min-width:130px;padding:10px 12px;border:1px solid var(--line);
    border-radius:12px;background:var(--panel);font-size:14px;color:var(--ink);outline:none}
  .controls input:focus,.controls select:focus{border-color:var(--accent)}
  .toggle{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:0 12px;cursor:pointer;user-select:none}
  .toggle input{accent-color:var(--accent);width:16px;height:16px}
  .bulk{display:flex;gap:8px;margin:0 0 16px}
  .bulk button{flex:1;padding:9px;border:1px solid var(--line);border-radius:12px;background:var(--panel);
    color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:.12s}
  .bulk button:hover{border-color:var(--accent);color:var(--ink)}
  .count{font-size:12px;color:var(--muted);margin:0 0 12px}
  .card{background:var(--panel);border-radius:18px;box-shadow:var(--shadow);border:1px solid var(--line);
    padding:18px 20px;margin-bottom:14px;scroll-margin-top:80px}
  .card.known{opacity:.6}
  .chead{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .num{font-size:12px;font-weight:700;color:var(--muted)}
  .badge{font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--accent);
    background:var(--accent-soft);padding:3px 9px;border-radius:99px}
  .learned{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);
    cursor:pointer;user-select:none}
  .learned input{accent-color:var(--accent);width:15px;height:15px}
  .q{font-size:18px;font-weight:650;margin:0 0 12px}
  details.spoiler{border:1px solid var(--line);border-radius:13px;margin-top:8px;overflow:hidden}
  details.spoiler summary{list-style:none;cursor:pointer;padding:11px 14px;font-size:14px;font-weight:600;
    display:flex;align-items:center;gap:8px;user-select:none}
  details.spoiler summary::-webkit-details-marker{display:none}
  details.spoiler summary::after{content:"показать";margin-left:auto;font-size:11px;font-weight:500;
    color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
  details.spoiler[open] summary::after{content:"скрыть"}
  details.hint summary{color:var(--hint);background:var(--hint-bg)}
  details.ans summary{color:var(--ans);background:var(--ans-bg)}
  details.spoiler .body{padding:4px 16px 16px;font-size:15px;white-space:pre-wrap}
  details.hint .body{color:var(--hint-ink)}
  .empty{text-align:center;color:var(--muted);padding:60px 0}
  footer{text-align:center;font-size:12px;color:var(--muted);padding:10px 0 30px}
  @media(max-width:520px){.q{font-size:16.5px}.card{padding:16px 16px}details.spoiler .body{font-size:14.5px}
    .tabs button{font-size:13px}}
</style>
</head>
<body class="sec-anatomy">
<div class="tabs" id="tabs"></div>
<header class="top">
  <h1 id="title"></h1>
  <p class="sub" id="sub"></p>
</header>
<div class="wrap">
  <div class="bar"><i id="prog"></i></div>
  <div class="stats">
    <span><span id="known">0</span> выучено · <span id="left">0</span> осталось</span>
    <button class="reset" id="reset">сбросить прогресс раздела</button>
  </div>

  <div class="controls">
    <input id="search" type="search" placeholder="Поиск по вопросам…" autocomplete="off">
    <select id="cat"></select>
    <label class="toggle"><input type="checkbox" id="onlyLeft"> только невыученные</label>
  </div>

  <div class="bulk">
    <button id="openHints">Открыть все подсказки</button>
    <button id="openAns">Открыть все ответы</button>
    <button id="closeAll">Свернуть всё</button>
  </div>

  <p class="count" id="count"></p>
  <div id="list"></div>
</div>
<footer>Сначала загляни в подсказку, попробуй вспомнить — потом проверь себя ответом.</footer>

<script>
const DATA = {"anatomy": [{"num": "1", "category": "Общие понятия", "q": "Значение и задачи изучения дисциплины «Анатомия и физиология животных»", "hint": "• Что изучает анатомия и каков её главный метод (греч. anatome — ?)\n• Чем физиология отличается от анатомии — функции vs строение\n• Связь строения и функции, роль наследственности и среды\n• Какие науки входят в морфологию (4 шт)?\n• Для каких дисциплин это теоретическая основа?\n• Перечисли задачи: топография, регуляция, видовые особенности", "a": "Анатомия — наука о строении и развитии органов, систем и организма; метод — рассечение (греч. anatome). Физиология — наука о функциях органов и организма во взаимосвязи со средой.\n\nСтроение обусловлено функцией, функция зависит от строения; обе определяются наследственностью и средой.\n\nМорфология объединяет: анатомию, гистологию, эмбриологию, цитологию. Анатомия бывает нормальная и патологическая.\n\nЗначение: теоретическая основа для зоогигиены, кормления, разведения, ветеринарии, акушерства, хирургии; понимание пищеварения, дыхания, размножения, обмена веществ.\n\nЗадачи:\n• строение тела здорового животного и топография органов;\n• физиологические процессы, их нервная и гуморальная регуляция;\n• видовые и возрастные особенности (КРС, лошадь, свинья, овца, птица);\n• оценка состояния животного и повышение продуктивности."}, {"num": "2", "category": "Цитология и гистология", "q": "Строение животной клетки", "hint": "• Из чего состоит клетка — две главные части?\n• Размеры (0,5–150 мкм), виды межклеточных контактов (3)\n• Строение плазмалеммы — слои, фагоцитоз\n• Перечисли органеллы общего значения и их функции (ЭПС, рибосомы, митохондрии/АТФ, Гольджи, клеточный центр, лизосомы)\n• Что в ядре: оболочка, хроматин, ядрышки, кариоплазма\n• Из чего формируются хромосомы?", "a": "Клетка — элементарная структурная и функциональная единица, состоит из цитоплазмы и ядра. Форма разнообразна, размер 0,5–150 мкм. Контакты: щелевые, плотные, десмосомы.\n\nЦитоплазма: плазмалемма, органоиды, включения, гиалоплазма.\n\nПлазмалемма — 2 слоя фосфолипидов + белки; избирательно регулирует проникновение; твёрдые частицы — фагоцитоз.\n\nОрганеллы общего значения:\n• ЭПС — шероховатая (рибосомы, синтез белка) и гладкая (жиры, углеводы);\n• рибосомы — синтез белка;\n• митохондрии — дыхание, образование АТФ (на кристах);\n• комплекс Гольджи — синтез углеводов, накопление жиров/белков, секрет;\n• клеточный центр (2 центриоли) — деление;\n• лизосомы — пузырьки с переваривающими ферментами.\n\nСпециальные органоиды: миофибриллы, реснички. Включения — запасы/продукты.\n\nЯдро — аппарат наследственности и регуляции деления: оболочка с порами, хроматин (ДНК + гистон), ядрышки (синтез РНК, рибосомы), кариоплазма. Из хроматина при делении формируются хромосомы."}, {"num": "3", "category": "Цитология и гистология", "q": "Эпителиальная ткань, морфологические и функциональные особенности", "hint": "• Из скольких зародышевых листков развивается, где располагается?\n• Ключевые признаки: пласт, мембрана, нет сосудов, полярность, регенерация\n• Деление по слоям: однослойный (одно-/многорядный) и многослойный\n• Вспомни формы: мезотелий, эндотелий, кубический, каёмчатый, мерцательный\n• Многослойный: где орого­вевающий / неороговевающий / переходный?\n• 5 функций + железистый эпителий (типы желёз)", "a": "Эпителий развивается из всех трёх зародышевых листков, лежит на границе организма и среды, образует пласт клеток на мембране; сосудов не содержит. Клетки полярны (апикальный и базальный концы), высоко регенерируют.\n\nПо числу слоёв: однослойный (однорядный/многорядный) и многослойный.\n\nОднослойный:\n• плоский серозных оболочек — мезотелий; в сосудах — эндотелий;\n• кубический (протоки желёз, канальцы почек);\n• призматический каёмчатый со щёточной каёмкой (кишечник);\n• многорядный мерцательный с ресничками (верхние дыхательные пути).\n\nМногослойный:\n• плоский ороговевающий — эпидермис, ротовая полость, глотка, пищевод, преджелудки жвачных;\n• плоский неороговевающий — роговица, пищевод, влагалище;\n• переходный — мочевыводящие пути.\n\nФункции: покровная (защитная), секреторная, выделительная, всасывающая, газообмен. Железистый эпителий образует железы: с протоками — секреты, без протоков — инкреты в кровь. По строению железы: трубчатые, альвеолярные, трубчато-альвеолярные."}, {"num": "4", "category": "Цитология и гистология", "q": "Соединительная ткань, морфологические и функциональные особенности", "hint": "• Второе название (опорно-…), из чего развивается (мезенхима/мезодерма)?\n• Главный признак — что между клетками? Полярность есть?\n• Перечисли виды: мезенхима, ретикулярная, кровь/лимфа, рыхлая, жировая, плотная (2), хрящевая, костная\n• Клетки рыхлой ткани и что они дают (фибробласты, тучные/гепарин, плазматические/гамма-глобулин…)\n• Состав межклеточного вещества\n• 4 функции", "a": "Соединительные (опорно-трофические) ткани формируют остов тела, выполняют трофическую и защитную функции; развиваются из мезенхимы (мезодерма). Главный признак — межклеточное вещество; полярности нет.\n\nВиды:\n• мезенхима — только у зародыша, исходная;\n• ретикулярная — основа красного костного мозга, селезёнки, лимфоузлов (кроветворение);\n• кровь и лимфа — жидкие (кровь 7–8% массы тела);\n• рыхлая — остов органов; клетки: фибробласты, гистиоциты (защита), плазматические (гамма-глобулин), тучные (гепарин), жировые, пигментные;\n• жировая (у свиней — шпик);\n• плотная оформленная — сухожилия, связки (параллельные коллагеновые пучки);\n• плотная неоформленная — капсулы, сетчатый слой дермы;\n• хрящевая — гиалиновый, эластический, волокнистый;\n• костная — скелет.\n\nМежклеточное вещество: коллагеновые и эластические волокна, аморфное вещество, тканевый сок.\n\nФункции: опорная, трофическая, защитная (фагоцитоз, антитела), запасающая (жировая ткань)."}, {"num": "5", "category": "Опорно-двигательный аппарат", "q": "Скелет туловища, деление его на отделы (укажи число позвонков по отделам у КРС, лошади, свиньи)", "hint": "• Из чего состоит скелет туловища, что образует грудную клетку?\n• 5 отделов позвоночника; шейных у всех — сколько? (атлант, аксис с зубом)\n• Числа по видам: КРС 7-13-6-5-?, свинья 7-?-7-4-?, лошадь 7-18-6-5-?\n• Число пар рёбер = числу чего? Стернальные (истинные) vs астернальные (ложные)\n• Сколько стернальных у КРС / свиньи?\n• Части грудины (3) и что образует грудную клетку", "a": "Скелет туловища: позвоночный столб, рёбра, грудина; грудные позвонки + рёбра + грудина = грудная клетка.\n\nПозвоночник — 5 отделов: шейный, грудной, поясничный, крестцовый, хвостовой. Шейных у всех 7 (1-й — атлант, 2-й — осевой/аксис с зубом).\n\nЧисло позвонков (шейн.-грудн.-поясн.-крестц.-хвост.):\n• КРС: 7–13–6–5–18-20;\n• свинья: 7–14-15–7–4–20-23;\n• лошадь: 7–18–6–5–17-19.\n\nЧисло пар рёбер = числу грудных позвонков (КРС 13, свинья 14-15, лошадь 18). Рёбра стернальные (истинные) — хрящи соединяются с грудиной; астернальные (ложные) — хрящи крепятся к предыдущим, образуя рёберную дугу. У КРС из 13 пар 8 стернальных; у свиньи первые 7 пар стернальные.\n\nГрудина — непарная: рукоятка, тело, мечевидный отросток с мечевидным хрящом. Грудную клетку образуют грудные позвонки (дорсально), рёбра (с боков), грудина (снизу); защищает сердце и лёгкие."}, {"num": "6", "category": "Опорно-двигательный аппарат", "q": "Строение и развитие кости как органа", "hint": "• Функции скелета (остов, рычаги, депо солей, кроветворение); число костей КРС/лошадь/свинья\n• Что различают в кости; чем покрыты суставные поверхности?\n• Надкостница — 2 слоя (наружный сосуды, внутренний остеобласты)\n• Костное вещество (компактное/губчатое), мозг красный vs жёлтый\n• Прочность: оссеин (30-33%) + соли (67-70%); молодые vs старые\n• 3 стадии остеогенеза; рост в длину/толщину; когда заканчивается у КРС/лошади", "a": "Кость — орган ОДА. Скелет: остов, рычаги для мышц, депо минеральных солей и красного костного мозга (кроветворение). Костей: КРС 207-209, лошадь 207-214, свинья 281-288.\n\nВ кости различают: надкостницу, костное вещество, сосуды и нервы. Суставные поверхности — без надкостницы, покрыты гиалиновым хрящом.\n\nНадкостница (периост): наружный грубоволокнистый слой с сосудами; внутренний — остеобласты (сращение переломов, рост в толщину).\n\nКостное вещество: компактное (снаружи) и губчатое (внутри, с мозгом). Костный мозг: красный (ретикулярная ткань, кроветворение) и жёлтый (жировая ткань).\n\nПрочность: оссеин (30-33%) + минеральные соли (67-70%). У молодых органики больше (эластичность), с возрастом солей больше (хрупкость).\n\nОстеогенез — 3 стадии: соединительнотканная, хрящевая, костная (остеобласты строят, остеокласты разрушают). Рост в длину — эпифизарный хрящ, в толщину — надкостница. Заканчивается у КРС к 4, у лошади к 5 годам."}, {"num": "7", "category": "Опорно-двигательный аппарат", "q": "Характеристика скелета свободных грудных конечностей", "hint": "• Чем соединяется с туловищем (пояс — лопатка), звенья: плечо→предплечье→запястье→пясть→пальцы\n• Плечо: головка с буграми, блок с мыщелками\n• Предплечье: лучевая (основная) + локтевая — видовые различия КРС/лошадь/свинья\n• Запястье: число костей и рядов по видам\n• Пясть: КРС III+IV срастаются, лошадь — только III (грифельные), свинья 4\n• Пальцы: путовая-венечная-копытцевая; сезамовидные; число пальцев по видам", "a": "Грудная конечность соединяется с туловищем поясом (лопаткой): плечо, предплечье, запястье, пясть, пальцы.\n\nПлечо — плечевая кость: вверху головка с буграми (малый медиальный, большой латеральный), внизу блок с мыщелками.\n\nПредплечье — лучевая (основная, несёт нагрузку) и локтевая, два межкостных пространства. КРС: локтевая развита, срастается с лучевой; лошадь: локтевая только в проксимальной части; свинья: обе короткие, соединены хрящом.\n\nЗапястье — короткие кости в 2 ряда: КРС 6 (4+2), лошадь 7 (4+3), свинья 8 (4+4).\n\nПясть: КРС III+IV срастаются (рудимент 5-й); лошадь — развита III, II и IV грифельные; свинья 4 (III, IV опорные).\n\nПальцы: путовая, венечная, копытцевая (у лошади копытная) кости; за путовым суставом 2 сезамовидные, у копытцевой — сезамовидная 3-й фаланги. КРС 2 основных (III, IV) + 2 недоразвитых; лошадь 1 (III); свинья 4 (III, IV опорные)."}, {"num": "8", "category": "Опорно-двигательный аппарат", "q": "Характеристика скелета свободных тазовых конечностей", "hint": "• Чем соединяется (тазовый пояс), звенья: бедро→голень→заплюсна→плюсна→пальцы\n• Бедро: головка, шейка, вертелы (у КРС третий!), мыщелки; коленная чашка\n• Голень: большеберцовая (основная) + малоберцовая — различия КРС (лодыжковая кость)/лошадь/свинья\n• Заплюсна: число костей и рядов; что за сустав? (скакательный)\n• Плюсна vs пясть — длиннее\n• Пальцы как на грудной, но длиннее; число по видам", "a": "Тазовая конечность соединяется тазовым поясом: бедро, голень, заплюсна, плюсна, пальцы.\n\nБедро — бедренная кость: головка (в суставную впадину таза), шейка, большой и малый вертелы, у КРС ещё третий вертел; дистально мыщелки и блок для коленной чашки. Коленная чашка — сезамовидная кость.\n\nГолень — большеберцовая (основная, с гребнем) и малоберцовая. КРС: малоберцовая редуцирована, её дистальный конец — лодыжковая кость (только у жвачных); лошадь: развита слабо; свинья: развита хорошо.\n\nЗаплюсна — короткие кости: КРС 5 в 3 ряда (верхний — таранная и пяточная с бугром, средний — центральная, нижний — две); скакательный сустав. Свинья 7 костей; лошадь — обособлена 3-я заплюсневая.\n\nПлюсна — как пясть, но кости длиннее (лошадь 1 развитая, КРС 2 сросшиеся).\n\nПальцы: путовая, венечная, копытцевая, фаланги длиннее и тоньше. Лошадь — 1, КРС и свинья — парнокопытные."}, {"num": "9", "category": "Опорно-двигательный аппарат", "q": "Строение и расположение спинного мозга и его оболочек", "hint": "• Латынь (medulla spinalis), где лежит, где начинается и заканчивается (мозговой конус, конский хвост)\n• Утолщения — какие два?\n• На разрезе: серое вещество («бабочка»), рога — дорсальные/вентральные/боковые; белое вещество — канатики\n• Корешки: дорсальный (чувствит., ганглий) + вентральный (двигат.) = смешанный нерв\n• 3 оболочки и пространства между ними\n• 2 функции", "a": "Спинной мозг (medulla spinalis) — отдел ЦНС, белая трубка в позвоночном канале. Начинается от продолговатого мозга у краниального края 1-го шейного позвонка, заканчивается в крестцовом канале мозговым конусом; конус + волокна + концевая нить = конский хвост. Отделы по позвоночнику; есть шейное и пояснично-крестцовое утолщения.\n\nНа разрезе центрально — серое вещество («летящая бабочка») вокруг центрального канала со спинномозговой жидкостью. Рога: дорсальные (чувствительные), вентральные (двигательные), боковые (двигательные и сосудистые), есть вставочные нейроны. Белое вещество по периферии образует канатики — дорсальные, вентральные, боковые (проводящие пути).\n\nКорешки: дорсальный (чувствительный, со спинномозговым ганглием) и вентральный (двигательный); сливаясь — смешанный спинномозговой нерв.\n\nОболочки (3): твёрдая (эпидуральное пространство), паутинная (субдуральное пространство со спинномозговой жидкостью), мягкая (покрывает мозг). Функции: рефлекторная и проводниковая."}, {"num": "10", "category": "Опорно-двигательный аппарат", "q": "Строение тазового пояса", "hint": "• Что образует, из чего состоит таз (2 безымянные кости + крестец + хвостовые позвонки)\n• 3 кости, срастающиеся в суставной впадине — назови их и положение\n• Подвздошная: крыло (маклок, крестцовый бугор, гребень) + тело\n• Седалищная (запертое отверстие, бугор, дуга), лонная\n• Вертлужная впадина → тазобедренный сустав; тазовое сращение\n• Что проходит через таз; акушерское значение (самки)", "a": "Тазовый пояс образует основу тазовой полости. Таз — две безымянные (тазовые) кости + крестцовая кость + первые хвостовые позвонки.\n\nКаждая тазовая кость из трёх костей, срастающихся в суставной впадине:\n• подвздошная — впереди впадины: крыло (наружная ягодичная и внутренняя тазовая поверхности) и тело; на крыле крестцовый бугор, маклок (латеральный бугор), подвздошный гребень; соединяется с крестцом;\n• седалищная — каудально: тело и две ветви (шовная, впадинная), ограничивают запертое отверстие; седалищный бугор, седалищная дуга;\n• лонная — краниомедиально: две ветви.\n\nВ месте сращения — вертлужная (суставная) впадина для головки бедра (тазобедренный сустав). Шовные ветви лонных костей срастаются — тазовое сращение.\n\nЧерез таз проходят прямая кишка, мочеполовые органы, у самок — родовые пути. Таз самок объёмнее, бугры сглажены (акушерское значение). Функции: опорная, передача усилия задних конечностей, защита тазовых органов."}, {"num": "11", "category": "Опорно-двигательный аппарат", "q": "Соединения костей скелета. Сустав: определение, строение. Суставы, их виды по строению и движению", "hint": "• Два типа соединения: сращение (синартроз) и сустав (диартроз)\n• Виды сращений: синдесмоз / синхондроз / синостоз — примеры каждого\n• Сустав — 3 обязательных элемента (капсула, синовия, хрящи) + вспомогательные\n• По движению: одно-, двух-, многоосные, плоские — примеры\n• По строению: простые vs сложные (мениски, ряды костей)\n• Что выделяет синовиальный слой?", "a": "Два типа соединения: сращение (синартроз) и суставы (диартроз).\n\nСращения (промежуточная ткань):\n• синдесмоз — соединительной тканью (швы черепа: зубчатые, чешуйчатые, плоские; связки);\n• синхондроз — хрящом (межпозвоночные диски, рёберные хрящи);\n• синостоз — костной тканью (кости таза, крестца).\n\nСустав — подвижное соединение. 3 обязательных элемента: 1) капсула (наружный фиброзный + внутренний синовиальный слой, выделяет синовию); 2) синовия — жидкость, устраняет трение; 3) суставные хрящи (гиалиновые, без надхрящницы). Вспомогательные: связки, диски, мениски.\n\nПо движению:\n• одноосные — сгибание-разгибание (локтевой, путовый);\n• двухосные — + отведение-приведение;\n• многоосные — головка и ямка (тазобедренный, плечевой);\n• плоские — малоподвижные (крестцово-подвздошный, запястно-пястный).\n\nПо строению: простые (две кости) и сложные (мениски — височно-нижнечелюстной, коленный; или ряды коротких костей — запястно-пястный, заплюсно-плюсневый)."}, {"num": "12", "category": "Опорно-двигательный аппарат", "q": "Строение мышцы как органа. Вспомогательные органы мышц. Классификация мышц по форме и действию", "hint": "• Структурная единица мышцы (волокно: сарколемма, саркоплазма, миофибриллы)\n• Строение органа: активная часть (брюшко, головка/хвост) + пассивная (сухожилие) + сосуды/нервы\n• Вспомогательные органы (4): фасции, бурсы, синовиальные влагалища, сесамовидные кости/блоки\n• Классификация по форме и по внутреннему строению (перистые…)\n• По действию: флексоры/экстензоры, аддукторы/абдукторы, супинаторы/пронаторы, сфинктеры…\n• Синергисты vs антагонисты; 4 свойства мышечной ткани", "a": "Скелетная (поперечнополосатая) мышца — орган активного движения. Структурная единица — мышечное волокно (сарколемма, саркоплазма, миофибриллы); волокна в пучки прослойками.\n\nСтроение органа:\n• активная часть — брюшко (тело), начало (головка) и конец (хвост);\n• пассивная часть — сухожилие (плотная соединительная ткань), крепит к кости;\n• сосуды и нервы.\n\nВспомогательные органы: фасции (одевают мышцы); синовиальные сумки (бурсы) у выступов костей; синовиальные влагалища сухожилий; сесамовидные кости и блоки (меняют направление тяги).\n\nПо форме: длинные (конечности), широкие (туловище), короткие, кольцевые (сфинктеры). По внутреннему строению: одно-, дву-, многоперистые, веретенообразные.\n\nПо действию: сгибатели (флексоры) и разгибатели (экстензоры); приводящие (аддукторы) и отводящие (абдукторы); вращатели (супинаторы, пронаторы); сжиматели (сфинктеры) и расширители; подниматели и опускатели; напрягатели. Синергисты — в одном направлении, антагонисты — в противоположных. Свойства: возбудимость, сократимость, проводимость, эластичность."}, {"num": "13", "category": "Дыхание", "q": "Физиология дыхания: акт вдоха и выдоха. Жизненная ёмкость лёгких", "hint": "• Три вида дыхания: внешнее, транспорт, тканевое\n• Вдох — активен: какие мышцы и куда диафрагма?\n• Выдох — пассивный или активный?\n• Где давление всегда отрицательное?\n• Где центр регуляции и от чего автоматизм?\n• ЖЕЛ = из каких трёх объёмов? Цифры у лошади и КРС", "a": "Дыхание: потребление O2, выделение CO2. Виды: внешнее (вентиляция), транспорт газов кровью, клеточное (тканевое). У млекопитающих внешнее в основном лёгочное; через кожу и ЖКТ 1-2%, у лошади при быстром аллюре до 8-10%.\n\nВдох (активен): сокращаются наружные межрёберные мышцы — рёбра вперёд и вверх; сокращается диафрагма (оттесняет органы назад). Объём грудной клетки растёт, лёгкие растягиваются, давление в них ниже атмосферного — воздух входит.\n\nВыдох (обычно пассивный): расслабляются вдыхательные мышцы, частично сокращаются внутренние межрёберные; грудная клетка возвращается, диафрагма выпуклая, воздух выжимается. При усиленном выдохе активны внутренние межрёберные, вспомогательные и брюшные мышцы. В плевральной полости давление всегда отрицательное.\n\nРегуляция — дыхательный центр продолговатого мозга (центры вдоха и выдоха); автоматизм связан с накоплением CO2.\n\nЖЕЛ = дыхательный + дополнительный + резервный воздух.\n• Дыхательный воздух: овцы и крупные собаки 0,3-0,5 л, лошадь 5-6 л\n• ЖЕЛ: собаки 1,5-3 л, лошадь 26-30 л, КРС 30-35 л\n• Остаточный воздух (после макс. выдоха): лошадь ~12 л\n• ЖЕЛ + остаточный = общая ёмкость\nЖЕЛ зависит от пола, возраста, породы, тренировки."}, {"num": "14", "category": "Опорно-двигательный аппарат", "q": "Мышцы головы", "hint": "• Две группы: лицевые (мимические) и жевательные\n• Мимические — откуда развиваются, где располагаются, как действуют?\n• Назови сфинктер губ, щёчную, круговую глаза\n• Жевательные — сколько пар? masseter, крыловидная, височная — что делают?\n• Какая опускает челюсть?\n• Боковое движение — чьё сочетание? Почему важно для жвачных?", "a": "Мышцы головы: лицевые (мимические) и жевательные.\n\nЛицевые (мимические): из кожной мускулатуры, вокруг отверстий (рот, нос, глаза, уши), действуют как сжиматели/расширители. Основные: круговая мышца рта (сфинктер губ); носо-губной подниматель; скуловая; опускатель нижней губы; подкожная мышца губ и клыковая (общий пласт с поднимателем и опускателем верхней губы); щёчная (боковая стенка рта, перемещает пищевой ком); круговая мышца глаза; мышцы ушной раковины. Обеспечивают захват корма, сосание, движение губ и ушей.\n\nЖевательные — 4 пары, на височно-нижнечелюстной сустав:\n• большая жевательная (m. masseter) — латеральная поверхность нижней челюсти, смыкает\n• медиальная крыловидная — медиальная поверхность ветви, смыкает\n• височная — из височной ямки к мышечному отростку, смыкает\n• двубрюшная — опускает (у лошади ещё яремно-челюстная, тоже опускает)\n\nБоковое (растирающее) движение: большая жевательная одной стороны + крыловидная противоположной — важно для жвачных. У травоядных жевательные развиты сильнее (грубый корм)."}, {"num": "15", "category": "Опорно-двигательный аппарат", "q": "Мышцы, соединяющие плечевой пояс с туловищем", "hint": "• Почему конечность держится на мышцах, а не на суставе?\n• Самая поверхностная в холке — что крепит лопатку?\n• Что лежит под ней?\n• Какая мышца «подвешивает» туловище и до какого ребра?\n• Плечеголовная — куда и где яремный жёлоб?\n• Кто тянет конечность назад? Грудные — что делают?", "a": "Грудная конечность соединяется с туловищем мышцами, а не суставом (лопатка без костного сочленения с осевым скелетом):\n\n• трапециевидная — самая поверхностная в холке; от канатика выйной и надостистой связки к ости лопатки и акромиону; поднимает и закрепляет лопатку\n• ромбовидная — под трапециевидной; от канатика выйной связки к медиальной поверхности лопаточного хряща; притягивает лопатку к туловищу\n• зубчатая вентральная — от медиальной поверхности лопатки веером к шейным позвонкам и грудной клетке (каудальный зубец до 9-го ребра); на ней подвешено туловище (опора и амортизация)\n• плечеголовная — от затылочной и височной костей к латеральному бугру плечевой кости; выносит конечность вперёд, опускает голову/шею (между ней и грудино-головной — яремный жёлоб с веной)\n• широчайшая мышца спины — от пояснично-спинной фасции к плечевой кости; тянет конечность назад, сгибает плечевой сустав\n• грудные (поверхностная и глубокая) — от грудной кости; прижимают и приводят конечность\n\nТуловище упруго подвешено между передними конечностями главным образом на зубчатой вентральной мышце (амортизация)."}, {"num": "16", "category": "Общие понятия", "q": "Понятие об органах, системы органов", "hint": "• Дай определение органа\n• Два типа по строению: трубчатые (3 оболочки?) и паренхиматозные (строма + паренхима?)\n• Что есть у любого органа (сосуды, нервы)?\n• Система vs аппарат — в чём разница?\n• Перечисли 8 систем/аппаратов по учебнику\n• Под чьим контролем работают?", "a": "Орган — часть тела определённой формы, строения, расположения, со специфической функцией. Два типа:\n• трубчатые — три оболочки: слизистая, мышечная, серозная (вне полостей — адвентиция)\n• паренхиматозные (компактные) — строма (соединительнотканный остов) + паренхима (рабочая ткань: в железах секреторный эпителий, в мышцах поперечнополосатая)\nЛюбой орган имеет артерии, вены, лимфососуды, нервы (сосудисто-нервный пучок).\n\nСистема органов — сходного строения, общая функция; аппарат — различного строения.\n\nСистемы и аппараты по учебнику:\n1) аппарат движения (кости и мышцы)\n2) система органов пищеварения\n3) система органов дыхания\n4) мочеполовой аппарат\n5) система крово- и лимфообращения\n6) железы внутренней секреции (эндокринная)\n7) система кожного покрова\n8) нервная система и органы чувств\n\nВсе взаимосвязаны под контролем нервной и эндокринной регуляции — единый целостный организм, связанный со средой."}, {"num": "17", "category": "Опорно-двигательный аппарат", "q": "Мышцы тазобедренного сустава", "hint": "• Сустав многоосный; две основные группы — какие?\n• Ягодичная: сколько мышц, какая наиболее развита? Особенность КРС?\n• Заднебедренная: 4 мышцы — назови; что обеспечивают (толчок)?\n• Сгибатели — подвздошно-поясничная и др.?\n• Приводящие на медиальной поверхности?\n• Бедренный треугольник — между какими мышцами?\n• Хозяйственное значение (окорок, бег)", "a": "Тазобедренный сустав — многоосный, мощные мышцы. Две основные группы:\n\nЯгодичная (3): поверхностная ягодичная (у КРС срастается с напрягателем широкой фасции и двуглавой — ягодично-двуглавая), средняя ягодичная (наиболее развита, на большом вертеле), глубокая ягодичная (отводит). Разгибают и отводят бедро.\n\nЗаднебедренная (4): двуглавая бедра (у КРС — ягодично-двуглавая), полусухожильная, полуперепончатая, квадратная мышца бедра. Главные разгибатели, обеспечивают отталкивание (толчок).\n\nСгибатели (выносят вперёд): подвздошно-поясничная (большая поясничная + подвздошная), портняжная, гребешковая.\n\nПриводящие (медиально): стройная (тонкая), приводящая, гребешковая.\n\nМежду стройной, гребешковой и портняжной — бедренный треугольник.\n\nЗначение: у КРС и свиньи заднебедренная группа — окорок (ценное мясо); у лошади её развитие даёт мощный бег."}, {"num": "18", "category": "Общие понятия", "q": "Строение копыта, мякишей", "hint": "• Копыто у кого? Копытца у кого?\n• Две основные части: роговая капсула и основа кожи; где есть подкожная основа?\n• Части основы/капсулы: кайма, венчик, стенка, подошва, стрелка — что делает каждая?\n• Скорость роста стенки? Белая линия?\n• Стрелка (пальцевый мякиш) — функция?\n• Мякиши: из чего, виды (каштаны, шпоры)?", "a": "Копыто — твёрдый кожный наконечник 3-го пальца у однокопытных (лошадь, осёл). У КРС и свиньи — копытца (по два). Две части: роговая капсула (= эпидермис) и основа кожи копыта (дерма); подкожная основа только в кайме и венчике. Кости пальца не входят, но связаны с тканями.\n\nЧасти:\n• кайма — узкая полоска без волос на границе с волосистой кожей\n• венчик — широкий валик; от его росткового слоя растут эпидермальные трубочки (основной слой роговой стенки)\n• стенка — боковая часть из 3 слоёв; растёт ~8 мм/мес; листочковый слой; соединение с подошвой — белая линия\n• подошва — вогнутая роговая пластинка (тело и ножки)\n• роговая стрелка (пальцевый мякиш) — эластичный клин между ножками подошвы; при опоре расширяет заднюю часть копыта, улучшает кровообращение\n\nКопытца жвачных и свиньи похожи на половину копыта лошади; стрелки нет.\n\nМякиши — плотные утолщения кожи на пальмарной/плантарной поверхности; эпидермис + основа кожи + подкожный слой; амортизируют. Виды: запястные и заплюсневые (у лошади — каштаны), пястные и плюсневые (у лошади — шпоры), пальцевые (у лошади — основа стрелки)."}, {"num": "19", "category": "Общие понятия", "q": "Строение, значение и развитие кожного покрова", "hint": "• Что входит в систему кожного покрова кроме кожи (производные)?\n• Три пласта кожи — назови и из чего развиваются?\n• Слои эпидермиса на безволосых участках?\n• Дерма: сосочковый и сетчатый слой — что в каждом? Кожевенное сырьё?\n• 6+ функций кожи (защита, терморегуляция, выделение...)\n• Хозяйственное значение", "a": "Кожа покрывает тело, защищает от среды (через здоровую не проникают микробы). Производные: волосы, потовые, сальные, молочные железы, копыта/копытца, когти, мякиши, рога.\n\nТри пласта:\n• эпидермис — многослойный плоский эпителий из эктодермы; на безволосых участках: базальный, шиповатый, зернистый, блестящий, роговой слои; без сосудов\n• дерма (основа кожи) — из мезенхимы; сосочковый слой (с сосудами, нервами, рецепторами) + сетчатый (плотная неоформленная ткань); самый прочный (кожевенное сырьё)\n• подкожная основа — рыхлая соединительная и жировая ткань; связывает кожу с телом, депо жира (у КРС кожа 6-7% массы тела)\n\nФункции: защитная; терморегуляция (потоотделение, теплоотдача, шерсть); выделительная (вода, соли, мочевина с потом); рецепторная (осязание: тактильная, температурная, болевая); частично дыхательная; синтез витамина D; депо крови, воды, солей.\n\nЗначение: шерсть, кожевенное и меховое сырьё, молоко. Состояние кожи и шерсти отражает здоровье и условия содержания."}, {"num": "20", "category": "Дыхание", "q": "Строение лёгких и грудной полости", "hint": "• Лёгкие — какой орган, форма, цвет? Три поверхности?\n• Доли у КРС слева; почему правое больше? Эпартериальный бронх?\n• Особенность лошади?\n• Бронхиальное дерево: цепочка от главных бронхов до альвеол\n• Стенка альвеолы, сурфактант — зачем?\n• Грудная полость: чем ограничена? Плевра, средостение, плевральная полость — давление?", "a": "Лёгкие — парные паренхиматозные органы, розовые, конусовидные, в грудной полости. Три поверхности: рёберная, диафрагмальная, средостенная; дорсальный край тупой, вентральный острый с вырезками на доли. У КРС слева: краниальная, средняя (сердечная), каудальная доли; правое ~в 1,5 раза больше, с добавочной долей (к нему идёт трахейный/эпартериальный бронх). У лошади сердечная и диафрагмальная доли не разделяются.\n\nБронхиальное (альвеолярное) дерево: главные бронхи → бронхи 1-го, 2-го порядка → бронхиолы (без хряща) → альвеолярные ходы → альвеолярные мешочки → альвеолы. Стенка альвеол — один слой плоского респираторного эпителия, снаружи капилляры; газообмен через два слоя клеток. Сурфактант придаёт упругость альвеолам.\n\nГрудная полость: грудные позвонки, рёбра, грудина, сзади диафрагма. Лёгкое покрыто лёгочной плеврой → переходит в рёберную; от позвоночника двумя пластинками — средостенная плевра; между листками — средостение (сердце, пищевод, трахея, сосуды, нервы). Между лёгочной и рёберной плеврой — плевральная полость с серозной жидкостью; давление отрицательное."}, {"num": "21", "category": "Дыхание", "q": "Строение гортани и трахеи", "hint": "• Чем выстланы воздухопроводящие пути?\n• Гортань: где, три функции? Пять хрящей — назови (щитовидный, кольцевидный, 2 черпаловидных, надгортанник)\n• Какой из эластического хряща и зачем? Где голосовые связки?\n• Трахея: основа (незамкнутые кольца), число колец у КРС/лошади/свиньи\n• Где бифуркация? Эпителий и его роль?", "a": "Гортань и трахея — воздухопроводящие пути, выстланы мерцательным эпителием.\n\nГортань — между глоткой и трахеей у углов нижней челюсти; проводит воздух, образует звук, защищает пути от корма при глотании. Пять хрящей: щитовидный (самый массивный, вентральная и боковые стенки), кольцевидный (каудально), два черпаловидных (парные, к ним голосовые связки), надгортанник (эластический хрящ, закрывает вход при глотании); остальные гиалиновые. Между щитовидным и черпаловидными — голосовые связки; слизистая образует голосовые губы, делящие гортань на преддверие, голосовую щель, дыхательную часть. Колебание губ — голос.\n\nТрахея — трубка, сжата с боков; основа — незамкнутые хрящевые кольца. Поперечная мышца трахеи сближает концы колец (облегчает прохождение корма по пищеводу). Колец: КРС 46-50, лошадь 48-60, свинья 32-36. Идёт по низу шеи, у 5-го ребра — бифуркация на два главных бронха. Слизистая трахеи и бронхов — многорядный призматический мерцательный эпителий с бокаловидными железами (слизь); реснички выводят пыль."}, {"num": "22", "category": "Пищеварение", "q": "Слюнные железы, их строение", "hint": "• Тип секреции? Мелкие (пристенные) vs крупные (застенные)\n• Три пары крупных — назови\n• Околоушная: цвет, секрет (серозный?), куда проток?\n• Нижнечелюстная: где, секрет, куда открывается?\n• Подъязычная: секрет (муцин?), сколько протоков?\n• Состав слюны; особенности свиньи и КРС (щёлочь для рубца)", "a": "Слюнные железы — внешней секреции, выделяют слюну в рот. Мелкие (пристенные) — в слизистой губ, щёк, языка, нёба; крупные (застенные) парные — три пары:\n\n• околоушная — красно-бурая, у основания ушной раковины; серозный (белковый) секрет; проток в преддверие рта на уровне 3-4-го верхнего коренного зуба\n• нижнечелюстная — с медиальной стороны нижней челюсти до 1-го шейного позвонка, жёлтая; смешанная слюна; проток в подъязычной бородавке впереди уздечки языка\n• подъязычная — на дне рта сбоку тела языка; передняя часть однопротоковая, задняя короткопротоковая (>30 протоков); преимущественно слизистая (муцин) смешанная слюна\n\nСтроение: секреторные отделы (альвеолы и трубки с серозными и слизистыми клетками) + выводные протоки (вставочные, исчерченные, междольковые); капсула, дольки.\n\nСлюна: вода, муцин, минеральные соли, ферменты. У свиньи — фермент, расщепляющий крахмал. У КРС слюны много, богата щелочами — поддерживает щелочную среду в рубце для микрофлоры. Выделение регулируется рефлекторно."}, {"num": "23", "category": "Кровь и кровообращение", "q": "Круги кровообращения: большой и малый", "hint": "• Сердце сколько камер? Какой ещё круг кроме двух (воротный)?\n• Большой круг: откуда начинается (аорта), куда возвращается (полые вены)? Что происходит в капиллярах?\n• Малый круг: лёгочный ствол из какого желудочка? Куда возвращается?\n• Запиши полный путь крови\n• Парадокс: где венозная кровь в артерии и наоборот?", "a": "Кровообращение замкнутое: большой и малый круги, единая система; сердце четырёхкамерное (2 предсердия, 2 желудочка). От большого круга — вставочный (воротный) круг с воротной веной и печёночными капиллярами.\n\nБольшой круг: аорта (из левого желудочка) → артерии → капилляры органов → краниальная и каудальная полые вены → правое предсердие. В капиллярах кровь отдаёт O2 и питательные вещества, забирает CO2 и продукты обмена (артериальная → венозная).\n\nМалый (лёгочный) круг — газообмен в лёгких: лёгочный ствол из правого желудочка → правая и левая лёгочные артерии → капилляры альвеол (отдаёт CO2, насыщается O2) → лёгочные вены → левое предсердие.\n\nПуть крови: левый желудочек → большой круг → правое предсердие → правый желудочек → малый круг → левое предсердие → левый желудочек.\n\nОсобенность: в лёгочной артерии — венозная кровь, в лёгочных венах — артериальная. Движение обеспечивает сердце-насос (сокращение проталкивает в аорту, расслабление присасывает из полых вен)."}, {"num": "24", "category": "Кровь и кровообращение", "q": "Строение и топография сердца у разных видов животных", "hint": "• Орган какой, сколько камер, как работает?\n• Топография: где в средостении, границы (3-е и 5-е ребро), где прослушивается у КРС? Масса у быка/коровы?\n• Три оболочки стенки (какой миокард толще?)\n• Четыре клапана — назови; что удерживает створки?\n• Перикард\n• Видовые особенности: кости сердца у КРС, свинья, лошадь (масса)", "a": "Сердце — полый мышечный конусовидный орган, 4 камеры (2 предсердия, 2 желудочка), насос (сокращение — в аорту, расслабление — присасывает из полых вен). В средостении, больше в левой половине; передняя граница — 3-е ребро, задняя — рёберный хрящ 5-го ребра; основание на уровне плечевого сустава, верхушка вниз-назад-влево. У КРС прослушивается в 3-4-м межреберье. Масса/тело: бык ~0,42%, корова ~0,50%.\n\nСтенка из 3 оболочек: эпикард (серозная), миокард (мышечная; левый желудочек толще правого), эндокард (с эндотелием). Остов — 4 фиброзных кольца. Клапаны (4): правый атриовентрикулярный (трёхстворчатый), левый атриовентрикулярный (двустворчатый; створки на сухожильных струнах), клапан лёгочного ствола, клапан аорты (по 3 полулунные створки) — ток крови в одном направлении. Снаружи — перикард (сердечная сумка) с полостью.\n\nВидовые особенности:\n• КРС — в фиброзном кольце аорты кости сердца (3-6 см)\n• свинья — небольшое, округлая верхушка у 7-го ребра\n• лошадь — большое, расширенное основание, масса до 5,75 кг"}, {"num": "25", "category": "Кровь и кровообращение", "q": "Группа крови, резус-фактор", "hint": "• Что на эритроцитах, а что в плазме? Агглютиногены vs агглютинины\n• Что такое агглютинация и гемолиз — чем опасны при переливании?\n• Вспомни 4 группы по системе АВ0 (Ландштейнер, Янский): кто универсальный донор, кто реципиент\n• Резус: у скольких % людей? У каких животных?\n• Числа систем у КРС, свиней, овец, кур, лошадей", "a": "Группа крови = антигены-агглютиногены на эритроцитах + антитела-агглютинины в плазме. Встреча одноимённых (агглютиноген + агглютинин) → агглютинация (склеивание) → гемолиз; опасно при переливании.\n\nСистема АВ0 (Ландштейнер, Янский): агглютиногены А, В; агглютинины α, β. α склеивает А, β — В.\n• I — нет агглютиногенов, есть α и β (донор для всех)\n• II — А и β\n• III — В и α\n• IV — А и В, агглютининов нет (только реципиент)\nДонор отдаёт, реципиент получает.\n\nРезус-фактор — агглютиноген у 85% людей; найден у Macacus rhesus. Rh+ кровь Rh– реципиенту → антитела → повторное переливание даёт агглютинацию. У с/х животных Rh только у лошадей.\n\nГруппы у животных сложнее: КРС >80 факторов в 12 системах; свиньи 14 систем, овцы 7, куры 14; лошади 10 агглютиногенов. Образуются в эмбриональный период, не меняются всю жизнь. Применение: селекция (происхождение), переливание."}, {"num": "26", "category": "Общие понятия", "q": "Деление брюшной полости на области", "hint": "• Границы полости: спереди диафрагма, сзади — вход в таз; выстлана брюшиной\n• Сколько всего областей? (10)\n• Две сегментальные плоскости → 3 отдела: где их проводят?\n• Передний — 3 области, средний — 4, задний — 3\n• Зачем это нужно? Пример: где лежит рубец у КРС", "a": "Брюшная полость: между диафрагмой (спереди) и входом в таз (сзади), выстлана брюшиной. Условно делят на 10 областей.\n\nДве сегментальные плоскости → 3 отдела:\n• 1-я плоскость — через каудальный край последней пары рёбер\n• 2-я — через краниальный край маклоков\n• передний (диафрагма – 1-я плоскость), средний (между плоскостями), задний (каудальнее 2-й)\n\nПередний отдел (3 области): левое и правое подреберья, область мечевидного хряща.\n\nСредний отдел (4 области): левая и правая подвздошные (сагиттальные плоскости по концам поперечно-рёберных отростков); фронтальной плоскостью на уровне плечевого сустава — дорсальная поясничная и вентральная пупочная.\n\nЗадний отдел (3 области): правая и левая паховые, непарная лонная.\n\nЗначение: точная локализация органов при исследовании, прослушивании, проколе, операциях (например, рубец КРС занимает всю левую половину)."}, {"num": "27", "category": "Опорно-двигательный аппарат", "q": "Строение плечевого пояса грудной конечности", "hint": "• Из каких 3 костей состоял у предков? Что редуцировалось у копытных и почему?\n• Лопатка: форма, 3 края и 3 угла\n• Ость делит латеральную поверхность на какие 2 ямки? Чем заканчивается ость?\n• Медиальная поверхность — какая ямка? Нижний угол — что несёт?\n• Главная особенность: как конечность связана с туловищем?", "a": "Плечевой пояс соединяет свободную грудную конечность с туловищем. У предков — 3 кости: лопатка, ключица, коракоид. У копытных (КРС, лошадь, свинья) ключица и коракоид редуцировались (коракоид — как коракоидный отросток); пояс = только лопатка.\n\nЛопатка — плоская парная кость треугольной формы, лежит косо на боку грудной клетки, крепится мышцами. 3 края, 3 угла:\n• позвоночный край (основание) — с лопаточным хрящом\n• латеральная поверхность остью делится на предостную и (более широкую) заостную ямки; ость заканчивается акромионом (у лошади слаб)\n• медиальная поверхность — подлопаточная ямка\n• нижний (суставной) угол — суставная впадина для головки плечевой кости (плечевой сустав), бугор лопатки, коракоидный отросток\n\nОсобенность: нет прямого костного соединения с осевым скелетом — конечность подвешена на мышцах → свобода движения вперёд-назад и амортизация. Место прикрепления многих мышц."}, {"num": "28", "category": "Цитология и гистология", "q": "Костная ткань, морфология и функциональные особенности", "hint": "• Какая ткань? Из чего развивается? Почему твёрдая?\n• 3 вида клеток: остео... (строят / зрелые / разрушают)\n• Межклеточное вещество: органика (оссеин + оссеомукоид) и неорганика (соли Ca). Сколько % Ca скелета?\n• Структурный элемент — остеон, гаверсов канал. Компактное vs губчатое\n• Функции: опора, кроветворение, минеральный обмен", "a": "Костная ткань — разновидность соединительной (опорно-трофической), из мезенхимы; твёрдость от обызвествлённого межклеточного вещества. Образует скелет.\n\nКлетки (3 вида):\n• остеобласты — молодые, строят кость, → остеоциты\n• остеоциты — зрелые\n• остеокласты — крупные, разрушают при перестройке\n\nМежклеточное вещество:\n• органика — оссеиновые волокна + оссеомукоид (упругость)\n• неорганика — соли (фосфорнокислый, углекислый кальций; твёрдость)\nНа скелет — 97% Ca организма. У молодых органики больше (эластичны), с возрастом солей больше (хрупкость).\n\nСтруктурный элемент — остеон: гаверсов канал + костные пластинки-трубочки с остеоцитами. Между остеонами — вставочные пластинки, на поверхности — общие. Компактное вещество из остеонов; губчатое — из переплетающихся пластинок.\n\nФункции:\n• опорная и защитная\n• кроветворная (красный костный мозг губчатого вещества)\n• минеральный обмен (депо Ca и P)\nХорошо снабжается кровью, регенерирует."}, {"num": "29", "category": "Кровь и кровообращение", "q": "Кровь: функции, состав. Свойства крови", "hint": "• Какая ткань? Сколько % массы тела? Что такое гомеостаз?\n• Состав: плазма + форменные элементы\n• Эритроциты (срок жизни 100-120 дней, гемоглобин), лейкоциты (грануло-/агранулоциты), тромбоциты\n• 5 функций: питательная, выделительная, дыхательная, регуляторная, защитная\n• Свойства: цвет, вязкость, реакция (щёлочь?), свёртывание", "a": "Кровь — жидкая соединительная (опорно-трофическая) ткань; с лимфой и тканевой жидкостью — внутренняя среда. 7-8% массы тела. Гомеостаз — постоянство состава и свойств внутренней среды.\n\nСостав — плазма (больше по объёму) + форменные элементы:\n• эритроциты — у большинства млекопитающих безъядерные двояковогнутые, из красного костного мозга, живут 100-120 дней, содержат гемоглобин (оксигемоглобин, переносит O2)\n• лейкоциты — ядерные, защита (фагоцитоз, антитела): зернистые (эозинофилы, базофилы, нейтрофилы) и незернистые (лимфоциты, моноциты)\n• тромбоциты — свёртывание\nПлазма — соломенного цвета, белки, жиры, углеводы.\n\nФункции: питательная, выделительная, дыхательная (O2/CO2), регуляторная (гормоны), защитная. Систему образуют кровь + костный мозг, селезёнка, печень, лимфоузлы.\n\nСвойства: красный непрозрачный цвет (гемоглобин); вязкость; слабощелочная реакция; постоянство осмотического давления; свёртывание."}, {"num": "30", "category": "Кровь и кровообращение", "q": "Кровеносные сосуды. Строение, деление", "hint": "• Три вида сосудов? Система замкнутая\n• 3 оболочки стенки: intima (эндотелий) / media (гладкие мышцы) / externa\n• Артерии — от сердца; 3 типа по мышцам: эластический (аорта), смешанный, мышечный. Где аорта начинается и тянется?\n• Капилляры — один слой эндотелия, обмен веществ\n• Вены — к сердцу, клапаны, тоньше media. Где венозная кровь, где артериальная?", "a": "Сосуды — замкнутая система: артерии, вены, капилляры.\n\nСтенка артерий и вен — 3 оболочки:\n• внутренняя (tunica intima) — эндотелий\n• средняя (tunica media) — соединительная ткань + гладкие мышцы\n• наружная (tunica externa) — рыхлая соединительная ткань\n\nАртерии — кровь от сердца. По мышцам 3 типа: эластический (аорта, крупные ветви), смешанный, мышечный (в органах). Аорта: из левого желудочка → к 6-му грудному позвонку → до 5-6-го поясничных. Ветвление магистральное, дихотомическое или рассыпное; коллатерали, анастомозы.\n\nКапилляры — мельчайшие, стенка из одного слоя эндотелия; обмен веществ (газообмен, питание).\n\nВены — кровь к сердцу. Похожи на артерии, но intima образует клапаны (кровь только к сердцу), media тоньше → просвет на разрезе овальный. Большой круг — венозная кровь, малый — артериальная.\n\nСхема: сердце → артерии → капилляры → вены → сердце. Диаметр сосуда связан с напряжённостью работы органа."}, {"num": "31", "category": "Пищеварение", "q": "Строение многокамерного желудка", "hint": "• У кого? Какой тип? 4 камеры — назови по порядку\n• Преджелудки (первые 3) — какой эпителий, есть ли железы? Сычуг — чем отличается?\n• Объём желудка крупных жвачных (>100 л)\n• Рубец: где лежит, мешки, сосочки, микрофлора, жвачка\n• Сетка / книжка / сычуг — объёмы и функция каждой. Зоны сычуга\n• Особенность у телят: пищеводный желоб", "a": "Многокамерный желудок — у жвачных (КРС, овца, коза); смешанный, пищеводно-кишечный тип; 4 камеры: рубец, сетка, книжка, сычуг. Первые три — преджелудки: плоский многослойный эпителий, без желёз; сычуг — слизистая кишечного типа с железами. У крупных жвачных >100 л.\n\nРубец — большой мешок, занимает всю левую половину брюшной полости (заходит в правую), дорсальный и вентральный мешки. В преддверие впадает пищевод → желоб сетки; жидкая пища в книжку, грубый корм в рубец. Слизистая в ороговевших сосочках (всасывание); микроорганизмы (бактерии, инфузории) расщепляют клетчатку; жвачка — отрыгивание и повторное пережёвывание.\n\nСетка (4-8 л) — складки в виде ячей сети; сортирует корм.\nКнижка (7-10 л) — листочки с ороговевшими сосочками; перетирает, отжимает.\nСычуг (8-10 л) — истинный железистый, грушевидный; зоны: кардиальная, фундальная (дно), пилорическая; железы дают желудочный сок (пепсин, соляная кислота обкладочными клетками фундальной зоны); пилорический сфинктер → в двенадцатиперстную кишку.\n\nУ телят молоко по желобу сетки идёт прямо в книжку и сычуг, минуя рубец."}, {"num": "32", "category": "Пищеварение", "q": "Строение однокамерного желудка свиньи, лошади, собаки", "hint": "• У кого однокамерный? Отверстия (кардиальное, пилорическое), кривизны, дно. 4 оболочки стенки\n• 2 типа по слизистой: кишечный (вся железистая — собака) и пищеводно-кишечный (начало безжелезистое — свинья, лошадь)\n• Свинья: дивертикул, зоны, где лежит\n• Лошадь: объём 6-15 л, слепой мешок, кардиальный сфинктер (почему рвота затруднена?)\n• Функции желудка", "a": "Однокамерный желудок — свинья, лошадь, собака. Мешковидный отдел между пищеводом и кишечником: вход — кардиальное отверстие, выход — пилорическое, большая и малая кривизна, дно. Стенка: слизистая, подслизистая, мышечная, серозная.\n\nПо слизистой 2 типа:\n• кишечный — вся слизистая железистая; у собаки (хищник), простой однокамерный кишечного типа\n• пищеводно-кишечный — начало многослойным плоским (безжелезистым) эпителием, остальное призматическим железистым; у свиньи и лошади\n\nСвинья: пищеводно-кишечный, с дивертикулом у входа; кардий безжелезистый (молочного цвета), остальное железистое (кардиальная, фундальная, пилорическая зоны); мышечная оболочка — продольный, кольцевой, косой слои; лежит поперёк в левом подреберье.\n\nЛошадь: удлинённый изогнутый мешок, пищеводно-кишечный, 6-15 л; слепой мешок (безжелезистый) + железистая часть (железы кардия, собственные, пилорические); внутренние пучки косого слоя — мощный кардиальный сфинктер (препятствует рвоте); почти весь в левом подреберье.\n\nФункции: депонирует корм, механическая и химическая обработка (белки — пепсин, соляная кислота), всасывает воду."}, {"num": "33", "category": "Пищеварение", "q": "Строение и топография печени", "hint": "• Hepar — самая крупная застенная железа, цвет. Масса у КРС / свиньи / лошади\n• Функции кроме жёлчи: барьерная, гликоген, мочевина\n• 2 поверхности; ворота печени — что входит (воротная вена, печёночная артерия, нервы), что выходит?\n• Доли: левая, средняя (→ квадратная + хвостатая), правая\n• Паренхиматозный орган: дольки, балки, купферовы клетки, центральная вена\n• Видовое: жёлчный пузырь у КРС есть, у лошади нет", "a": "Печень (hepar) — самая крупная застенная пищеварительная железа, буро-красная. Масса: КРС 3-9 кг, свинья до 2,5 кг, лошадь 1,5-3,5 кг. Функции: жёлчь, барьерная (обезвреживание), синтез гликогена, образование мочевины.\n\nПоверхности: диафрагмальная и висцеральная. На висцеральной — ворота печени: входят воротная вена (кровь с кишечника), печёночная артерия (питание), нервы; выходит жёлчный проток. По дорсальному краю — вырезки для пищевода и задней полой вены. Доли: левая, средняя, правая; средняя воротами → квадратная и хвостатая.\n\nПаренхиматозный орган: остов (капсула, междольковые прослойки) + паренхима из печёночных долек (многогранные призмы). Клетки рядами (балками): одной стороной — к венозным капиллярам, другой образуют жёлчные капилляры. На капиллярах — звёздчатые (купферовы) клетки (фагоцитоз). Кровь воротной вены → центральная вена дольки → печёночные вены → задняя полая вена.\n\nУ КРС: печёночный + пузырный проток = общий жёлчный проток (открывается во 2-м изгибе двенадцатиперстной кишки); жёлчный пузырь есть. У лошади пузыря нет — жёлчь по печёночному протоку."}, {"num": "34", "category": "Пищеварение", "q": "Тонкий отдел кишечника. Строение", "hint": "• 3 кишки: duodenum, jejunum, ileum. Что здесь происходит?\n• Двенадцатиперстная: куда открываются протоки? Какие железы (сложнотрубчатые только здесь)\n• Длина тощей (до 40 м у КРС), подвздошной (до 50 см)\n• Ворсинки, каёмчатый эпителий, микроворсинки (поверхность ×14), число ворсинок на см²\n• Что в каждой ворсинке? Лимфатический сосуд — сколько % жира?\n• Ферменты, жёлчь", "a": "Тонкий отдел: двенадцатиперстная (duodenum), тощая (jejunum), подвздошная (ileum). Здесь окончательное переваривание и всасывание.\n\nДвенадцатиперстная — продолжение пилоруса; открываются протоки печени и поджелудочной железы. Слизистая с сильными ворсинками, трубчатые и сложнотрубчатые железы (сложнотрубчатые только здесь; трубчатые общекишечные — во всех). Тощая — самая длинная (до 40 м у КРС), ворсинки мельче. Подвздошная — самая короткая (у КРС до 50 см), впадает в слепую кишку.\n\nСтенка трубчатого органа. Слизистая в складках, призматический каёмчатый эпителий с бокаловидными клетками; в двенадцатиперстной ~1500-2000 ворсинок/см². Каёмка из микроворсинок — всасывающая поверхность до ×14. В каждой ворсинке — кровеносные капилляры и центральный лимфатический сосуд (до 80% всосавшегося жира); есть гладкие мышечные волокна. Мышечная оболочка — продольный и циркулярный слои (перистальтика). Снаружи — серозная оболочка. Действуют ферменты поджелудочного и кишечного соков; жёлчь эмульгирует жиры."}, {"num": "35", "category": "Эндокринная система", "q": "Щитовидная железа и её значение. Развитие и топография", "hint": "• Glandula thyreoidea — какая группа (бранхиогенная)? Из чего развивается?\n• 2 доли + перешеек (у кого его нет — лошадь, овца, коза). Где лежит?\n• Тиреоциты → фолликулы с коллоидом → какие 2 гормона? Из чего образуются (тирозин + йод)?\n• Действие тироксина: основной обмен, тепло, рост, молоко\n• Тиреокальцитонин — что с кальцием и остеокластами? Зоб при нехватке йода\n• Регуляция: гипофиз (тиротропин), гипоталамус (тиролиберин)", "a": "Щитовидная железа (glandula thyreoidea) — непарная железа внутренней секреции бранхиогенной группы, из глотки и жаберных карманов. 2 доли + перешеек (нет у лошади, овцы, козы). Красно-коричневая, на первых 1-2 кольцах трахеи.\n\nПаренхима — тиреоциты, образуют фолликулы; полости заполнены коллоидом с гормонами тироксином и трийодтиронином. Межфолликулярные островки — тиреокальцитонин.\n\nТироксин и трийодтиронин — из тирозина и йода. Действие: стимулируют поглощение O2 и выделение CO2, повышают основной обмен и теплообразование, усиливают расщепление белков, жиров, углеводов, влияют на рост и развитие, кожу и производные, повышают удой и жирность молока. Удаление у молодняка → задержка роста, нарушение условных рефлексов.\n\nТиреокальцитонин сберегает кальций: угнетает остеокласты, активирует остеобласты → Ca в кость, в плазме снижается. При нехватке йода → мало тироксина → гипофиз даёт больше тиротропина → разрастание железы (зоб). Регуляция: ЦНС и гипофиз (тиротропин, стимулируемый тиролиберином гипоталамуса)."}, {"num": "36", "category": "Пищеварение", "q": "Толстый отдел кишечника. Строение", "hint": "• Почему «толстый»? У кого разница невелика (КРС)? 3 кишки: слепая, ободочная, прямая\n• Что здесь происходит? Где формируется кал?\n• Слизистая: есть ли ворсинки? Какие железы, эпителий, бокаловидные клетки\n• Свои ферменты? За счёт чего идёт переваривание (микрофлора)\n• Видовые особенности: КРС (спиральный диск), свинья (3 тении), лошадь (огромный, переваривание клетчатки)", "a": "Толстый отдел — просвет шире тонкого (у КРС разница мала). Кишки: слепая, ободочная, прямая. Здесь заканчивается всасывание; в прямой кишке формируется кал.\n\nСлизистая: ворсинок нет, только трубчатые общекишечные железы; однослойный призматический эпителий, конец прямой кишки — многослойный плоский. Много бокаловидных клеток (слизь). Мышечная оболочка — продольный и циркулярный слои. Собственных ферментов почти нет; переваривание — за счёт ферментов из тонкого отдела и микрофлоры.\n\nВидовые особенности:\n• КРС — слепая ~70 см, ободочная (~7 м) свёрнута спиральным лабиринтом (диском) на правой стенке рубца, прямая короткая (~40 см)\n• свинья — слепая с 3 тениями и 3 рядами карманов, ободочная свёрнута конусом\n• лошадь — толстый отдел огромен: слепая и большая ободочная (до 6,5 м) с 4 тениями и 4 рядами карманов; у непарнокопытных здесь основное переваривание клетчатки\nПрямая кишка заканчивается анусом."}, {"num": "37", "category": "Витамины и минералы", "q": "Общая характеристика витаминов", "hint": "• Что это: не белки/липиды/углеводы, нужны в малых дозах\n• Кто и когда: Лунин (1881), Функ — название (1912)\n• Откуда берутся: провитамины и синтез микрофлорой ЖКТ\n• Авитаминоз vs гиповитаминоз?\n• Главное деление — по чему? Две группы + примеры А, D, E, K и B, C, P", "a": "Витамины — органические вещества кормов, не относящиеся к белкам, липидам, углеводам. Нужны в малых количествах, роль подобна ферментам и гормонам, многие входят в состав ферментов. Известно >30; открыл Н. И. Лунин (1881), название предложил К. Функ (1912).\n\nИсточники: постоянное поступление с кормом; часть из провитаминов (А из каротина в тонком кишечнике; D3 из эргостерина под УФ); часть синтезируется микрофлорой ЖКТ (группа В, витамин К — особенно у жвачных). Отсутствие → авитаминоз, недостаток → гиповитаминоз.\n\nДеление по растворимости:\n• Жирорастворимые: А (ретинол) — эпителий, зрение (родопсин); D (кальциферол) — обмен Ca и P, против рахита и остеомаляции; Е (токоферол) — размножение, развитие зародыша, усвоение витамина А; К (нафтохинон, фитохинол) — протромбин, свёртывание крови.\n• Водорастворимые: группа В (В1 — тиамин, В2 — рибофлавин и др.), С (аскорбиновая кислота), Р (цитрин).\n\nПотребность зависит от вида, возраста, продуктивности, физиологического состояния."}, {"num": "38", "category": "Нервная система и анализаторы", "q": "Физиология нервов", "hint": "• Из чего нерв: волокна, миелиновые vs безмиелиновые\n• Потенциал покоя: какой ион выходит? роль Na-K-насоса и АТФ\n• Потенциал действия: что входит, длительность (1–5 мс)\n• Свойства проведения: изолированно, в обе стороны\n• Скорость: непрерывно vs скачкообразно (перехваты Ранвье), цифры 0,5–3 и 120 м/с\n• Почему неутомляем?", "a": "Нерв — пучки нервных волокон (отростков нейронов) в соединительнотканных оболочках. Волокна миелиновые (мякотные) и безмиелиновые. Функция — проведение возбуждения (импульса).\n\nПотенциал покоя: снаружи мембрана «+», внутри «−»; создаётся выходом ионов калия наружу (анионы остаются внутри). Разность концентраций Na и K поддерживает натрий-калиевый насос (энергия — АТФ).\n\nПотенциал действия: при раздражении проницаемость для Na растёт в сотни раз, Na входит, мембрана перезаряжается; длительность 1–5 мс, распространяется круговыми (локальными) токами.\n\nСвойства: возбуждение проводится изолированно (не переходит на соседние волокна) и в обе стороны от места раздражения.\n\nСкорость: в безмиелиновых — непрерывно и медленно (0,5–3 м/с); в миелиновых ПД возникает только в перехватах Ранвье, идёт скачкообразно — до 120 м/с. Обмен в нерве мал → практически неутомляем; высокая лабильность (миелиновые — до 500 импульсов/с)."}, {"num": "39", "category": "Нервная система и анализаторы", "q": "Строение наружного, среднего и внутреннего уха", "hint": "• Три части — назови\n• Наружное: раковина (эластический хрящ), слуховой проход, барабанная перепонка\n• Среднее: сколько косточек? перечисли. Евстахиева труба → у лошади что?\n• Внутреннее (лабиринт): преддверие, улитка, 3 полукружных канала\n• Перилимфа vs эндолимфа; кортиев орган — рецептор слуха\n• Полукружные каналы — орган чего?", "a": "Ухо (орган слуха и равновесия) — три части: наружное, среднее, внутреннее.\n\nНаружное: ушная раковина (основа — эластический хрящ, покрыт кожей; улавливает звук), наружный слуховой проход и мышцы. Проход заканчивается барабанной перепонкой, отделяющей от среднего.\n\nСреднее: барабанная полость каменистой кости; 4 слуховые косточки (суставы) — молоточек, наковальня, чечевицеобразная косточка, стремечко. Молоточек соединён с барабанной перепонкой, стремечко — с перепонкой овального окошка. Слуховая (евстахиева) труба → глотка; у лошади образует воздухоносный мешок.\n\nВнутреннее (лабиринт): преддверие, улитка, 3 полукружных канала. Костный и перепончатый лабиринт; между ними перилимфа, внутри — эндолимфа. Улитка — спиральный канал с основной пластинкой; на ней кортиев орган, волосковые клетки которого — акустический рецептор (→ спиральный ганглий → кора). Полукружные каналы (эндолимфа) — периферическая часть органа равновесия: раздражают вестибулярные рецепторы при изменении положения головы."}, {"num": "40", "category": "Пищеварение", "q": "Характерные особенности в строении органов домашней птицы", "hint": "• Пищеварение: чем заменены зубы/губы? зоб, двойной желудок (железистый + мышечный)\n• Кишечник короткий, 2 слепые, клоака, фабрициева сумка\n• Печень: доли, жёлчный пузырь\n• Дыхание: воздухоносные мешки, певчая гортань у бифуркации трахеи\n• Скелет: пневматичные кости, киль\n• Почки, мочевого пузыря нет, мочевая кислота; левый яичник; эритроциты — какие?", "a": "Пищеварение: зубов, дёсен, губ нет — заменяют роговые надклювье и подклювье; слюнные железы слабо развиты. Пищевод длинный, образует зоб (у гусей и уток развит слабо) — корм увлажняется. Желудок двойной: железистый (сок) и мышечный (толстая стенка, плотная кутикула, перетирает корм). Кишечник короткий (у кур длиннее тела в 6 раз); толстый отдел — 2 слепые кишки и прямая, открывается в клоаку; ободочной нет. Печень большая, тёмно-коричневая, 2 доли, с жёлчным пузырём. В клоаку открываются кишечник, мочеточники, половые пути; у молодых — фабрициева сумка (лимфоидный орган).\n\nДыхание: лёгкие малы + воздухоносные мешки (между органами, в костях); звук — в певчей гортани у бифуркации трахеи. Костяк лёгкий, кости пневматичны, грудная кость с килем.\n\nПрочее: почки крупные, мочевого пузыря нет, моча с мочевой кислотой → в клоаку. У самок развит левый яичник и яйцевод; яйцо формируется в яйцеводе. Эритроциты овальные, с ядром; температура высокая, обмен интенсивный."}, {"num": "41", "category": "Обмен веществ", "q": "Обмен энергии", "hint": "• Что это: превращения энергии; часть в тепло, часть в АТФ/креатинфосфат\n• Два метода калориметрии: прямая (камера, вода) и непрямая (газообмен)\n• Дыхательный коэффициент = CO2/O2; цифры для углеводов/белков/жиров (1,0 / 0,8 / 0,7)\n• Калорийность 1 г: жир 38,9 кДж, углеводы и белки по 17,6 кДж\n• Основной обмен — условия; продуктивный обмен\n• Регуляция: кора, гипоталамус, тироксин", "a": "Обмен энергии — превращения энергии в организме. Энергия питательных веществ при окислении частично идёт на ассимиляцию и работу, большей частью — в тепло; часть запасается в макроэргах (АТФ, креатинфосфат).\n\nКалориметрия:\n• Прямая — камера с теплонепроницаемыми стенками, тепло поглощает вода, по разнице её температур считают теплопродукцию; точна, но сложна.\n• Непрямая (косвенная) — по газообмену: объём потреблённого O2 и выделенного CO2, вычисляют дыхательный коэффициент (CO2/O2). Углеводы — 1,0; белки — 0,8; жиры — 0,7.\n\nКалорийность 1 г: жир — 38,9 кДж (9,3 ккал); углеводы — 17,6 кДж (4,1 ккал); белки — 17,6 кДж (4,1 ккал).\n\nОсновной обмен — энергия при полном мышечном покое, натощак, при оптимальной температуре. Влияют возраст, пол, размеры, продуктивность, время суток и года; беременность и лактация повышают. Продуктивный обмен — на образование продукции; общая потребность = основной + продуктивный. Регуляция — кора и гипоталамус; симпатика, тироксин, гормоны гипофиза и надпочечников усиливают обмен."}, {"num": "42", "category": "Витамины и минералы", "q": "Физиологическое значение микроэлементов", "hint": "• Деление: макро- (Na, K, Cl, Ca, P, Fe, Mg, S) vs микро- (сотые/тысячные %)\n• Микроэлементы: Co, I, Cu, Mn, Zn, F, Br, Sr\n• Co — где откладывается? связь с В12, при недостатке анемия/лизуха\n• I — какой гормон? (тироксин)\n• Cu — печень, тканевое дыхание, гемоглобин\n• Mn — окисл.-восст., нервная система/равновесие", "a": "Минеральные вещества — макро- и микроэлементы. Макро- (по учебнику): натрий, калий, хлор, кальций, фосфор, железо, магний, сера. Микро- (сотые и тысячные доли %): кобальт, йод, медь, марганец, цинк, фтор, бром, стронций и др. Микроэлементы — рост и развитие, устойчивость к болезням, плодовитость, продуктивность; входят в ферменты, гормоны, витамины.\n\n• Кобальт — откладывается в печени; нужен для эритроцитов и гемоглобина, для синтеза витамина В12 (входит в него). Недостаток → анемия, лизуха, матовая ломкая шерсть.\n• Йод — в составе тироксина (гормон щитовидной железы). Недостаток → нарушение её функции, слабый молодняк, падение продуктивности.\n• Медь — больше в печени, в составе ферментов; стимулирует тканевое дыхание, кроветворение, синтез гемоглобина. Недостаток → анемия, нарушения нервной и мышечной систем.\n• Марганец — в ферментах, окислительно-восстановительные процессы, рост, размножение. Недостаток → нарушение нервной системы и равновесия.\n• Цинк, фтор и др. также необходимы.\n\nПотребность зависит от вида, возраста, продуктивности, содержания элементов в кормах и почве."}, {"num": "43", "category": "Эндокринная система", "q": "Околощитовидная железа, её гормоны и действие", "hint": "• Латынь: gll. paratyroideae; парные, наружные/внутренние; у коровы где?\n• Клетки: паратироциты (главные, оксифильные)\n• Гормон: паратгормон (паратирин), белковой природы — регулирует что?\n• Механизм: остеокласты → Ca из костей; P — выведение с мочой ↑\n• Всасывание Ca: кишечник + почечные канальцы\n• Удаление желёз → тетания, гибель на 4–12-й день", "a": "Околощитовидные (паращитовидные) железы — gll. paratyroideae — парные округлые/овальные органы желто-коричневого цвета; наружные и внутренние. У коровы наружные краниальнее щитовидной у общей сонной артерии, внутренние — в её паренхиме. Развиваются из глотки и жаберных карманов. Клетки — паратироциты (главные и оксифильные).\n\nГормон — паратгормон (паратирин), белковой природы; регулирует уровень кальция и фосфора в крови. Стимулирует остеокласты (разрушают кость) → Ca (и P) выходят из костей в кровь. Но усиливает выведение фосфатов с мочой → концентрация фосфора в крови падает. Усиливает всасывание Ca в кишечнике и почечных канальцах.\n\nРегуляция: выделение растёт при снижении Ca в крови (обратная связь). Удаление желёз (у собак) → падение Ca, судорожные припадки — тетания (возбуждение двигательных центров среднего и продолговатого мозга), гибель на 4–12-й день. Спасает введение паратгормона."}, {"num": "44", "category": "Нервная система и анализаторы", "q": "Строение и расположение ромбовидного мозга и его оболочки", "hint": "• Ромбовидный = продолговатый + задний мозг\n• Продолговатый (medulla oblongata): продолжение спинного; ромбовидная ямка, IV желудочек; центры — какие? (дыхание, сердце, глотание...)\n• Задний (metencephalon) = мозжечок + мост\n• Мозжечок: полушария + червячок, кора 3 слоя; функция — координация, тонус, равновесие\n• Мост — что связывает?\n• 3 оболочки: твёрдая, паутинная, мягкая; подпаутинное пространство", "a": "Головной мозг: большой и ромбовидный. Ромбовидный = продолговатый + задний мозг.\n\nПродолговатый мозг (medulla oblongata) — дорсальнее затылочной кости, продолжение спинного мозга. Серое вещество — ядра, часть на дне ромбовидной ямки в IV желудочке. Жизненно важные центры: дыхательный, сердечно-сосудистый, глотания, слюноотделения; проходят проводящие пути.\n\nЗадний мозг (metencephalon) = мозжечок + мост. Мозжечок (cerebellum) дорсальнее продолговатого, два полушария + червячок. Серое вещество на поверхности — кора с 3 слоями нейронов (молекулярный, ганглиозный, гранулярный). Функции: координация движений, тонус мышц, равновесие, поза. Мост — белая поперечная пластинка на вентральной поверхности, связывает спинной мозг с головным.\n\nОболочки (3): твёрдая (наружная, у костей), паутинная (средняя, тонкая), мягкая (сосудистая, у мозга). Между паутинной и мягкой — подпаутинное пространство со спинномозговой жидкостью."}, {"num": "45", "category": "Кровь и кровообращение", "q": "Лейкоциты, их строение и функции", "hint": "• Что: белые клетки с ядрами, ~20 мкм; гранулоциты vs агранулоциты — кто куда\n• Норма у КРС: 6–10·10⁹/л; лейкоцитоз vs лейкопения\n• Функция — защита; фагоцитоз (Мечников)\n• Базофилы — гепарин; нейтрофилы/эозинофилы — амёбовидное движение\n• Лимфоциты 30–50%: Т (клеточный), В (гуморальный, антитела), нулевые\n• Моноциты → макрофаги; лейкоцитарная формула", "a": "Лейкоциты — белые клетки с ядрами, до ~20 мкм. По зернистости делят на гранулоциты (нейтрофилы, эозинофилы, базофилы) и агранулоциты (лимфоциты, моноциты). У КРС 6–10·10⁹/л. Увеличение — лейкоцитоз, уменьшение — лейкопения.\n\nГлавная функция — защита. Поглощение и переваривание микробов — фагоцитоз (открыл И. И. Мечников). Нейтрофилы и эозинофилы способны к амёбовидному движению, проходят через стенки капилляров. Базофилы почти не фагоцитируют, синтезируют гепарин (против свёртывания).\n\nЛимфоциты — 30–50%, живут долго, центральное звено иммунитета:\n• Т-лимфоциты (тимусзависимые) — клеточный иммунитет, разрушают чужеродные и изменённые клетки;\n• В-лимфоциты (бурсазависимые) — гуморальный иммунитет, вырабатывают антитела;\n• нулевые — превращаются в Т- или В-лимфоциты.\n\nМоноциты переваривают микробы и обломки клеток, в очаге воспаления → макрофаги. Процентное соотношение видов — лейкоцитарная формула (лейкограмма)."}, {"num": "46", "category": "Обмен веществ", "q": "Физиология мышц", "hint": "• 3 типа ткани: поперечнополосатая скелетная, гладкая, сердечная\n• Единица — мышечное волокно; актин (тонкие) + миозин (толстые) → исчерченность\n• Свойства: возбудимость, проведение (4–15 м/с), растяжимость, эластичность, пластичность\n• Одиночное сокращение: 3 периода; тетанус зубчатый/гладкий\n• Химизм: анаэробная (распад АТФ) + аэробная; креатинфосфат, молочная кислота\n• Теория скольжения: Ca → тропонин → мостики миозина к актину", "a": "Мышечная ткань: возбудимость, проводимость, сократимость. Типы: поперечнополосатая скелетная (произвольная), гладкая (непроизвольная), сердечная. Единица скелетной мышцы — волокно с миофибриллами из актина (тонкие нити) и миозина (толстые); их чередование даёт поперечную исчерченность.\n\nСвойства: возбудимость (меньше, чем у нервов), изолированное проведение (4–15 м/с), растяжимость, эластичность (возврат к длине), пластичность; эластичность выражена лучше.\n\nСокращение: при одиночном раздражении — 3 периода (латентный, сокращения, расслабления; у млекопитающих 0,04–0,1 с). При частых импульсах — тетанус (зубчатый, гладкий); в норме мышцы работают по типу гладкого тетануса.\n\nХимизм (2 фазы): анаэробная (распад АТФ на АДФ и фосфорную кислоту, энергия) и аэробная; восстановление АТФ — за счёт креатинфосфата; молочная кислота частично окисляется до CO2 и воды, частично → гликоген.\n\nТеория скольжения: Ca связывается с тропонином, тропомиозин освобождает места, головки мостиков миозина прикрепляются к актину и продвигают нити к середине саркомера → укорочение. Гладкие мышцы сокращаются медленно, длительно, мало утомляются, имеют тонус."}, {"num": "47", "category": "Кровь и кровообращение", "q": "Состав плазмы крови", "hint": "• Кровь = плазма + форменные элементы; плазма сверху при отстаивании\n• Состав: 90–92% воды, 8–10% сухих веществ; белки 6–8%\n• Белки: альбумины, глобулины (фибриноген → свёртывание); онкотическое давление; гамма-глобулины → антитела\n• Сыворотка = плазма без фибриногена\n• Прочее: глюкоза, липиды, небелковый азот, соли (осмотическое давление)\n• pH 7,35–7,55; буферы — назови; щелочной резерв", "a": "Кровь = жидкая плазма + форменные элементы (эритроциты, лейкоциты, тромбоциты). При отстаивании/центрифугировании плазма сверху — прозрачная, слегка желтоватая.\n\nСостав плазмы: 90–92% воды, 8–10% сухих веществ. Белки (6–8%) — главным образом альбумины и глобулины; к глобулинам относят фибриноген (свёртывание). Белки создают онкотическое давление, поддерживают объём крови и воду в тканях; из гамма-глобулинов — антитела (иммунитет). Плазма без фибриногена — сыворотка.\n\nТакже: глюкоза, липиды, молочная и пировиноградная кислоты, небелковый азот (аминокислоты, мочевина, мочевая кислота, креатинин), минеральные соли, ферменты, гормоны, витамины; растворены O2, CO2, азот. Минеральные соли создают осмотическое давление.\n\nРеакция слабощелочная, pH 7,35–7,55; поддерживают буферные системы — карбонатная, фосфатная, гемоглобиновая (основная), белков плазмы, и выделительные органы. Бикарбонаты — щелочной резерв крови."}, {"num": "48", "category": "Выделительная система", "q": "Типы почек, их строение", "hint": "• Латынь: renes; парные, забрюшинно под поясницей\n• 4 типа — назови и привяжи к видам\n• Множественные (водные, белый медведь); бороздчатая многососочковая — КРС\n• Гладкая многососочковая — свинья; гладкая однососочковая — овца, лошадь, собака\n• Разрез: кора (тёмная) + мозговой слой; капсулы\n• Нефрон: ~8 млн у КРС; почечное тельце (фильтрация, первичная моча) + канальцы (реабсорбция, вторичная)", "a": "Почки (renes) — парные паренхиматозные органы, образуют мочу; лежат забрюшинно под поясничными позвонками. 4 типа:\n• Множественные (водные животные, белые медведи) — много маленьких почек со стебельками к общему мочеточнику.\n• Бороздчатая многососочковая (КРС) — дольки слиты средней частью, сосочки и наружные части обособлены.\n• Гладкая многососочковая (свинья) — дольки слиты наружными частями, обособлены лишь сосочки.\n• Гладкая однососочковая (овца, лошадь, собака) — доли полностью слиты, сосочки → один общий.\n\nНа разрезе: кора (мочеотделительная зона, тёмно-красная) и мозговой слой (белый). Снаружи — фиброзная и жировая капсулы.\n\nСтруктурно-функциональная единица — нефрон (у КРС ~8 млн в почке). Состоит из капсулы клубочка с сосудистым клубочком (вместе — почечное тельце; фильтрация, первичная моча) и канальцев (проксимальный отдел, петля нефрона, дистальный отдел; реабсорбция, вторичная моча)."}, {"num": "49", "category": "Кровь и кровообращение", "q": "Свойства сердечной мышцы. Сердечный цикл", "hint": "• Стенка сердца: какие 3 слоя?\n• 4 свойства миокарда на «а», «в», «п», «с»\n• Проводящая система: узлы → пучок → волокна (4 звена, как называются?)\n• «Закон сердца» и зачем рефрактерность\n• Цикл при 60 уд/мин = 1 с: какие 3 фазы и их длительность?\n• Частоты по видам: лошадь vs КРС/свинья", "a": "Сердце — полый мышечный орган; стенка: эндокард, миокард, эпикард.\n\nСвойства миокарда: автоматия, возбудимость, проводимость, сократимость.\n\nАвтоматия — ритмические сокращения без внешних раздражений. Проводящая система:\n• синоатриальный узел — водитель ритма (пейсмекер)\n• атриовентрикулярный узел — центр автоматии 2-го порядка\n• пучок Гиса с двумя ножками\n• волокна Пуркине\n\nНа пороговое раздражение — максимальное сокращение; сила тем больше, чем сильнее растянуты волокна в диастолу («закон сердца»). Длительная абсолютная рефрактерность не даёт впадать в тетанус.\n\nСердечный цикл — смена систолы и диастолы. При 60 уд/мин цикл = 1 с:\n• систола предсердий ~0,1 с — кровь в желудочки\n• систола желудочков ~0,3 с (напряжение, изгнание) — кровь в аорту и лёгочную артерию; AV-клапаны закрыты, полулунные открыты\n• общая диастола ~0,6 с — заполнение камер\n\nЧСС в минуту: лошадь 32-42, КРС и свинья 60-80, собака 70-80."}, {"num": "50", "category": "Кровь и кровообращение", "q": "Регуляция работы сердца", "hint": "• Два вида регуляции: нервная и …?\n• Блуждающий vs симпатический: кто тормозит, кто усиливает?\n• Где центры каждого (продолговатый мозг / грудные сегменты)?\n• Рефлексогенные зоны: дуга аорты, каротидный синус, устья полых вен — кто что делает\n• Гуморально: адреналин, тироксин — эффект; ионы K vs Ca", "a": "Сердце работает автоматически, но регулируе
