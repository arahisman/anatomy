иём.\n• Суточная (pro die) — за сутки (разовая × кратность).\n• Курсовая — на весь курс лечения.\n\nКлассификация по величине действия:\n• Минимальная (пороговая) — наименьшая, вызывающая эффект.\n• Средняя терапевтическая — даёт нужный лечебный эффект у большинства животных.\n• Высшая (максимальная) — предельно допустимая без вреда.\n• Токсическая — вызывает отравление.\n• Летальная (смертельная, DL) — вызывает гибель; DL50 — гибель 50% животных.\n\nДополнительно:\n• Широта терапевтического действия — диапазон между минимальной и токсической дозой (чем шире, тем безопаснее).\n• Ударная (нагрузочная) и поддерживающая дозы — для быстрого создания и поддержания концентрации."}, {"num": "3.2", "category": "Билет 3", "q": "Маточные средства. Спазмолитические средства.", "hint": "• Маточные = усиливают сокращения миометрия\n• Окситоцин, питуитрин, эргометрин, простагландины\n• Применение: слабость родов, кровотечения, задержка последа\n• Спазмолитики = расслабляют: но-шпа, папаверин, атропин", "a": "МАТОЧНЫЕ СРЕДСТВА (uterotonica):\n• Определение — вещества, усиливающие сократительную активность и тонус миометрия.\n\nКлассификация:\n• Гормоны задней доли гипофиза: окситоцин (Oxytocinum), питуитрин (Pituitrinum) — вызывают ритмичные сокращения.\n• Препараты спорыньи (алкалоиды): эргометрина малеат (Ergometrini maleas), эрготамин, метилэргометрин — вызывают длительное тоническое сокращение.\n• Простагландины F2α: динопрост, эстрофан, магэстрофан — стимулируют матку, лизис жёлтого тела.\n\nМеханизм:\n• Окситоцин/питуитрин — ритмичные сокращения тела матки.\n• Спорынья — стойкий тонус, сжатие сосудов (останавливает кровотечение).\n\nПрименение:\n• Слабость родовой деятельности, стимуляция родов.\n• Задержание последа, субинволюция, атония матки.\n• Послеродовые маточные кровотечения (спорынья).\n• Изгнание содержимого при эндометрите.\n\nСПАЗМОЛИТИЧЕСКИЕ СРЕДСТВА:\n• Определение — вещества, снимающие спазм гладкой мускулатуры (расслабляют миометрий, кишечник, сосуды).\n\nКлассификация:\n• Миотропные (прямо на мышцу): но-шпа/дротаверин (No-spa), папаверина гидрохлорид (Papaverini hydrochloridum), магния сульфат.\n• Нейротропные (М-холиноблокаторы): атропина сульфат (Atropini sulfas), платифиллин.\n\nМеханизм:\n• Миотропные — снижают тонус гладких мышц напрямую.\n• Нейротропные — блокируют М-холинорецепторы, устраняют влияние парасимпатики.\n\nПрименение:\n• Спазмы кишечника (колики у лошадей), желчных и мочевых путей.\n• Спазм шейки матки, угроза аборта (расслабление матки).\n• Спастические боли."}, {"num": "3.3", "category": "Билет 3", "q": "Выписать 5 штук внутриматочных палочек с фуразолидоном корове при эндометрите.", "hint": "• Furazolidonum 0,5 — антибактериальное\n• Форма: палочка (bacillus) на основе\n• D.t.d. N 5 — на курс\n• В матку, 1 раз/сутки при эндометрите", "a": "Rp.: Furazolidoni 0,5\n     Olei Cacao q.s. ut fiat bacillus longitudine 10 cm\n     D.t.d. N 5\n     M.D.S. Корове. Внутриматочно, по 1 палочке 1 раз в сутки\n     после очищения и обработки полости матки; при остром\n     гнойно-катаральном эндометрите, до выздоровления\n     (не более 5 введений).\n\nПояснение:\n• Фуразолидон (нитрофуран) — широкий спектр антимикробного действия (эшерихии, протей, стафило-, стрептококки, в т.ч. устойчивые к антибиотикам), местно в полости матки.\n• Содержание фуразолидона в палочке ~0,5 г; основа — масло какао (или полиэтиленоксидная), формирующая палочку, растворяющуюся при температуре тела.\n• Вводят 1 раз в сутки (при тяжёлом течении 1 раз в 24–48 ч), курс до 5 палочек. Молоко в пищу — после кипячения в течение 3 сут после последнего введения. (Состав основы уточнить по фармакопее/инструкции производителя.)"}, {"num": "4.1", "category": "Билет 4", "q": "Жидкие лекарственные формы. Твердые (плотные) лекарственные формы.", "hint": "• Жидкие: растворы, настои, отвары, микстуры, эмульсии\n• + настойки, экстракты, линименты, слизи\n• Твёрдые: порошки, таблетки, драже, гранулы\n• + капсулы, болюсы, брикеты", "a": "ЖИДКИЕ ЛЕКАРСТВЕННЫЕ ФОРМЫ:\n• Определение — формы, где лекарство растворено/взвешено в жидкости (вода, спирт, масло).\n\nВиды:\n• Растворы (Solutiones) — прозрачные, вещество полностью растворено.\n• Настои (Infusa) и отвары (Decocta) — водные вытяжки из растительного сырья.\n• Настойки (Tincturae) — спиртовые вытяжки.\n• Экстракты жидкие (Extracta fluida) — концентрированные вытяжки.\n• Микстуры (Mixturae) — смеси нескольких жидких веществ.\n• Эмульсии (Emulsa) — взвесь нерастворимых жидкостей (масло в воде).\n• Суспензии (Suspensiones) — взвесь твёрдых нерастворимых частиц.\n• Слизи (Mucilagines), линименты (Linimenta — жидкие мази).\n\nДостоинства: быстрое действие, удобство дозирования, мягкое действие на слизистые.\nНедостатки: малая стойкость при хранении, громоздкость.\n\nТВЁРДЫЕ (ПЛОТНЫЕ) ЛЕКАРСТВЕННЫЕ ФОРМЫ:\n• Определение — формы с твёрдой консистенцией.\n\nВиды:\n• Порошки (Pulveres) — простые и сложные, дозированные/недозированные.\n• Таблетки (Tabulettae) — спрессованные дозированные формы.\n• Драже (Dragee) — наслоением на гранулу.\n• Гранулы (Granulae) — мелкие зёрна.\n• Капсулы (Capsulae) — оболочка с веществом.\n• Болюсы (Boli) — крупные мягкие пилюли для крупных животных.\n• Пилюли (Pilulae), брикеты, кашки (Electuaria — мягкая форма).\n\nДостоинства: стойкость при хранении, точность дозирования, удобство транспортировки.\nНедостатки: более медленное действие (нужно растворение)."}, {"num": "4.2", "category": "Билет 4", "q": "Принципы дозирования веществ на все животное и на 1 кг веса его, возможные ошибки. Соотношение доз лекарственных веществ животным разного вида и возраста.", "hint": "• Два способа: на всё животное и на 1 кг массы\n• На 1 кг точнее — учёт реальной массы\n• Ошибки: средняя масса, не учли вид/возраст\n• Молодым и старым — меньше; кошкам осторожно", "a": "ПРИНЦИПЫ ДОЗИРОВАНИЯ:\n\n1) Дозирование на всё животное:\n• Дозу указывают на одну голову (среднее животное вида).\n• Просто, но неточно — не учитывает индивидуальную массу.\n• Ошибка: при отклонении массы от средней — передозировка (мелкие) или недостаточная доза (крупные).\n\n2) Дозирование на 1 кг массы тела:\n• Дозу умножают на фактическую массу животного (мг/кг, ЕД/кг).\n• Точный и предпочтительный метод, особенно для сильнодействующих и ядовитых веществ.\n• Требует точного взвешивания/определения массы.\n\nВозможные ошибки:\n• Ориентир на «среднюю» массу без взвешивания.\n• Неучёт упитанности (жир мало насыщается водорастворимыми веществами — расчёт лучше на «тощую» массу).\n• Путаница единиц (г/мг/мл/ЕД).\n• Неучёт вида и возраста.\n\nСООТНОШЕНИЕ ДОЗ ПО ВИДУ ЖИВОТНЫХ (ориентировочно, относительно лошади = 1):\n• Лошадь — 1; крупный рогатый скот — 1–1,5.\n• Свинья — 1/5–1/4; овца, коза — 1/5–1/6.\n• Собака — 1/10–1/16; кошка — 1/20–1/32; птица — 1/20–1/40.\n• Видовая чувствительность: кошки плохо переносят фенол, салицилаты; жвачные чувствительны к ареколину.\n\nСООТНОШЕНИЕ ПО ВОЗРАСТУ:\n• Молодняку и старым животным дозу уменьшают (незрелые/ослабленные системы метаболизма и выведения).\n• Новорождённым — особенно осторожно; примерно: до года — часть взрослой дозы по массе с поправкой."}, {"num": "4.3", "category": "Билет 4", "q": "Выписать камфорную мазь для лечения мастита у коровы.", "hint": "• Unguentum Camphoratum 10%\n• Камфора 10,0 + основа (вазелин/ланолин)\n• Наружно, втирать в вымя\n• Согревающее, противовоспалительное при мастите", "a": "Rp.: Camphorae 10,0\n     Vaselini\n     Lanolini ana 45,0\n     M.f. unguentum\n     D.S. Корове. Наружное. Наносить тонким слоем и слегка\n     втирать в кожу поражённой четверти вымени 2–3 раза в\n     день в течение 7–10 дней при мастите.\n\nПояснение:\n• Камфорная мазь 10% (Unguentum Camphoratum) — камфора 10 частей на 90 частей основы (вазелин + ланолин).\n• Действие местнораздражающее, отвлекающее, противовоспалительное и слабоантисептическое; усиливает кровоток и улучшает рассасывание воспаления в вымени.\n• Применяют наружно лёгким массажем 2–3 раза в сутки; обычно при субклиническом/серозном мастите и в комплексной терапии. На раздражённую/повреждённую кожу и трещины сосков не наносят."}, {"num": "5.1", "category": "Билет 5", "q": "Дозирование веществ с учетом вида, возраста, пола, массы тела, упитанности и физиологического состояния животного.", "hint": "• Доза — количество вещества на приём\n• Вид, возраст, масса, упитанность — всё влияет\n• Молодняк и старые — меньше; жирные — осторожно\n• Беременность, лактация — особый учёт", "a": "Определение:\n• Доза — количество лекарственного вещества, вводимое за один приём, рассчитанное на животное или на 1 кг массы тела.\n\nВиды доз:\n• Терапевтическая (лечебная), токсическая, смертельная (летальная).\n• Разовая, суточная, курсовая.\n\nФакторы, влияющие на дозу:\n• Вид животного: чувствительность разная (например, лошади и КРС чувствительны к ареколину; кошки — к фенолу; жвачные имеют рубец). Дозы выражают чаще на единицу массы.\n• Возраст: молодняку и старым животным дозу снижают (недоразвитие/ослабление функций печени и почек, изменённый обмен). Детёнышам — доля от взрослой дозы.\n• Пол: самки в среднем чувствительнее; учитывают также беременность.\n• Масса тела: основной критерий расчёта (мг или мл на 1 кг). Чем больше масса — тем больше доза.\n• Упитанность: у жирных животных липофильные вещества депонируются в жире, у истощённых — действие усиливается; дозу корректируют.\n• Физиологическое состояние: беременность (риск аборта, токсичность для плода), лактация (переход в молоко), стельность, голодание, лихорадка, истощение — требуют коррекции дозы.\n\nВывод:\n• Дозу всегда индивидуализируют: вид + масса + возраст + состояние, чтобы получить лечебный эффект без токсичности."}, {"num": "5.2", "category": "Билет 5", "q": "Понятие о рецепте, его составные части.", "hint": "• Рецепт — письменное требование врача аптеке\n• Inscriptio, Datum, Designatio, Praepositio\n• Rp. → Recipe «возьми»\n• D.S. — выдай, обозначь; подпись врача", "a": "Определение:\n• Рецепт — письменное, составленное по установленной форме обращение (требование) ветеринарного врача к аптеке об изготовлении и отпуске лекарства с указанием способа его применения.\n• Имеет юридическое, медицинское и хозяйственное значение.\n\nСоставные части рецепта:\n• Inscriptio (надпись): штамп, дата выписки, ФИО и адрес владельца/хозяйства, вид и возраст животного.\n• Invocatio (обращение): «Recipe» (Rp.) — «возьми».\n• Designatio materiarum (перечисление веществ): названия лекарственных средств на латыни в родительном падеже и их количества (доза, концентрация); основное вещество (basis), вспомогательные (adjuvans, corrigens, constituens).\n• Subscriptio (предписание): указание фармацевту — изготовить форму, D.t.d. N (раздели на дозы), вид лекарственной формы.\n• Signatura (обозначение): «Signa» (S.) — сигнатура: способ, доза, кратность и путь применения (на русском, понятно владельцу), вид животного.\n• Подпись и личная печать врача.\n\nОбозначения:\n• M. — Misce (смешай); D.S. — Da. Signa (выдай, обозначь); D.t.d. N — Da tales doses numero (выдай таких доз числом).\n\nПравила:\n• Латынь, чёткий почерк, количества жидких в мл, твёрдых в г; исправления не допускаются."}, {"num": "5.3", "category": "Билет 5", "q": "Выписать гипертонический раствор глюкозы 200 мл. для внутривенного введения корове.", "hint": "• Гипертонический = 40% глюкоза\n• Solutio Glucosi 40% — 200 мл\n• D.S. внутривенно, медленно\n• Питание, дезинтоксикация, при ацетонемии", "a": "Rp.: Solutionis Glucosi 40% — 200 ml\n      Sterilisetur!\n      D.S. Внутривенно. Корове. Ввести 200 мл медленно, однократно (1–2 раза в сутки) при ацетонемии, интоксикации, гипотонии преджелудков.\n\nПояснение:\nГипертоническим считают раствор глюкозы 40% (для жвачных применяют 20–40%). Для КРС внутривенно вводят 75–370 мл препарата, доза 200 мл — типичная средняя. Вводят медленно, 1–2 раза в день. Действие: повышает осмотическое давление крови, питательное, дезинтоксикационное, усиливает работу сердца и печени, увеличивает диурез; показан при кетозе (ацетонемии), интоксикациях, атонии преджелудков."}, {"num": "6.1", "category": "Билет 6", "q": "Понятие о возбуждении фармакологическими средствами: значение этого действия при различных нарушениях функционального состояния животных. Понятие о фармакологическом угнетении; значение этого действия при изменениях функционального состояния животных.", "hint": "• Возбуждение — усиление функции органа\n• Угнетение — ослабление функции\n• Стимуляторы: кофеин, камфора, аналептики\n• Угнетающие: наркоз, снотворные, седативные", "a": "Возбуждение (стимуляция):\n• Определение — усиление (повышение) функциональной активности органа или системы под действием лекарственного вещества (до уровня нормы и выше).\n• Виды: возбуждающее (в пределах нормы) и стимулирующее/тонизирующее действие.\n• Значение: применяют при угнетении функций — слабости сердца и дыхания, шоке, коллапсе, ослаблении ЦНС, атонии преджелудков, парезах.\n• Примеры препаратов: кофеин-бензоат натрия (Coffeinum-natrii benzoas), камфора (Camphora), кордиамин (Cordiaminum), лобелин, цититон — дыхательные и сердечно-сосудистые аналептики; стрихнин (Strychnini nitras) — тонус ЦНС; прозерин — тонус ЖКТ.\n\nУгнетение (депрессия):\n• Определение — ослабление (снижение) функциональной активности органа или системы под действием вещества.\n• Степени: успокоение (седация) → угнетение → паралич; крайняя степень возбуждения может перейти в паралич.\n• Значение: применяют при перевозбуждении, боли, судорогах, для обездвиживания, наркоза, снятия спазмов и воспаления.\n• Примеры: средства для наркоза (хлоралгидрат — Chlorali hydras, эфир, тиопентал-натрий), снотворные (барбитураты), нейролептики (аминазин — Aminazinum, ромпун/ксилазин), седативные, болеутоляющие (анальгетики), спазмолитики.\n\nВывод:\n• Выбор действия зависит от исходного состояния: при ослаблении функции — возбуждающие/стимулирующие средства; при перевозбуждении — угнетающие. Цель — вернуть функцию к норме."}, {"num": "6.2", "category": "Билет 6", "q": "Противоэймериозные средства. Инсектоакарициды. Дератизационные средства.", "hint": "• Эймериоз (кокцидиоз) — кокцидиостатики\n• Инсектоакарициды — против насекомых и клещей\n• Дератизация — против грызунов (зоокумарины)\n• Пиретроиды, ФОС; зоокумарин = яд крови", "a": "Противоэймериозные (кокцидиостатики):\n• Назначение — лечение и профилактика эймериоза (кокцидиоза) птиц, кроликов, телят, ягнят.\n• Препараты: ампролиум, кокцидиовит, монензин, салиномицин, толтразурил (Байкокс), сульфаниламиды (сульфадимезин, норсульфазол), фуразолидон, химкокцид.\n• Механизм: подавляют развитие эймерий (кокцидий) на разных стадиях, нарушают обмен и размножение паразита в кишечнике.\n\nИнсектоакарициды:\n• Назначение — уничтожение насекомых (инсектициды: вши, блохи, мухи, оводы) и клещей (акарициды: чесоточные, иксодовые).\n• Группы и препараты:\n  – Фосфорорганические (ФОС): хлорофос, неоцидол (диазинон), сульфидофос.\n  – Пиретроиды: перметрин, циперметрин, дельтаметрин (Бутокс), стомазан, неостомазан.\n  – Хлорорганические — ограничены (токсичны, кумулируются).\n  – Макроциклические лактоны (системные): ивермектин (Ивомек), аверсектин (Баймек) — против чесоточных клещей, оводов, гельминтов.\n• Механизм: нейротоксины — нарушают передачу нервного импульса у членистоногих (ФОС — антихолинэстеразное; пиретроиды — на натриевые каналы).\n\nДератизационные средства (родентициды):\n• Назначение — уничтожение грызунов (крысы, мыши) как переносчиков болезней.\n• Препараты: антикоагулянты — зоокумарин (варфарин), дифенацин, ратиндан, бродифакум; острые яды — фосфид цинка.\n• Механизм: антикоагулянты нарушают свёртывание крови (блокируют витамин К), вызывают кровоизлияния; действуют постепенно, не вызывая настороженности у грызунов.\n• Меры: приманки, осторожность (опасны для других животных и человека)."}, {"num": "6.3", "category": "Билет 6", "q": "Выписать и приготовить 10% раствор кальция хлорида для внутривенного введения корове.", "hint": "• Calcii chloridi 10% — 200 мл\n• Только внутривенно, медленно!\n• Под кожу/в мышцу нельзя — некроз\n• При родильном парезе, эндометрите", "a": "Rp.: Solutionis Calcii chloridi 10% — 200 ml\n      Sterilisetur!\n      D.S. Внутривенно. Корове. Ввести 200 мл медленно, однократно (при необходимости повторить) при родильном парезе, эндометрите, для повышения тонуса матки.\n\nПояснение:\nДля КРС 10% раствор кальция хлорида вводят внутривенно в дозе 150–400 мл на животное; 200 мл — типичная доза. Вводят ТОЛЬКО внутривенно и медленно: подкожно и внутримышечно нельзя — выраженное раздражение и некроз тканей. Действие: восполняет дефицит кальция, противовоспалительное, кровоостанавливающее, тонизирует матку; показан при родильном парезе, послеродовых осложнениях, эндометрите."}, {"num": "7.1", "category": "Билет 7", "q": "Действие лекарственных веществ в зависимости от их концентрации и лекарственной формы.", "hint": "• Концентрация: меньше — раздражает, больше — прижигает\n• Один препарат, разный % = разный эффект\n• Жидкие формы действуют быстро, мази — долго и местно\n• Форма решает путь и скорость всасывания", "a": "Зависимость действия от концентрации:\n• Одно и то же вещество в разных концентрациях даёт разный эффект.\n• Слабые растворы — мягкое (вяжущее, противомикробное), крепкие — раздражающее и прижигающее.\n• Примеры: спирт этиловый 40% — раздражающее, 70% — лучшее антисептическое (обезвоживает микробы), 90–96% — дубит кожу, антисептика слабее.\n• Раствор йода: 5% — для операционного поля, концентрированный — прижигающее.\n• Скорость всасывания зависит от разности концентраций по обе стороны мембраны: выше концентрация — быстрее и сильнее действие.\n\nЗависимость действия от лекарственной формы:\n• Форма определяет путь введения, скорость всасывания и продолжительность действия.\n• Растворы, инъекции — действуют быстро, кратковременно; всасывание полное.\n• Порошки, таблетки, болюсы — действуют медленнее (нужно растворение).\n• Мягкие формы (мази, пасты) — длительное местное действие, медленное всасывание.\n• Свечи, суппозитории — местное и резорбтивное действие через слизистую.\n• Пролонгированные формы — замедленное, длительное действие.\n\nВиды действия по локализации:\n• Местное — в месте нанесения (примочки, мази, анестетики новокаин, лидокаин).\n• Резорбтивное (общее) — после всасывания в кровь и доставки к органу-мишени.\n• Рефлекторное — раздражение рецепторов с ответом на расстоянии.\n\nВывод: эффект препарата определяется не только самим веществом, но и его концентрацией и лекарственной формой."}, {"num": "7.2", "category": "Билет 7", "q": "Мягкие лекарственные формы.", "hint": "• «МЛП-С»: Мази, Линименты, Пасты, Свечи\n• Плюс пластыри и кашки\n• Мазь мягкая, паста густая (>25% порошка)\n• Линимент — жидкая мазь", "a": "Определение:\n• Мягкие лекарственные формы — формы мягкой (вязкой) консистенции для наружного и местного применения, реже для введения в полости.\n\nКлассификация (виды):\n• Мази (Unguenta)\n• Пасты (Pastae)\n• Линименты — жидкие мази (Linimenta)\n• Суппозитории — свечи, палочки, шарики (Suppositoria)\n• Пластыри (Emplastra)\n• Кашки (Electuaria)\n\nХарактеристика:\n• Мазь — мягкая форма для нанесения на кожу, раны, слизистые; состоит из основы и действующего вещества (вазелин, ланолин, свиной жир как основа). Содержание порошка до 25%.\n• Паста — разновидность мази с содержанием порошкообразных веществ свыше 25%; гуще мази, дольше держится на поражённом участке, действует длительнее, обладает подсушивающим действием.\n• Линимент — жидкая мазь, по консистенции близка к маслам; бывает эмульсионный, суспензионный, смешанный. Перед применением взбалтывают (линимент Вишневского).\n• Суппозитории — дозированные формы, плавятся при температуре тела; ректальные, вагинальные, палочки. Действие местное и резорбтивное.\n• Пластыри — пластичная масса на ткани/бумаге, прилипает к коже.\n• Кашки — тестообразная масса для дачи внутрь крупным животным (с порошками, экстрактами, патокой/сиропом как связующим).\n\nПрименение:\n• Защита, лечение кожи, ран, слизистых; противовоспалительное, антисептическое, раздражающее, смягчающее действие."}, {"num": "7.3", "category": "Билет 7", "q": "Выписать уголь, активированный в таблетках свинье при отравлении.", "hint": "• Carbo activatus — таблетки по 0,25\n• Свинье 5–10 г = около 20–40 таблеток\n• Внутрь, в виде водной взвеси\n• Адсорбент при отравлении, чем раньше — тем лучше", "a": "Rp.: Carbonis activati 0,25\n     D.t.d. N 40 in tabulettis\n     S. Внутрь. Свинье. Растолочь и дать в виде взвеси с водой на один приём при отравлении (по возможности — в первые часы).\n\nПояснение:\n• Уголь активированный (Carbo activatus) — адсорбент, связывает яды, токсины и газы в ЖКТ, препятствуя их всасыванию.\n• Таблетки выпускаются по 0,25 г; разовая доза для свиньи как адсорбента при отравлении — около 5–10 г (здесь 40 табл. ≈ 10 г).\n• Путь введения — внутрь в виде водной взвеси (растолчённые таблетки в воде).\n• Эффективнее всего в первые часы после отравления; при необходимости дают повторно. (Точные дозы — уточнить по российской ветеринарной рецептуре/наставлению.)"}, {"num": "8.1", "category": "Билет 8", "q": "Мази, пасты, линименты. Методика приготовления, привести примеры и выписать рецепт.", "hint": "• Основа + действующее вещество\n• Мазь до 25% порошка, паста — свыше 25%\n• Линимент — жидкая мазь, взбалтывать\n• Примеры: ихтиоловая, цинковая, лин. Вишневского", "a": "Мази (Unguenta):\n• Мягкая форма для нанесения на кожу, раны, слизистые.\n• Состав: действующее вещество + основа (вазелин Vaselinum, ланолин Lanolinum, свиной жир Adeps suillus).\n• Содержание порошка до 25%.\n• Приготовление: действующее вещество тщательно растирают и смешивают с основой до однородной массы (M.f. unguentum).\n• Примеры: мазь ихтиоловая, цинковая, серная, тетрациклиновая.\n\nПасты (Pastae):\n• Разновидность мази с содержанием порошкообразных веществ свыше 25%.\n• Гуще мази, дольше держатся, действуют длительнее, подсушивают.\n• Приготовление: смешивают порошки с расплавленной основой (M.f. pasta).\n• Примеры: паста цинковая, паста Лассара.\n\nЛинименты (Linimenta):\n• Жидкие мази, по консистенции близки к маслам; перед применением взбалтывают.\n• Виды: эмульсионные, суспензионные, смешанные.\n• Приготовление: смешивают/эмульгируют компоненты (M.f. linimentum).\n• Примеры: линимент бальзамический по Вишневскому, линимент синтомицина.\n\nРецепт мази:\nRp.: Unguenti Zinci 10% — 30,0\n     D.S. Наружное. Смазывать поражённые участки кожи 1–2 раза в день.\n\nРецепт линимента:\nRp.: Linimenti Vishnevsky 50,0\n     D.S. Наружное. Наносить на марлевую повязку при ранах, язвах.\n\nПояснение:\n• Мази и пасты — для длительного местного действия; линименты удобны для втирания и нанесения на повязки."}, {"num": "8.2", "category": "Билет 8", "q": "Предмет, задачи и значение рецептуры. Правила выписывания рецептов. Виды рецептов. Привести примеры.", "hint": "• Рецепт — письменное обращение врача в аптеку\n• Виды: магистральные, официнальные, мануальные\n• По форме: развёрнутые и сокращённые\n• Латынь, Rp.— D.S., подпись и печать", "a": "Предмет и задачи рецептуры:\n• Рецептура — раздел фармакологии о правилах выписывания, изготовления и отпуска лекарств.\n• Общая рецептура — изучает лекарственные формы и правила прописывания.\n• Частная рецептура — выписывание конкретных препаратов.\n• Задача: научить грамотно выписывать рецепт с правильной дозой, формой, путём введения.\n\nЗначение:\n• Рецепт — письменное обращение (распоряжение) ветврача в аптеку об изготовлении и отпуске лекарства, юридический и финансовый документ.\n\nВиды рецептов (прописей):\n• Официнальные — узаконенные Фармакопеей, готовые, не подлежат изменению; всегда сокращённые (указывают только название формы и количество).\n• Магистральные — составляет врач по своему усмотрению с учётом состояния пациента; всегда развёрнутые (полный состав, концентрация, дозы); готовят в аптеке.\n• Мануальные — по стандартным прописям из фармацевтического мануала; развёрнутые.\n• По форме: развёрнутые (все ингредиенты) и сокращённые (название формы + количество).\n\nПравила выписывания:\n• Пишут на латинском языке, чётко, без исправлений.\n• Начинают с Rp. (Recipe — возьми).\n• Названия веществ — в родительном падеже, доза — арабскими цифрами (граммы — десятичной дробью).\n• Указания фармацевту: M.f. (Misce fiat), D.t.d. N (Da tales doses), D.S. (Da. Signa — выдай, обозначь).\n• Сигнатура (S.) — способ применения, вид животного, на русском.\n• Подпись и печать ветврача.\n\nПримеры:\nОфицинальный (сокращённый):\nRp.: Tabulettas Analgini 0,5 N 10\n     D.S. Внутрь по 1 таблетке.\n\nМагистральный (развёрнутый):\nRp.: Mentholi 0,1\n     Vaselini 10,0\n     M.f. unguentum\n     D.S. Наружное. Смазывать кожу."}, {"num": "8.3", "category": "Билет 8", "q": "Выписать и приготовить 5% спиртовой раствор йода 150мл. для обработки операционного поля.", "hint": "• Йод 5% = 7,5 г на 150 мл\n• Растворитель — спирт этиловый 95%\n• Наружно, для операционного поля\n• Обрабатывают дважды: до и после операции", "a": "Готовый официнальный вариант:\nRp.: Solutionis Iodi spirituosae 5% — 150 ml\n     D.S. Наружное. Для обработки операционного поля: смазать кожу стерильным тампоном двукратно (перед операцией и после).\n\nРазвёрнутый (магистральный) вариант приготовления:\nRp.: Iodi 7,5\n     Kalii iodidi 5,0\n     Spiritus aethylici 95% ad 150 ml\n     M.f. solutio\n     D.S. Наружное. Для обработки операционного поля двукратно.\n\nПояснение:\n• 5% раствор: на 150 мл берут 7,5 г йода (5% × 150). Йодид калия добавляют для лучшего растворения йода в спирте.\n• Растворитель — спирт этиловый 95%.\n• Йод — антисептик окислительного типа; операционное поле обрабатывают дважды (метод Гроссиха–Филончикова): до и в конце операции, движениями от центра к периферии.\n• Применяют наружно; на повреждённую кожу/слизистые крепкий раствор не наносят (прижигание)."}, {"num": "9.1", "category": "Билет 9", "q": "Государственная фармакопея: содержание, значение.Номенклатура фармакологических веществ: названия русские и латинские,основные и синонимы: приставки и окончания.", "hint": "• Фармакопея — гос. сборник стандартов на ЛС\n• Закон, обязательна для всех\n• Названия: основное + синонимы, рус. и латынь\n• Приставки/окончания подсказывают группу (-циллин, -каин)", "a": "Государственная фармакопея (ГФ):\n• Сборник обязательных государственных стандартов и положений, нормирующих качество лекарственных средств.\n• Имеет силу закона; требования обязательны для всех предприятий, изготавливающих, хранящих и применяющих ЛС.\n• Издаётся под контролем государства, периодически переиздаётся и дополняется.\n\nСодержание фармакопеи:\n• Общие статьи (методы анализа, испытания на чистоту, методы стерилизации).\n• Частные статьи на отдельные препараты (состав, свойства, подлинность, хранение).\n• Список А (ядовитые — Venena) и список Б (сильнодействующие — Heroica), их хранение и высшие дозы.\n• Таблицы высших разовых и суточных доз для людей и животных.\n• Перечень реактивов, индикаторов, титрованных растворов.\n\nЗначение:\n• Обеспечивает единые требования к качеству, подлинности и безопасности ЛС.\n• Основа государственного контроля за изготовлением и применением.\n\nНоменклатура фармакологических веществ:\n• Каждое вещество имеет русское и латинское название (в рецептах — латынь, в родительном падеже).\n• Основное (международное непатентованное, МНН) название — официальное.\n• Синонимы — торговые (фирменные) названия одного и того же вещества.\n• Пример: основное — кислота ацетилсалициловая (Acidum acetylsalicylicum), синоним — аспирин (Aspirinum).\n\nПриставки и окончания (подсказывают группу):\n• Сульфа- — сульфаниламиды (Sulfadimezinum).\n• -циллин — пенициллины (Benzylpenicillinum).\n• -каин — местные анестетики (Novocainum, Lidocainum).\n• -ол — спирты, фенолы (Mentholum, Phenolum).\n• -ин — алкалоиды, гликозиды (Atropinum, Strychninum).\n• Окончание -um — характерно для латинских названий веществ среднего рода."}, {"num": "9.2", "category": "Билет 9", "q": "Растворы, отвары, настои. Методика приготовления, привести примеры и выписать рецепт.", "hint": "• Раствор — вещество растворено в воде (Solutio)\n• Настой — мягкое сырьё, настаивают 15 мин (Infusum)\n• Отвар — грубое сырьё, кипятят 30 мин (Decoctum)\n• Водяная баня, концентрация обычно 1:10", "a": "Жидкие лекарственные формы для внутреннего и наружного применения.\n\n1) Растворы (Solutiones):\n• Прозрачные жидкости, полученные растворением вещества в воде, спирте, масле.\n• Концентрация: в % или соотношением (1:1000).\n• Применяют внутрь, наружно, инъекционно.\n• Пример: Rp.: Solutionis Natrii chloridi 0,9% — 200 ml. Sterilisetur! D.S.\n\n2) Настои (Infusa) — из мягких частей растений (листья, цветки, трава):\n• Сырьё измельчают, заливают водой комнатной температуры, нагревают на кипящей водяной бане 15 минут, охлаждают 45 минут, процеживают.\n• Стандартное соотношение 1:10 (из сильнодействующего сырья — 1:30, 1:400).\n• Пример: настой травы термопсиса, листьев наперстянки.\n\n3) Отвары (Decocta) — из грубых, плотных частей растений (кора, корни, корневища):\n• Сырьё заливают водой, нагревают на кипящей водяной бане 30 минут, охлаждают 10 минут, процеживают горячими.\n• Соотношение обычно 1:10.\n• Пример: отвар коры дуба, корня алтея.\n\nОбщие правила:\n• Готовят на дистиллированной воде, используют свежими (хранят не более 2–3 суток в холоде).\n• Концентрацию указывают перед названием сырья.\n\nПример рецепта (настой):\nRp.: Infusi herbae Thermopsidis 0,6 — 200 ml\n     D.S. Внутрь по 1 столовой ложке (отхаркивающее).\n\nПример рецепта (отвар):\nRp.: Decocti corticis Quercus 20,0 — 200 ml\n     D.S. Наружно для полосканий (вяжущее)."}, {"num": "9.3", "category": "Билет 9", "q": "Выписать отвар коры дуба теленку.", "hint": "• Кора дуба = Cortex Quercus, отвар = Decoctum\n• Концентрация 1:10 (20,0 — 200 ml)\n• Вяжущее при поносе, внутрь\n• Кипятят 30 мин (грубое сырьё — кора)", "a": "Rp.: Decocti corticis Quercus 20,0 — 200 ml\n     D.S. Внутрь. Телёнку. По 100–150 мл 2–3 раза в день за 30 минут до выпойки молока — как вяжущее и противовоспалительное средство при диарее (поносе).\n\nПояснение:\n• Кора дуба (Cortex Quercus) — грубое плотное сырьё, поэтому готовят отвар (Decoctum) кипячением на водяной бане 30 минут.\n• Стандартная концентрация отвара 1:10, то есть 20,0 г сырья на 200 мл воды.\n• Действующее начало — дубильные вещества (танины), дают вяжущий, противовоспалительный и антисептический эффект на слизистую ЖКТ, уплотняют поверхность, уменьшают секрецию и перистальтику.\n• Применяют внутрь свежеприготовленным; диапазон дозы по сырью для телят 10–30 г (типичная — 20 г). При больших концентрациях возможен запор."}, {"num": "10.1", "category": "Билет 10", "q": "Виды рецептов (простые, сложные, дозированные и недозированные, развернутые и сокращенные). Приведите примеры.", "hint": "• Простой — 1 вещество; сложный — 2 и более\n• Дозированный — на дозы (D.t.d. N); недозированный — общей массой\n• Развёрнутый — все ингредиенты; сокращённый — готовая форма\n• Помни: D.t.d.N — признак дозированного", "a": "Рецепт — письменное обращение врача в аптеку об изготовлении и отпуске лекарства. Виды:\n\nПо числу ингредиентов:\n• Простой — содержит одно лекарственное вещество.\n  Пример: Rp.: Sol. Furacilini 0,02% — 200 ml. D.S.\n• Сложный — два и более веществ (основное + вспомогательные).\n  Пример: Rp.: Mentholi 0,1; Olei Vaselini 10,0. M.D.S.\n\nПо способу прописывания формы:\n• Развёрнутый — перечисляют все ингредиенты с количествами и указанием изготовить форму.\n  Пример: Rp.: Streptocidi 5,0; Olei Vaselini 50,0. M.f. linimentum. D.S.\n• Сокращённый — указывают готовую (официнальную) лекарственную форму и её количество.\n  Пример: Rp.: Unguenti Streptocidi 5% — 30,0. D.S.\n\nПо разделению на дозы:\n• Дозированный (разделительный) — общее количество делят на отдельные дозы; пишут D.t.d. N (дай таких доз числом).\n  Пример: Rp.: Norsulfazoli 0,5. D.t.d. N 10. S. По 1 порошку 2 раза в день.\n• Недозированный (неразделительный) — лекарство отпускают общей массой/объёмом, а делит его сам владелец при приёме.\n  Пример: Rp.: Natrii sulfatis 200,0. D.S. По 1 столовой ложке в воде.\n\nВывод: твёрдые дозированные формы (порошки, таблетки, свечи) выписывают с D.t.d. N; растворы, мази, отвары чаще — недозированно, общим объёмом."}, {"num": "10.2", "category": "Билет 10", "q": "Понятие о кумуляции, привыкании, синергизме, антагонизме. Привести примеры, ответ обосновать.", "hint": "• Кумуляция — накопление вещества/эффекта (дигитоксин)\n• Привыкание — ослабление действия (нужна доза больше)\n• Синергизм — усиление (1+1>2), сложение или потенцирование\n• Антагонизм — ослабление/устранение (атропин ↔ пилокарпин)", "a": "Явления при повторном и совместном применении лекарств.\n\n1) Кумуляция — накопление в организме вещества или его эффекта при повторных введениях:\n• Материальная — накапливается само вещество (медленно выводится). Пример: сердечные гликозиды (дигитоксин, Digitoxinum), соли тяжёлых металлов.\n• Функциональная — накапливается эффект, а не вещество. Пример: этиловый спирт.\n• Опасна передозировкой; требует снижения дозы.\n\n2) Привыкание (толерантность) — ослабление действия препарата при повторном применении, требует увеличения дозы для прежнего эффекта:\n• Пример: слабительные, снотворные, наркотические анальгетики.\n• Разновидность — лекарственная зависимость (морфин).\n\n3) Синергизм — однонаправленное действие двух веществ, при котором эффект усиливается:\n• Суммирование (аддитивный) — эффекты складываются (1+1=2). Пример: совместное применение двух средств для наркоза.\n• Потенцирование — общий эффект больше суммы (1+1>2). Пример: аминазин усиливает действие снотворных и анальгетиков.\n• Используют для усиления лечебного эффекта и снижения доз.\n\n4) Антагонизм — взаимное ослабление или устранение действия веществ:\n• Физиологический (функциональный): атропин (Atropinum) ослабляет действие пилокарпина (Pilocarpinum) на зрачок и железы.\n• Конкурентный: антагонизм за рецептор.\n• Химический: при отравлениях — нейтрализация (унитиол связывает тяжёлые металлы).\n• Применяют как основу антидотной (противоядной) терапии.\n\nОбоснование: знание этих явлений позволяет правильно комбинировать препараты, избегать передозировки (кумуляция), терять эффект (привыкание), усиливать лечение (синергизм) и лечить отравления (антагонизм)."}, {"num": "10.3", "category": "Билет 10", "q": "Выписать и приготовить 0,02% раствор фурациллина для обработки ротовой полости корове.", "hint": "• Фурацилин = Furacilinum (Nitrofuralum)\n• 0,02% = 1:5000 (0,1 г на 500 мл)\n• Растворяют в горячей воде, остужают\n• Антисептик, орошение/полоскание полости рта", "a": "Rp.: Solutionis Furacilini 0,02% — 500 ml\n     D.S. Наружно. Корове. Для орошения и промывания ротовой полости 2–3 раза в день при стоматите, ранах и воспалении слизистой.\n\nили в развёрнутой форме:\nRp.: Furacilini 0,1\n     Aquae purificatae 500 ml\n     M.D.S. Наружно. Корове. Для обработки ротовой полости.\n\nПояснение:\n• Фурацилин (Furacilinum, синоним Нитрофурал — Nitrofuralum) — противомикробное средство группы нитрофуранов, антисептик широкого спектра.\n• Концентрация 0,02% соответствует соотношению 1:5000 (0,1 г на 500 мл воды).\n• Фурацилин плохо растворим в холодной воде, поэтому растворяют в горячей (кипящей) воде, затем охлаждают до тёплого; раствор стоек, можно стерилизовать 30 мин при 100 °C.\n• Применяют свежим, наружно — для орошения и промывания слизистой; кратность 2–3 раза в сутки. Действие направлено на подавление микрофлоры и заживление."}, {"num": "11.1", "category": "Билет 11", "q": "Слизи, эмульсии, микстуры. Методика приготовления, привести примеры, выписать рецепт.", "hint": "• Слизь (Mucilago) — вязкая, обволакивает, защищает\n• Эмульсия (Emulsum) — масло в воде, нужен эмульгатор\n• Микстура (Mixtura) — смесь нескольких веществ в жидкости\n• Все официнальны → концентрацию слизи не пишут", "a": "Это жидкие лекарственные формы для внутреннего применения.\n\nСлизи (Mucilago):\n• Густая, вязкая, клейкая жидкость; извлекают водой слизистые вещества из растений (семя льна, корень алтея, клубни ятрышника) или растворяют камеди.\n• Действие: обволакивающее, защищает слизистую от раздражения, замедляет всасывание раздражающих веществ.\n• Примеры: слизь крахмала (Mucilago Amyli), слизь корня алтея (Mucilago radicis Althaeae), слизь семени льна (Mucilago seminis Lini), слизь камеди аравийской (Mucilago Gummi arabici).\n• Все слизи официнальны — концентрацию не указывают, пишут только название и количество.\n\nЭмульсии (Emulsum):\n• Жидкая форма, где нерастворимые в воде жидкости (жирные масла, бальзамы) взвешены в воде в виде мельчайших капель.\n• Виды: масляные (Emulsa oleosa) и семенные (Emulsa seminalia — из семян, содержащих масло, напр. миндаль, мак).\n• Для устойчивости нужен эмульгатор (камеди, слизи, белки, желатоза).\n• Применяют для маскировки вкуса масел, дачи нерастворимых веществ.\n\nМикстуры (Mixtura):\n• Жидкая форма — смесь нескольких веществ (твёрдых, жидких, галеновых, порошков растений) в воде, настое, отваре, сиропе; в растворённом или взвешенном виде.\n• Выписывают в развёрнутой (с перечнем компонентов) или сокращённой форме.\n• Перед употреблением взбалтывают, если есть взвесь.\n\nПример рецепта (слизь крахмала с обволакивающей целью):\nRp.: Mucilaginis Amyli 100,0\n     D.S. Внутреннее. Телёнку. По 50 мл 2 раза в день при раздражении слизистой ЖКТ (перед дачей раздражающих средств).\n\nПример микстуры:\nRp.: Natrii hydrocarbonatis 5,0\n     Aquae purificatae ad 200 ml\n     M.D.S. Внутреннее. Телёнку. По 100 мл 2 раза в день."}, {"num": "11.2", "category": "Билет 11", "q": "Общая характеристика витаминных препаратов. Препараты жирорастворимых витаминов. Препараты водорастворимых витаминов.", "hint": "• Витамины — низкомолекулярные регуляторы обмена\n• Жирорастворимые: A, D, E, K (запасаются, токсичны при избытке)\n• Водорастворимые: группа B и C (не запасаются)\n• «АДЕКа» — жирорастворимые", "a": "Общая характеристика:\n• Витамины — низкомолекулярные биологически активные вещества, необходимые в малых количествах для нормального обмена; многие входят в состав ферментов (коферменты).\n• В организме не синтезируются (или недостаточно), поступают с кормом.\n• Недостаток → гиповитаминоз/авитаминоз; избыток жирорастворимых → гипервитаминоз (токсичность).\n• Применяют для профилактики и лечения гиповитаминозов, повышения резистентности, продуктивности, при болезнях обмена.\n• Классификация: жирорастворимые (A, D, E, K) и водорастворимые (группа B, C).\n\nПрепараты жирорастворимых витаминов:\n• Витамин A — ретинол (Retinoli acetas/palmitas): рост, зрение, эпителий слизистых. Показан при ксерофтальмии, задержке роста.\n• Витамин D — кальциферол (Ergocalciferolum — D2, Cholecalciferolum — D3): обмен Ca и P; при рахите, остеомаляции.\n• Витамин E — токоферол (Tocopheroli acetas): антиоксидант, репродукция, мышцы; при беломышечной болезни, бесплодии.\n• Витамин K — викасол (Vicasolum): синтез протромбина, свёртывание крови; при кровотечениях.\n• Комплексные: Тривит, Тетравит (A, D3, E ± F).\n\nПрепараты водорастворимых витаминов:\n• B1 — тиамин (Thiamini bromidum/chloridum): углеводный обмен, нервная система.\n• B2 — рибофлавин (Riboflavinum): окислительно-восстановительные процессы.\n• B3/PP — никотиновая кислота (Acidum nicotinicum): тканевое дыхание.\n• B6 — пиридоксин (Pyridoxini hydrochloridum): белковый обмен.\n• B12 — цианокобаламин (Cyanocobalaminum): кроветворение, при анемии.\n• Bc — фолиевая кислота (Acidum folicum): кроветворение.\n• C — аскорбиновая кислота (Acidum ascorbinicum): окислительные процессы, иммунитет, проницаемость сосудов."}, {"num": "11.3", "category": "Билет 11", "q": "Выписать отвар семени льна при диспепсии теленку.", "hint": "• Decoctum seminis Lini — обволакивающее\n• 1:30 (напр. 50,0 на 1000 мл)\n• Внутрь, тёплым, при диспепсии телёнка\n• Защищает слизистую ЖКТ", "a": "Rp.: Seminis Lini 50,0\n     Aquae purificatae 1000 ml\n     M.f. decoctum\n     D.S. Внутреннее. Телёнку. По 100–150 мл в тёплом виде 3 раза в день за 30 мин до выпойки молозива при диспепсии.\n\nПояснение:\n• Отвар семени льна оказывает обволакивающее и мягчительное действие, защищает воспалённую слизистую кишечника от раздражения, уменьшает диарею при диспепсии.\n• Соотношение слизистого сырья к воде ~1:30 (50,0 на 1000 мл); семя кипятят, фильтруют, охлаждают до 30–38 °C, готовят свежим.\n• Доза семени льна внутрь для крупного рогатого скота 50–100 г; для телёнка отвар дают дробно, тёплым."}, {"num": "12.1", "category": "Билет 12", "q": "Понятие о лекарственных средствах и лекарственных препаратах. Классификация лекарственных средств.", "hint": "• Лек. средство — вещество для лечения/профилактики\n• Лек. препарат — средство в готовой форме (доза + форма)\n• Классы: по происхождению, действию, агрегатному состоянию\n• Список А (яды), Б (сильнодействующие)", "a": "Определения:\n• Лекарственное средство (вещество) — вещество или их смесь природного, синтетического или биологического происхождения, применяемое для профилактики, диагностики и лечения болезней животных.\n• Лекарственный препарат — лекарственное средство в виде определённой лекарственной формы (таблетка, раствор, мазь), готовое к применению, с указанной дозой.\n• Лекарственная форма — удобное для применения состояние, придаваемое лекарственному средству.\n• Лекарственное сырьё — источник получения лекарственных веществ (растения, органы животных, минералы).\n\nКлассификация лекарственных средств:\nПо происхождению:\n• Минеральные (натрия хлорид, магния сульфат).\n• Растительные (настойки, отвары, гликозиды, алкалоиды).\n• Животного происхождения (гормоны, ферменты, сыворотки).\n• Микробного/биологического (антибиотики, вакцины).\n• Синтетические.\n\nПо агрегатному состоянию: твёрдые, мягкие, жидкие, газообразные.\n\nПо характеру (фармакологическому) действия: дезинфицирующие, антимикробные, сердечные, нейротропные, средства, влияющие на ЖКТ, и др.\n\nПо степени опасности (списки):\n• Список А (Venena) — ядовитые и наркотические; хранят в сейфе.\n• Список Б (Heroica) — сильнодействующие; хранят отдельно под замком.\n• Общий список — остальные средства.\n• Высшие разовые и суточные дозы установлены для средств списков А и Б."}, {"num": "12.2", "category": "Билет 12", "q": "Тетрациклины. Аминогликозиды. Макролиды.", "hint": "• Тетрациклины — широкий спектр, бактериостатики (30S)\n• Аминогликозиды — Гр(−), бактерицидны (30S), ото/нефротоксичны\n• Макролиды — Гр(+) и внутриклеточные, бактериостатики (50S)\n• Все тормозят синтез белка рибосом", "a": "Тетрациклины:\n• Антибиотики широкого спектра (Гр+, Гр−, микоплазмы, риккетсии, хламидии).\n• Механизм: нарушают синтез белка, связываясь с 30S субъединицей рибосом; бактериостатики.\n• Препараты: тетрациклин (Tetracyclinum), окситетрациклин (Oxytetracyclinum), доксициклин (Doxycyclinum), хлортетрациклин (Chlortetracyclinum).\n• Применение: респираторные, ЖКТ-инфекции, маститы, кормовые добавки (стимуляторы роста).\n• Особенности: связывают Ca (нельзя с молоком/кормом), окрашивают зубы у молодняка.\n\nАминогликозиды:\n• Спектр преимущественно Гр− флора, в т.ч. синегнойная палочка; туберкулёз (стрептомицин).\n• Механизм: необратимо связываются с 30S субъединицей, нарушают синтез белка; бактерицидны.\n• Препараты: стрептомицин (Streptomycinum), гентамицин (Gentamycini sulfas), канамицин (Kanamycini sulfas), неомицин (Neomycini sulfas), амикацин (Amikacinum).\n• Применение: тяжёлые Гр− инфекции, септицемии, инфекции мочевых путей.\n• Особенности: плохо всасываются из ЖКТ (вводят парентерально), ото- и нефротоксичны.\n\nМакролиды:\n• Спектр: Гр+ кокки, микоплазмы, внутриклеточные возбудители.\n• Механизм: связываются с 50S субъединицей рибосом, тормозят синтез белка; бактериостатики.\n• Препараты: эритромицин (Erythromycinum), тилозин (Tylosinum), азитромицин (Azithromycinum), спирамицин (Spiramycinum).\n• Применение: респираторные инфекции, микоплазмозы птиц и свиней, маститы; малотоксичны, относительно безопасны."}, {"num": "12.3", "category": "Билет 12", "q": "Выписать и приготовить 0.1% раствор калия перманганата 450мл. для обработки раневой поверхности у поросенка.", "hint": "• Kalii permanganatis — окислитель, антисептик\n• 0,1% = 0,45 г на 450 мл\n• Промывать рану, готовить свежим\n• Малая концентрация — вяжущее/обеззараживающее", "a": "Rp.: Solutionis Kalii permanganatis 0,1% — 450 ml\n     D.S. Наружное. Поросёнку. Для промывания раневой поверхности 1–2 раза в день. Применять свежеприготовленным.\n\nРазвёрнутая форма (для приготовления):\nRp.: Kalii permanganatis 0,45\n     Aquae purificatae ad 450 ml\n     M.D.S. Наружное. Поросёнку. Для обработки (промывания) раны.\n\nПояснение:\n• Калия перманганат — окислитель, антисептик; в слабых концентрациях (0,1–0,5%) оказывает вяжущее и обеззараживающее действие при промывании ран.\n• Расчёт: 0,1% = 0,1 г на 100 мл → на 450 мл нужно 0,45 г препарата.\n• Раствор готовят на тёплой воде, применяют только свежим (быстро разлагается на свету); крепкие растворы дают прижигающий эффект, поэтому для ран берут слабый розовый раствор."}, {"num": "13.1", "category": "Билет 13", "q": "Понятие о механизме действие фармакологических веществ. Перечесть виды действия фармакологических веществ.", "hint": "• Механизм — КАК вещество влияет на клетку\n• 4 пути: рецепторы, ферменты, ионные каналы, физико-химия\n• Виды: местное и резорбтивное\n• Ещё: прямое/косвенное (рефлекторное), главное/побочное", "a": "Механизм действия:\n• Механизм действия — это способ, которым лекарственное вещество вызывает фармакологический эффект на молекулярном/клеточном уровне.\n• Основные точки приложения: рецепторы (агонисты, антагонисты), ферменты (угнетение или активация), ионные каналы, транспортные системы, гены; физико-химическое действие (адсорбенты, антациды, осмотические средства).\n\nВиды действия лекарственных веществ:\n• Местное — в месте нанесения до всасывания (мази, присыпки, вяжущие, местные анестетики).\n• Резорбтивное (общее) — после всасывания в кровь и распределения по организму.\n• Рефлекторное — раздражение рецепторов вызывает ответ через ЦНС (нашатырный спирт при обмороке, горчичники).\n• Прямое — непосредственно на орган-мишень (сердечные гликозиды на миокард).\n• Косвенное (опосредованное) — изменение функции одного органа через влияние на другой.\n• Главное (основное) и побочное — желаемый лечебный и сопутствующий нежелательный эффект.\n• Избирательное (элективное) и общеклеточное.\n• Обратимое и необратимое.\n• Этиотропное (на причину болезни), патогенетическое, симптоматическое, заместительное."}, {"num": "13.2", "category": "Билет 13", "q": "Общая характеристика противомикробных и противопаразитарных лекарственных средств (дезинфицирующие, антисептические и химиотерапевтические средства). Фенолы, крезолы и их производные. Группа кислот.", "hint": "• Дезинфектанты — на объекты; антисептики — на ткани\n• Химиотерапия — внутри организма, действие на возбудителя\n• Фенол = карболка; крезолы сильнее в 10-15 раз\n• Кислоты: борная, салициловая, бензойная, молочная", "a": "Общая характеристика:\n• Противомикробные и противопаразитарные средства подавляют возбудителей болезней (бактерии, грибы, простейшие, паразиты).\n• Дезинфицирующие — обеззараживают объекты внешней среды (помещения, инструменты, выделения).\n• Антисептические — применяют на коже, слизистых, ранах (местно).\n• Химиотерапевтические — действуют избирательно на возбудителя внутри организма, малотоксичны для макроорганизма (антибиотики, сульфаниламиды, нитрофураны).\n\nФенолы, крезолы и их производные:\n• Фенол (Phenolum purum, кислота карболовая) — бактерицидное, противопаразитарное действие; 3-5% водные растворы для дезинфекции инструментов и помещений. Токсичен, всасывается через кожу.\n• Крезолы — в 10-15 раз активнее фенола. Препараты: крезол чистый, трикрезол.\n• Лизол (Lysolum) — раствор крезола в калийном мыле; 1-3% для рук и инструментов, 3-5% для помещений.\n• Креолин (Creolinum) — смесь крезолов, дёгтя и мыла; противопаразитарное (накожно при чесотке), дезинфекция; образует эмульсию.\n• Дёготь берёзовый (Pix liquida) — антисептик, входит в мазь Вишневского, линимент Вишневского.\n\nГруппа кислот:\n• Кислота борная (Acidum boricum) — 2-4% растворы, слабый антисептик для слизистых, глаз.\n• Кислота салициловая (Acidum salicylicum) — антисептик, кератолитик, в мазях, присыпках, спиртовых растворах.\n• Кислота бензойная (Acidum benzoicum) — антисептик, отхаркивающее.\n• Кислота молочная (Acidum lacticum) — для аэрозольной дезинфекции воздуха помещений, прижигание.\n• Действие кислот: денатурация белков микробной клетки; концентрированные оказывают прижигающее действие."}, {"num": "13.3", "category": "Билет 13", "q": "Выписать и приготовить 10% ихтиоловую мазь 250г. для наружного применения.", "hint": "• Ichthyoli 25,0 (10% от 250)\n• Vaselini ad 250,0 — основа\n• M.f. unguentum — смешать до мази\n• Наружно, на поражённую кожу", "a": "Rp.: Ichthyoli 25,0\n     Vaselini ad 250,0\n     M.f. unguentum\n     D.S. Наружное. Наносить тонким слоем на поражённые участки кожи 1-2 раза в сутки, при необходимости под повязку.\n\nПояснение:\n10% мазь означает 25,0 ихтиола на 250,0 общей массы; остальное (225,0) — вазелин как мазевая основа (ad 250,0). Ихтиол оказывает противовоспалительное, антисептическое, кератопластическое и местное обезболивающее действие; применяют наружно при дерматитах, экземах, ожогах, фурункулёзе у животных. Кратность — 1-2 раза в сутки до выздоровления."}, {"num": "14.1", "category": "Билет 14", "q": "Болюсы, брикеты, драже. Методика приготовления, привести примеры и выписать рецепт.", "hint": "• Болюс — большая пилюля, форма жёлудя, 30-50 г КРС\n• Брикеты — прессованный порошок плиткой\n• Драже — наслаивание на сахарное ядро, шарик\n• Все — твёрдые дозированные формы внутрь", "a": "Болюсы (Boli):\n• Крупная разновидность пилюль продолговатой (яйцевидной/желудёвой) формы.\n• Масса: для собак и кошек 3-5 г, для крупных животных (лошади, КРС) 30-50 г.\n• Основа разрыхляющая: ржаная мука, порошок и корень алтея, белая глина, вода, сиропы.\n• Готовят ex tempore, применяют в день приготовления (при хранении твердеют и не распадаются).\n• Способ: смешивают лекарство с основой → пилюльная масса → формируют болюс.\n\nБрикеты (Briketae):\n• Твёрдая форма, получаемая прессованием порошкообразных смесей в плитки определённой массы.\n• Удобны для хранения и применения в полевых условиях, не требуют взвешивания.\n• Примеры: кормовые добавки, премиксы, брикеты дезосредств, антигельминтиков, минеральных солей.\n\nДраже (Dragee):\n• Твёрдая дозированная форма, получаемая многократным наслаиванием (дражированием) лекарственных и вспомогательных веществ на сахарные гранулы (ядра).\n• Масса обычно до 1,0; правильная шарообразная форма, гладкая ровная поверхность.\n• Готовят на дражировочных машинах (фабрично).\n\nПример рецепта болюсов:\nRp.: Phenylii salicylatis 5,0\n     Massae pilularum q.s.\n     M.f. bolus\n     D.t.d. N 6\n     S. Внутрь по 1 болюсу 2 раза в день. Лошади."}, {"num": "14.2", "category": "Билет 14", "q": "Общая характеристика антигельминтиков. Противонематодозные средства. Противоцестодозные средства.", "hint": "• Антигельминтики — против глистов (черви)\n• Нематоды (круглые): левамизол, пиперазин, ивермектин, фенбендазол\n• Цестоды (плоские/ленточные): никлозамид, празиквантел, ареколин\n• Действие: парализуют или убивают паразита", "a": "Общая характеристика антигельминтиков:\n• Антигельминтики (антгельминтики) — средства для лечения и профилактики гельминтозов животных.\n• По спектру делят на: противонематодозные, противоцестодозные, противотрематодозные.\n• Механизм: нарушение нервно-мышечной функции (паралич паразита), угнетение энергообмена/метаболизма гельминта.\n• Требования: высокая активность против паразита, малая токсичность для животного, удобство применения.\n\nПротивонематодозные средства (против круглых червей — нематод):\n• Левамизол (Laevamisolum) — нервно-мышечный паралич нематод; КРС, свиньи, овцы.\n• Пиперазин и его соли (Piperazinum) — при аскаридозе, параскаридозе; малотоксичен.\n• Ивермектин (Ivermectinum) — макроциклический лактон, широкого спектра (нематоды + членистоногие), действует на ГАМК-каналы.\n• Фенбендазол, альбендазол (бензимидазолы) — нарушают энергообмен, действуют на яйца и личинки.\n• Нилверм, тетрамизол.\n\nПротивоцестодозные средства (против ленточных червей — цестод):\n• Никлозамид / фенасал (Niclosamidum) — нарушает усвоение глюкозы и фосфорилирование у цестод.\n• Празиквантел (Praziquantelum) — повышает проницаемость мембран для Ca, паралич и гибель паразита; широко при цестодозах.\n• Ареколина гидробромид (Arecolini hydrobromidum) — вызывает усиленную перистальтику и отхождение цестод (дегельминтизация собак).\n• Камала, мужской папоротник (экстракт) — растительные противоцестодозные."}, {"num": "14.3", "category": "Билет 14", "q": "Выписать и приготовить 70% раствор этилового спирта 200мл. для обработки рук хирурга.", "hint": "• Spiritus aethylici 70% — 200 ml\n• D.S. Наружно, для обработки рук хирурга\n• Дезинфекция/антисептика кожи\n• 70% обеззараживает лучше 96%", "a": "Rp.: Spiritus aethylici 70% - 200 ml\n     D.S. Наружное. Для обработки (дезинфекции) рук хирурга перед операцией: нанести на чистые руки и втирать в кожу до высыхания.\n\nПояснение:\n70% этиловый спирт обладает оптимальным бактерицидным (антисептическим) действием — лучше проникает в микробную клетку и денатурирует белок, чем 96% (который дубит поверхностный слой и хуже обеззараживает). Применяют наружно для обработки рук хирурга и операционного поля. Готовят разведением 96% спирта водой по таблицам/правилу смешения до 70%. (В медицинской рецептуре отпуск спирта по форме ограничен; в учебном ветеринарном рецепте указывают требуемый объём.)"}, {"num": "15.1", "category": "Билет 15", "q": "Настойки, экстракты. Методика приготовления, привести примеры и выписать рецепт.", "hint": "• Настойка (Tinctura) — спиртовая вытяжка без нагрева\n• Экстракт (Extractum) — сгущённая вытяжка: жидк./густой/сухой\n• Методы: мацерация, перколяция, реперколяция\n• Настойка 1:5 (ядовитые 1:10); дозируют каплями", "a": "Определение:\n• Настойки (Tincturae) — прозрачные жидкие спиртовые, водно-спиртовые или спирто-эфирные извлечения из растительного сырья, получаемые без нагревания и без удаления экстрагента.\n• Экстракты (Extracta) — концентрированные вытяжки из растительного сырья, полученные путём частичного или полного удаления экстрагента.\n\nКлассификация экстрактов:\n• Жидкие (Extracta fluida) — соотношение сырьё:вытяжка 1:1.\n• Густые (Extracta spissa) — вязкая масса, влаги до 25%.\n• Сухие (Extracta sicca) — сыпучая масса, влаги до 5%.\n\nМетодика приготовления:\n• Настойки готовят в соотношении 1:5 (из неядовитого сырья) и 1:10 (из ядовитого и сильнодействующего).\n• Основные методы: мацерация (настаивание сырья с экстрагентом 7 суток при перемешивании), перколяция (вытеснение), реперколяция, растворение готовых экстрактов.\n• Экстрагент чаще — этиловый спирт разной крепости (40–70%).\n\nПримеры:\n• Настойки: настойка валерианы (Tinctura Valerianae), настойка полыни (Tinctura Absinthii), настойка чемерицы (Tinctura Veratri), настойка йода (Tinctura Iodi).\n• Экстракты: экстракт красавки сухой (Extractum Belladonnae siccum), экстракт алоэ жидкий (Extractum Aloes fluidum), экстракт солодки густой (Extractum Glycyrrhizae spissum).\n\nПрименение: настойки и жидкие экстракты дозируют каплями/мл внутрь; используют как тонизирующие, седативные, горечи, желчегонные, антисептические средства.\n\nПример рецепта:\nRp.: Tincturae Valerianae 30 ml\n     D.S. Внутрь. Собаке. По 15–20 капель 2–3 раза в день как успокаивающее.\n\nRp.: Extracti Belladonnae sicci 0,03\n     D.t.d. N 10 in tabulettis\n     S. Внутрь. Собаке. По 1 таблетке при спазмах кишечника."}, {"num": "15.2", "category": "Билет 15", "q": "Местноанестезирующие средства. Вяжущие, адсорбирующие, обволакивающие средства.", "hint": "• Анестетики снимают боль на месте: новокаин, лидокаин, дикаin\n• Эфиры (новокаин, дикаин) и амиды (лидокаин, тримекаин)\n• Вяжущие = плёнка-уплотнение: танин, кора дуба, висмут\n• Обволакивающие — слизи; адсорбирующие — уголь, белая глина", "a": "Местноанестезирующие средства:\n• Определение — вещества, обратимо блокирующие проведение возбуждения по нервным волокнам, устраняя болевую чувствительность на месте применения.\n• Механизм — блокада натриевых каналов мембраны нервного волокна.\n• Классификация по структуре: сложные эфиры — новокаин (Novocainum), дикаин (Dicainum), анестезин (Anaesthesinum); амиды — лидокаин (Lidocainum), тримекаин (Trimecainum).\n• Виды анестезии: поверхностная (дикаин, анестезин), инфильтрационная (новокаин 0,25–0,5%, лидокаин), проводниковая (новокаин 1–2%, лидокаин, тримекаин).\n• Дикаин активнее новокаина в 100–200 раз, но в ~15 раз токсичнее; лидокаин сильнее и длительнее новокаина.\n\nВяжущие средства:\n• Действие — уплотняют поверхностный слой ткани (коагуляция белков), образуют защитную плёнку, уменьшают проницаемость и воспаление.\n• Органические: танин (Tanninum), кора дуба, цветки ромашки, трава зверобоя.\n• Неорганические (соли металлов): висмута субнитрат (Bismuthi subnitras), свинца ацетат, квасцы (Alumen), цинка окись.\n• Применение: воспаления кожи, слизистых, ЖКТ (диарея), раны.\n\nОбволакивающие средства:\n• Индифферентные коллоидные растворы (слизи), покрывающие слизистую и защищающие от раздражения.\n• Примеры: слизь крахмала (Mucilago Amyli), слизь семян льна, отвар алтея.\n• Применение: гастриты, отравления раздражающими веществами, вместе с раздражающими лекарствами.\n\nАдсорбирующие средства:\n• Тончайшие нерастворимые порошки, связывающие на поверхности газы, токсины, защищающие слизистую механически.\n• Примеры: уголь активированный (Carbo activatus), глина белая (Bolus alba), тальк.\n• Применение: метеоризм, отравления, диарея, присыпки на кожу."}, {"num": "15.3", "category": "Билет 15", "q": "Выписать и приготовить йодоформ со стрептоцидом для присыпки кастрационной раны.", "hint": "• Присыпка (Aspersio) — порошок наружно\n• Йодоформ — антисептик, выделяет йод; стрептоцид — антибактериал.\n• Смесь поровну, M.f. pulvis subtilissimus\n• Присыпать раневую поверхность после кастрации", "a": "Rp.: Iodoformii\n     Streptocidi ana 5,0\n     M.f. pulvis subtilissimus\n     D.S. Наружно. Жеребцу (быку). Присыпать раневую поверхность мошонки 1–2 раза в день после кастрации до заживления.\n\nПояснение:\n• Йодоформ (Iodoformium) — антисептик, медленно выделяющий йод, обладает противомикробным, подсушивающим и дезодорирующим действием; стрептоцид (Streptocidum) — сульфаниламид с антибактериальным действием.\n• Компоненты берут в равных частях (ana), измельчают в тончайший порошок (pulvis subtilissimus) для равномерного нанесения; готовая присыпка — недозированная наружная форма.\n• Применяют для профилактики и лечения раневой инфекции кастрационной раны, ускорения подсушивания и заживления. Промышленные присыпки содержат йодоформ 2–5%; для учебного рецепта используют соотношение 1:1 (уточнить концентрацию по фармакопее)."}, {"num": "16.1", "category": "Билет 16", "q": "Кашки, суппозитории. Методика приготовления, привести примеры и выписать рецепт.", "hint": "• Кашка (Electuarium) — тестообразная масса, только внутрь\n• Густая (E. spissa) и жидкая (E. molle); основа — мука, мёд, сироп\n• Суппозиторий — дозированная форма, тает в полости тела\n• Основа суппозиториев — масло какао (Oleum Cacao)", "a": "Кашки (Electuaria):\n• Определение — мягкая недозированная лекарственная форма кашицеобразной (тестообразной) консистенции для внутреннего применения (крупным животным).\n• Виды: густая кашка (Electuarium spissum) и жидкая/мягкая (Electuarium molle).\n• Состав: лекарственные вещества + формообразующие (порошок солодкового или алтейного корня, ржаная мука, мёд, патока, сахарный сироп).\n• Методика: лекарственные вещества растирают с формообразующим и связывающим (сироп, мёд) до однородной тестообразной массы; готовят ex tempore, хранят не более 1–2 суток (нестойкая форма).\n• Применение: дача внутрь крупному рогатому скоту, лошадям (на корень языка или в виде болюсов).\n\nСуппозитории (Suppositoria):\n• Определение — дозированные лекарственные формы, твёрдые при комнатной температуре и расплавляющиеся (растворяющиеся) при температуре тела.\n• Виды: ректальные (Suppositoria rectalia), вагинальные (Suppositoria vaginalia), палочки (Bacilli).\n• Основа: масло какао (Oleum Cacao) — применяют по умолчанию, если основа не указана; также желатино-глицериновая основа.\n• Методика: лекарственное вещество смешивают с расплавленной/тёртой основой, формуют выливанием или выкатыванием, дозируют.\n• Применение: местное (антисептики, вяжущие) и резорбтивное действие.\n\nПримеры рецептов:\nRp.: Natrii hydrocarbonatis 50,0\n     Pulveris radicis Althaeae\n     Sirupi simplicis q.s.\n     M.f. electuarium\n     D.S. Внутрь. Корове. На один приём как антацидное (при ацидозе рубца).\n\nRp.: Xeroformii 0,2\n     Olei Cacao q.s.\n     M.f. suppositorium rectale\n     D.t.d. N 6\n     S. Ректально. Собаке. По 1 свече при воспалении прямой кишки."}, {"num": "16.2", "category": "Билет 16", "q": "Пути выведения фармакологических веществ из организма, терапевтическое и токсическое значение.", "hint": "• Главный путь — почки (моча): фильтрация + секреция\n• Прочие: ЖКТ/желчь, лёгкие, молоко, пот, слюна, слёзы\n• Молоко и мясо — токсическое/пищевое значение (остатки)\n• Реакцию мочи меняют для ускорения выведения", "a": "Определение:\n• Экскреция (выведение) — заключительный этап фармакокинетики, удаление лекарственного вещества и его метаболитов из организма.\n\nОсновные пути выведения:\n• Почки (с мочой) — главный путь; механизмы: клубочковая фильтрация, активная канальцевая секреция, обратная реабсорбция. Не фильтруются вещества, связанные с белками.\n• Желудочно-кишечный тракт (с калом, желчью) — выводятся плохо всасывающиеся вещества и выделяемые печенью с желчью.\n• Лёгкие — летучие вещества и газы (эфир, спирт, ингаляционные наркотики).\n• Молочные железы (с молоком) — антибиотики, сульфаниламиды и др.\n• Потовые, слюнные, слёзные железы — в небольших количествах.\n\nТерапевтическое значение:\n• Путь выведения определяет выбор препарата при болезнях органов: уроантисептики выводятся почками (лечат мочевые пути), отхаркивающие — через бронхи.\n• Изменением реакции мочи ускоряют выведение: при отравлении кислыми соединениями мочу ощелачивают, основными — подкисляют (форсированный диурез).\n\nТоксическое значение:\n• При нарушении функции почек/печени лекарства и токсичные метаболиты накапливаются (кумуляция) — риск отравления; нужна коррекция доз.\n• Выведение с молоком и накопление в мясе требует соблюдения сроков ожидания (браковки продукции) — продукты не должны содержать остатков препаратов.\n• Раздражающие вещества при выведении могут повреждать выводящие органы (нефротоксичность, гастрит)."}, {"num": "16.3", "category": "Билет 16", "q": "Выписать физиологический раствор для внутривенного введения при обезвоживании организма у теленка.", "hint": "• Физраствор = натрия хлорид 0,9% (изотонический)\n• Sterilisetur! Вводить в/в, медленно, тёплым (37–38°C)\n• Телёнку 1000–2000 мл за приём\n• При обезвоживании, диспепсии, интоксикации", "a": "Rp.: Solutionis Natrii chloridi 0,9% — 1000 ml\n     Sterilisetur!\n     D.S. Внутривенно. Телёнку. Ввести медленно капельно, подогрев до 37–38°C, при обезвоживании (токсической диспепсии).\n\nПояснение:\n• Физиологический (изотонический) раствор — 0,9% натрия хлорида (Natrii chloridum), осмотически соответствует плазме крови, восполняет потери жидкости и электролитов.\n• Применяют внутривенно (медленно, капельно, в тёплом виде) при обезвоживании, токсической диспепсии, интоксикации, кровопотерях, шоке.\n• Доза для телят составляет 1000–2500 мл на введение (по инструкции к препарату); конкретный объём устанавливает ветврач по массе и степени обезвоживания. Раствор обязательно стерилизуют."}, {"num": "17.1", "category": "Билет 17", "q": "Правила выписывания рецептов.", "hint": "• Рецепт — письменное требование врача\n• Inscriptio, Designatio, Praescriptio, Signatura\n• Латынь, чернила, печать, подпись\n• Сокращённая и развёрнутая пропись", "a": "Определение:\n• Рецепт — письменное обращение ветврача в аптеку об изготовлении и отпуске лекарства с указанием применения.\n\nЧасти рецепта:\n• Inscriptio — заголовок: дата, вид/возраст животного, владелец/хозяйство.\n• Invocatio — обращение: Recipe (Rp.) — «возьми».\n• Designatio materiarum — перечень веществ (на латыни, род. падеж, доза в граммах/мл/ЕД).\n• Subscriptio — указание о форме, изготовлении (M.f. pulvis), числе доз (D.t.d. N).\n• Signatura — способ применения (S.), пишется на родном языке.\n• Подпись и личная печать врача.\n\nПравила оформления:\n• Лекарственные вещества пишут на латыни, в родительном падеже.\n• Дозы — арабскими цифрами: граммы (1,0), миллилитры (ml), единицы действия (ED), капли — римскими (gtt. V).\n• Если доза в целых граммах — после числа ставят запятую и ноль (1,0).\n• Пропись бывает развёрнутая (перечислены все ингредиенты) и сокращённая (готовый препарат).\n• Названия не сокращают произвольно; используют принятые сокращения (Rp., D.t.d., M.D.S.).\n• Заполняется чётко, чернилами, без исправлений; ядовитые/наркотические — на особых бланках, с печатью «Для рецептов».\n\nВиды прописей:\n• Магистральная — индивидуальное изготовление по рецепту врача.\n• Официнальная — по фармакопее (готовая форма)."}, {"num": "17.2", "category": "Билет 17", "q": "Общая характеристика антибиотиков, их классификация. Пенициллины. Цефалоспорины.", "hint": "• Антибиотик — продукт микробов против микробов\n• Бета-лактамы рвут клеточную стенку\n• Пенициллины: бензилпенициллин, ампициллин, амоксициллин\n• Цефалоспорины: цефазолин, цефтриаксон, поколения", "a": "Определение:\n• Антибиотики — вещества микробного, растительного, животного или синтетического происхождения, подавляющие рост микроорганизмов (бактериостаз) или убивающие их (бактерицидность).\n\nКлассификация по химическому строению:\n• Бета-лактамные: пенициллины, цефалоспорины, карбапенемы, монобактамы.\n• Аминогликозиды: стрептомицин, гентамицин, неомицин.\n• Тетрациклины: тетрациклин, окситетрациклин, доксициклин.\n• Макролиды: эритромицин, тилозин.\n• Левомицетины (амфениколы): хлорамфеникол.\n• Полипептиды, линкозамиды, фторхинолоны (как химиопрепараты) и др.\n\nПо типу действия: бактерицидные и бактериостатические.\nПо спектру: узкого и широкого спектра.\n\nПенициллины (Penicillina):\n• Бета-лактамные; механизм — нарушают синтез пептидогликана клеточной стенки, действуют на делящиеся клетки (бактерицидно).\n• Природные: бензилпенициллина натриевая/калиевая соль (Benzylpenicillinum-natrium), бициллин (пролонгированный).\n• Полусинтетические: оксациллин (Oxacillinum) — устойчив к пенициллиназе; ампициллин (Ampicillinum), амоксициллин (Amoxicillinum) — широкого спектра.\n• Спектр природных — преимущественно грамположительные. Недостаток — разрушаются бета-лактамазами, аллергии.\n• Дозируют в единицах действия (ЕД), вводят чаще в/м.\n\nЦефалоспорины (Cephalosporina):\n• Бета-лактамные, механизм тот же (угнетение синтеза клеточной стенки), бактерицидны, более устойчивы к бета-лактамазам.\n• I поколение: цефазолин (Cefazolinum) — больше грам(+).\n• II поколение: цефуроксим.\n• III поколение: цефтриаксон (Ceftriaxonum), цефотаксим, цефтиофур (ветеринарный) — широкий спектр, активны против грам(–).\n• IV поколение: цефепим.\n\nПрименение: бактериальные инфекции дыхательных, мочеполовых путей, маститы, раны, сепсис, послеродовые инфекции."}, {"num": "17.3", "category": "Билет 17", "q": "Выписать и приготовить изотонический раствор натрия хлорида для внутривенного введения корове.", "hint": "• Изотонический = 0,9% NaCl\n• Корове в/в ~1000–2000 мл\n• Обязательно стерилизовать (Sterilisetur!)\n• При обезвоживании, интоксикации", "a": "Rp.: Solutionis Natrii chloridi 0,9% - 1000 ml\n     Sterilisetur!\n     D.S. Корове. Внутривенно, медленно (капельно), подогрев до температуры тела.\n     При обезвоживании, интоксикации, кровопотере.\n\nРазвёрнутая пропись:\nRp.: Natrii chloridi 9,0\n     Aquae pro injectionibus ad 1000 ml\n     Misce. Sterilisetur!\n     D.S. Корове. Внутривенно, капельно.\n\nПояснение:\nИзотоническая (физиологическая) концентрация натрия хлорида — 0,9% (9 г на 1000 мл воды для инъекций), соответствует осмотическому давлению крови. Для коровы при внутривенном введении объём составляет 1000–2000 мл (в зависимости от массы и тяжести состояния); вводят медленно, раствор подогревают до температуры тела. Применяют при больших потерях жидкости, интоксикациях, шоке, как растворитель лекарств. Раствор обязательно стерилизуют."}, {"num": "18.1", "category": "Билет 18", "q": "Основы фармакокинетики и фармакодинамики.", "hint": "• Кинетика — что организм делает с лекарством\n• ВРМВ: Всасывание, Распределение, Метаболизм, Выведение\n• Динамика — что лекарство делает с организмом\n• Рецепторы, эффект, дозы, виды действия", "a": "Фармакокинетика — изучает движение лекарства в организме («что организм делает с лекарством»):\n• Всасывание (абсорбция) — поступление вещества в кровь из места введения; зависит от пути введения, растворимости.\n• Распределение — перенос кровью к тканям и органам, прохождение барьеров (гематоэнцефалический, плацентарный), связь с белками плазмы.\n• Биотрансформация (метаболизм) — превращение вещества, в основном в печени (окисление, конъюгация); образование менее активных/неактивных метаболитов.\n• Выведение (экскреция) — удаление с мочой (почки), желчью, молоком, через ЖКТ, лёгкие. Важно учитывать выведение с молоком/мясом (сроки убоя, ограничения).\n\nФармакодинамика — изучает действие лекарства на организм («что лекарство делает с организмом»):\n• Механизм действия — взаимодействие с рецепторами, ферментами, ионными каналами, мембранами.\n• Виды действия: местное и резорбтивное; прямое и рефлекторное; главное и побочное; обратимое и необратимое; избирательное.\n• Эффекты зависят от дозы: терапевтическая, токсическая, смертельная.\n• Понятия: агонисты и антагонисты, рецепторы, широта терапевтического действия.\n\nЗначение в ветеринарии:\n• Правильный выбор пути введения, дозы и кратности; учёт вида животного, массы, состояния и сроков выведения остатков."}, {"num": "18.2", "category": "Билет 18", "q": "Сульфаниламидные препараты.Комбинированные сульфаниламидные препараты.", "hint": "• Конкуренты ПАБК — блок синтеза фолиевой кислоты\n• Бактериостатики широкого спектра\n• Резорбтивные, кишечные, наружные, длительные\n• Комбо с триметопримом = бактерицидно (бисептол)", "a": "Определение:\n• Сульфаниламиды — синтетические химиотерапевтические средства, производные сульфаниловой кислоты, обладающие противомикробным действием.\n\nМеханизм действия:\n• Структурно сходны с парааминобензойной кислотой (ПАБК); конкурентно вытесняют её, нарушая синтез фолиевой кислоты у микробов → прекращается рост (бактериостаз). Действуют на грам(+) и грам(–) бактерии, кокцидии.\n\nКлассификация (по применению/длительности):\n• Хорошо всасывающиеся (резорбтивные) — для системных инфекций: сульфадимезин (Sulfadimezinum), стрептоцид, норсульфазол, этазол.\n• Длительного действия: сульфадиметоксин (Sulfadimethoxinum), сульфамонометоксин.\n• Плохо всасывающиеся (кишечные): фталазол (Phthalazolum), сульгин — при кишечных инфекциях.\n• Для наружного (местного) применения: стрептоцид, сульфацил-натрий (глазной).\n\nПравила применения:\n• Дают ударную (первую повышенную) дозу, затем поддерживающие; курсом, с обильным питьём (профилактика кристаллурии).\n\nКомбинированные сульфаниламиды:\n• Сочетают сульфаниламид с триметопримом, который блокирует следующий этап синтеза фолиевой кислоты → двойная блокада, действие становится бактерицидным, спектр шире.\n• Ко-тримоксазол = сульфаметоксазол + триметоприм (бисептол, бактрим).\n• Ветеринарные: тримеразин, дитрим, сульфаниламид + триметоприм.\n• Показания: инфекции дыхательных, мочевыводящих путей, ЖКТ, маститы."}, {"num": "18.3", "category": "Билет 18", "q": "Выписать натрия сульфат корове в качестве слабительного.", "hint": "• Натрия сульфат = глауберова соль (солевое слабит.)\n• Корове 400–800 г\n• Внутрь, в 1–2% растворе, с обилием воды\n• Держит воду в кишечнике, усиливает перистальтику", "a": "Rp.: Natrii sulfatis 600,0\n     Aquae purificatae ad 10000 ml\n     M.D.S. Корове. Внутрь, однократно (через зонд или с пойлом).\n     Как солевое слабительное, при запорах, интоксикации, переполнении ЖКТ. Обеспечить обильное питьё.\n\nПояснение:\nНатрия сульфат (глауберова соль, Na2SO4·10H2O) — солевое слабительное. Доза для крупного рогатого скота 400–800 г (взята типичная — 600 г). Как слабительное задают внутрь в виде 5–6% водного раствора с большим количеством воды (600 г на 10 л воды ≈ 6%); более слабые 1–2% растворы используют не как слабительное, а для нормализации пищеварения и при гипотонии преджелудков. Соль плохо всасывается, удерживает воду в просвете кишечника, разжижает содержимое, раздражает рецепторы и усиливает перистальтику. Противопоказан при поносах, завороте кишок, истощённым и старым животным."}, {"num": "19.1", "category": "Билет 19", "q": "Дозы профилактические, лечебные, токсические и летальные.", "hint": "• Доза — количество вещества на приём.\n• Профилактическая < лечебная < токсическая < летальная.\n• Лечебная: пороговая, средняя, высшая.\n• Безопасность = широта терап. действия (ЛД50/ЭД50).", "a": "Определение:\n• Доза — количество лекарственного вещества, введённое в организм на один приём (разовая), за сутки (суточная) или за курс (курсовая).\n• Дозируют в граммах, мг, мл, ЕД; в ветеринарии часто на 1 кг массы животного.\n\nВиды доз по нарастанию:\n• Профилактическая — для предупреждения болезни; обычно 1/2–1/3 от максимальной лечебной.\n• Лечебная (терапевтическая) — вызывает лечебный эффект. Различают: пороговую (минимальную действующую), среднюю терапевтическую и высшую (максимальную допустимую).\n• Токсическая — вызывает в организме патологические (отравляющие) изменения. Бывает минимальная, средняя.\n• Летальная (смертельная) — вызывает гибель животного; ЛД50 — доза, губительная для 50% животных.\n\nОценка безопасности:\n• Широта терапевтического действия — диапазон между минимальной лечебной и минимальной токсической дозой; чем шире — тем безопаснее.\n• Терапевтический индекс = ЛД50 / ЭД50 (чем больше, тем безопаснее препарат).\n\nЗначение:\n• Превышение дозы переводит лекарство в яд — важно строго соблюдать дозировку с учётом вида, массы, возраста и состояния животного."}, {"num": "19.2", "category": "Билет 19", "q": "Нейролептики. Транквилизаторы. Седативные средства.", "hint": "• Все три — успокаивают ЦНС, угнетают.\n• Нейролептики — аминазин, сильнее всех (психозы, фиксация).\n• Транквилизаторы — снимают страх, тревогу.\n• Седативные — мягкие: бром, валериана.", "a": "Общее: психотропные средства, угнетающие ЦНС, оказывают успокаивающее действие. Применяют для усмирения, фиксации, премедикации, при стрессе животных.\n\n1. Нейролептики (антипсихотические):\n• Действие: сильное успокаивающее, снижают реакцию на раздражители, подавляют страх и агрессию, потенцируют наркоз; механизм — угнетение ретикулярной формации и блокада дофаминовых рецепторов.\n• Классификация и препараты: производные фенотиазина — аминазин (Aminazinum), пропазин, этаперазин; производные бутирофенона — галоперидол (Haloperidolum), дроперидол; алкалоиды раувольфии — резерпин (Reserpinum).\n• В ветеринарии: аминазин п/к, в/м 1–2 мг/кг для усмирения, фиксации, профилактики стресса; ксилазин (Рометар, Ромпун) — седация и обездвиживание КРС, лошадей.\n\n2. Транквилизаторы (анксиолитики):\n• Действие: устраняют тревогу, страх, эмоциональное напряжение без выраженного снотворного эффекта; расслабляют мускулатуру.\n• Препараты: производные бензодиазепина — диазепам (сибазон, реланиум), феназепам; мепротан.\n• Применение: при транспортировке, перегруппировке, перед обработками, для снятия судорог.\n\n3. Седативные средства:\n• Действие: мягко успокаивают, усиливают тормозные процессы в коре, нормализуют сон, эффект слабее нейролептиков.\n• Препараты: бромиды (натрия бромид — Natrii bromidum, калия бромид), препараты валерианы (Tinctura Valerianae), пустырника, магния сульфат.\n• Применение: при повышенной возбудимости, неврозах, как успокаивающее."}, {"num": "19.3", "category": "Билет 19", "q": "Выписать и приготовить 2% раствор ихтиола 500мл. корове при тимпании.", "hint": "• Ихтиол 2% = 10 г на 500 мл.\n• Противобродильное при тимпании рубца.\n• Задают внутрь (через зонд/рот).\n• Простая форма: D.S. внутрь.", "a": "Rp.: Ichthyoli 10,0\n      Aquae destillatae ad 500 ml\n      M.D.S. Внутрь. Корове. Задать на один приём при тимпании (вздутии рубца) как противобродильное и дезинфицирующее средство; при необходимости повторить.\n\nПояснение:\nДля 2% раствора на 500 мл берут 10 г ихтиола (2 г на 100 мл). Ихтиол применяют в концентрации 0,25–2% как антисептическое, противобродильное и противовоспалительное средство при тимпании рубца. Задают внутрь (через рот или зонд), уменьшает газообразование и брожение в рубце."}, {"num": "20.1", "category": "Билет 20", "q": "Порошки, таблетки, пилюли. Методика приготовления, привести примеры и выписать рецепт.", "hint": "• Все — твёрдые дозированные формы.\n• Порошок (Pulvis) — простой/сложный, измельчают и смешивают.\n• Таблетка (Tabuletta) — заводская, прессуют.\n• Пилюля (Pilula) — шарик с массой (constituens).", "a": "Твёрдые лекарственные формы для внутреннего применения.\n\n1. Порошки (Pulveres):\n• Сыпучая форма из измельчённых веществ; для внутреннего и наружного применения.\n• Простые (pulvis simplex) — одно вещество; сложные (pulvis compositus) — два и более.\n• Приготовление: вещества измельчают и тщательно смешивают до однородности; делят на дозы (разделённые) или отпускают общей массой (неразделённые).\n• Пример рецепта (разделённый порошок):\n  Rp.: Streptocidi 0,5\n       D.t.d. N 10\n       S. Внутрь. По 1 порошку 3 раза в день.\n\n2. Таблетки (Tabulettae):\n• Твёрдая дозированная официнальная форма, получают прессованием на заводе.\n• Готовое (официнальное) средство, врач не готовит.\n• Пример рецепта:\n  Rp.: Tab. Analgini 0,5 N 10\n       D.S. Внутрь. По 1 таблетке 2 раза в день.\n\n3. Пилюли (Pilulae):\n• Шарики массой 0,1–0,5 г для приёма внутрь.\n• Состоят из лекарственного вещества и формообразующих (constituens) — пилюльная масса (massa pilularum) из порошка и экстракта солодки, глицерина и др.\n• Приготовление: смешивают вещество с массой, раскатывают и делят на пилюли.\n• Пример рецепта:\n  Rp.: Extracti et pulveris radicis Glycyrrhizae q.s.\n       ut fiat massa pilularum\n       D.t.d. N 30\n       S. Внутрь. По 1 пилюле 2 раза в день.\n\nВывод: порошки и пилюли могут изготавливаться в аптеке, таблетки — только заводское (официнальное) производство; все формы дозированы и удобны для точного применения."}, {"num": "20.2", "category": "Билет 20", "q": "Холинолитические средства. Мышечные релаксанты.", "hint": "• Холинолитики блокируют ацетилхолин.\n• М-холинолитик — атропин (расширяет зрачок, ↓секреция).\n• Н-холинолитики — ганглиоблокаторы.\n• Миорелаксанты — дитилин, тубокурарин (расслабляют мышцы).", "a": "ХОЛИНОЛИТИЧЕСКИЕ СРЕДСТВА (холиноблокаторы):\n• Определение: блокируют холинорецепторы, прекращая действие ацетилхолина и парасимпатической иннервации.\n\nКлассификация:\n• М-холинолитики — блокируют М-холинорецепторы: атропина сульфат (Atropini sulfas), скополамин, платифиллин (Platyphyllinum), метацин.\n  – Эффекты: расширение зрачка, учащение сердцебиения, снижение секреции желёз (слюна, бронхи), расслабление гладкой мускулатуры (спазмолитик).\n  – Применение: премедикация перед наркозом, спазмы ЖКТ, отравления ФОС, брадикардия.\n• Н-холинолитики (ганглиоблокаторы) — бензогексоний, пентамин; блокируют вегетативные ганглии (снижают АД).\n\nМЫШЕЧНЫЕ РЕЛАКСАНТЫ (курареподобные):\n• Определение: блокируют Н-холинорецепторы скелетных мышц, расслабляют поперечно-полосатую мускулатуру.\n\nКлассификация:\n• Деполяризующие — дитилин (Dithylinum, суксаметоний); вызывают стойкую деполяризацию мембраны; действуют коротко.\n• Антидеполяризующи
