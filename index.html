и (кошары):\n• Главное требование — сухость, чистота, отсутствие сквозняков при достаточной вентиляции.\n• Температура воздуха для взрослых овец (овцематок, баранов, молодняка): +4...+6°C.\n• В тепляке (родильном отделении): около +12...+16°C; при ягнении +15...+18°C, для новорожденных ягнят не ниже +8...+12°C.\n• Относительная влажность: не более 75-85% (в тепляке ~75%, при ягнении до 70%).\n• Аммиак — не более 20 мг/м³; углекислый газ — не более 0,25%.\n• Скорость движения воздуха: 0,3-0,5 м/с (в тепляке ~0,2 м/с).\n• Полы лучше глинобитные или земляные с сухой подстилкой (солома); навоз убирают, обеспечивают сухое логово.\n• Площадь пола на овцематку ориентировочно 1,8-2,5 м² (уточнить по учебнику в зависимости от породы/направления).\n\nСистемы содержания:\n• Стойлово-пастбищная — зимой животных держат в овчарнях, летом на пастбищах; основная в зонах с холодной зимой.\n• Пастбищная (круглогодовая) — содержание на пастбищах большую часть года, с укрытиями от непогоды; в южных районах с мягкой зимой.\n• Отгонная (отгонно-пастбищная) — сезонные перегоны отар на отдаленные пастбища (зимние — в степи/полупустыни, летние — в горы), при бескормице — тебеневка.\n• Стойлово-выгульная (откормочная) — при интенсивном откорме.\n\nОсновные постройки:\n• Овчарня (кошара) — основное помещение для зимнего содержания отары.\n• Баз (база, выгульно-кормовая площадка) — открытая огороженная площадка у овчарни для прогулок и кормления на воздухе.\n• Тепляк — утепленное родильное отделение в самой теплой и светлой части кошары; в нем оборудуют родильную секцию, клетки-кучки (для маток с ягнятами) и оцарки (групповые клетки — сакманы).\n\nЗначение: правильная система содержания и гигиена обеспечивают здоровье отары, высокое качество шерсти, сохранность ягнят при ягнении, профилактику простудных и копытных болезней."}, {"num": "12.3", "category": "Билет 12", "q": "Очистка, улучшение и обеззараживание питьевой воды. Самоочищение воды.", "hint": "• Очистка: отстаивание → коагуляция → фильтрация\n• Обеззараживание: хлор, озон, УФ, кипячение\n• Остаточный хлор 0,3–0,5 мг/л, контакт ~30 мин\n• Самоочищение: разбавление, осаждение, окисление, микробы", "a": "Цель обработки:\n• улучшение физических, химических и бактериологических свойств воды до питьевого качества (прозрачность, цвет, вкус, отсутствие патогенов).\n\n1) Очистка и улучшение воды:\n• Отстаивание — осаждение крупных взвешенных частиц в отстойниках под действием силы тяжести.\n• Коагуляция — добавление коагулянтов (сернокислый алюминий Al2(SO4)3, сернокислое железо) для укрупнения и осаждения мелких взвесей, удаления цветности и органики.\n• Фильтрация — пропускание через слой песка/гравия (быстрые и медленные фильтры) для удаления оставшейся мути и микробов.\n• Улучшение: умягчение (удаление солей жесткости), обезжелезивание, дезодорация (углевание), фторирование/обесфторивание.\n\n2) Обеззараживание (после осветления и фильтрации):\n• Хлорирование — основной способ: хлор или хлорная известь; рабочая доза подбирается по хлорпотребности, остаточный свободный хлор 0,3–0,5 мг/л, время контакта не менее 30 мин (для хлорной извести часто берут ~1–1,5 мг/л активного хлора, уточнить по учебнику).\n• Озонирование — лучший метод по гигиене: уничтожает микробы, улучшает вкус и цвет, без привкуса.\n• УФ-облучение (бактерицидные лампы) — разрушает микроорганизмы без реагентов.\n• Кипячение — для небольших количеств воды (надежно убивает микрофлору).\n• Реже: ультразвук, олигодинамия (ионы серебра).\n\n3) Самоочищение воды:\n• Определение — естественное восстановление природных свойств водоема за счет физических, химических и биологических процессов.\n• Механизмы: разбавление и перемешивание; осаждение взвесей; окисление органики растворенным кислородом; минерализация органики микроорганизмами; губительное действие солнечного света (УФ) и температуры; гибель патогенных микробов в чуждой среде; биологическая очистка (планктон, водоросли, простейшие).\n• Значение — обеспечивает санитарное состояние водоисточников, но при сильном загрязнении самоочищения недостаточно — требуется искусственная очистка."}, {"num": "13.1", "category": "Билет 13", "q": "Физиологическая и санитарно-гигиеническая роль воды в животноводстве.", "hint": "• Вода — 60-70% тела, среда всех реакций\n• Транспорт, обмен, терморегуляция, выделение\n• Поение коров ~50-70 л/сут; качество = здоровье\n• Грязная вода = инфекции, инвазии, отравления", "a": "Определение:\n• Вода — главная составная часть организма: у взрослых животных 60-65% массы тела, у молодняка до 70-80%.\n\nФизиологическая роль:\n• Среда (растворитель), в которой идут все биохимические реакции обмена веществ.\n• Транспорт питательных веществ к клеткам и удаление продуктов распада.\n• Участие в пищеварении (слюна, желудочный, кишечный соки), всасывании, выделении (моча, пот).\n• Терморегуляция: испарение воды охлаждает тело, поддерживает постоянную температуру.\n• Поддержание тургора клеток, осмотического давления, объёма крови и лимфы.\n• Потеря 10% воды — тяжёлое состояние; 20% — гибель животного.\n\nПотребность в воде (поение):\n• Дойная корова — в среднем 50-70 л/сут (зависит от удоя, t воздуха, корма).\n• На 1 кг сухого вещества корма КРС требуется 4-6 л воды.\n• Бесперебойное поение повышает удои на 6-10%.\n• Температура воды: для взрослых — 10-12 °С, для стельных — 12-15 °С, для молодняка — 15-30 °С.\n\nСанитарно-гигиеническое значение:\n• Поение, мойка животных, посуды, помещений, охлаждение молока, приготовление кормов.\n• Через недоброкачественную воду передаются инфекции (сибирская язва, ящур, лептоспироз, сальмонеллёз, колибактериоз), инвазии (яйца гельминтов), отравления (нитраты, соли тяжёлых металлов).\n\nТребования к питьевой воде:\n• Прозрачная, бесцветная, без посторонних запахов и привкусов.\n• Без патогенных микробов, яиц гельминтов, ядовитых примесей.\n• Контролируют органолептические, физические, химические (жёсткость, нитраты, минерализация) и бактериологические (коли-титр, коли-индекс) показатели."}, {"num": "13.2", "category": "Билет 13", "q": "Гигиенические требования к пастбищному содержанию животных и рациональное использование пастбищ.", "hint": "• Пастбище: дешёвое молоко + оздоровление (моцион, солнце, зелень)\n• Постепенный перевод 7-10 дней, чтобы не было тимпании\n• Загонная (порционная) пастьба, 0,25-0,3 га/гол КРС\n• Оборудование: водопой, навесы, соль-лизунец, прогоны", "a": "Значение пастбищ:\n• Зелёный корм — самый дешёвый, полноценный (протеин, каротин, минералы, витамины).\n• Оздоровление: моцион, солнечный свет (вит. D), чистый воздух, закаливание — профилактика рахита, остеомаляции, бесплодия.\n\nПодготовка животных к выпасу:\n• Перевод со стойлового на пастбищное содержание постепенный, в течение 7-10 дней (иначе расстройства пищеварения, тимпания, поносы).\n• Перед выгоном — осмотр, расчистка и обрезка копыт, обрезка рогов, проверка на инфекции, вакцинации, дегельминтизация.\n• Первые дни животных подкармливают сеном и выпасают по 2-3 ч, постепенно увеличивая время.\n\nРациональное использование пастбищ:\n• Загонная (порционная) система: пастбище делят на 8-12 загонов, стравливают поочерёдно, давая травостою отрастать (отдых загона 25-30 дней).\n• Не допускать стравливания травы ниже 4-5 см.\n• Нагрузка для дойного КРС — 0,25-0,3 га культурного пастбища на голову; ёмкость пастбища рассчитывают по урожайности и числу голов.\n• Чередование выпаса с сенокошением, подкашивание несъеденных остатков, удобрение, подсев трав.\n\nОборудование пастбищ:\n• Водопой (чистый, благоустроенный, не из стоячих заражённых водоёмов).\n• Навесы (тырла) от солнца и непогоды, лагерные постройки.\n• Соль-лизунец, минеральная подкормка.\n• Прогоны (скотопрогоны) — сухие, без острых предметов.\n\nПрофилактика болезней и отравлений:\n• Контроль ядовитых трав, отравлений нитратами (после азотных удобрений выпасают не ранее чем через 3-4 недели).\n• Защита от перегрева, гнуса; профилактика тимпании при выпасе по бобовым по росе.\n• Пастбищные инвазии (гельминтозы) — смена загонов, дегельминтизация.\n\nРежим пастьбы:\n• Пасти в прохладные часы (утро, вечер), в жару — отдых под навесом, продолжительность пастьбы 12-14 ч/сут."}, {"num": "13.3", "category": "Билет 13", "q": "Корнеклубнеплоды; питательность (картофель, свекла, морковь,турнепс)", "hint": "• Сочные диетические корма, воды 70-90%\n• Картофель — крахмал; свекла — сахар; морковь — каротин\n• Мало протеина (1-2%), клетчатки и жира\n• Картофель проросший/позеленевший — соланин (варить)", "a": "Общая характеристика:\n• Корнеклубнеплоды (картофель, свёкла, морковь, турнепс, брюква) — сочные, диетические, охотно поедаемые корма.\n• Высокое содержание воды (70-90%), мало клетчатки, жира; протеина 1-2% (около половины — амиды).\n• Хорошо влияют на пищеварение, молокоотдачу, усвоение других кормов.\n\nПитательность (на 1 кг):\n• Картофель: сухого вещества ~22-25%, в основном крахмал (до 20%); ~0,3 корм. ед.; переваримого протеина ~10-16 г; беден витаминами (кроме С). Норма коровам до 15-20 кг, свиньям (варёный) — основной энергокорм.\n• Свёкла кормовая: сухого вещества ~12%; ~0,12-0,16 корм. ед.; переваримого протеина ~9 г; сахара ~40 г. Норма коровам до 30-35 кг/сут.\n• Свёкла сахарная: сухого вещества ~23%; ~0,24-0,26 корм. ед.; переваримого протеина ~7 г; сахара до 120 г. Норма коровам 6-8 кг (приучать постепенно).\n• Морковь: сухого вещества ~12%; ~0,14 корм. ед.; переваримого протеина ~8 г; богата каротином (50-250 мг/кг) — ценный витаминный корм для молодняка, племенных, птицы. Норма коровам 10-15 кг.\n• Турнепс: сухого вещества ~9-10%; ~0,09-0,11 корм. ед.; переваримого протеина ~6 г; сахара ~48 г. Молокогонный корм. Норма коровам до 20-25 кг (даёт привкус молоку — скармливать после дойки).\n\n(Точные значения корм. ед. уточнить по справочным таблицам Менькина / Солдатенко.)\n\nПодготовка к скармливанию:\n• Очистка от земли, мойка, измельчение перед раздачей.\n• Картофель проросший и позеленевший содержит соланин — варить, воду сливать.\n• Не скармливать мёрзлые, загнившие корнеплоды (опасность нитритов, расстройств)."}, {"num": "14.1", "category": "Билет 14", "q": "Вентиляция животноводческих помещений. Системы вентиляции, принцип действия, гигиеническая оценка.", "hint": "• Цель: убрать влагу, CO₂, аммиак, дать свежий воздух\n• Естественная (трубная приточно-вытяжная) — дёшево, слаба летом\n• Принудительная (приточная/вытяжная/комбинир.) — надёжно, но дорого\n• Оценка по кратности воздухообмена и нормам газов", "a": "Назначение вентиляции:\n• Удаление избытка влаги, вредных газов (CO₂, аммиак, сероводород), пыли, микробов; подача свежего воздуха; нормализация микроклимата.\n• ПДК: CO₂ — до 0,25%, аммиак — до 20 мг/м³, сероводород — до 10 мг/м³.\n\nПоказатели:\n• Объём вентиляции — количество воздуха (м³), подаваемого в помещение за 1 ч (рассчитывают по выделению водяных паров или CO₂).\n• Кратность воздухообмена — сколько раз за час сменяется воздух в помещении.\n\n1. Естественная вентиляция:\n• Работает за счёт разности температур и давления внутри и снаружи, а также ветра.\n• Беструбная (через окна, ворота, поры стен, щели) и трубная приточно-вытяжная (вытяжные шахты с дефлекторами + приточные каналы).\n• Сечение вытяжной трубы — от 0,8×0,8 м, приточного канала — около 0,2×0,2 м.\n• Оценка: простая, дешёвая, не требует энергии; но малоэффективна летом (малая разность температур) и плохо управляется.\n\n2. Искусственная (принудительная, механическая) вентиляция:\n• Воздух перемещается вентиляторами. Виды:\n  – приточная (нагнетает свежий воздух);\n  – вытяжная (удаляет загрязнённый);\n  – приточно-вытяжная (комбинированная) — наиболее эффективна.\n• Может работать с подогревом (калориферы, теплогенераторы) и очисткой воздуха.\n• Оценка: обеспечивает заданный микроклимат в любое время года независимо от погоды; но требует энергии, оборудования, обслуживания.\n\n3. Комбинированная: сочетание естественной и принудительной (на небольших фермах).\n\nГигиеническая оценка систем:\n• Эффективность вентиляции оценивают по влажности, концентрации газов, скорости движения воздуха (норма 0,2-0,5 м/с зимой) и кратности воздухообмена.\n• Лучшая система та, что поддерживает нормы микроклимата без сквозняков и переохлаждения животных."}, {"num": "14.2", "category": "Билет 14", "q": "Влияние почвы на здоровье животных. Биогеохимические провинции.", "hint": "• Почва → растения → вода → организм животного (цепь)\n• Биогеохим. провинция = аномалия микроэлементов\n• Зоб (йод), акобальтоз (Co), флюороз (F), паракератоз (Zn)\n• Почва — фактор передачи инфекций (сиб. язва, столбняк)", "a": "Влияние почвы на здоровье животных:\n• Почва — главное звено цепи «почва → вода → растение → организм»; через неё в организм поступают макро- и микроэлементы.\n• Физические свойства почвы (влажность, воздухопроницаемость, теплоёмкость) влияют на сухость, температуру, состояние помещений и пастбищ.\n• Почва — фактор передачи болезней: в ней долго сохраняются возбудители (сибирская язва, столбняк, эмфизематозный карбункул, ботулизм), яйца и личинки гельминтов.\n• Самоочищение почвы: бактерии минерализуют органику (аммонификация, нитрификация) — обезвреживание трупов, навоза.\n\nГигиенические требования к почве (под застройку ферм):\n• Сухая, водо- и воздухопроницаемая (супеси, суглинки), низкий уровень грунтовых вод, незаражённая, с хорошим самоочищением.\n\nБиогеохимические провинции:\n• Это территории с повышенным или пониженным содержанием одного/нескольких химических элементов в почве, воде, растениях и организмах.\n• В них возникают эндемические (биогеохимические) болезни — массовые, привязанные к местности.\n\nЭндемические болезни (примеры):\n• Недостаток йода — эндемический зоб (увеличение щитовидной железы, рождение слабого молодняка); встречается в Прибайкалье, Бурятии и др.\n• Недостаток кобальта — акобальтоз («сухотка»): истощение, анемия (нарушается синтез вит. В₁₂).\n• Недостаток меди — анемия, нарушение роста; избыток молибдена усугубляет.\n• Недостаток цинка — паракератоз кожи.\n• Недостаток/избыток фтора: недостаток — кариес зубов; избыток — флюороз (крапчатость и разрушение эмали, поражение костей).\n• Нарушение Ca/P — остеомаляция, остеопороз, рахит.\n• Уровская болезнь (Прибайкалье) — поражение суставов и костей (дисбаланс Ca, Sr, P).\n\nЗначение:\n• Знание биогеохимических провинций позволяет проводить профилактику: подкормку дефицитными микроэлементами (йодированная, кобальтовая соль), коррекцию рационов."}, {"num": "14.3", "category": "Билет 14", "q": "Гигиена привязного содержания крупного рогатого скота. Преимущества и недостатки.", "hint": "• Корова в индивидуальном стойле на привязи + моцион\n• Стойло ~1,7-2,2 м², цепная привязь\n• Плюсы: индивидуальное кормление, учёт, раздой, удобство ветобслуживания\n• Минусы: гиподинамия, затраты труда, мало моциона", "a": "Сущность системы:\n• Каждое животное содержится в индивидуальном стойле на привязи; кормление, поение и доение — на месте.\n• Обязателен ежедневный активный моцион на выгульных площадках или прогонах.\n\nУстройство стойл (нормы):\n• Площадь стойла для дойных коров и нетелей: на товарных фермах 1,7-2,2 м², на племенных 2,1-2,4 м².\n• Ширина стойла 1,0-1,2 м, длина 1,7-1,9 м (на племенных — шире и длиннее).\n• Привязи: индивидуальные (цепные — вертикальные и горизонтальные) и групповые (автопривязь). Привязь должна быть прочной, но позволять животному ложиться, вставать, есть.\n• Высота помещений 2,4-3 м; пол с уклоном к навозному каналу; кормушки и поилки у каждого стойла.\n\nПреимущества:\n• Индивидуальное (дифференцированное) нормирование кормления каждой коровы по продуктивности.\n• Точный учёт удоев, затрат кормов; удобный раздой коров.\n• Удобство ветеринарного обслуживания, осеменения, наблюдения за состоянием.\n• Спокойная обстановка, меньше травм и стрессов от стычек в группе.\n\nНедостатки:\n• Гиподинамия (недостаток движения) — ослабление здоровья, нарушение обмена, копыт, воспроизводства.\n• Лишение оздоровительного действия пастбища (солнце, моцион, свежая трава).\n• Высокие затраты ручного труда, низкая производительность, трудность автоматизации.\n• Дополнительные затраты на скашивание и подвоз зелёной массы.\n• При нарушении микроклимата (низкая t, высокая влажность) удои снижаются на 4-23%, привесы на 15-20%.\n\nГигиенические требования:\n• Обязательный ежедневный моцион (2-3 ч), нормальный микроклимат, чистая сухая подстилка, регулярная уборка навоза, чистка кожи, уход за копытами."}, {"num": "15.1", "category": "Билет 15", "q": "Гигиенический уход за с.-х. животными. Особенности организации ухода в специализированных хозяйствах.", "hint": "• Уход: кожа, конечности, копыта, рога, моцион\n• Чистка щёткой/пылесосом, чистая = здоровая кожа\n• Спецхозяйства: поток, ванны с медным купоросом\n• Расчистка копыт 2 раза/год, активный моцион", "a": "Определение:\n• Гигиенический уход — система мероприятий по содержанию кожи, конечностей, копыт и рогов в чистоте для сохранения здоровья и продуктивности.\n\nУход за кожей:\n• Кожа выполняет защитную, выделительную, терморегуляторную, дыхательную функции; загрязнение нарушает потоотделение и теплоотдачу.\n• КРС, свиней, лошадей чистят волосяной щёткой; лошадей после — влажной суконкой. Чистят вне помещения или в тамбуре/манеже.\n• Механизированная чистка — ручной или передвижной электропылесос с щётками. Купание и душ летом.\n\nУход за конечностями и копытами:\n• Систематически очищают от грязи, обмывают и обсушивают.\n• Регулярная расчистка и обрезка копыт (как правило 2 раза в год) предупреждает деформацию и хромоту.\n• Уход за рогами, при необходимости — обезроживание.\n\nМоцион:\n• Активный моцион (прогон 2-3 км) укрепляет конечности, сердечно-сосудистую систему, улучшает обмен веществ и воспроизводство.\n\nОсобенности в специализированных (промышленных) хозяйствах:\n• Высокая концентрация поголовья, безвыгульное содержание, гиподинамия — повышенный риск болезней копыт.\n• Перед входом в доильные залы оборудуют бетонированные дезванны длиной 4-6 м с 10%-ным раствором медного купороса для профилактики болезней копыт.\n• Уход максимально механизирован, организован поточно по технологическим группам и цехам.\n• Обязательны регулярная функциональная обрезка копыт, моцион на выгульно-кормовых площадках, контроль микроклимата.\n\nЗначение:\n• Чистая кожа и здоровые конечности повышают продуктивность, снижают заболеваемость и санитарно ухудшают качество продукции при нарушении ухода."}, {"num": "15.2", "category": "Билет 15", "q": "Ультрафиолетовое излучение. Гигиеническое значение, механизм действия на организм. Устройства для УФ облучения животных.", "hint": "• УФ-А, УФ-В, УФ-С (загарная, антирахитная, бактерицидная)\n• Витамин D из 7-дегидрохолестерина в коже\n• Эффекты: антирахит, бактерицид, эритема, тонус\n• Лампы ПРК (ДРТ), эритемные ЛЭ, бактерицидные БУВ; дозы строго", "a": "Определение:\n• Ультрафиолетовое излучение — невидимые лучи с длиной волны 400-10 нм (короче фиолетовых).\n\nЗоны (области) спектра:\n• Зона А — 400-320 нм: загарное, общестимулирующее действие.\n• Зона В — 320-280 нм: антирахитное (образование витамина D), эритемное.\n• Зона С — 280-200 нм: бактерицидное, абиотическое.\n\nМеханизм действия на организм:\n• Антирахитное: в коже из 7-дегидрохолестерина образуется витамин D3 — нормализуется обмен Са и Р, предупреждается рахит и остеодистрофия.\n• Образование биологически активных веществ (гистамин и др.), стимуляция кроветворения, иммунитета, обмена веществ.\n• Эритемное действие (покраснение кожи), пигментация (загар).\n• Бактерицидное (зона С) — обеззараживание воздуха, кожи, воды.\n\nГигиеническое значение:\n• Профилактика рахита, остеодистрофии, алиментарной анемии, экзем.\n• Повышение защитных сил, продуктивности, воспроизводства; снижение заболеваемости и падежа молодняка.\n• Недостаток УФ (зимой, в помещениях) ведёт к нарушению обмена веществ.\n\nУстройства для УФ-облучения:\n• Ртутно-кварцевые лампы ПРК (ПРК-2, ПРК-4, ПРК-7) — стационарные и передвижные установки.\n• Эритемные люминесцентные лампы (ЛЭ, типа ЭО, ЭО1-30) для длительного облучения животных.\n• Бактерицидные лампы БУВ-30 (зона С) — обеззараживание воздуха и помещений.\n• Облучатели типа ОЭ, самоходные установки (УО) для дозированного облучения.\n\nУсловия применения:\n• Строгое соблюдение доз облучения, периодический контроль уровня облучённости.\n• Защита глаз персонала и животных; передозировка вызывает ожоги и угнетение."}, {"num": "15.3", "category": "Билет 15", "q": "Особенности кормление супоросных свиноматок", "hint": "• Супоросность ~114-117 дней, два периода\n• 1-я половина (до 80-85 дн.) — умеренно, не перекормить\n• 2-я половина — корма +30-40% (рост плодов)\n• Полноценный белок, минералы, витамины А, D, E; моцион", "a": "Общие сведения:\n• Супоросность длится в среднем 114-117 дней (около 3 мес 3 нед 3 дня).\n• Цель кормления — рождение крепких, жизнеспособных поросят и подготовка матки к лактации.\n• Нормы дифференцируют по возрасту (молодые до 2 лет и взрослые) и по периоду супоросности.\n\nПервая половина супоросности (до 80-85 дня):\n• Эмбрионы растут медленно, потребность невысока — кормят умеренно.\n• После осеменения норму снижают примерно на треть от уровня холостого периода, чтобы не допустить ожирения и гибели эмбрионов.\n• Используют объёмистые корма (сочные, грубые) — нормализуют пищеварение.\n\nВторая половина супоросности (с 80-85 дня):\n• Плоды интенсивно растут — потребность возрастает, дачу кормов увеличивают примерно на 30-40%.\n• В рационе повышают долю концентратов (около 40% по питательности), дают сочные и грубые корма.\n• За 3-4 дня до опороса уровень кормления снижают на 30-35%, исключают объёмистые и пучащие корма.\n\nКачество рациона:\n• Полноценный протеин (корма животного происхождения, бобовые, жмыхи), достаточно лизина.\n• Минеральные вещества — соль, мел, костная мука (кальций, фосфор, железо для профилактики анемии поросят).\n• Витамины А, D, E, группы B; полезна травяная мука, зелёные корма.\n• Корма доброкачественные — нельзя мёрзлые, плесневелые, гнилые (риск абортов).\n\nСодержание:\n• Кормление 2 раза в сутки, постоянный доступ к чистой воде, активный моцион — профилактика трудных опоросов.\n\nЗначение:\n• Полноценное кормление обеспечивает крупный, выровненный приплод и высокую молочность матки."}, {"num": "16.1", "category": "Билет 16", "q": "Гигиена сухостойных коров и нетелей, как основа получения здорового молодняка", "hint": "• Сухостой ~60 дней (45-70), своевременный запуск\n• Накопить резерв: белок плода 70%, витамины А, D\n• Содержание: 5 м² пола, выгул 8-10 м², моцион\n• Цель: крепкий приплод, молозиво, профилактика отёла", "a": "Понятие:\n• Сухостойный период — время от запуска (прекращения доения) до отёла. Продолжительность 45-70 суток, оптимально около 60 дней (для нетелей подготовку начинают за 2-3 мес до отёла).\n• Запуск проводят своевременно — за 60 дней до отёла, постепенно снижая доения.\n\nЗначение периода:\n• Завершается рост плода (70% массы — в последние 2 мес), формируется здоровый приплод.\n• Восстанавливается упитанность коровы, накапливается резерв питательных веществ, готовится вымя к лактации.\n• Закладывается качество молозива (витамины А, D) — основа иммунитета телёнка.\n\nКормление:\n• Уровень кормления повышают, поддерживают среднюю/вышесреднюю упитанность (без ожирения).\n• Протеиновое питание увеличивают — сухое вещество плода на ~70% состоит из белка; ~110 г переваримого протеина на 1 корм. ед.\n• Минеральное обеспечение: кальций, фосфор, соотношение Са:Р около 1,5:1; в последние 2 недели Са снижают (профилактика родильного пареза).\n• Достаточно каротина и витаминов А, D; основа рациона — хорошее сено, сенаж, корнеплоды; за 2 недели до отёла снижают сочные и концентраты.\n\nСодержание и гигиена:\n• Группировка по срокам стельности; нетелей — отдельной группой. Лучше беспривязное содержание со свободным выходом на площадки.\n• Площадь пола на животное не менее 5 м², выгульно-кормовая площадка 8-10 м².\n• Обязателен активный моцион (2-3 км) — облегчает отёл, профилактирует залёживание и родовые осложнения.\n• Чистота, сухость, нормальный микроклимат, подготовка к переводу в родильное отделение.\n\nВывод:\n• Правильные кормление, содержание и моцион сухостойных коров и нетелей — основа рождения крепкого, здорового молодняка и высокой последующей продуктивности."}, {"num": "16.2", "category": "Билет 16", "q": "Значение натрия, калия, хлора в кормлении животных; их кормовые источники.", "hint": "• Na, K, Cl — водно-солевой, осмотический баланс\n• Натрий+хлор = поваренная соль (в кормах мало)\n• Калий — в избытке в растительных кормах\n• Cl → соляная кислота желудка; соль 50-100 г КРС", "a": "Общее значение:\n• Натрий, калий и хлор — макроэлементы-электролиты; поддерживают водно-солевой обмен, осмотическое давление, кислотно-щелочное равновесие, передачу нервных импульсов и работу мышц.\n\nНатрий (Na):\n• Главный катион межклеточной жидкости; регулирует осмотическое давление, всасывание, обмен воды, нервную проводимость.\n• Растительные корма натрием бедны, поэтому его дают с поваренной солью.\n• Недостаток: снижение аппетита и продуктивности, потеря массы, извращённый аппетит (лизуха), судороги.\n\nКалий (K):\n• Основной внутриклеточный катион; участвует в обмене углеводов и белков, работе сердца, мышц, нервной системы.\n• Растительные корма богаты калием, поэтому дефицит редок; возможен избыток.\n• Источники: зелёная трава, силос, сено, корнеплоды, картофель, патока.\n\nХлор (Cl):\n• Образует соляную кислоту желудочного сока (пищеварение, бактерицидность), участвует в осмотическом и кислотно-щелочном балансе.\n• Основной источник — поваренная соль (NaCl).\n• Недостаток связан с дефицитом соли — нарушение пищеварения, аппетита.\n\nКормовые источники:\n• Натрий и хлор — поваренная соль (NaCl): рассыпная крупнокристаллическая, брикеты, соль-лизунец; вводят в комбикорма.\n• Калий — зелёные и сочные корма, бобовые травы, корнеплоды, патока.\n\nПримерные нормы поваренной соли:\n• Крупному рогатому скоту — в среднем до 50-100 г на голову в сутки (с подкормкой соль-лизунцом); потребность растёт при стельности и лактации.\n• Свиньям, овцам, лошадям — пропорционально живой массе и продуктивности (уточнить по учебнику/нормам).\n\nВажно:\n• Избыток соли при недостатке воды вызывает солевое отравление (особенно у свиней и птицы); нужен постоянный доступ к воде."}, {"num": "16.3", "category": "Билет 16", "q": "Особенности кормление коров при сдаивании и в сухостойный период", "hint": "• Раздой = авансированное кормление +2-3 корм. ед.\n• Концентратов на 3-4 кг больше факт. удоя, до 50-55%\n• Сухостой ~60 дней: накопить резерв, не ожирять\n• Са:Р ~1,5:1, протеин ~110 г/корм.ед., каротин, моцион", "a": "Кормление при раздое (после отёла, сдаивание):\n• Раздой — период первых 2-3 месяцев лактации, когда стимулируют повышение удоя.\n• Применяют авансированное кормление: к норме на фактический удой добавляют 2-3 корм. ед. «на раздой».\n• Концентраты дают на 3-4 кг больше, чем требует текущий удой; пока корова прибавляет молоко, аванс сохраняют.\n• Доля концентратов по питательности не должна превышать 50-55%; клетчатки в сухом веществе 16-18%.\n• Рацион полноценный, легкопереваримый: хорошее сено, сенаж, силос, корнеплоды, патока, комбикорм; контроль сахаро-протеинового отношения (около 0,8-1,0:1).\n• После отёла рацион наращивают постепенно (3-4 дня), чтобы не вызвать расстройств и мастита.\n• Пример (удой 20 кг): сено 3 кг, сенаж 12 кг, силос 14 кг, патока 1,5 кг, комбикорм ~6 кг (ориентировочно).\n\nКормление в сухостойный период:\n• Продолжительность около 60 дней (45-70), своевременный запуск.\n• Цель — восстановить упитанность, накопить резерв питательных веществ, обеспечить рост плода и подготовку к лактации (без ожирения).\n• Протеиновое питание повышенное (~110 г переваримого протеина на 1 корм. ед.), так как сухое вещество плода на ~70% состоит из белка.\n• Минеральное обеспечение: кальций, фосфор (Са:Р около 1,5:1), за 2 недели до отёла кальций снижают; достаточно каротина и витаминов А, D.\n• Основа рациона — доброкачественное сено, сенаж, корнеплоды; за 1-2 недели до отёла сокращают сочные и концентрированные корма, исключают мёрзлые и недоброкачественные.\n• Обязателен моцион — облегчает отёл, профилактирует осложнения.\n\nЗначение:\n• Правильный раздой раскрывает молочную продуктивность, а полноценный сухостой обеспечивает здоровый приплод, качественное молозиво и высокий удой следующей лактации."}, {"num": "17.1", "category": "Билет 17", "q": "Гигиена беспривязного содержания крупного рогатого скота. Преимущества и недостатки.", "hint": "• Свобода движения, групповое содержание, машинное доение в зале\n• Глубокая подстилка или боксы, кормовая площадка\n• Плюс: дёшево, выше производительность труда\n• Минус: больше кормов и подстилки, риск травм/инфекций", "a": "Определение:\n• Беспривязное содержание — система, при которой животных содержат группами без привязи, со свободным доступом к кормам, воде и местам отдыха; доение в специальном доильном зале.\n\nСпособы (варианты):\n• На глубокой несменяемой подстилке (солома, добавляют по 2,5–3 кг на голову в сутки), навоз убирают 1–2 раза в год.\n• Боксовое содержание — индивидуальные боксы для отдыха + кормовая и навозная площадки.\n• Комбибоксовое — бокс совмещён с кормушкой.\n\nЗонирование помещения:\n• Зона отдыха (логово/боксы), кормовая зона (кормовой стол, фронт кормления 0,7–0,8 м), доильно-молочный блок, выгульно-кормовые площадки.\n\nГигиенические требования:\n• Сухая, тёплая, чистая подстилка; нормируемый микроклимат (t ~8–10 °C, влажность до 70–75%).\n• Формирование выровненных групп по возрасту, продуктивности, физиологическому состоянию.\n• Достаточный фронт кормления и поения, бесперебойное водоснабжение.\n• Соблюдение ветсанправил: профилактика травматизма и распространения болезней.\n\nПреимущества:\n• Экономичность строительства и эксплуатации.\n• Высокая производительность труда (механизация, доение в зале «ёлочка», «карусель»).\n• Активный моцион — лучше здоровье, воспроизводство, крепость конечностей.\n• Отвечает физиологическим потребностям животных.\n\nНедостатки:\n• Больший расход кормов (на 5–10%) и подстилки.\n• Сложнее индивидуальный учёт и нормированное кормление.\n• Выше риск травм (борьба за иерархию), быстрее распространяются инфекции.\n• Требует высокой культуры и чёткой технологии обслуживания; навоз полужидкий, труднее содержать чистоту.\n\nЗначение:\n• Перспективная промышленная технология молочного скотоводства при условии полноценного кормления и строгого соблюдения зоогигиенических норм."}, {"num": "17.2", "category": "Билет 17", "q": "Освещенность животноводческих помещений. Гигиеническое значение, методы нормирования и определения.", "hint": "• Свет = обмен веществ, витамин D, резистентность\n• Естественное: световой коэффициент СК и КЕО\n• Искусственное: освещённость в люксах (лк), люксметр\n• Коровник СК 1:10–1:15; недостаток = «световое голодание»", "a": "Гигиеническое значение света:\n• Стимулирует обмен веществ, рост, кроветворение, функцию желёз.\n• УФ-лучи: образование витамина D, бактерицидное действие, повышение естественной резистентности.\n• Влияет на половые функции, воспроизводство, продуктивность (молоко, яйценоскость).\n• Недостаток света зимой → «световое голодание»: снижение продуктивности, резистентности, рост бесплодия.\n\nВиды освещения:\n• Естественное (через окна), искусственное (лампы), совмещённое.\n\nНормирование естественного освещения:\n1) Геометрический метод — световой коэффициент (СК):\n• СК = отношение остеклённой площади окон к площади пола.\n• Коровники, телятники: 1:10 – 1:15.\n• Свинарники: 1:10 – 1:12 (для маток), откормочные 1:15 – 1:20.\n• Овчарни: 1:15 – 1:20; птичники: 1:8 – 1:12; родильные/профилактории — больше света (1:10–1:15). (уточнить по учебнику)\n2) Светотехнический метод — коэффициент естественной освещённости (КЕО):\n• КЕО = отношение освещённости в точке внутри помещения к одновременной наружной освещённости, в %.\n• Для животноводческих помещений КЕО ≈ 0,5–1,0%.\n\nНормирование искусственного освещения:\n• Измеряется в люксах (лк); нормируется удельная мощность ламп (Вт/м²).\n• Коровники: на уровне кормушек ~50–75 лк; свинарники-откорм: 20–50 лк.\n• Продолжительность светового дня (рабочее освещение) 14–18 ч; предусматривают дежурное (ночное) освещение.\n\nМетоды определения:\n• Световой коэффициент — измерением площади окон и пола.\n• КЕО — расчётом или измерением люксметром внутри и снаружи.\n• Освещённость в люксах — прибором люксметром (фотоэлемент + гальванометр).\n\nЗначение:\n• Правильный световой режим обеспечивает здоровье, высокую продуктивность и воспроизводство животных."}, {"num": "17.3", "category": "Билет 17", "q": "Особенности кормление холостых свиноматок", "hint": "• Цель — заводская упитанность к случке (не худые, не жирные)\n• ~2,8–3,2 к.ед. и ~280–320 г протеина в сутки\n• Флешинг: за 3–14 сут поднять норму на 25–30%\n• Концентраты ~65% + сочные корма 35%", "a": "Определение:\n• Холостая свиноматка — матка после отъёма поросят, подготавливаемая к случке (осеменению).\n\nЦель и особенности кормления:\n• Обеспечить заводскую (среднюю) упитанность: истощённые и ожиревшие матки плохо осеменяются и дают малочисленные пометы.\n• Восстановить потери живой массы после подсосного периода.\n• Подготовить к плодотворному осеменению и многоплодию.\n\nНормы кормления (на голову в сутки, по живой массе):\n• Масса 141–160 кг: ~2,8 кормовых единиц и ~280 г переваримого протеина.\n• Масса 181–200 кг: ~3,2 к.ед. и ~320 г переваримого протеина.\n• Сухого вещества: до 2 лет — 1,8–2,4 кг, старше 2 лет — 1,2–1,6 кг на 100 кг живой массы.\n\nКачество рациона (на 1 кг сухого вещества):\n• Переваримый протеин — 105 г, сырая клетчатка — до 140 г, лизин — 6 г.\n• Кальций — 8,7 г, фосфор — 7,2 г, поваренная соль — 5,8 г, каротин — 11,6 мг.\n\nСтруктура рациона:\n• Концентраты — ~65–75% по питательности, сочные корма (свёкла, картофель, силос) — 25–35%.\n• Травяная мука, летом — зелёная масса до 10–12 кг на голову; комбикорма СК-1, КК-53.\n\nФлешинг (стимулирующее кормление перед случкой):\n• За 3–14 суток до осеменения уровень кормления повышают на 25–30%.\n• Усиливает овуляцию, повышает оплодотворяемость и многоплодие.\n\nГигиенические требования:\n• Полноценность по протеину, минералам, витаминам; моцион и солнечное облучение.\n• Доброкачественные корма; контроль упитанности перед случкой.\n\nЗначение:\n• Правильное кормление холостых маток обеспечивает высокую оплодотворяемость, многоплодие и крепкий приплод."}]};
const SECTIONS = {
  anatomy: {label:'Анатомия', title:'Анатомия и физиология животных',
            sub:'96 экзаменационных вопросов · подсказка и ответ к каждому',
            lsk:'anatomy_known_v2', catAll:'Все темы', catNoun:'тем'},
  pharma:  {label:'Фармакология', title:'Ветеринарная фармакология',
            sub:'22 билета · 66 вопросов · подсказка и ответ',
            lsk:'pharma_known_v1', catAll:'Все билеты', catNoun:'билетов'},
  mdk:     {label:'МДК 01.01', title:'МДК 01.01 — зоогигиена и кормление',
            sub:'17 билетов · 51 вопрос · подсказка и ответ',
            lsk:'mdk_known_v1', catAll:'Все билеты', catNoun:'билетов'},
};
const ORDER = ['anatomy','pharma','mdk'];

const $ = s => document.querySelector(s);
const list = $('#list'), sel = $('#cat');

let cur = localStorage.getItem('active_section');
if(!SECTIONS[cur]) cur = 'anatomy';
let known = {};

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function loadKnown(){ try{ known = JSON.parse(localStorage.getItem(SECTIONS[cur].lsk)||'{}'); }catch(e){ known={}; } }
function saveKnown(){ localStorage.setItem(SECTIONS[cur].lsk, JSON.stringify(known)); }

// build tab bar
$('#tabs').innerHTML = ORDER.map(k=>{
  const s=SECTIONS[k];
  return `<button data-sec="${k}"><span>${s.label}</span><span class="n">${DATA[k].length} вопр.</span></button>`;
}).join('');

function renderList(){
  const cards = DATA[cur];
  list.innerHTML = cards.map(c=>`
    <article class="card${known[c.num]?' known':''}" data-num="${esc(c.num)}" data-cat="${esc(c.category)}" data-q="${esc(c.q.toLowerCase())}">
      <div class="chead">
        <span class="num">№ ${esc(c.num)}</span>
        <span class="badge">${esc(c.category)}</span>
        <label class="learned"><input type="checkbox" data-num="${esc(c.num)}" ${known[c.num]?'checked':''}> выучено</label>
      </div>
      <h2 class="q">${esc(c.q)}</h2>
      <details class="spoiler hint"><summary>💡 Подсказка</summary><div class="body">${esc(c.hint)}</div></details>
      <details class="spoiler ans"><summary>✅ Ответ</summary><div class="body">${esc(c.a)}</div></details>
    </article>`).join('');
}

function fillCats(){
  const s = SECTIONS[cur];
  const cards = DATA[cur];
  const cats = [...new Set(cards.map(c=>c.category))];
  sel.innerHTML = `<option value="">${s.catAll} (${cards.length})</option>` +
    cats.map(c=>{const n=cards.filter(x=>x.category===c).length;return `<option value="${esc(c)}">${esc(c)} (${n})</option>`}).join('');
}

function updateStats(){
  const cards = DATA[cur];
  const k = cards.filter(c=>known[c.num]).length;
  $('#known').textContent = k;
  $('#left').textContent = cards.length - k;
  $('#prog').style.width = (cards.length? k/cards.length*100:0)+'%';
}

function applyFilter(){
  const q = $('#search').value.trim().toLowerCase();
  const cat = sel.value;
  const onlyLeft = $('#onlyLeft').checked;
  let shown = 0;
  document.querySelectorAll('.card').forEach(el=>{
    const num = el.dataset.num;
    let ok = true;
    if(cat && el.dataset.cat!==cat) ok=false;
    if(onlyLeft && known[num]) ok=false;
    if(q && !(el.dataset.q.includes(q) || num.toLowerCase().startsWith(q))) ok=false;
    el.style.display = ok ? '' : 'none';
    if(ok) shown++;
  });
  const total = DATA[cur].length;
  $('#count').textContent = shown===total ? `Всего вопросов: ${total}` : `Показано: ${shown} из ${total}`;
  let e = $('#empty');
  if(shown===0){ if(!e){ e=document.createElement('div'); e.id='empty'; e.className='empty'; e.innerHTML='Ничего не найдено.<br>Измените поиск или фильтр.'; list.appendChild(e);} }
  else if(e){ e.remove(); }
}

function setAll(selector, open){
  document.querySelectorAll('.card').forEach(card=>{
    if(card.style.display==='none') return;
    const d = card.querySelector(selector);
    if(d) d.open = open;
  });
}

function switchSection(name){
  if(!SECTIONS[name]) return;
  cur = name;
  localStorage.setItem('active_section', cur);
  document.body.className = 'sec-'+cur;
  const s = SECTIONS[cur];
  $('#title').textContent = s.title;
  $('#sub').textContent = s.sub;
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('active', b.dataset.sec===cur));
  loadKnown();
  renderList();
  fillCats();
  // reset filters on switch
  $('#search').value=''; $('#onlyLeft').checked=false;
  updateStats();
  applyFilter();
  window.scrollTo(0,0);
}

// events
$('#tabs').addEventListener('click', e=>{
  const b = e.target.closest('button[data-sec]');
  if(b) switchSection(b.dataset.sec);
});
list.addEventListener('change', e=>{
  if(e.target.matches('input[type=checkbox][data-num]')){
    const num = e.target.dataset.num;
    if(e.target.checked) known[num]=1; else delete known[num];
    saveKnown();
    e.target.closest('.card').classList.toggle('known', !!known[num]);
    updateStats();
    if($('#onlyLeft').checked) applyFilter();
  }
});
$('#search').oninput = applyFilter;
sel.onchange = applyFilter;
$('#onlyLeft').onchange = applyFilter;
$('#openHints').onclick = ()=>setAll('details.hint', true);
$('#openAns').onclick = ()=>setAll('details.ans', true);
$('#closeAll').onclick = ()=>setAll('details.spoiler', false);
$('#reset').onclick = ()=>{ if(confirm('Сбросить прогресс этого раздела?')){ known={}; saveKnown();
  document.querySelectorAll('.card').forEach(el=>el.classList.remove('known'));
  document.querySelectorAll('input[type=checkbox][data-num]').forEach(cb=>cb.checked=false);
  updateStats(); applyFilter(); } };

switchSection(cur);
</script>
</body>
</html>
