тся нервной и гуморальной системами.\n\nНервная (рефлекторная) регуляция — по блуждающим и симпатическим нервам. Центры блуждающих — в продолговатом мозге, симпатических — в боковых рогах первых 5 грудных сегментов спинного мозга.\n• Блуждающие нервы (к СА- и AV-узлам): тормозят — замедляют и ослабляют сокращения, понижают возбудимость и проводимость\n• Симпатические: учащают и усиливают, повышают возбудимость и проводимость\nРефлекторную регуляцию обеспечивают кора, гипоталамус, продолговатый и спинной мозг.\n\nРецепторы сосудистых рефлексогенных зон (дуга аорты, каротидный синус, устья полых вен):\n• ↑давления в дуге аорты и каротидном синусе → ослабление и урежение сокращений\n• ↑давления в устье полых вен → усиление и учащение\n• хеморецепторы возбуждаются при ↑CO2 и ↓O2\n\nГуморальная регуляция: адреналин, норадреналин надпочечников, избыток тироксина — учащают и усиливают. Электролиты: избыток K+ — реже и слабее, остановка в диастоле; Ca2+ — учащает и усиливает."}, {"num": "51", "category": "Размножение и лактация", "q": "Общая характеристика органов размножения самцов. Придаточные половые железы самца", "hint": "• Перечисли органы самца (7 структур)\n• Семенники: что в извитых канальцах, стадии сперматогенеза?\n• Интерстициальные клетки → какой гормон?\n• Путь спермия: придаток → спермиопровод → … → мочеполовой канал\n• 3 придаточные железы: пузырьковидные, простата, … (куперова)", "a": "Органы самца: семенники, придатки семенников, спермиопроводы, мочеполовой канал, придаточные железы, половой член, семенниковый мешок (мошонка).\n\nСеменники (testis) — парные железы. Паренхима — извитые семенные канальцы, где идёт сперматогенез (сперматогонии → сперматоциты I и II порядка → сперматиды → спермии). В строме — интерстициальные клетки, продуцирующие тестостерон. До рождения семенники опускаются через паховый канал в мошонку. От хвоста придатка отходит спермиовыносящий проток, идёт в составе семенного канатика через паховый канал в брюшную полость, образует ампулы и открывается в мочеиспускательный канал (→ мочеполовой канал). Половой член вводит сперму и выводит мочу.\n\nПридаточные половые железы (секрет в тазовую часть мочеполового канала):\n• пузырьковидные (семенные пузырьки) — парные, у быка большие, у шейки мочевого пузыря\n• предстательная (простата) — непарная: тело на шейке пузыря + рассеянная часть в стенке канала\n• бульбоуретральная (куперова) — парная, в конце тазовой части канала\nИх секрет + спермии = сперма."}, {"num": "52", "category": "Кровь и кровообращение", "q": "Лимфа и тканевая жидкость", "hint": "• 3 компонента внутренней среды; что истинная среда клеток?\n• Тканевая жидкость: откуда образуется, что близка по составу?\n• Лимфа: цвет, белок (меньше/больше плазмы?), где его больше всего (печень, %)?\n• Есть ли эритроциты/тромбоциты? Свёртывается ли?\n• Главные клетки — …; куда впадает лимфа в итоге?", "a": "Внутреннюю среду образуют кровь, тканевая жидкость и лимфа. Истинная среда клеток — тканевая жидкость; кровь поддерживает её состав.\n\nТканевая (межклеточная) жидкость заполняет промежутки между клетками, по составу близка к плазме. Образуется при движении крови по капиллярам (плазма проникает через стенки). Клетки берут из неё питательные вещества, гормоны, витамины, минералы, воду, O2, а выделяют CO2 и продукты обмена. Пополняется из крови и превращается в лимфу.\n\nЛимфа — жидкость лимфатических сосудов: бесцветная, прозрачная, состав близок к плазме, но белка меньше (больше всего в лимфе печени — в среднем 5,3%). Реакция щелочная; плотность и вязкость ниже плазмы. Эритроцитов и тромбоцитов нет, но свёртывается (есть фибриноген и факторы свёртывания). Главные форменные элементы — лимфоциты, их число растёт после лимфоузлов (в грудном протоке 5-20·10^9 в 1 л). После жирного корма лимфа кишечника молочно-белая. Путь: капилляры → сосуды → лимфоузлы → грудной проток → передняя полая вена."}, {"num": "53", "category": "Кровь и кровообращение", "q": "Кроветворение", "hint": "• Главный орган кроветворения? Что в нём образуется?\n• Где ещё формируются лимфоциты и моноциты?\n• Орган кроветворения у плода (помимо костного мозга)?\n• Из каких клеток всё образуется (на «г»)? Где разрушаются?\n• Витамины/микроэлементы для эритропоэза; роль эритропоэтина и почек", "a": "Кроветворение поддерживает постоянное число форменных элементов взамен разрушающихся.\n\nГлавный орган — костный мозг (эритроциты, тромбоциты, лейкоциты). Лимфоциты также в лимфоузлах и тимусе; моноциты — ещё в соединительной ткани и лимфоузлах. У плода — костный мозг и печень.\n\nВсе элементы образуются из гемоцитобластов (крупные клетки с ядром). Разрушение эритроцитов и лейкоцитов — в печени и селезёнке. Образование: эритроцитов — эритропоэз, тромбоцитов — тромбоцитопоэз, лейкоцитов — лейкопоэз.\n\nЭритроциты образуются при участии витамина В12, фолиевой кислоты, микроэлементов (железо, кобальт, медь). Регуляция — нервная система, эндокринные железы, гуморальные факторы (кора, гипоталамус). Усиливают эритропоэз мужские половые гормоны, гормоны коры надпочечников и щитовидной железы; тормозят эстрогены. Эритропоэтины усиливают образование эритроцитов; их предшественник эритрогенин образуется в почках, активируется при кислородном голодании. Тромбоциты стимулируют тромбоцитопоэтины, лейкоциты — лейкопоэтины."}, {"num": "54", "category": "Кровь и кровообращение", "q": "Свёртывание крови", "hint": "• Суть: фибриноген → … (растворимый → нерастворимый)\n• Кто участвует: стенки сосудов, тромбоциты, факторы плазмы\n• 3 фазы: протромбиназа → тромбин → фибрин (что в каждой?)\n• Роль ионов Ca и тромбопластина\n• После сгустка: ретракция → фибринолиз (плазмин). Что нужно: Ca, витамин К; что мешает — гепарин", "a": "Свёртывание — защитная реакция против кровопотери: образуется тромб. Основа — превращение растворимого фибриногена плазмы в нерастворимый фибрин, нити которого образуют сеть, задерживающую форменные элементы.\n\nУчаствуют: стенки сосудов, форменные элементы (особенно тромбоциты), ферментная система плазмы (факторы свёртывания плазмы, клеток, тканей). Три фазы:\n• 1-я (самая сложная и долгая) — образование протромбиназы (тканевой и кровяной); толчок — повреждение сосудов, тромбоцитов, эритроцитов с выделением тромбопластина (фрагменты фосфолипидных мембран); участвуют ионы Ca и факторы плазмы\n• 2-я — образование тромбина: протромбиназа превращает протромбин в тромбин (при Ca2+)\n• 3-я — тромбин (при Ca2+ и фибринстабилизирующем факторе) превращает фибриноген в фибрин, образуется тромб\n\nЗатем ретракция (уплотнение сгустка), потом фибринолиз — расщепление фибрина плазмином (из плазминогена), восстановление просвета. Нужны Ca и витамин К (для синтеза протромбина в печени); препятствует свёртыванию гепарин."}, {"num": "55", "category": "Пищеварение", "q": "Пищеварение в полости рта", "hint": "• Захват корма по видам: КРС, лошадь, свинья, плотоядные — чем?\n• 3 пары крупных слюнных желёз и их секрет (серозный/смешанный)\n• pH слюны: жвачные vs лошадь/свинья; бактерицидные вещества\n• У кого есть ферменты (амилаза, мальтаза)? Что расщепляют?\n• Суточный объём слюны: КРС, овца, лошадь, свинья; центр слюноотделения", "a": "В ротовой полости корм захватывается, измельчается, смачивается слюной, оценивается на вкус. Захват: КРС — языком, лошадь — губами и резцами, свинья — рылом и губами, плотоядные — зубами; у жвачных — жвачка (отрыгивание и повторное пережёвывание).\n\nСлюна — продукт 3 пар крупных желёз: околоушные (серозные, жидкая слюна), нижнечелюстные и подъязычные (смешанные, с муцином) + мелкие. Слабощелочная, 99-99,4% воды, 0,6-1% сухих веществ; pH жвачных 8,1-8,3, лошади и свиньи 7,2-7,5. Смачивает корм, склеивает ком муцином, нейтрализует кислоты, бактерицидна (лизоцим, ингибан). Ферменты a-амилаза (птиалин) и мальтаза — только у свиньи: амилаза → крахмал до декстринов и мальтозы, мальтаза → мальтоза в глюкозу; у лошади, жвачных, плотоядных ферментов нет.\n\nЗа сутки: КРС 90-190 л, овцы 6-10 л, лошадь до 40 л, свинья до 15 л; у жвачных околоушные секретируют постоянно. Слюноотделение рефлекторно: центр в продолговатом мозге (контроль гипоталамуса и коры). Ком языком в глотку → перистальтика пищевода → желудок."}, {"num": "56", "category": "Размножение и лактация", "q": "Процесс молокообразования. Лактация", "hint": "• Лактация — что это; длительность у коров?\n• Где образуется молоко; сколько крови на 1 л молока?\n• Из чего синтез: казеин ← …, лактоза ← …, жир ← … (+уксусная кислота рубца)\n• Гормоны: соматотропин, пролактин, окситоцин — кто за что?\n• Рефлекс молокоотдачи: 2 фазы (нервная и нервно-гуморальная)", "a": "Лактация — образование, накопление и выведение молока. У коров длится ~10 месяцев.\n\nМолоко образуется в эпителиальных клетках альвеол и протоков вымени из веществ крови; на 1 л молока через вымя проходит ~500 л крови. Синтез: казеин — из аминокислот и белков плазмы; лактоза — из глюкозы; молочный жир — из глицерина и жирных кислот, а также из уксусной кислоты рубца. Витамины и минералы переходят из крови без изменений. Из альвеол молоко → молочные протоки → молочный синус (цистерна), где накапливается между доениями.\n\nРегуляция — нервная система и эндокринные железы (кора, гипоталамус — лактационный центр). Гипоталамус → нейросекреты → гипофиз выделяет соматотропин и пролактин (прямо участвуют в образовании молока).\n\nРефлекс молокоотдачи, 2 фазы:\n• нервная — раздражение рецепторов соска → импульсы в спинной мозг и к сфинктерам сосков → цистернальная порция молока\n• нервно-гуморальная — импульсы в гипоталамус → окситоцин → через заднюю долю гипофиза в кровь → сокращение миоэпителиальных клеток альвеол → альвеолярная порция"}, {"num": "57", "category": "Эндокринная система", "q": "Общая характеристика желёз внутренней секреции", "hint": "• Главное отличие от желёз внешней секреции (протоки?)\n• Что выделяют — инкреты/гормоны куда?\n• Железы смешанной секреции — какие 2?\n• 3 группы по происхождению: невральная, бранхиогенная, мезодермальная — примеры\n• Ведущая роль: гипоталамус и гипофиз (тропные гормоны); гипер- vs гипофункция", "a": "Железы внутренней секреции (эндокринные) не имеют выводных протоков; их инкреты (с гормонами) поступают прямо в кровь и лимфу — отличие от желёз внешней секреции (секрет по протокам). Железы смешанной секреции — поджелудочная, половые. Все эндокринные — паренхиматозные органы с густой сетью капилляров.\n\nГруппы по происхождению:\n• невральная — гипофиз, эпифиз (из нейроглии)\n• бранхиогенная — щитовидная, околощитовидные, тимус (из глотки и жаберных карманов)\n• мезодермальная — половые железы, корковое вещество надпочечников\n\nГормоны — биологически активные вещества, действуют в малых количествах; разносятся кровью, действуют на органы-мишени, регулируют обмен, рост, развитие, размножение, приспособление. Связь с нервной системой — единая нейрогормональная регуляция; ведущая роль у гипоталамуса и гипофиза (тропные гормоны).\n\nК эндокринным относят: гипофиз, эпифиз, щитовидную, околощитовидные, надпочечники, тимус, островки поджелудочной (инсулин, глюкагон), половые железы. Регуляция по обратной связи; нарушения — гиперфункция или гипофункция."}, {"num": "58", "category": "Размножение и лактация", "q": "Строение вымени коровы", "hint": "• Из чего развилось вымя; где расположено; есть ли железы на сосках?\n• Подвешивающий аппарат: связка делит на …; сколько долей и сосков?\n• Индекс вымени — что это, % передних долей?\n• Тип железы (альвеолярно-трубчатая); строение альвеолы\n• Путь молока: альвеолы → протоки → синус (отделы) → сосковый проток (длина, сфинктер); кровь на 1 кг молока", "a": "Вымя коровы — молочная железа из видоизменённых кожных желёз, в паховой области. Кожа тонкая, эластичная, с волосами, сальными и потовыми железами (на сосках их нет). Части: основание, тело, соски.\n\nПодвешивающий аппарат: подвешивающая связка из 2 листков эластической ткани делит вымя на правую и левую половины. Каждая — передняя и задняя доли (всего 4 доли, обычно 4 соска); передние доли менее развиты — их удой 38-45% (индекс вымени). Молоко между долями не переходит.\n\nСтроение: паренхима, строма, сосуды, нервы. Железа альвеолярно-трубчатая. Молочные альвеолы — пузырьки из железистых клеток, миоэпителия, мембраны и соединительной ткани с сосудами; в железистых клетках синтезируются части молока. Альвеолы → дольки. Молоко → молочные протоки → молочный синус (цистерна) с железистым и сосковым отделами → единственный сосковый проток (5-14 мм) с сфинктером соска. На 1 кг молока — 450-500 л крови, кровоснабжение развито."}, {"num": "59", "category": "Выделительная система", "q": "Строение мочеточников и мочевого пузыря", "hint": "• Мочеточник (ureter): парный? Какие 2 части; какой эпителий?\n• Как впадает в пузырь и почему нет обратного тока мочи?\n• Мочевой пузырь (vesica urinaria): форма, части (тело, верхушка, шейка)\n• Мышечная оболочка: слои, где сфинктер; чем покрыты разные части (сероза/адвентиция)?\n• Мочеиспускание — рефлекс; особенность у птиц", "a": "Мочеточники и мочевой пузырь — мочевыводящие пути.\n\nМочеточник (ureter) — парный трубчатый орган из почки в пузырь; части — брюшная и тазовая. От ворот почки идёт каудально по дорсальной брюшной стенке. Слизистая — многослойный переходный эпителий, есть мышечная оболочка. Косо пронизывает стенку пузыря, проходит между его мышечной и слизистой оболочками, открывается у шейки; при наполнении стенка пузыря сжимает конец мочеточника — нет обратного тока.\n\nМочевой пузырь (vesica urinaria) — непарный грушевидный орган-резервуар на дне таза, при наполнении свешивается в брюшную полость. Части: тело, верхушка, шейка (→ уретра). Слизистая — многослойный переходный эпителий, сильно растяжимый. Мышечная оболочка толстая: циркулярный + 2 продольных слоя гладких мышц; циркулярный у шейки образует сфинктер. Верхушка и тело — серозная оболочка, шейка — адвентиция.\n\nМочеиспускание рефлекторно: наполнение → раздражение рецепторов → сфинктер расслабляется, мышца сокращается, моча выводится. У птиц мочевого пузыря нет — моча в клоаку."}, {"num": "60", "category": "Нервная система и анализаторы", "q": "Вегетативная нервная система", "hint": "• Что регулирует ВНС; почему не полностью независима (контроль коры)?\n• Отличие от соматической системы\n• Особенность пути: 2 нейрона, прерывается где (ганглий)?\n• Симпатический vs парасимпатический: где центры, какой эффект (мобилизация/покой)?\n• Медиаторы: норадреналин vs ацетилхолин; высший центр — …", "a": "Автономная (вегетативная) нервная система регулирует функции внутренних органов, кровеносную и лимфатическую системы, кроветворные органы, обмен веществ — непроизвольные функции (соматическая управляет скелетными мышцами). Полностью независимой не является: центры контролируются корой.\n\nОсобенность: путь от центра к органу — из 2 нейронов, прерывается в вегетативном ганглии. Делится на симпатический и парасимпатический отделы (обычно противоположное действие).\n\nСимпатический отдел: центры в грудном и поясничном отделах спинного мозга, узлы по бокам позвоночника (симпатические стволы). Мобилизует организм: учащает и усиливает сердцебиение, повышает давление, расширяет зрачок и бронхи, тормозит пищеварение, усиливает распад гликогена. Медиатор — норадреналин (адреналин).\n\nПарасимпатический отдел: центры в среднем и продолговатом мозге (блуждающий нерв) и крестцовом отделе; узлы в стенках органов или рядом. Действует в покое: замедляет сердце, понижает давление, суживает зрачок, усиливает секрецию пищеварительных желёз и перистальтику. Медиатор — ацетилхолин. Высший центр — гипоталамус."}, {"num": "61", "category": "Пищеварение", "q": "Глотка, пищевод, строение и топография", "hint": "• Глотка — перекрёст каких двух путей?\n• Сколько отверстий в глотке? Перечисли\n• Эпителий: свод vs стенки и дно\n• Что закрывает хоаны и вход в гортань при глотании?\n• Пищевод: три части и куда впадает у жвачных\n• Особенность движения корма у жвачных", "a": "Глотка и пищевод проводят корм изо рта в желудок.\n\nГлотка (pharynx): трубчатый воронкообразный орган позади носовой и ротовой полостей, перед пищеводом и гортанью — перекрёст дыхательного и пищеварительного путей.\n• 7 отверстий: непарный зев, парные хоаны, отверстие гортани, пищеводное отверстие, 2 отверстия слуховых труб.\n• Эпителий: свод — мерцательный, стенки и дно — многослойный плоский.\n• Мышцы поперечнополосатые (констрикторы: ростральный, средний, каудальный) проталкивают ком; хоаны закрывает нёбная занавеска, вход в гортань — надгортанник.\n• У лошади слуховые трубы образуют воздухоносные мешки.\n\nПищевод (oesophagus): трубчатый орган. Части — шейная, грудная, брюшная.\n• Идёт от глотки по дорсальной поверхности гортани и трахеи, прободает диафрагму, впадает в желудок (у жвачных — в преддверие рубца).\n• Слизистая — многослойный плоский эпителий, продольные складки.\n• Корм — перистальтикой; у жвачных движется в обе стороны (отрыгивание жвачки)."}, {"num": "62", "category": "Нервная система и анализаторы", "q": "Черепно-мозговые нервы (перечисли все 12 пар)", "hint": "• Сколько пар и откуда отходят?\n• По функции: чувствительные / двигательные / смешанные\n• Глазные мышцы — какие 3 пары (III, IV, VI)?\n• Какая пара смешанная и делится на 3 ветви?\n• Какие пары идут за пределы головы (X, XII)?\n• Мнемоника по порядку: обонятельный → зрительный → ...", "a": "Черепные нервы отходят от основания мозга, 12 пар, иннервируют (кроме X и XII) органы головы. По функции — чувствительные, двигательные, смешанные.\n\n• I — обонятельный (чувств.; нейроны в обонятельном эпителии носа).\n• II — зрительный (чувств.; нейроны в сетчатке, образует зрительный перекрест).\n• III — глазодвигательный (двигат.; прямые и косые мышцы глаза).\n• IV — блоковой (двигат.; мышца глаза).\n• V — тройничный (смешанный; глазничный, верхнечелюстной, нижнечелюстной нервы).\n• VI — отводящий (двигат.; мышца глаза).\n• VII — лицевой (лицевые мышцы, слюнные железы).\n• VIII — слуховой (преддверно-улитковый) (чувств.; слух и равновесие, спиральный узел улитки).\n• IX — языкоглоточный (вкусовые луковицы языка, околоушная железа).\n• X — блуждающий (парасимпатический; органы шеи, груди, живота).\n• XI — добавочный (от продолговатого и спинного мозга; мышцы шеи).\n• XII — подъязычный (сокращение языка)."}, {"num": "63", "category": "Размножение и лактация", "q": "Оболочки стенки матки коровы", "hint": "• Тип матки коровы? Части (тело, рога, шейка) и их размеры\n• Три оболочки — назови латинские термины\n• Эндометрий: что за бугорки, сколько, в сколько рядов?\n• Тип плаценты у жвачных\n• Миометрий: сколько слоёв, что между ними?\n• Периметрий → во что переходит (связки)?", "a": "Матка (uterus) коровы — двурогая: тело, 2 рога, шейка. Рога изогнуты как бараньи, идут параллельно, переходят в короткое тело (2–6 см). Шейка 7–11 см, сообщается с влагалищем; к рогам подходят яйцеводы.\n\nТри оболочки: слизистая, мышечная, серозная.\n\n• Слизистая (эндометрий): однослойный цилиндрический эпителий с мерцательными клетками, меняется в половом цикле. 80–120 карункулов (маточных бугорков) в 4 ряда — материнская часть плаценты (плацента множественная, котиледонная).\n• Мышечная (миометрий): 2 слоя гладкой мышцы, между ними сосудистый слой; важна при изгнании плода в отёл.\n• Серозная (периметрий): переходит в широкие маточные связки (матка подвешена); между рогами — межроговая связка.\n\nКровь — по 3 парным маточным артериям; иннервация — тазовый нерв и ветви подчревного сплетения."}, {"num": "64", "category": "Обмен веществ", "q": "Обмен углеводов в организме", "hint": "• Энергия с 1 г? (17,6 кДж / 4,1 ккал)\n• Куда идёт глюкоза по воротной вене и что образует?\n• Норма глюкозы: жвачные vs однокамерный желудок\n• Гипо-/гипергликемия, глюкозурия\n• Анаэробный vs аэробный путь распада\n• ЛЖК в рубце; из какой кислоты — глюкоза?\n• Гормоны: инсулин, глюкагон/адреналин, ГКС, СТГ, тироксин", "a": "Углеводы — основной источник энергии: 1 г → 17,6 кДж (4,1 ккал). Поступают с растительным кормом (крахмал, сахара, клетчатка), всасываются как глюкоза.\n\n• Глюкоза по воротной вене → печень → запасной гликоген; при недостатке гликоген снова распадается до глюкозы.\n• Норма в крови: жвачные 40–60 мг%, с однокамерным желудком 80–100 мг%. Гипогликемия / гипергликемия; избыток выводится почками (глюкозурия).\n\nРасщепление:\n• Анаэробно — до молочной кислоты (окисляется или → гликоген).\n• Аэробно — до CO2 и воды; энергия в АТФ.\n• У жвачных в рубце сбраживание до ЛЖК (уксусная, пропионовая, масляная); из пропионовой — глюкоза, уксусная — основной источник энергии.\n\nРегуляция: кора, гипоталамус, ВНС, гормоны. Инсулин — окисление глюкозы и синтез гликогена; глюкагон и адреналин — распад гликогена; глюкокортикоиды — глюкоза из аминокислот и жирных кислот; соматотропин повышает глюкозу, тироксин усиливает окисление."}, {"num": "65", "category": "Обмен веществ", "q": "Обмен веществ, ассимиляция и диссимиляция", "hint": "• Определение метаболизма; связь с обменом энергии\n• Два противоположных процесса — назови синонимы каждого\n• Ассимиляция: с затратой или выделением энергии?\n• Диссимиляция: куда идёт энергия (АТФ + тепло), конечные продукты\n• Кто преобладает: у плода/молодого / взрослого / при голодании\n• Виды обмена; чем регулируется", "a": "Обмен веществ (метаболизм) — совокупность процессов поступления, превращения и выведения веществ, обеспечивающих рост, развитие, движение, размножение, обновление структур; связан с обменом энергии. Складывается из ассимиляции и диссимиляции.\n\n• Ассимиляция (анаболизм, пластический обмен): усвоение веществ, синтез собственных сложных соединений (белки, жиры, углеводы), построение клеточных структур. Идёт с затратой энергии. Преобладает у растущих, беременных, продуктивных, особенно у плода.\n• Диссимиляция (катаболизм, энергетический обмен): распад сложных веществ на простые с освобождением энергии (АТФ + часть как тепло). Конечные продукты — CO2, вода, аммиак, мочевина, мочевая кислота — удаляются.\n\nПротекают одновременно: у молодого преобладает ассимиляция, у взрослого уравновешены, при голодании/старении/болезнях — диссимиляция (исхудание). Виды: обмен белков, жиров, углеводов, воды, минеральных веществ. Регуляция — нервная система и эндокринные железы; интенсивность зависит от вида, возраста, продуктивности, кормления, содержания."}, {"num": "66", "category": "Обмен веществ", "q": "Обмен белков в организме", "hint": "• Почему белки — центр обмена? (нельзя из жиров/углеводов)\n• Ферменты расщепления до аминокислот\n• Заменимые vs незаменимые (примеры); биологическая ценность\n• Особенность у жвачных — микробный белок из чего?\n• Дезаминирование → аммиак → мочевина (у птиц — мочевая кислота)\n• Азотистый баланс: + / равновесие / −\n• Гормоны регуляции", "a": "Белки — основной пластический материал (клетки, ферменты, гормоны, антитела, гемоглобин). Не синтезируются из жиров и углеводов, должны поступать с кормом — центр метаболизма.\n\n• В ЖКТ расщепляются ферментами (пепсин, трипсин, химотрипсин, пептидазы) до аминокислот → кровь → печень и ткани → синтез собственных белков.\n• Аминокислоты: заменимые (синтезируются) и незаменимые (лизин, метионин, триптофан, валин и др.). Биологическая ценность определяется содержанием незаменимых.\n• У жвачных: микрофлора рубца синтезирует полноценный микробный белок из небелкового азота (мочевина, аммонийные соли); переваривается в сычуге и кишечнике.\n• Распад: дезаминирование — отщепление аминогруппы → аммиак; безазотистый остаток — энергия или → жиры/углеводы. Аммиак в печени → мочевина (почки). У птиц — мочевая кислота.\n\nАзотистый баланс: положительный (рост, беременность, откорм), равновесие (взрослые), отрицательный (голодание, болезни). Регуляция: соматотропный гормон, тироксин, гормоны коры надпочечников, половые."}, {"num": "67", "category": "Дыхание", "q": "Строение носовой полости", "hint": "• Функции: согревание, увлажнение, очистка, обоняние\n• Чем открывается спереди (ноздри) и сзади (хоаны)?\n• Костная основа; чем разделена на половины\n• Раковины: дорсальная и вентральная → носовые ходы (верхний/средний/нижний/общий) и их назначение\n• Эпителий дыхательной и обонятельной областей\n• Придаточные пазухи, носослёзный канал\n• Видовое: свинья (хоботная пластинка), птицы", "a": "Носовая полость — начало дыхательных путей: воздух согревается, увлажняется, очищается, воспринимается обоняние. В лицевом отделе черепа, спереди — ноздри, сзади через хоаны — глотка.\n\n• Разделена носовой перегородкой (в основе хрящ) на 2 половины. Костная основа: носовые, резцовые, верхнечелюстные, нёбные, решётчатая кости. Снизу — твёрдое нёбо.\n• Раковины (дорсальная и вентральная) делят на ходы: верхний (дорсальный) — обонятельный, к решётчатому лабиринту; средний — в придаточные пазухи; нижний (вентральный) — дыхательный, к хоанам (вводят зонд); общий ход.\n• Слизистая дыхательной области — мерцательный эпителий, богата сосудами и железами (согревание, увлажнение). Дорсально — обонятельная область с рецепторными клетками.\n• Придаточные пазухи (верхнечелюстная, лобная) — облегчают череп, резонаторы. В углу глаза открывается носослёзный канал.\n• Видовое: у свиньи хоботная (хрящевая) пластинка — основа рыла; у птиц полость простая, обоняние слабое."}, {"num": "68", "category": "Пищеварение", "q": "Желудочный сок, его состав. Пищеварение в желудке", "hint": "• Три типа клеток желёз и что каждый вырабатывает\n• Ферменты: пепсин (из чего, чем активируется), гастриксин, химозин/реннин (молодняк), липаза\n• Роль соляной кислоты (4 функции); роль слизи\n• Две фазы секреции — рефлекторная и гуморальная (гастрин)\n• Что такое «запальный сок» (Павлов)?\n• У жвачных истинное пищеварение — где?", "a": "Желудочный сок — бесцветная прозрачная жидкость кислой реакции, вырабатывается железами слизистой. Клетки: главные (ферменты), добавочные (слизь), обкладочные (соляная кислота).\n\nСостав: вода, органические вещества (ферменты, аминокислоты), минеральные соли, HCl.\nФерменты:\n• Пепсин — главный, из неактивного пепсиногена, активируется HCl, расщепляет белки до полипептидов.\n• Гастриксин — белки при слабокислой реакции.\n• Химозин (реннин, сычужный) — в слабокислой среде с ионами Ca превращает казеиноген молока в казеин (створаживание), особенно у молодняка.\n• Липаза — жиры до глицерина и жирных кислот (легче эмульгированный жир молока).\n\nHCl: кислая среда, активирует пепсиноген, набухание белков, бактерицидное действие. Слизь защищает стенку от самопереваривания.\n\nПищеварение: белки расщепляются пепсином, частично жиры; перистальтика перемешивает и порциями переводит в 12-перстную кишку.\nСекреция в 2 фазы:\n• Рефлекторная (сложнорефлекторная) — безусловные и условные рефлексы; раздражение рецепторов рта → блуждающий нерв → железы; условнорефлекторный сок Павлов назвал «запальным».\n• Гуморальная — гормон гастрин (пилорическая часть, под влиянием HCl и продуктов переваривания).\n\nУ жвачных истинное желудочное пищеварение — в сычуге."}, {"num": "69", "category": "Обмен веществ", "q": "Обмен жиров в организме", "hint": "• Функции жиров (4); энергия 1 г (~9,3 ккал, вдвое больше)\n• Жирорастворимые витамины (А, D, E, K); депо жира\n• Расщепление: желчь эмульгирует → липаза → глицерин + жирные кислоты; куда всасываются низко- и высокомолекулярные?\n• Синтез жира из углеводов и белков (откорм)\n• Кетоновые тела — когда (диабет, кетоз коров)?\n• Фосфатиды (лецитин), стерины (холестерин); гормоны", "a": "Жиры (липиды): энергетическая, пластическая, защитная, теплоизоляционная функции. 1 г → ~9,3 ккал (вдвое больше углеводов/белков). Входят в мембраны, растворяют витамины A, D, E, K, откладываются в подкожной клетчатке, сальнике, брыжейке.\n\n• В тонком кишечнике желчь эмульгирует, липаза (поджелудочного и кишечного сока) расщепляет на глицерин и жирные кислоты. Глицерин и низкомолекулярные кислоты — в кровь; высокомолекулярные с желчными кислотами — в лимфу. В стенке кишечника синтезируется специфический жир → лимфа → кровь → депо.\n• Синтез из углеводов и белков (откорм). При недостатке углеводов жиры окисляются до CO2 и воды.\n• При неполном окислении (сахарный диабет, кетоз высокопродуктивных коров) — кетоновые тела (ацетон, ацетоуксусная, бета-оксимасляная кислоты) → ацидоз.\n• Также фосфатиды (лецитин) и стерины (холестерин) — мембраны, гормоны, желчные кислоты.\n\nРегуляция: нервная система, адреналин, соматотропин, тироксин, инсулин, половые гормоны. Видовое: разный состав и температура плавления жира."}, {"num": "70", "category": "Витамины и минералы", "q": "Физиологическое значение макроэлементов", "hint": "• Что такое макроэлементы (количество) и кто к ним относится (7)?\n• Общие функции (пластика, осмос, КЩР, возбуждение, ферменты)\n• Кальций: 99% где? недостаток (рахит, остеомаляция, парез)\n• Фосфор: где входит, Ca:P соотношение, витамин D\n• Na и Cl, K, Mg (тетания), сера (что входит, жвачные)", "a": "Макроэлементы — минеральные вещества в больших количествах (десятые доли % и более): кальций, фосфор, натрий, калий, хлор, магний, сера. Функции: пластическая, осмотическое давление, кислотно-щелочное равновесие, возбуждение, мышечное сокращение, работа ферментов.\n\n• Кальций — строительный материал костей и зубов (~99% в скелете), свёртывание крови, мышечное сокращение, нервные импульсы, проницаемость мембран. Недостаток: рахит у молодняка, остеомаляция у взрослых, послеродовый парез у коров.\n• Фосфор — кости (с Ca), нуклеиновые кислоты, фосфолипиды, АТФ, ферменты; энергетический обмен. Ca:P соотношение ~1,5–2:1, нужен витамин D.\n• Натрий и хлор — осмотическое давление, КЩР; натрий в возбуждении, хлор в HCl желудочного сока. Вводят с поваренной солью.\n• Калий — главный внутриклеточный катион; сердце, нервно-мышечная возбудимость, осмос внутри клеток.\n• Магний — ферменты, углеводный и фосфорный обмен, нервно-мышечная возбудимость; недостаток — пастбищная тетания.\n• Сера — серосодержащие аминокислоты (метионин, цистин), витамины, гормоны, шерсть, копытный рог; нужна жвачным для микробного синтеза белка."}, {"num": "71", "category": "Пищеварение", "q": "Пищеварение в тонком отделе кишечника", "hint": "• Три кишки тонкого отдела; что открывается в 12-перстную?\n• Три сока: поджелудочный (ферменты на все вещества), кишечный, желчь\n• Желчь — есть ли ферменты? её функции\n• Полостное vs пристеночное (мембранное) пищеварение\n• Куда всасываются аминокислоты/глюкоза и продукты жиров?\n• Движения кишечника; гормоны (секретин, холецистокинин)", "a": "Тонкий отдел: двенадцатиперстная, тощая, подвздошная кишки — главный участок пищеварения (расщепление до конечных продуктов + всасывание). В 12-перстную открываются протоки поджелудочной железы и печени (желчного пузыря).\n\nТри сока:\n• Поджелудочный — щелочной, ферменты на все вещества: трипсин и химотрипсин (белки → аминокислоты, активируются энтерокиназой), амилаза и мальтаза (углеводы → глюкоза), липаза (жиры → глицерин и жирные кислоты), нуклеазы.\n• Желчь — без ферментов: эмульгирует жиры, активирует липазу, всасывание жирных кислот и жирорастворимых витаминов, усиливает перистальтику, бактерицидна, нейтрализует кислый химус.\n• Кишечный — пептидазы, мальтаза, лактаза, сахараза, липаза, энтерокиназа.\n\nПищеварение полостное (в просвете) и пристеночное (мембранное) на микроворсинках, где завершается расщепление и всасывание.\n\nВсасывание через слизистую с огромной поверхностью (складки, ворсинки, микроворсинки): аминокислоты и глюкоза — в кровь, продукты жиров — в лимфу.\n\nДвижения: перистальтические, маятникообразные, ритмическая сегментация. Регуляция: нервная система (блуждающий нерв), гормоны (секретин, холецистокинин). У жвачных переваривается микробный белок из преджелудков."}, {"num": "72", "category": "Пищеварение", "q": "Строение ротовой полости", "hint": "• Функции рта; деление на преддверие и собственно полость\n• Губы (круговая мышца); у КРС — носогубное зеркало, малоподвижная верхняя губа\n• Твёрдое и мягкое нёбо (нёбная занавеска)\n• Язык: части (верхушка, тело, корень); сосочки — какие у КРС, какие отсутствуют?\n• Зубы: резцы, клыки, коренные (премоляры, моляры)\n• Три пары слюнных желёз; эпителий", "a": "Ротовая полость — начало пищеварительного аппарата: захват, измельчение, смачивание слюной, формирование кома; вкус и осязание. Деление: преддверие рта (между губами/щеками и зубами) и собственно ротовая полость (от зубов до нёбной занавески).\n\n• Слизистая образует дёсны, твёрдое и мягкое нёбо, покрывает язык, губы, щёки.\n• Губы — кожно-мышечные складки с круговой мышцей; у КРС верхняя губа малоподвижна, есть носогубное зеркало. У жвачных на месте верхних резцов — роговая зубная пластинка.\n• Твёрдое нёбо — поперечные валики с роговыми сосочками к глотке; переходит в мягкое нёбо (нёбную занавеску), отделяющее рот от глотки.\n• Язык — мышечный, орган вкуса; верхушка, тело, корень. Сосочки: нитевидные (механические), грибовидные и валиковидные (вкусовые); у КРС листовидные отсутствуют, нитевидные ороговевшие, язык шероховатый, с подушкой языка.\n• Зубы в альвеолах: резцы, клыки, коренные (премоляры, моляры).\n• Открываются протоки 3 пар слюнных желёз — околоушной, нижнечелюстной, подъязычной. Эпителий многослойный плоский."}, {"num": "73", "category": "Нервная система и анализаторы", "q": "Периферическая нервная система", "hint": "• Что вне головного и спинного мозга?\n• Связь ЦНС с органами: афферентные и эфферентные пути\n• Три компонента: нервы, ганглии, окончания\n• Сколько пар черепных? сколько групп спинномозговых?\n• Корешки: передний + задний = ?\n• Не забудь вегетативный отдел", "a": "ПНС — часть нервной системы вне головного и спинного мозга; связывает ЦНС с органами: афферентные (чувствительные) пути от рецепторов в центр, эфферентные (двигательные) — от центра к органам.\n\nКомпоненты: нервы, ганглии (нервные узлы), нервные окончания.\n\nНервы — пучки волокон в соединительнотканных оболочках. По функции: чувствительные, двигательные, смешанные (большинство).\n\nЧерепно-мозговые нервы — 12 пар: обонятельный, зрительный, глазодвигательный, блоковый, тройничный, отводящий, лицевой, преддверно-улитковый, языкоглоточный, блуждающий, добавочный, подъязычный. Иннервируют органы головы; блуждающий — шею, грудную и брюшную полости.\n\nСпинномозговые нервы — парами по сегментам (шейные, грудные, поясничные, крестцовые, хвостовые). Каждый = слияние переднего (двигательного) и заднего (чувствительного) корешков → смешанный. Образуют сплетения: шейное, плечевое, поясничное, крестцовое.\n\nК ПНС относят и периферию вегетативной НС: симпатические и парасимпатические ганглии и волокна. Окончания — чувствительные (рецепторы) и двигательные (эффекторы)."}, {"num": "74", "category": "Пищеварение", "q": "Пищеварение в толстом отделе кишечника", "hint": "• Три отдела: слепая, ободочная, прямая\n• Свои ферменты? только слизь — за счёт чего переваривание?\n• Главное: микробное сбраживание клетчатки → ЛЖК\n• Что синтезирует микрофлора (вит. B, K)?\n• Всасывание чего → формирование кала?\n• У кого «бродильный чан»? (лошадь vs жвачные)", "a": "Толстый отдел: слепая, ободочная, прямая кишки. Своих ферментов нет (только слизь) — переваривание за счёт ферментов из тонкого кишечника и микрофлоры.\n\nГлавное — микробное сбраживание клетчатки (целлюлозы) до летучих жирных кислот (уксусной, пропионовой, масляной), которые всасываются как источник энергии. Микрофлора синтезирует витамины группы B и K, сбраживает углеводы, подвергает белки гниению (индол, скатол, фенол, сероводород → обезвреживаются в печени).\n\nВажнейшая функция — всасывание воды и минеральных солей → сгущение содержимого и формирование кала.\n\nВидовые особенности: значение велико у травоядных с однокамерным желудком (лошадь, свинья). У лошади сильно развиты слепая и большая ободочная кишки — роль «бродильного чана», как рубец у жвачных. У жвачных клетчатка переваривается в рубце, роль толстого кишечника меньше.\n\nДвижения: перистальтические и антиперистальтические. Дефекация — рефлекторно, центр в крестцовом отделе спинного мозга, регулируется корой."}, {"num": "75", "category": "Обмен веществ", "q": "Обмен воды в организме", "hint": "• Сколько % воды в теле? (60–70)\n• Функции: среда реакций, растворитель, транспорт, теплорегуляция\n• Вода внутри- и внеклеточная (2/3 где?)\n• Три пути поступления; эндогенная вода ~10% (из чего больше?)\n• Пути выведения: почки, кожа, лёгкие, кишечник, молоко\n• Гормоны: вазопрессин, альдостерон; центр жажды где?", "a": "Вода — 60–70 % тела; среда биохимических реакций, растворитель, транспорт, теплорегуляция, поддержание формы клеток и осмотического давления. Без воды животное гибнет быстрее, чем без корма.\n\nРаспределение: внутриклеточная (~2/3) и внеклеточная (плазма, лимфа, тканевая жидкость).\n\nПоступление (3 пути): питьё (основной), корм, метаболическая (эндогенная) вода при окислении веществ (~10 %, больше всего при окислении жиров).\n\nВыведение: почки с мочой (основной путь), кожа с потом, лёгкие с выдохом, кишечник с калом; у лактирующих — с молоком.\n\nВодный баланс — равенство поступления и выведения. Регуляция связана с обменом Na и Cl, осуществляется нервной системой и гормонами: антидиуретический гормон (вазопрессин) усиливает реабсорбцию воды в почках; альдостерон задерживает Na и воду. Жажда — питьевой центр гипоталамуса.\n\nПотребность зависит от вида, продуктивности, температуры, корма (особенно у лактирующих коров). Обезвоживание → сгущение крови, расстройства обмена."}, {"num": "76", "category": "Дыхание", "q": "Жизненная ёмкость лёгких", "hint": "• ЖЕЛ — макс. выдох после макс. вдоха\n• Формула: дыхательный + дополнительный + резервный\n• Цифры для лошади: дыхательный 5–6, дополнительный 10–12 л\n• ЖЕЛ: собака 1,5–3, лошадь 26–30, КРС 30–35 л\n• Остаточный воздух — входит в ЖЕЛ? проба плавания лёгкого\n• ЖЕЛ + остаточный = общая ёмкость", "a": "ЖЕЛ — наибольший объём воздуха, выдыхаемый после самого глубокого вдоха; зависит от пола, возраста, породы, продуктивности, тренировки.\n\nСостоит из трёх объёмов:\n• Дыхательный воздух — при спокойном дыхании (овцы, крупные собаки 0,3–0,5 л; лошади 5–6 л)\n• Дополнительный — вдох с макс. усилием после спокойного вдоха (овцы, собаки 0,5–1 л; лошадь 10–12 л)\n• Резервный — выдох после спокойного выдоха (≈ дополнительному)\n\nЖЕЛ = дыхательный + дополнительный + резервный. Собаки 1,5–3 л, лошади 26–30 л, КРС 30–35 л.\n\nОстаточный воздух — остаётся после макс. выдоха (лошадь ~12 л); в ЖЕЛ не входит, входит в лёгкие при первом вдохе новорождённого, не удаляется после смерти (кусочек дышавшего лёгкого плавает в воде). ЖЕЛ + остаточный = общая ёмкость.\n\nЖЕЛ больше у животных с интенсивным обменом и тренированных (рабочие, спортивные лошади), снижается при болезнях лёгких и сердца."}, {"num": "77", "category": "Нервная система и анализаторы", "q": "Строение большого мозга", "hint": "• Конечный мозг: 2 полушария + мозолистое тело\n• Снаружи — кора (плащ), извилины и борозды; под ней — белое вещество\n• Сколько слоёв нейронов в коре? (6)\n• Зоны коры: двигательная, чувствительная, зрительная (затылок), слуховая (висок)...\n• Подкорковые ядра, боковые желудочки\n• 4 доли; у кого кора развита лучше? (собака)", "a": "Большой (конечный) мозг — самый развитый отдел; два полушария, разделены продольной щелью, соединены мозолистым телом. Управляет высшей нервной деятельностью: мышление, память, ощущения, произвольные движения.\n\nСнаружи — серое вещество, кора больших полушарий (плащ), несколько мм. Образует извилины, разделённые бороздами (↑ поверхность). Под корой — белое вещество (проводящие пути).\n\nКора — нейроны слоями (обычно 6). Функциональные зоны (центры): двигательная, кожно-мышечной чувствительности, зрительная (затылочная), слуховая (височная), обонятельная, вкусовая — высшие отделы анализаторов.\n\nВ основании полушарий — подкорковые (базальные) ядра (регуляция движений, тонуса мышц). Внутри — боковые желудочки со спинномозговой жидкостью.\n\nДоли: лобная, теменная, височная, затылочная. Также обонятельный мозг с обонятельными луковицами. У с/х животных кора развита хорошо, но меньше, чем у человека; наиболее — у собаки."}, {"num": "78", "category": "Кровь и кровообращение", "q": "Движение крови по кровеносным сосудам", "hint": "• Замкнутая система: артерии → капилляры → вены\n• Главная причина движения — разность давления (высокое → низкое)\n• Где давление наибольшее? (аорта) Систолическое vs диастолическое\n• Скорость: макс в аорте, мин в капиллярах — почему?\n• Пульс: где щупают у лошади / КРС?\n• Что помогает току по венам? (мышцы, клапаны, грудная полость)", "a": "Кровь движется по замкнутой системе (артерии, капилляры, вены) непрерывно благодаря сердцу, создающему разность давлений. Из левого желудочка в аорту → артерии и капилляры большого круга → вены → правое предсердие.\n\nГлавная причина движения — разность давления между началом артерий (высокое) и концом вен (низкое, ≈0); кровь течёт из области высокого в область низкого.\n\nДавление: наибольшее в аорте и крупных артериях, снижается в артериолах и капиллярах, наименьшее в венах. Максимальное (систолическое) — при сокращении желудочков, минимальное (диастолическое) — при расслаблении. Падает из-за трения.\n\nСкорость: макс в аорте, мин в капиллярах (важно для обмена), снова растёт в венах — зависит от суммарного просвета (в капиллярах наибольший).\n\nПульс — колебания стенок артерий от выброса крови; щупают у лошади на наружной челюстной артерии, у КРС на хвостовой или лицевой.\n\nТоку по венам способствуют: сокращения скелетных мышц, клапаны вен, присасывающее действие грудной полости при вдохе и сердца. Регуляция: сосудодвигательный центр продолговатого мозга и гуморально (адреналин, ацетилхолин)."}, {"num": "79", "category": "Кровь и кровообращение", "q": "Эритроциты, их строение, значение, функция", "hint": "• Форма у млекопитающих? (двояковогнутый диск, безъядерные)\n• Исключения: верблюды/ламы — овальные; птицы, рыбы, амфибии — с ядром\n• Что внутри? гемоглобин + железо → оксигемоглобин\n• Цифры: КРС 5–7,5; овцы 7,5–12,5; свиньи 6–7,5 млн/мм³\n• Функции: O₂, CO₂, буфер, транспорт веществ\n• Где образуются? сколько живут? что такое гемолиз, анемия?", "a": "Эритроциты — красные кровяные клетки, самые многочисленные. У большинства млекопитающих безъядерные, двояковогнутый диск (↑ поверхность, облегчает диффузию O₂); у верблюдов и лам — овальные. У птиц, рыб, амфибий, рептилий — овальные, с ядром.\n\nСтроение: белково-липоидная оболочка, внутри сетчатое строение, ячейки заполнены гемоглобином (красный цвет, богат железом). С O₂ образует непрочное соединение — оксигемоглобин. Эластичны, проходят по узким капиллярам.\n\nКоличество: КРС ~5–7,5; овцы 7,5–12,5; свиньи 6–7,5 млн в 1 мм³ (в СИ — ·10¹² в 1 л). Больше у молодых, высокопродуктивных, тренированных.\n\nФункции: перенос O₂ от лёгких к тканям, транспорт CO₂ к лёгким, транспорт аминокислот, гормонов, витаминов, продуктов обмена, поддержание кислотно-щелочного равновесия (гемоглобиновый буфер).\n\nОбразуются в красном костном мозге, живут 100–120 дней. Гемолиз — разрушение оболочки с выходом гемоглобина. При недостатке эритроцитов/гемоглобина — анемия."}, {"num": "80", "category": "Нервная система и анализаторы", "q": "Нервные центры и их свойства", "hint": "• Определение: совокупность нейронов, регулирующих функцию/рефлекс\n• Примеры локализации: дыхательный, сосудодвигательный (где?), мочеиспускания\n• Перечисли свойства: одностороннее проведение, синаптическая задержка...\n• Суммация, трансформация ритма, последействие\n• Почему утомляются быстрее волокон? (медиатор)\n• Тонус, пластичность, иррадиация и торможение", "a": "Нервный центр — совокупность нейронов в определённом отделе ЦНС, совместно регулирующих функцию или рефлекс. Примеры: дыхательный и сосудодвигательный — в продолговатом мозге; мочеиспускания и дефекации — в крестцовом отделе спинного мозга.\n\nСвойства (отличают от проведения по волокну):\n• Одностороннее проведение — через синапсы только в одном направлении (с чувствительного на двигательный)\n• Замедленное проведение (синаптическая задержка) — из-за передачи через синапсы с медиатором\n• Суммация — слабые подпороговые раздражения суммируются и дают реакцию\n• Трансформация ритма — изменение частоты импульсов\n• Последействие — возбуждение продолжается после прекращения раздражения\n• Утомляемость — быстрее, чем волокна (истощение медиатора)\n• Высокая чувствительность к недостатку O₂, ядам, фармакологии\n• Тонус — постоянное возбуждение, импульсы к органам\n• Пластичность — перестройка деятельности\n\nСпособность к иррадиации возбуждения и торможению. Взаимодействие возбуждения и торможения обеспечивает координацию деятельности организма."}, {"num": "81", "category": "Нервная система и анализаторы", "q": "Строение и функции зрительного анализатора", "hint": "• Три части анализатора: периферическая, проводниковая, центральная (где зона коры?)\n• Три оболочки глаза: фиброзная (склера/роговица), сосудистая (радужка, зрачок, цилиарное тело), сетчатка\n• Рецепторы сетчатки: палочки (?) и колбочки (?)\n• Светопреломляющие среды: роговица, влага, хрусталик (аккомодация), стекловидное тело\n• Фотохимия: распад родопсина\n• Видовые: расположение глаз травоядных vs хищников, тапетум", "a": "Зрительный анализатор — восприятие света, формы, цвета, размеров, движения. Три части: периферическая (глаз с сетчаткой), проводниковая (зрительный нерв, пути), центральная (зрительная зона коры затылочной доли).\n\nГлаз: глазное яблоко + вспомогательные органы (веки, слёзный аппарат, мышцы). Три оболочки яблока:\n• Наружная фиброзная: сзади непрозрачная склера (белочная), спереди прозрачная роговица\n• Средняя сосудистая: спереди радужка с зрачком (регулирует свет) и ресничное (цилиарное) тело (удерживает хрусталик)\n• Внутренняя сетчатка: палочки (свет, сумеречное зрение) и колбочки (цвет, острота)\n\nСветопреломляющие среды: роговица, водянистая влага камер, хрусталик (двояковыпуклая линза, аккомодация), стекловидное тело — фокусируют изображение на сетчатке.\n\nСвет → фотохимические реакции (распад родопсина) → возбуждение по зрительному нерву в подкорковые центры и зону коры → зрительный образ.\n\nВидовые особенности: у травоядных глаза по бокам (широкое поле зрения), у хищников — прямо (объёмное зрение). У ночных много палочек, есть отражательное зеркальце (тапетум)."}, {"num": "82", "category": "Выделительная система", "q": "Моча, её состав, образование мочи", "hint": "• Моча — конечный продукт почек: что выводит?\n• Состав: 93–95% вода; чего в норме НЕТ? (белок, жир, глюкоза)\n• Главное органическое — мочевина; реакция у травоядных vs плотоядных\n• Две фазы образования: фильтрация (где? давление 70–90) и реабсорбция\n• Из 10 л крови → сколько первичной мочи? (~1 л)\n• Что не всасывается обратно? Путь конечной мочи. Гормоны регуляции", "a": "Моча — конечный продукт почек; выводит конечные продукты обмена (азотистые), избыток воды, солей, чужеродные вещества; поддерживает постоянство внутренней среды.\n\nСостав: 93–95 % вода. Те же вещества, что в плазме, кроме белков, жиров, глюкозы (в норме нет). Органические: преобладает мочевина, также мочевая кислота, креатинин; минеральные: хлориды, сульфаты, фосфаты Na, K, Ca. Реакция: у травоядных щелочная, у плотоядных кислая, у свиней бывает кислой; плотность 1,018–1,040. У лошади мутная (кристаллы углекислого кальция).\n\nОбразование в нефронах, две фазы:\n• Фильтрация — в мальпигиевом клубочке под давлением крови (70–90 мм рт. ст.) образуется первичная моча (плазма без белков); из 10 л крови ~1 л первичной мочи\n• Реабсорбция — в извитых канальцах всасываются вода, глюкоза, аминокислоты, соли; мочевина, мочевая кислота, креатинин, сульфаты не всасываются. Идут секреция и синтез (гиппуровая кислота у травоядных) → концентрированная конечная моча\n\nПуть: собирательные трубки → лоханки → мочеточники → мочевой пузырь → наружу. Регуляция: нервная система, антидиуретический гормон, альдостерон."}, {"num": "83", "category": "Эндокринная система", "q": "Надпочечники, их строение и функция", "hint": "• Парные, у краниального конца почки; две разные железы в одной\n• Корковое вещество vs мозговое — что где?\n• Три зоны коры: клубочковая (альдостерон), пучковая (глюкокортикоиды), сетчатая (половые)\n• Что регулирует деятельность коры? (АКТГ)\n• Мозговое: адреналин и норадреналин — гормоны «тревоги»\n• Действие адреналина: сердце, сосуды, сахар, зрачок", "a": "Надпочечники — парные железы у краниального конца каждой почки; две разные по происхождению и функции части: корковое (кора) и мозговое вещество.\n\nКорковое вещество — кортикостероиды из холестерина, три зоны:\n• Клубочковая — минералокортикоиды (альдостерон): минеральный обмен, задержка Na и воды, выведение K, осмотическое и кровяное давление\n• Пучковая — глюкокортикоиды (кортизол, кортикостерон): углеводный, белковый, жировой обмен, образование глюкозы из белков, противовоспалительное и противоаллергическое действие, устойчивость к стрессу\n• Сетчатая — половые гормоны (андрогены, эстрогены)\n\nГормоны коры жизненно необходимы (при недостаточности животное гибнет). Регуляция — АКТГ передней доли гипофиза.\n\nМозговое вещество — адреналин и норадреналин (катехоламины). Адреналин: усиливает и учащает работу сердца, суживает сосуды, ↑ давление, расширяет зрачок и бронхи, тормозит ЖКТ, ↑ сахар крови (распад гликогена). Гормоны «тревоги», действуют как симпатическая НС.\n\nИтог: надпочечники важны для обмена веществ, приспособления к неблагоприятным условиям, постоянства внутренней среды."}, {"num": "84", "category": "Эндокринная система", "q": "Гипофиз: топография, строение, функции, гормоны", "hint": "• Где? (турецкое седло, ножка к гипоталамусу — либерины/статины)\n• Три доли: передняя (аденогипофиз), средняя, задняя (нейрогипофиз)\n• Передняя — 6 гормонов: СТГ (гигантизм/акромегалия), ТТГ, АКТГ, ФСГ, ЛГ, пролактин\n• Какие два — гонадотропные?\n• Средняя — меланотропин\n• Задняя сама не образует — что накапливает? (окситоцин, вазопрессин из гипоталамуса)", "a": "Гипофиз (нижний мозговой придаток) — железа у основания мозга в турецком седле клиновидной кости; ножкой соединён с гипоталамусом (его либерины и статины регулируют гипофиз). Управляет другими железами.\n\nТри доли: передняя (аденогипофиз), средняя, задняя (нейрогипофиз).\n\nПередняя — 6 гормонов:\n• Соматотропин (СТГ, гормон роста) — рост, синтез белка; избыток у молодняка → гигантизм, у взрослых → акромегалия, недостаток → карликовость\n• Тиротропин (ТТГ) — стимулирует щитовидную железу\n• Кортикотропин (АКТГ) — рост коры надпочечников, пучковая и сетчатая зоны\n• Фоллитропин (ФСГ) — сперматогенез / рост фолликулов\n• Лютропин (ЛГ) — овуляция, жёлтое тело, половые гормоны\n• Пролактин (ЛТГ) — сохраняет жёлтое тело, образование молока\nФСГ и ЛГ — гонадотропные.\n\nСредняя — меланотропин (пигментные клетки кожи у рыб, амфибий, рептилий; у млекопитающих роль неясна).\n\nЗадняя (нейрогипофиз) — гормонов не образует, накапливает и выделяет окситоцин и вазопрессин (из ядер гипоталамуса). Окситоцин — сокращение матки, выведение молока. Вазопрессин (АДГ) — реабсорбция воды в почках, ↓ диурез, ↑ кровяное давление."}, {"num": "85", "category": "Высшая нервная деятельность", "q": "Учение И.П. Павлова об условных и безусловных рефлексах", "hint": "• Кто автор учения о ВНД? Что лежит в основе — рефлекс\n• Две группы рефлексов: врождённые vs приобретённые\n• Где замыкаются: низшие отделы ЦНС vs кора\n• Условия выработки условного рефлекса (4 пункта, сигнал ПЕРЕД безусловным)\n• Что такое временная нервная связь? Пример с лампочкой\n• Угасание и виды торможения; применение в животноводстве", "a": "И.П. Павлов — учение о ВНД, в основе рефлекс (ответ на раздражение через нервную систему). Рефлексы: безусловные и условные.\n\nБезусловные:\n• врождённые, постоянные, наследственные, одинаковые у вида\n• через низшие отделы ЦНС (спинной мозг, ствол), на адекватный раздражитель\n• примеры: пищевой, оборонительный, половой, ориентировочный, сосательный\n• приспособление к постоянным условиям; сложные = инстинкты\n\nУсловные:\n• приобретённые, индивидуальные, непостоянные, на основе безусловных\n• обязательно участие коры; тонкое приспособление к меняющимся условиям\n\nУсловия выработки: совпадение во времени условного и безусловного раздражителей (условный сигнал предшествует безусловному); многократное сочетание; деятельное состояние коры. Образуется временная нервная связь. Пример: лампочка + кормление → лампочка вызывает слюноотделение.\n\nУсловные рефлексы угасают без подкрепления. Торможение внешнее (безусловное) и внутреннее (условное). Применение: объяснение дрессировки, навыков, стереотипов; в животноводстве — рефлексы на кормление, доение, распорядок."}, {"num": "86", "category": "Размножение и лактация", "q": "Беременность, её продолжительность у с/х животных разных видов. Роды", "hint": "• Что такое беременность? Что происходит с половыми циклами, жёлтым телом, маткой\n• Роль плаценты\n• Числа-ориентиры: корова ~285, лошадь ~340, овца/коза ~150, свинья ~114\n• Роды — какой это процесс? Подготовка за 3-4 недели (вымя, молозиво, релаксин)\n• Гормональный сдвиг перед родами: прогестерон ↓, эстрогены ↑, окситоцин\n• Что такое послед?", "a": "Беременность — состояние самки от оплодотворения до рождения плода. С её наступлением: прекращаются половые циклы, сохраняется жёлтое тело (прогестерон), увеличивается матка, развивается молочная железа, растёт потребность в питании. Через плаценту плод получает питание и кислород, отдаёт продукты обмена.\n\nПродолжительность (сутки): корова ~285 (240-310), лошадь ~340 (307-412), овца/коза ~150 (140-160), свинья ~114 (110-140), собака ~62 (59-65), кролик ~30 (28-33), кошка ~58, осёл ~380, верблюд ~365.\n\nРоды — рефлекторный физиологический процесс рождения живого плода. Подготовка: за 3-4 недели у коров и кобыл отекает вымя, перед родами — секреция молозива; релаксин расслабляет связки родовых путей. К концу: прогестерон ↓, эстрогены ↑, растёт чувствительность матки к окситоцину и ацетилхолину. Раздражение интерорецепторов → ритмические сокращения мышц матки → роды. У кобыл и свиней роды быстрые, у жвачных продолжительнее. После — выделение последа (плодных оболочек)."}, {"num": "87", "category": "Размножение и лактация", "q": "Характеристика органов размножения самок", "hint": "• Три группы органов: железы, пути, наружные\n• Яичники — двойная функция (какая?); фолликул, овуляция, эстрогены, жёлтое тело/прогестерон\n• Яйцепроводы — где происходит оплодотворение? бахромка\n• Матка двурогая: рога, тело, шейка; три оболочки (эндо-, мио-, серозная)\n• Влагалище, преддверие, наружные органы\n• Видовые особенности (свинья, крольчиха — многоплодие)", "a": "Половой аппарат самок: образование яйцеклеток, оплодотворение, развитие плода, роды, выкармливание. Деление: половые железы (яичники), половые пути (яйцепроводы, матка, влагалище), наружные органы (преддверие, половые губы, клитор).\n\nЯичники — парные, двойная функция:\n• образование и созревание яйцеклеток в фолликулах; выход яйцеклетки = овуляция\n• железа внутренней секреции: фолликулы → эстрогены (течка, возбуждение); жёлтое тело → прогестерон (сохраняет беременность)\n\nЯйцепроводы — извитые трубки от яичника к матке; здесь обычно оплодотворение; воронка-бахромка захватывает яйцеклетку.\n\nМатка — мышечный полый орган, у с/х животных двурогая: рога (в них плод), тело, шейка (узкий канал, закрыт при беременности). Стенка: слизистая (эндометрий), мышечная (миометрий), серозная.\n\nВлагалище — для совокупления и родов; преддверие общее для половых и мочевых путей. Наружные органы: половые губы, клитор. Видовое: у свиньи и крольчихи длинные рога (многоплодие), у коровы/кобылы — карункулы."}, {"num": "88", "category": "Дыхание", "q": "Регуляция дыхания", "hint": "• Два пути регуляции: рефлекторный и гуморальный\n• Дыхательный центр — где? состав (вдох/выдох); пневмотаксис; автоматизм\n• Рефлекс: растяжение лёгких → блуждающий нерв → смена вдоха выдохом\n• Главный гуморальный возбудитель — что? (CO2). Опыт перекрёстного кровообращения\n• Хеморецепторы дуги аорты и каротидного синуса\n• Защитные рефлексы: чиханье, кашель", "a": "Дыхание регулируется рефлекторным (нервным) и гуморальным путями для обеспечения O2 и удаления CO2.\n\nДыхательный центр — в продолговатом мозге, двусторонний, из центров вдоха и выдоха. Центр пневмотаксиса в варолиевом мосту контролирует его; участвует и кора. Центр обладает автоматизмом (связан с накоплением CO2).\n\nРефлекторная регуляция: при вдохе лёгкие растягиваются → рецепторы → по блуждающему нерву в центр → торможение вдоха, возбуждение выдоха → выдох; при спадении лёгких вновь возбуждается вдох. Вдох вызывает выдох, выдох — вдох. Участвуют рецепторы межрёберных мышц и диафрагмы.\n\nГуморальная регуляция — важнейшая. Специфический возбудитель — углекислота крови: при ↑CO2, ↓O2, ↑молочной кислоты дыхание учащается и углубляется (доказано опытом с перекрёстным кровообращением). Хеморецепторы дуги аорты и каротидного синуса усиливают дыхание. Кора даёт условные дыхательные рефлексы. Защитные рефлексы: чиханье, кашель."}, {"num": "89", "category": "Высшая нервная деятельность", "q": "Учение И.П. Павлова о типах высшей нервной деятельности", "hint": "• Три свойства нервных процессов — какие? (сила, уравновешенность, подвижность)\n• Сколько типов и с чем совпадают (темпераменты Гиппократа)\n• Сангвиник = сильный, уравновешенный, ? \n• Флегматик, холерик, меланхолик — какие сочетания свойств?\n• Слабый тип — это кто?\n• Значение для животноводства", "a": "Павлов создал учение о типах ВНД на основе трёх свойств нервных процессов (возбуждения и торможения):\n• сила — способность выдерживать сильные/длительные раздражения, не переходя в торможение (сильные и слабые)\n• уравновешенность — соотношение возбуждения и торможения (уравновешенные и неуравновешенные)\n• подвижность — способность быстро сменять возбуждение торможением и наоборот (подвижные и инертные)\n\nЧетыре типа (совпадают с темпераментами Гиппократа):\n• Сильный, уравновешенный, подвижный (сангвиник) — живые, легко приспосабливаются, быстро вырабатывают и переделывают рефлексы\n• Сильный, уравновешенный, инертный/спокойный (флегматик) — спокойные, рефлексы прочные, но переделываются медленно\n• Сильный, неуравновешенный/безудержный (холерик) — возбудимые, агрессивные, преобладает возбуждение\n• Слабый (меланхолик) — трусливые, легко тормозимые, плохо переносят сильные раздражители, рефлексы вырабатываются с трудом\n\nЗначение: подбор животных для целей, дрессировка, отбор на продуктивность."}, {"num": "90", "category": "Обмен веществ", "q": "Теплорегуляция", "hint": "• Определение; теплокровные vs холоднокровные\n• Температурные ориентиры: корова 37,5-39, лошадь, овца/коза, курица 40,5-42\n• Гибель: ниже 24 и выше 44 C\n• Два вида регуляции: химическая (тепло-?) и физическая (тепло-?)\n• Где образуется тепло (мышцы ~3/4, печень)? Пути теплоотдачи\n• Видовое: собака — слабые потовые железы → как отдаёт тепло?\n• Центры регуляции (гипоталамус) и гормоны", "a": "Теплорегуляция — процессы, поддерживающие постоянство температуры тела у теплокровных независимо от среды; у холоднокровных (рыбы, земноводные, пресмыкающиеся) температура меняется со средой.\n\nТемпература (в прямой кишке): корова 37,5-39,0; лошадь 37,5-38,5; овца/коза 38,5-40,0; свинья 38,0-40,0; собака 37,5-39,0; курица 40,5-42,0; утка 41,0-43,0 C. Зависит от возраста (у молодых выше), пола (у самцов выше), времени суток (ночью ниже). Гибель: ниже 24 C и выше 44 C.\n\nДва компонента:\n• Химическая (теплообразование) — окисление питательных веществ; ~3/4 тепла дают мышцы, много — печень, ЖКТ, жвачка. При охлаждении усиливается.\n• Физическая (теплоотдача) — через поверхность тела: теплопроводность, излучение, испарение пота (лошадь, КРС, овца). У собак потовые железы слабые → теплоотдача испарением слюны с языка и через дыхательные пути.\n\nПри перегреве: сосуды кожи расширяются, ↑ потоотделение и дыхание; при охлаждении: сосуды сужаются, волосы поднимаются. Регуляция: кора, центры теплорегуляции гипоталамуса, гормоны (тиротропин, тироксин, адреналин)."}, {"num": "91", "category": "Кожный покров", "q": "Волосяной покров, физиология линьки", "hint": "• Функции волосяного покрова; волос — производное чего?\n• Строение волоса: стержень и корень; луковица, сосочек; слои стержня (сердцевина, корковый, кутикула); пигмент\n• Мышца-подниматель, сальные железы\n• 4 типа волос: покровные, пуховые, длинные, осязательные (вибриссы)\n• Линька: сезонная vs постоянная\n• Регуляция: гормоны, световой день, температура", "a": "Волосяной покров — совокупность волос на коже млекопитающих; защита от повреждений, холода, перегрева, участие в осязании. Волос — нитевидное роговое производное эпидермиса.\n\nСтроение: стержень (над кожей) и корень (в фолликуле). Нижняя часть корня — волосяная луковица, в основании волосяной сосочек с сосудами (питание). Рост за счёт деления клеток луковицы. В стержне: сердцевина, корковый слой, кутикула (чешуйки). Цвет — от меланина. К фолликулу прикреплена мышца-подниматель волоса; в мешок открываются протоки сальных желёз.\n\nТипы волос: покровные (остевые), пуховые (подшёрсток), длинные (защитные — грива, хвост, щётки), осязательные (синуозные, вибриссы).\n\nЛинька — периодическая смена волос. Виды: сезонная (весна/осень, меняется густота) и постоянная (перманентная, круглый год). Весной выпадает зимний подшёрсток, осенью отрастает густая шерсть. Регуляция: нервная система, гормоны (щитовидной и половых желёз), длина светового дня, температура, кормление. У птиц — смена перьевого покрова."}, {"num": "92", "category": "Эндокринная система", "q": "Гормоны, их свойства и механизм действия", "hint": "• Что такое гормоны? куда выделяются?\n• 5 свойств: высокая активность, специфичность (орган-мишень), дистантность, недолговечность (где разрушаются?), отсутствие видовой специфичности\n• 3 химические группы: белковые/пептидные, производные аминокислот, стероидные — примеры\n• Два механизма: поверхностный (мембрана + цАМФ) vs проникающий (на ДНК ядра) — какие гормоны как?\n• Регуляция: нервная система, гипофиз, обратная связь", "a": "Гормоны — биологически активные вещества эндокринных желёз, выделяются прямо в кровь; гуморальная регуляция обмена, роста, развития, размножения.\n\nСвойства:\n• высокая биологическая активность (малые дозы)\n• специфичность — орган-мишень\n• дистантность — действуют вдали от места образования\n• относительная недолговечность — быстро разрушаются (в печени)\n• отсутствие видовой специфичности у многих (гормон одного вида действует у другого — используют препараты)\n\nПо химической природе:\n• белковые и пептидные (инсулин, гормоны гипофиза)\n• производные аминокислот (тироксин, адреналин)\n• стероидные (кора надпочечников, половые железы)\n\nМеханизм действия:\n• белковые, пептидные, адреналин — связываются с рецепторами мембраны, через посредник (цАМФ) активируют ферменты\n• стероидные и тироксин — проникают в клетку, действуют на ДНК ядра, регулируют синтез белков-ферментов\n\nРегуляция выработки: нервная система и гипофиз по принципу обратной связи (единство нервной и гуморальной регуляции)."}, {"num": "93", "category": "Пищеварение", "q": "Слюна и слюноотделение", "hint": "• Три пары крупных желёз: околоушные (серозные), подъязычные и нижнечелюстные (смешанные)\n• Состав: вода ~99%, муцин, неорганика; pH жвачных 8,1-8,3, лошади/свиньи 7,2-7,5\n• Значение: смачивание, муцин, нейтрализация, бактерицидность (лизоцим), вкус\n• Где есть амилаза (птиалин) и мальтаза? (свинья); у кого нет?\n• Объёмы: КРС 90-190 л, овца 6-10, свинья до 15\n• Регуляция: центр в продолговатом мозге, безусловное и условное (Павлов)", "a": "Слюна — пищеварительный сок слюнных желёз. Три пары крупных: околоушные (серозные, жидкая прозрачная), подъязычные и нижнечелюстные (смешанные, вязкая с муцином), плюс мелкие железы рта.\n\nСостав: вода 99-99,4%, органика (муцин), неорганика (хлориды, сульфаты, карбонаты Na, K, Ca). Реакция слабощелочная: pH жвачных 8,1-8,3; лошади и свиньи 7,2-7,5.\n\nЗначение: смачивает корм; муцин обволакивает ком (проглатывание); щёлочи нейтрализуют кислоты желудка; бактерицидность (лизоцим, ингибан); растворяет вещества для восприятия вкуса.\n\nФерменты: у свиньи — альфа-амилаза (птиалин, крахмал → декстрины и мальтоза) и мальтаза (мальтоза → глюкоза); у лошади, жвачных, плотоядных их нет. Особо важна слюна жвачных: КРС 90-190 л/сут, овца 6-10 л — щелочная слюна поддерживает среду рубца. Свинья до 15 л/сут; у собак — только при приёме корма.\n\nРегуляция: центр в продолговатом мозге. Безусловное отделение — при попадании корма в рот; условное — на вид, запах, сигналы (классика Павлова)."}, {"num": "94", "category": "Пищеварение", "q": "Пищеварение в рубце", "hint": "• Рубец — самый крупный преджелудок; есть ли свои железы?\n• Кто переваривает: бактерии, инфузории, грибки; фермент целлюлаза\n• Главный процесс — клетчатка → ЛЖК (какие три? уксусная, пропионовая, масляная) → энергия\n• Превращение белков: микробный белок из небелкового азота (мочевина, карбамид)\n• Синтез витаминов B и K\n• Газы и тимпания; жвачка (руминация)", "a": "Рубец — самый крупный отдел сложного желудка жвачных; вместе с сеткой и книжкой относится к преджелудкам (без собственных желёз). Переваривание идёт за счёт микрофлоры и микрофауны.\n\nОбитатели: бактерии, инфузории (простейшие), грибки — симбиоз с животным; выделяют недостающие ферменты, прежде всего целлюлазу.\n\nГлавный процесс — переваривание клетчатки (целлюлозы): расщепление до сахаров → сбраживание в летучие жирные кислоты (уксусная, пропионовая, масляная). Они всасываются через стенку рубца, служат главным источником энергии и для синтеза молочного жира.\n\nБелки: микробы расщепляют белки корма и синтезируют полноценный микробный белок, в т.ч. из небелкового азота — мочевины, аммонийных солей (можно подкармливать карбамидом); микробный белок переваривается в сычуге и кишечнике. Синтезируются витамины группы B и K.\n\nПри брожении — газы (CO2, метан), удаляются отрыжкой; нарушение → тимпания (вздутие). Жвачка (руминация): отрыгивание, повторное пережёвывание, смачивание щелочной слюной, проглатывание. Стенка преджелудков ритмично сокращается. Жвачные хорошо используют грубые корма."}, {"num": "95", "category": "Нервная система и анализаторы", "q": "Обонятельный анализатор", "hint": "• Значение обоняния для с/х животных (корм, особи, охота, потомство)\n• Три части анализатора — какие?\n• Периферия: где рецепторы? (обонятельная область, решётчатая кость), обонятельный эпителий, волоски\n• Проводник: обонятельный нерв (I пара), решётчатая пластинка, обонятельные луковицы\n• Центр: обонятельный мозг\n• Кто такие макросматики?", "a": "Обонятельный анализатор — восприятие запахов (летучих веществ в воздухе). Значение для животных: поиск и оценка корма, распознавание особей, состояния охоты, узнавание потомства (по запаху), ориентация, избегание опасности. Сильно развит у собаки (ведущее чувство).\n\nТри части:\n• Периферическая — обонятельные рецепторы в обонятельной области слизистой носа (верхняя/дорсальная часть, область решётчатой кости); обонятельный эпителий с рецепторными клетками, имеющими волоски (реснички). Пахучие вещества растворяются в слизи, раздражают волоски → возбуждение.\n• Проводниковая — обонятельный нерв (I пара черепных нервов); волокна через решётчатую пластинку → обонятельные луковицы на основании мозга → обонятельные тракты к подкорковым центрам.\n• Центральная — корковый центр в обонятельном мозге (основание и медиальная часть полушарий); формирование и распознавание запаха.\n\nМакросматики (сильное обоняние): собака, лошадь, КРС. У человека и птиц слабее. Обоняние связано со вкусом в выборе корма."}, {"num": "96", "category": "Опорно-двигательный аппарат", "q": "Скелет головы", "hint": "• Функции черепа; соединения костей (швы) — какие кости подвижны?\n• Два отдела: мозговой и лицевой\n• Мозговой: непарные (затылочная с большим отверстием и мыщелками, клиновидная, решётчатая, межтеменная) и парные (теменные, лобные, височные — орган слуха)\n• Лицевой: парные (носовые, слёзные, скуловые, верхнечелюстные, резцовые, нёбные...) и непарные (сошник, подъязычная)\n• Придаточные пазухи (верхнечелюстная, лобная)\n• Видовое: рога у КРС, хоботковая кость свиньи, лёгкий череп птиц", "a": "Череп — костный остов головы; защита мозга и органов чувств, основа начальных отделов пищеварения и дыхания. Кости соединены швами неподвижно; подвижны только нижняя челюсть и подъязычная кость. Два отдела: мозговой и лицевой.\n\nМозговой отдел (черепная полость, мозг):\n• непарные: затылочная (большое затылочное отверстие, затылочные мыщелки для I шейного позвонка), клиновидная, решётчатая, межтеменная\n• парные: теменные, лобные, височные (орган слуха и равновесия). У рогатого скота лобные несут роговые отростки.\n\nЛицевой отдел (носовая, ротовая полости, глазницы):\n• парные: носовые, слёзные, скуловые, верхнечелюстные (верхние зубы), резцовые (межчелюстные), нёбные, крыловидные, нижние носовые раковины\n• непарные: сошник, подъязычная кость\n• нижняя челюсть — единственная подвижная кость, несёт нижние зубы, сочленяется с височной; захват и пережёвывание корма\n\nПридаточные пазухи (верхнечелюстная, лобная) сообщаются с носовой полостью, облегчают череп.\n\nВидовое: у КРС развиты лобные кости с роговыми отростками; у свиньи — хоботковая кость на носовых; у птиц череп лёгкий, тонкий, роговой клюв, большие глазницы."}], "pharma": [{"num": "1.1", "category": "Билет 1", "q": "Определение фармакологии. История фармакологии. Понятие о лекарственном веществе, лекарственном средстве, лекарственной форме и яде. Источники получения лекарственных средств. Фармакокинетика лекарственных средств. Фармакодинамика и механизм действия лекарственных веществ.", "hint": "• Фармакология = наука о действии лекарств на организм\n• Кинетика — что организм делает с лекарством (ВРМВ)\n• Динамика — что лекарство делает с организмом\n• Доза решает: лекарство или яд (Парацельс)", "a": "Определение:\n• Фармакология — наука, изучающая взаимодействие лекарственных веществ с организмом животных (действие, превращения, применение).\n\nИстория (кратко):\n• Древность — эмпирическое лечение травами; Гиппократ, Гален (галеновы препараты).\n• Парацельс — «всё есть яд, дело в дозе».\n• Развитие научной фармакологии — И.П. Павлов, Н.П. Кравков (основоположник русской фармакологии).\n\nОсновные понятия:\n• Лекарственное вещество — индивидуальное химическое соединение (субстанция) с лечебным действием.\n• Лекарственное средство (препарат) — вещество (или смесь), разрешённое к применению для лечения, профилактики, диагностики.\n• Лекарственная форма — удобное для применения состояние препарата (порошок, таблетка, раствор, мазь, болюс, свеча).\n• Яд — вещество, которое в малых дозах вызывает расстройство функций или гибель организма; различие лекарства и яда — в дозе.\n\nИсточники получения:\n• Растительные (алкалоиды, гликозиды, эфирные масла).\n• Животные (гормоны, ферменты, сыворотки, органопрепараты).\n• Минеральные (соли, кислоты, щёлочи).\n• Микробные/биотехнологические (антибиотики, вакцины).\n• Синтетические и полусинтетические.\n\nФармакокинетика (что организм делает с лекарством) — ВРМВ:\n• Всасывание (абсорбция) — поступление в кровь.\n• Распределение по тканям и органам.\n• Метаболизм (биотрансформация) — преимущественно в печени.\n• Выведение (экскреция) — почки, ЖКТ, лёгкие, молочные железы.\n\nФармакодинамика (что лекарство делает с организмом):\n• Изучает эффекты, локализацию и механизм действия.\n• Механизмы действия: воздействие на рецепторы (агонисты/антагонисты), влияние на ферменты, ионные каналы, физико-химическое и прямое химическое действие.\n• Виды действия: местное и резорбтивное; главное и побочное; прямое и косвенное (рефлекторное); обратимое и необратимое."}, {"num": "1.2", "category": "Билет 1", "q": "Антисептические красители, щелочи, мыла и детергенты.", "hint": "• Красители: зелёнка, метиленовая синь, этакридин\n• Щёлочи: сода, едкий натр — растворяют грязь, белок\n• Мыла — анионные ПАВ, моют и обеззараживают\n• Детергенты (катапол, хлоргексидин) — на мембрану микроба", "a": "Антисептические красители:\n• Действие: подавляют рост микробов (особенно грам«+»), связываясь с их белками; применяют наружно.\n• Бриллиантовый зелёный (Viride nitens) — 1–2% спиртовой/водный раствор; раны, гнойничковые поражения кожи, пиодермии.\n• Метиленовый синий (Methylenum coeruleum) — 1–3% спиртовой раствор наружно; 1% водный — при отравлении цианидами в/в; антисептик мочевых путей.\n• Этакридина лактат (риванол, Aethacridini lactas) — 0,05–0,2% водные растворы для промывания ран, полостей, слизистых.\n\nЩёлочи:\n• Действие: растворяют белки, слизь, омыляют жиры; обладают противомикробным и моющим действием; едкие — раздражают и прижигают.\n• Натрия гидрокарбонат (сода, Natrii hydrocarbonas) — 1–2% растворы для промываний, обработки слизистых.\n• Натрия карбонат (сода кальцинированная) и натра едкий (Natrii hydroxydum) — крепкие растворы для дезинфекции помещений, обеззараживания.\n• Аммиак (нашатырный спирт) — обезжиривание рук, дезинфекция.\n\nМыла (анионные ПАВ):\n• Соли высших жирных кислот; снижают поверхностное натяжение, эмульгируют грязь и жир.\n• Зелёное (калийное) мыло — мытьё, очистка кожи перед обработкой.\n• Мыльный спирт — для механической очистки и дезинфекции.\n\nДетергенты (поверхностно-активные вещества):\n• Механизм: нарушают проницаемость клеточной мембраны микробов.\n• Катионные (наиболее активны как антисептики): хлоргексидина биглюконат, бензалкония хлорид, церигель, катапол, дегмицид, роккал — обработка рук, операционного поля, ран, инструментов.\n• Анионные — собственно мыла (моющее + слабое противомикробное действие).\n• Применение: антисептика рук, кожи, обработка ран, дезинфекция."}, {"num": "1.3", "category": "Билет 1", "q": "Выписать молочную кислоту корове при атонии преджелудков.", "hint": "• Acidum lacticum — молочная кислота\n• Разводить до 2% (≈ 10–15 мл на воду)\n• Внутрь, противобродильное, восстанавливает моторику\n• M.D.S. — выпоить корове в воде", "a": "Rp.: Acidi lactici 15,0\n     Aquae destillatae 700 ml\n     M.D.S. Внутреннее. Корове. Выпоить в один приём при атонии (гипотонии) преджелудков; даётся как противобродильное и стимулирующее моторику рубца средство (примерно 2% раствор).\n\nПояснение:\nМолочная кислота КРС назначается внутрь в дозе 10–15 мл (до 40 мл), обязательно в разведении до 2% концентрации (нельзя давать концентрат). Действует как противобродильное, антисептическое и спазмолитическое средство, активирует моторику преджелудков и отрыжку. При необходимости введение повторяют. Концентрированную кислоту в чистом виде задавать нельзя — вызывает ожог слизистой."}, {"num": "2.1", "category": "Билет 2", "q": "Общая характеристика средств общей анестезии. Средства для неингаляционного наркоза. Средства для ингаляционного наркоза.", "hint": "• Наркоз — обратимое угнетение ЦНС, выключение сознания и боли\n• Стадии: анальгезия → возбуждение → хирургическая → пробуждение\n• Неингаляционные — в/в: тиопентал, кетамин, пропофол\n• Ингаляционные — пары/газы: эфир, галотан, изофлуран, N2O", "a": "Общая характеристика:\n• Средства общей анестезии (наркозные) — угнетают ЦНС, вызывая обратимую утрату сознания, всех видов чувствительности (особенно болевой), расслабление скелетных мышц и угнетение рефлексов.\n• Стадии наркоза: I — анальгезия; II — возбуждение; III — хирургическая (наркоз); IV — пробуждение (или передозировка — паралич центров).\n• По способу введения делят на неингаляционные и ингаляционные.\n\nСредства для неингаляционного наркоза:\n• Вводят парентерально (чаще внутривенно), реже внутрь; наркоз наступает быстро, без стадии возбуждения, удобны в полевых условиях.\n• Барбитураты: тиопентал-натрий (Thiopentalum-natrium), гексенал — кратковременный наркоз.\n• Небарбитуровые: кетамин (Ketaminum, калипсол), пропофол (Propofolum), натрия оксибутират (натрия оксибат), пропанидид.\n• Применение: кратковременные операции, вводный наркоз, обездвиживание животных.\n\nСредства для ингаляционного наркоза:\n• Вводят через дыхательные пути (пары летучих жидкостей или газы); наркоз легко управляем по глубине.\n• Летучие жидкости: эфир для наркоза (Aether pro narcosi), галотан (фторотан), изофлуран, севофлуран, энфлуран.\n• Газообразные: закись азота (Nitrogenium oxydulatum), циклопропан.\n• Применение: длительные операции; часто в комбинации с неингаляционными средствами (комбинированный наркоз) и миорелаксантами."}, {"num": "2.2", "category": "Билет 2", "q": "Понятие о прямом и косвенном действии фармакологических веществ; сущность действия, формы проявления, значение.", "hint": "• Прямое — лекарство действует на сам орган-мишень\n• Косвенное (рефлекторное) — через другой орган/рефлекс\n• Пример косвенного: чемерица раздражает желудок → усиливает рубец\n• Сердечные гликозиды — прямое на миокард", "a": "Сущность действия:\n• Действие лекарства — изменение функций органов и систем в результате его взаимодействия с тканями организма.\n\nПрямое действие:\n• Лекарственное вещество действует непосредственно на орган или ткань, с которыми контактирует.\n• Развивается в месте приложения или в органе-мишени.\n• Примеры: сердечные гликозиды (дигоксин) усиливают сокращения миокарда; адреналин — прямо на адренорецепторы сосудов.\n\nКосвенное (непрямое, рефлекторное) действие:\n• Эффект возникает в одном органе, а проявляется в другом — через нервные рефлексы или гуморальные механизмы.\n• Раздражение рецепторов в одном месте вызывает ответную реакцию в другом органе.\n• Примеры: настойка чемерицы раздражает рецепторы желудка и рефлекторно усиливает моторику преджелудков; горечи (полынь) усиливают аппетит и секрецию через рефлекс со вкусовых рецепторов; нашатырный спирт рефлекторно возбуждает дыхательный центр.\n\nФормы проявления и значение:\n• Местное действие — в месте нанесения (до всасывания).\n• Резорбтивное — после всасывания в кровь.\n• Главное (лечебное) и побочное действие.\n• Значение: знание прямого и косвенного действия позволяет правильно выбрать препарат, путь введения и предвидеть эффект и побочные реакции при лечении животных."}, {"num": "2.3", "category": "Билет 2", "q": "Выписать настойку чемерицы корове при тимпании.", "hint": "• Tinctura Veratri — настойка чемерицы\n• Доза КРС внутрь 5–12 мл\n• Разводить в воде (0,5–1 л)\n• Рвотное/руминаторное — усиливает моторику рубца, отрыжку", "a": "Rp.: Tincturae Veratri 10 ml\n     D.S. Внутреннее. Корове. Развести в 0,5–1 л воды и выпоить в один приём при тимпании рубца; рефлекторно усиливает моторику преджелудков, вызывает отрыжку и руминацию.\n\nПояснение:\nНастойку чемерицы (Tinctura Veratri) КРС задают внутрь в дозе 5–12 мл на голову (0,01–0,024 мл/кг), обязательно в разведении водой (50–500 мл и более по массе). Действует как руминаторное и рвотное средство: раздражает рецепторы желудка, рефлекторно восстанавливает и усиливает сокращения преджелудков, отрыжку и жвачку. При передозировке возможно отравление вератровыми алкалоидами (антидот — 1% раствор атропина сульфата), поэтому строго соблюдать дозу."}, {"num": "3.1", "category": "Билет 3", "q": "Закономерности распределения фармакологических веществ в организме. Понятие о дозах: разовые, суточные, курсовые, летальные, токсические, минимальные, средние, максимальные.", "hint": "• Распределение: кровь → органы по кровотоку\n• Барьеры: ГЭБ, плацентарный; связь с белками\n• Доза: разовая, суточная, курсовая\n• По силе: минимальная → средняя → высшая → токсическая → летальная", "a": "Распределение веществ в организме:\n• Распределение — переход всосавшегося вещества из крови в органы и ткани.\n• Скорость и полнота зависят от кровоснабжения органа (быстрее в сердце, печень, почки, мозг; медленнее в жир, кости).\n• Связывание с белками плазмы (альбумины): связанная фракция неактивна, является депо.\n• Биологические барьеры: гематоэнцефалический (ГЭБ), плацентарный, гематоофтальмический — ограничивают проникновение.\n• Жирорастворимые (липофильные) вещества проникают через мембраны и барьеры легче, чем водорастворимые.\n• Депонирование: накопление в тканях (жир, кости, печень) с последующим высвобождением.\n\nПонятие о дозе:\n• Доза — количество вещества, вводимого на один приём (выражают в г, мг, мл, ЕД, на кг массы).\n\nКлассификация доз по времени:\n• Разовая (pro dosi) — на один пр
